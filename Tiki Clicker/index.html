<!DOCTYPE html>
<html>
<head>
  <title>Tiki Clicker</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../Favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #0e0500;
      --bg2: #1a0800;
      --accent: #ff6a00;
      --accent2: #ff3a00;
      --card: rgba(255,100,0,0.10);
      --card-hover: rgba(255,100,0,0.18);
      --text: #fff5ee;
      --muted: rgba(255,245,238,0.68);
      --gold: #ffb347;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      font-family: 'Rubik', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,100,0,0.22), transparent 38%),
        radial-gradient(circle at 85% 80%, rgba(255,50,0,0.18), transparent 36%),
        radial-gradient(circle at 50% 50%, rgba(30,5,0,0.7), transparent 70%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    /* ── HOME BUTTON ── */
    #homeText {
      position: fixed;
      top: 12px;
      left: 14px;
      font-family: 'Rubik', sans-serif;
      font-size: 1.6em;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.18s;
      z-index: 1000;
      user-select: none;
      color: var(--text);
      opacity: 0.92;
      text-shadow: 0 0 18px rgba(255,100,0,0.5);
    }
    #homeText:hover { transform: scale(1.13); }

    /* ── FULLSCREEN BUTTON ── */
    #fullscreenBtn {
      position: fixed;
      top: 12px;
      right: 14px;
      background: rgba(255,100,0,0.15);
      border: 1px solid rgba(255,100,0,0.28);
      color: var(--text);
      font-size: 1.4em;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, transform 0.18s;
      backdrop-filter: blur(8px);
    }
    #fullscreenBtn:hover { background: rgba(255,100,0,0.28); transform: scale(1.08); }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 70px 16px 40px;
      min-height: 100vh;
    }

    h1 {
      font-size: clamp(2em, 7vw, 4em);
      font-weight: 900;
      background: linear-gradient(135deg, #ffb347, #ff6a00, #ff3a00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
      text-shadow: none;
      filter: drop-shadow(0 0 18px rgba(255,100,0,0.45));
    }

    /* ── CLICKS COUNTER ── */
    #counterWrap {
      text-align: center;
      margin-bottom: 12px;
    }
    #clickCount {
      font-size: clamp(2.2em, 6vw, 3.8em);
      font-weight: 900;
      color: var(--gold);
      display: block;
      filter: drop-shadow(0 0 12px rgba(255,179,71,0.5));
    }
    #cpsDisplay {
      font-size: 0.95em;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── MAIN AREA: TIKI + SHOP ── */
    #mainArea {
      display: flex;
      gap: 28px;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      max-width: 1000px;
    }

    /* ── TIKI CIRCLE ── */
    #tikiWrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }
    #tikiCircle {
      width: min(260px, 44vw);
      height: min(260px, 44vw);
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow:
        0 0 0 4px rgba(255,100,0,0.35),
        0 0 40px rgba(255,80,0,0.35),
        0 12px 40px rgba(0,0,0,0.5);
      animation: tikiBob 2.4s ease-in-out infinite;
      transition: transform 0.08s, box-shadow 0.08s;
      user-select: none;
      -webkit-user-select: none;
    }
    #tikiCircle:active {
      transform: scale(0.93);
      box-shadow:
        0 0 0 4px rgba(255,100,0,0.55),
        0 0 60px rgba(255,80,0,0.55),
        0 6px 20px rgba(0,0,0,0.5);
      animation: none;
    }
    @keyframes tikiBob {
      0%   { transform: translateY(0px) rotate(-0.5deg); }
      25%  { transform: translateY(-6px) rotate(0.5deg); }
      50%  { transform: translateY(-10px) rotate(-0.5deg); }
      75%  { transform: translateY(-6px) rotate(0.5deg); }
      100% { transform: translateY(0px) rotate(-0.5deg); }
    }
    #tikiImg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      border-radius: 50%;
    }
    #tikiImgFallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5em;
      background: radial-gradient(circle, #3a1200, #1a0500);
      border-radius: 50%;
    }

    #clickHint {
      margin-top: 14px;
      font-size: 0.9em;
      color: var(--muted);
      text-align: center;
    }

    /* ── CLICK PARTICLES ── */
    .click-particle {
      position: fixed;
      font-size: 1.1em;
      font-weight: 900;
      color: var(--gold);
      pointer-events: none;
      z-index: 9999;
      animation: floatUp 0.85s ease-out forwards;
      text-shadow: 0 0 8px rgba(255,179,71,0.8);
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(0.7); }
    }

    /* ── SHOP ── */
    #shop {
      flex: 1;
      min-width: 0;
      max-width: 440px;
    }
    #shopTitle {
      font-size: 1.3em;
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 1px;
    }

    .shop-section-label {
      font-size: 0.78em;
      font-weight: 700;
      color: rgba(255,179,71,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 12px 0 6px;
      padding-left: 4px;
    }

    .shop-item {
      background: var(--card);
      border: 1px solid rgba(255,100,0,0.18);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: background 0.18s, border-color 0.18s;
    }
    .shop-item.affordable { border-color: rgba(255,100,0,0.38); }
    .shop-item.affordable:hover { background: var(--card-hover); }
    .shop-item.maxed { border-color: rgba(255,179,71,0.35); background: rgba(255,179,71,0.06); }

    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-weight: 700;
      font-size: 0.95em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-desc {
      font-size: 0.78em;
      color: var(--muted);
      margin-top: 2px;
    }
    .item-owned {
      font-size: 0.74em;
      color: var(--gold);
      margin-top: 2px;
    }

    .buy-btn {
      background: linear-gradient(145deg, #ff6a00, #cc3000);
      color: #fff5ee;
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      font-size: 0.82em;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: filter 0.15s, transform 0.12s;
      box-shadow: 0 4px 14px rgba(255,80,0,0.3);
    }
    .buy-btn:hover:not(:disabled) { filter: brightness(1.14); transform: scale(1.04); }
    .buy-btn:active:not(:disabled) { transform: scale(0.96); }
    .buy-btn:disabled {
      background: rgba(100,50,20,0.35);
      color: rgba(255,245,238,0.32);
      cursor: not-allowed;
      box-shadow: none;
    }
    .buy-btn.maxed-btn {
      background: linear-gradient(145deg, #ffd060, #e09000);
      color: #1a0800;
      cursor: default;
    }

    /* ── RESET BUTTON ── */
    #resetBtn {
      display: block;
      margin: 28px auto 0;
      background: rgba(255,50,50,0.12);
      border: 1px solid rgba(255,50,50,0.25);
      color: rgba(255,180,180,0.75);
      font-family: 'Rubik', sans-serif;
      font-size: 0.8em;
      padding: 7px 18px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }
    #resetBtn:hover { background: rgba(255,50,50,0.22); color: #ffc0c0; }

    /* ── PREVIEW OVERLAY (from CheeseArt) ── */
    #previewOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 5000;
    }
    #previewOverlay.show { opacity: 1; pointer-events: auto; }
    #previewImage {
      max-width: 96vw;
      max-height: 96vh;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.6);
      border-radius: 50%;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,10,0,0.95);
      border: 1px solid rgba(255,100,0,0.35);
      color: var(--gold);
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 999px;
      font-size: 0.92em;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 9000;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      #mainArea { flex-direction: column; align-items: center; }
      #shop { max-width: 100%; width: 100%; }
      #tikiCircle { width: min(220px, 72vw); height: min(220px, 72vw); }
    }
  </style>
</head>
<body>

<div id="homeText" onclick="goHome()">Wren.fun</div>
<button id="fullscreenBtn" title="Toggle Fullscreen">⛶</button>

<div id="app">
  <h1>🗿 Tiki Clicker</h1>

  <div id="counterWrap">
    <span id="clickCount">0</span>
    <div id="cpsDisplay">0 clicks per second</div>
  </div>

  <div id="mainArea">
    <!-- TIKI -->
    <div id="tikiWrap">
      <div id="tikiCircle" onclick="handleClick(event)">
        <img id="tikiImg" src="tikitheg.jpg" alt="Tiki" onerror="this.style.display='none';document.getElementById('tikiImgFallback').style.display='flex';">
        <div id="tikiImgFallback" style="display:none;">🗿</div>
      </div>
      <div id="clickHint">Click the Tiki!</div>
    </div>

    <!-- SHOP -->
    <div id="shop">
      <div id="shopTitle">🛒 Tiki Shop</div>

      <!-- AUTO-CLICK UPGRADES -->
      <div class="shop-section-label">⚙️ Auto Click</div>
      <div id="autoClickShop"></div>

      <!-- MULTIPLIER UPGRADES -->
      <div class="shop-section-label">✖️ Click Multiplier</div>
      <div id="multiplierShop"></div>
    </div>
  </div>

  <button id="resetBtn" onclick="confirmReset()">🔄 Reset Progress</button>
</div>

<!-- Fullscreen preview overlay (from CheeseArt pattern) -->
<div id="previewOverlay" onclick="closePreview()">
  <img id="previewImage" alt="Tiki Preview">
</div>

<div id="toast"></div>

<script>
// ── STATE ──
const SAVE_KEY = 'tikiClicker_save';

const AUTO_LEVELS = [
  { level:1, label:'Auto Click Lv.1', rate:1,     interval:4000,  cost:100  },
  { level:2, label:'Auto Click Lv.2', rate:1,     interval:3000,  cost:200  },
  { level:3, label:'Auto Click Lv.3', rate:1,     interval:2000,  cost:300  },
  { level:4, label:'Auto Click Lv.4', rate:1,     interval:1000,  cost:500  },
  { level:5, label:'Auto Click Lv.5', rate:1,     interval:500,   cost:750  },
  { level:6, label:'Auto Click Lv.6', rate:1,     interval:250,   cost:2000 },
  { level:7, label:'Auto Click Lv.7', rate:1,     interval:100,   cost:4000 },
  { level:8, label:'Auto Click Lv.8', rate:1,     interval:50,    cost:10000},
];

const MULT_LEVELS = [
  { level:2,  label:'x2 Clicks',  cost:500  },
  { level:3,  label:'x3 Clicks',  cost:1200 },
  { level:4,  label:'x4 Clicks',  cost:2500 },
  { level:5,  label:'x5 Clicks',  cost:5000 },
  { level:10, label:'x10 Clicks', cost:12000},
  { level:20, label:'x20 Clicks', cost:30000},
  { level:50, label:'x50 Clicks', cost:100000},
];

let state = {
  clicks: 0,
  autoLevel: 0,    // 0 = none, 1-8 = highest purchased
  multLevel: 1,    // current multiplier (1x default)
  multPurchased: 0 // index of highest mult purchased (0 = none)
};

function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      state.clicks = Number(s.clicks) || 0;
      state.autoLevel = Number(s.autoLevel) || 0;
      state.multLevel = Number(s.multLevel) || 1;
      state.multPurchased = Number(s.multPurchased) || 0;
    }
  } catch(e) {}
}

function saveState() {
  localStorage.setItem(SAVE_KEY, JSON.stringify(state));
}

// ── AUTO-CLICK TIMER ──
let autoTimer = null;

function getAutoClicksPerSecond() {
  if (state.autoLevel === 0) return 0;
  const lvl = AUTO_LEVELS[state.autoLevel - 1];
  return (lvl.rate * state.multLevel) / (lvl.interval / 1000);
}

function startAutoClick() {
  if (autoTimer) clearInterval(autoTimer);
  if (state.autoLevel === 0) return;
  const lvl = AUTO_LEVELS[state.autoLevel - 1];
  autoTimer = setInterval(() => {
    state.clicks += state.multLevel;
    saveState();
    updateDisplay();
  }, lvl.interval);
}

// ── DISPLAY ──
function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return Math.floor(n).toLocaleString();
}

function updateDisplay() {
  document.getElementById('clickCount').textContent = formatNum(state.clicks);

  const cps = getAutoClicksPerSecond();
  document.getElementById('cpsDisplay').textContent =
    cps === 0 ? 'No auto-clicks yet' :
    (cps % 1 === 0 ? cps : cps.toFixed(2)) + ' clicks per second';

  renderShop();
}

// ── CLICKING ──
function handleClick(e) {
  const gain = state.multLevel;
  state.clicks += gain;
  saveState();
  updateDisplay();
  spawnParticle(e, '+' + gain);
  // Tiki bounce
  const circle = document.getElementById('tikiCircle');
  circle.style.animation = 'none';
  setTimeout(() => { circle.style.animation = ''; }, 80);
}

function spawnParticle(e, text) {
  const p = document.createElement('div');
  p.className = 'click-particle';
  p.textContent = text;
  p.style.left = (e.clientX + (Math.random() - 0.5) * 30 - 10) + 'px';
  p.style.top  = (e.clientY - 10) + 'px';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 900);
}

// ── SHOP RENDER ──
function renderShop() {
  renderAutoShop();
  renderMultShop();
}

function renderAutoShop() {
  const el = document.getElementById('autoClickShop');
  el.innerHTML = '';
  const nextLevel = state.autoLevel + 1;

  // Show current (owned) level if any
  if (state.autoLevel > 0) {
    const owned = AUTO_LEVELS[state.autoLevel - 1];
    const div = document.createElement('div');
    div.className = 'shop-item maxed';
    div.innerHTML = `
      <div class="item-info">
        <div class="item-name">⚙️ ${owned.label}</div>
        <div class="item-desc">Auto-clicks every ${owned.interval >= 1000 ? owned.interval/1000 + 's' : owned.interval + 'ms'}</div>
        <div class="item-owned">✅ Owned</div>
      </div>
      <button class="buy-btn maxed-btn" disabled>Owned</button>`;
    el.appendChild(div);
  }

  // Show next purchasable level
  if (nextLevel <= AUTO_LEVELS.length) {
    const next = AUTO_LEVELS[nextLevel - 1];
    const canAfford = state.clicks >= next.cost;
    const div = document.createElement('div');
    div.className = 'shop-item' + (canAfford ? ' affordable' : '');
    div.innerHTML = `
      <div class="item-info">
        <div class="item-name">⚙️ ${next.label}</div>
        <div class="item-desc">Auto-clicks every ${next.interval >= 1000 ? next.interval/1000 + 's' : next.interval + 'ms'}</div>
        <div class="item-desc">Cost: 🗿 ${next.cost.toLocaleString()} clicks</div>
      </div>
      <button class="buy-btn" ${canAfford ? '' : 'disabled'} onclick="buyAuto()">Buy</button>`;
    el.appendChild(div);
  } else if (state.autoLevel === AUTO_LEVELS.length) {
    const div = document.createElement('div');
    div.className = 'shop-item maxed';
    div.innerHTML = `<div class="item-info"><div class="item-name">⚙️ Max Auto-Click!</div><div class="item-desc">You've reached the maximum auto-click speed!</div></div><button class="buy-btn maxed-btn" disabled>MAX</button>`;
    el.appendChild(div);
  }
}

function renderMultShop() {
  const el = document.getElementById('multiplierShop');
  el.innerHTML = '';
  const nextIdx = state.multPurchased; // index in MULT_LEVELS array

  // Show current multiplier
  if (state.multLevel > 1) {
    const div = document.createElement('div');
    div.className = 'shop-item maxed';
    div.innerHTML = `
      <div class="item-info">
        <div class="item-name">✖️ x${state.multLevel} Multiplier</div>
        <div class="item-desc">Each click gives ${state.multLevel} Tiki Clicks</div>
        <div class="item-owned">✅ Active</div>
      </div>
      <button class="buy-btn maxed-btn" disabled>Active</button>`;
    el.appendChild(div);
  }

  // Show next purchasable multiplier
  if (nextIdx < MULT_LEVELS.length) {
    const next = MULT_LEVELS[nextIdx];
    const canAfford = state.clicks >= next.cost;
    const div = document.createElement('div');
    div.className = 'shop-item' + (canAfford ? ' affordable' : '');
    div.innerHTML = `
      <div class="item-info">
        <div class="item-name">✖️ ${next.label}</div>
        <div class="item-desc">Each click gives ${next.level} Tiki Clicks</div>
        <div class="item-desc">Cost: 🗿 ${next.cost.toLocaleString()} clicks</div>
      </div>
      <button class="buy-btn" ${canAfford ? '' : 'disabled'} onclick="buyMult()">Buy</button>`;
    el.appendChild(div);
  } else {
    const div = document.createElement('div');
    div.className = 'shop-item maxed';
    div.innerHTML = `<div class="item-info"><div class="item-name">✖️ Max Multiplier!</div><div class="item-desc">x50 — Maximum power achieved!</div></div><button class="buy-btn maxed-btn" disabled>MAX</button>`;
    el.appendChild(div);
  }
}

// ── PURCHASES ──
function buyAuto() {
  const nextLevel = state.autoLevel + 1;
  if (nextLevel > AUTO_LEVELS.length) return;
  const cost = AUTO_LEVELS[nextLevel - 1].cost;
  if (state.clicks < cost) return;
  state.clicks -= cost;
  state.autoLevel = nextLevel;
  saveState();
  startAutoClick();
  updateDisplay();
  showToast('⚙️ Auto Click Lv.' + nextLevel + ' unlocked!');
}

function buyMult() {
  const nextIdx = state.multPurchased;
  if (nextIdx >= MULT_LEVELS.length) return;
  const next = MULT_LEVELS[nextIdx];
  if (state.clicks < next.cost) return;
  state.clicks -= next.cost;
  state.multLevel = next.level;
  state.multPurchased = nextIdx + 1;
  saveState();
  // Restart auto with new multiplier
  startAutoClick();
  updateDisplay();
  showToast('✖️ ' + next.label + ' activated!');
}

// ── RESET ──
function confirmReset() {
  if (confirm('Reset all progress? This cannot be undone!')) {
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
    state = { clicks: 0, autoLevel: 0, multLevel: 1, multPurchased: 0 };
    saveState();
    updateDisplay();
    showToast('🔄 Progress reset!');
  }
}

// ── TOAST ──
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── FULLSCREEN (from CheeseArt) ──
const fullscreenBtn = document.getElementById('fullscreenBtn');
function isFullscreen() {
  return !!(document.fullscreenElement || document.webkitFullscreenElement);
}
function updateFullscreenButton() {
  fullscreenBtn.title = isFullscreen() ? 'Exit Fullscreen' : 'Toggle Fullscreen';
}
function toggleFullscreen() {
  if (isFullscreen()) {
    (document.exitFullscreen || document.webkitExitFullscreen || (()=>{})).call(document);
  } else {
    const el = document.documentElement;
    (el.requestFullscreen || el.webkitRequestFullscreen || (()=>{})).call(el);
  }
}
fullscreenBtn.addEventListener('click', toggleFullscreen);
document.addEventListener('fullscreenchange', updateFullscreenButton);
document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
updateFullscreenButton();

// ── PREVIEW (long-press or right-click tiki to see full image) ──
const previewOverlay = document.getElementById('previewOverlay');
const previewImage = document.getElementById('previewImage');
let longPressTimer = null;

document.getElementById('tikiCircle').addEventListener('contextmenu', e => {
  e.preventDefault();
  openPreview();
});
document.getElementById('tikiCircle').addEventListener('touchstart', () => {
  longPressTimer = setTimeout(openPreview, 600);
}, { passive: true });
document.getElementById('tikiCircle').addEventListener('touchend', () => {
  clearTimeout(longPressTimer);
});
function openPreview() {
  previewImage.src = 'tikitheg.jpg';
  previewOverlay.classList.add('show');
}
function closePreview() {
