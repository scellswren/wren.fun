<!DOCTYPE html>
<html>
<head>
  <title>Wren.fun</title>
  <!-- Google Font to match neal.fun -->
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff; /* WHITE background */
      color: black; /* text visible on white */
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 50px;
      font-size: 5em;
      font-family: 'Rubik', sans-serif; /* neal.fun style */
    }

    p {
      font-size: 1.5em;
      margin-bottom: 50px;
    }

    /* Button container */
    .button-container {
      display: flex;
      justify-content: center; /* buttons next to each other */
      gap: 30px; /* space between buttons */
      margin-bottom: 50px;
    }

    /* Buttons */
    .btn {
      background-color: #eee; /* light gray button to stand out on white */
      color: black;
      padding: 25px 50px; /* bigger buttons */
      font-size: 1.5em;
      font-family: 'Rubik', sans-serif;
      text-decoration: none;
      border-radius: 15px;
      transition: transform 0.2s, background-color 0.2s;
      border: 2px solid #ccc;
    }

    .btn:hover {
      transform: scale(1.08); /* slightly bigger on hover */
      background-color: #ddd;
    }
  </style>
</head>
<body>

<h1>Wren.fun</h1>
<p>Cool stuff made by me 😎</p>

<div class="button-container">
  <a href="#" class="btn">Button 1</a>
  <a href="#" class="btn">Button 2</a>
  <a href="#" class="btn">Button 3</a>
</div>

</body>
</html>
