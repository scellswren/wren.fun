<!DOCTYPE html>
<html>
<head>
  <title>Wren.fun</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"> <!-- replace with your W icon -->

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff; /* white background */
      color: black;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 50px;
      font-size: 5em;
      font-family: 'Rubik', sans-serif;
    }

    p {
      font-size: 1.5em;
      margin-bottom: 50px;
    }

    /* Button container */
    .button-container {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-bottom: 50px;
      flex-wrap: wrap; /* neat on small screens */
    }

    /* Neal.fun-style huge buttons */
    .btn {
      background-color: #f0f0f0;
      color: black;
      padding: 90px 150px; /* 3x bigger */
      font-size: 4.8em;    /* 3x bigger font */
      font-family: 'Rubik', sans-serif;
      text-decoration: none;
      border-radius: 25px;
      border: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<h1>Wren.fun</h1>
<p>Cool stuff made by me 😎</p>

<div class="button-container">
  <a href="lucky.html" class="btn">Lucky Generator</a>
  <a href="#" class="btn">Button 2</a>
  <a href="#" class="btn">Button 3</a>
</div>

</body>
</html>
