<!DOCTYPE html>
<html>
<head>
  <title>Wren.fun</title>
  <!-- Google Fonts to match neal.fun -->
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #000; /* black background */
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 50px;
      font-size: 4em;
      font-family: 'Rubik', sans-serif; /* neal.fun style font */
    }

    p {
      font-size: 1.2em;
      margin-bottom: 40px;
    }

    /* Button container */
    .button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Buttons like neal.fun */
    .btn {
      background-color: #222;
      color: white;
      padding: 15px 40px;
      font-size: 1.2em;
      font-family: 'Rubik', sans-serif;
      text-decoration: none;
      border-radius: 10px;
      transition: transform 0.2s, background-color 0.2s;
    }

    .btn:hover {
      transform: scale(1.05); /* small expand */
      background-color: #444;
    }
  </style>
</head>
<body>

<h1>Wren.fun</h1>
<p>Cool stuff made by me 😎</p>

<div class="button-container">
  <a href="#" class="btn">Button 1</a>
  <a href="#" class="btn">Button 2</a>
  <a href="#" class="btn">Button 3</a>
</div>

</body>
</html>
