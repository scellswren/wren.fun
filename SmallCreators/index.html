<!DOCTYPE html>
<html>
<head>
  <title>Small Creators</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../Favicon.png">

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100vh;
      color: white;
      overflow: hidden;

      background: linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#3a0ca3);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
    }

    @keyframes gradientBG {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }

    h1 {
      font-size: 4em;
      margin-bottom: 40px;
      color: yellow;
      font-family: 'Rubik', sans-serif;
    }

    /* WHAT BUTTON (smaller) */

    #what-btn {
      font-size: 2.5em;
      padding: 20px 40px;
      background: linear-gradient(45deg,#8a2be2,#b517ff);
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-family: 'Rubik', sans-serif;

      box-shadow:
        0 10px 25px rgba(0,0,0,0.5),
        0 0 25px rgba(181,23,255,0.6);

      transition:
        transform 0.15s,
        box-shadow 0.15s,
        filter 0.2s;
    }

    #what-btn:hover {
      transform: scale(1.08);
      filter: brightness(1.2);
      box-shadow:
        0 12px 30px rgba(0,0,0,0.6),
        0 0 35px rgba(200,80,255,0.9);
    }

    #what-btn:active {
      transform: scale(0.92);
      box-shadow:
        0 5px 10px rgba(0,0,0,0.6),
        inset 0 0 15px rgba(0,0,0,0.5);
    }

    .label {
      position: absolute;
      bottom: 25px;
      left: 25px;
      font-size: 1.2em;
      color: #ccc;
      opacity: 0.9;
    }

    /* Wren.fun text */

    #homeText {
      position: fixed;
      top: 10px;
      left: 10px;
      font-family: 'Rubik', sans-serif;
      font-size: 2em;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
      z-index: 1000;
      color: white;
    }

    #homeText:hover {
      transform: scale(1.2);
    }

  </style>
</head>

<body>

<div id="homeText" onclick="goHome()">Wren.fun</div>

<h1>Small Creators</h1>

<button id="what-btn">WHAT!!</button>

<div class="label">Click to discover a random small creator!</div>

<script>

  const creators = [
    "https://www.youtube.com/@WrenIsOld",
    "https://www.youtube.com/@Tikitheg",
    "https://www.youtube.com/@Edunzie",
    "https://www.youtube.com/@cyatr9",
    "https://www.youtube.com/@TheTurtleKid2012",
    "https://www.youtube.com/@bigzxno",
    "https://www.youtube.com/@The-mind-of-Orin",
    "https://www.youtube.com/@Juju2y",
    "https://www.youtube.com/@bigzxno",
    "https://www.youtube.com/@KatsurChicken",
    "https://www.youtube.com/@nathan8024"
  ];

  document.getElementById("what-btn").addEventListener("click", () => {

    const btn = document.getElementById("what-btn");

    btn.style.transform = "scale(0.9)";
    setTimeout(() => {
      btn.style.transform = "";
    }, 120);

    const randomIndex = Math.floor(Math.random() * creators.length);
    const url = creators[randomIndex];

    setTimeout(() => {
      window.location.href = url;
    }, 150);

  });

  function goHome() {
    window.location.href = "../index.html";
  }

</script>

</body>
</html>
