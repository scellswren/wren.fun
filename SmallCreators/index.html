<!DOCTYPE html>
<html>
<head>
  <title>Small Creators</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../Favicon.png">
  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100vh;
      position: relative;
    }

    h1 {
      font-size: 4em;
      margin-bottom: 50px;
      color: yellow;
    }

    #what-btn {
      font-size: 5em;
      padding: 40px 80px;
      background: purple;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: 'Rubik', sans-serif;
    }

    #what-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 12px rgba(255,255,255,0.3);
    }

    .label {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 1.2em;
      color: #aaa;
    }

    /* Wren.fun text top-left */
    #homeText {
      position: fixed;
      top: 10px;
      left: 10px;
      font-family: 'Rubik', sans-serif;
      font-size: 2em;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
      z-index: 1000;
      color: white;
    }

    #homeText:hover {
      transform: scale(1.2);
    }
  </style>
</head>
<body>

<div id="homeText" onclick="goHome()">Wren.fun</div>

<h1>Small Creators</h1>

<button id="what-btn">WHAT!!</button>

<div class="label">Click to discover a random small creator!</div>

<script>
  // Add your full creator URLs here
  const creators = [
    "https://www.youtube.com/@WrenIsOld",
    "https://www.youtube.com/@Tikitheg",
    "https://www.youtube.com/@Edunzie",
    "https://www.youtube.com/@cyatr9",
    "https://www.youtube.com/@TheTurtleKid2012",
    "https://www.youtube.com/@bigzxno",
    "https://www.youtube.com/@The-mind-of-Orin",
    "https://www.youtube.com/@Juju2y",
    "https://www.youtube.com/@bigzxno",
    "https://www.youtube.com/@KatsurChicken",
    "https://www.youtube.com/@nathan8024"
  ];

  document.getElementById("what-btn").addEventListener("click", () => {
    const randomIndex = Math.floor(Math.random() * creators.length);
    const url = creators[randomIndex];
    window.location.href = url; // Redirect to random creator
  });

  function goHome() {
    window.location.href = "../index.html"; // Adjust path to main page
  }
</script>

</body>
</html>
