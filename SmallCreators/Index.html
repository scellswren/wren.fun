<!DOCTYPE html>
<html>
<head>
  <title>Small Creators</title>
  <link rel="icon" type="image/png" href="../Favicon.png">
  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      font-size: 4em;
      margin-bottom: 50px;
      color: yellow;
    }

    #what-btn {
      font-size: 5em;
      padding: 40px 80px;
      background: purple;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #what-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 12px rgba(255,255,255,0.3);
    }

    .label {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 1.2em;
      color: #aaa;
    }
  </style>
</head>
<body>

<h1>Small Creators</h1>

<button id="what-btn">WHAT!!</button>

<div class="label">Click to discover a random small creator!</div>

<script>
  // Make sure to use full URLs with https://
  const creators = [
    "https://www.youtube.com/channel/UCxxxxxxxxx1",
    "https://www.youtube.com/channel/UCxxxxxxxxx2",
    "https://www.youtube.com/channel/UCxxxxxxxxx3",
    "https://www.youtube.com/channel/UCxxxxxxxxx4"
    // Add more links as needed
  ];

  document.getElementById("what-btn").addEventListener("click", () => {
    const randomIndex = Math.floor(Math.random() * creators.length);
    const url = creators[randomIndex];
    // Immediately redirect to random creator
    window.location.href = url;
  });
</script>

</body>
</html>
