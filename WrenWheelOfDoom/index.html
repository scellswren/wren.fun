<!DOCTYPE html>
<html>
<head>
  <title>The Wren Wheel of Doom</title>
  <link rel="icon" type="image/png" href="../Favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #FFD700;
      --purple: #9D4EDD;
      --pink: #FF006E;
      --cyan: #00F5FF;
      --green: #06FFA5;
      --red: #FF3A3A;
      --orange: #FF7700;
      --bg: #0a0a0f;
      --surface: #13131f;
      --surface2: #1c1c2e;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: white;
      font-family: 'Rubik', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.45s ease, color 0.45s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 38% at 12% 18%, rgba(157,78,221,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 45% 32% at 88% 8%,  rgba(255,0,110,0.16) 0%, transparent 55%),
        radial-gradient(ellipse 50% 38% at 82% 82%, rgba(0,245,255,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 42% 32% at 8%  88%, rgba(255,119,0,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 38% 28% at 50% 50%, rgba(6,255,165,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(157,78,221,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(157,78,221,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── RADIOACTIVE THEME ── */
    body.theme-radioactive {
      background: radial-gradient(circle at 20% 20%, rgba(100,255,60,0.42) 0%, transparent 34%),
        radial-gradient(circle at 80% 68%, rgba(50,200,0,0.48) 0%, transparent 38%),
        radial-gradient(circle at 55% 15%, rgba(180,255,80,0.26) 0%, transparent 32%),
        linear-gradient(180deg, #001a00 0%, #042600 45%, #000d00 100%);
      color: #ccffcc;
    }
    body.theme-radioactive::before {
      background:
        radial-gradient(ellipse 55% 38% at 12% 18%, rgba(80,255,60,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 45% 32% at 88% 8%,  rgba(120,255,70,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 50% 38% at 82% 82%, rgba(50,220,40,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 42% 32% at 8%  88%, rgba(100,255,80,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 38% 28% at 50% 50%, rgba(6,255,100,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    body.theme-radioactive::after {
      background-image:
        linear-gradient(rgba(80,255,60,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80,255,60,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── SNOW THEME ── */
    body.theme-snow {
      background: radial-gradient(circle at 20% 20%, rgba(200,230,255,0.55) 0%, transparent 34%),
        radial-gradient(circle at 80% 70%, rgba(160,200,240,0.45) 0%, transparent 40%),
        radial-gradient(circle at 55% 15%, rgba(240,248,255,0.40) 0%, transparent 32%),
        linear-gradient(180deg, #0d1b2a 0%, #1a2f45 45%, #060e16 100%);
      color: #e8f4ff;
    }
    body.theme-snow::before {
      background:
        radial-gradient(ellipse 55% 38% at 12% 18%, rgba(200,235,255,0.24) 0%, transparent 60%),
        radial-gradient(ellipse 45% 32% at 88% 8%,  rgba(160,210,255,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 50% 38% at 82% 82%, rgba(255,255,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 42% 32% at 8%  88%, rgba(120,190,255,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 38% 28% at 50% 50%, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    body.theme-snow::after {
      background-image:
        linear-gradient(rgba(200,235,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,235,255,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── COTTON CANDY THEME ── */
    body.theme-cotton-candy {
      background: linear-gradient(180deg, #fff0f8 0%, #ffdaee 45%, #ffcae5 100%);
      color: #5a1035;
    }
    body.theme-cotton-candy::before {
      background:
        radial-gradient(ellipse 70% 40% at 15% 20%, rgba(255,255,255,0.85) 0%, transparent 55%),
        radial-gradient(ellipse 55% 35% at 80% 10%, rgba(255,200,230,0.75) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 50% 60%, rgba(255,255,255,0.65) 0%, transparent 55%),
        radial-gradient(ellipse 50% 35% at 20% 75%, rgba(255,180,220,0.55) 0%, transparent 50%),
        radial-gradient(ellipse 65% 40% at 85% 80%, rgba(255,255,255,0.70) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }
    body.theme-cotton-candy::after {
      background-image:
        linear-gradient(rgba(255,140,198,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,140,198,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── SABER THEME ── */
    body.theme-saber {
      background: radial-gradient(circle at 18% 20%, rgba(90,180,255,0.24) 0%, transparent 26%),
        radial-gradient(circle at 82% 24%, rgba(20,110,255,0.18) 0%, transparent 30%),
        radial-gradient(circle at 50% 92%, rgba(0,0,0,0.72) 0%, transparent 34%),
        linear-gradient(180deg, #00000a 0%, #00183d 44%, #040816 100%);
      color: #edf8ff;
    }
    body.theme-saber::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 28%, rgba(100,190,255,0.14) 0%, transparent 22%),
        radial-gradient(circle at 72% 60%, rgba(0,130,255,0.12) 0%, transparent 28%),
        radial-gradient(circle at 50% 14%, rgba(170,220,255,0.08) 0%, transparent 18%);
      pointer-events: none;
      z-index: 0;
    }
    body.theme-saber::after {
      background-image:
        linear-gradient(rgba(90,180,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(90,180,255,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── BLACK HOLE THEME ── */
    body.theme-black-hole {
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.10) 0 1.4%, transparent 1.7% 100%),
        radial-gradient(circle at 50% 50%, rgba(106,52,192,0.34) 0 8%, rgba(0,0,0,0) 8.4% 15%, rgba(54,17,98,0.38) 15% 21%, rgba(0,0,0,0) 21.5% 28%, rgba(0,0,0,0.98) 28% 100%),
        linear-gradient(180deg, #010005 0%, #07000d 44%, #000000 100%);
      color: #f5ecff;
    }
    body.theme-black-hole::before {
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.10) 0 2%, transparent 2.3% 100%),
        radial-gradient(circle at 50% 50%, rgba(166,88,255,0.20) 0 7%, transparent 7.2% 100%),
        radial-gradient(circle at 50% 50%, rgba(0,0,0,0.92) 0 18%, rgba(0,0,0,0) 18.5% 100%),
        radial-gradient(circle at 50% 44%, rgba(173,104,255,0.20) 0 22%, transparent 22.3% 100%),
        radial-gradient(circle at 18% 18%, rgba(160,110,255,0.18) 0%, transparent 20%),
        radial-gradient(circle at 82% 20%, rgba(255,110,240,0.14) 0%, transparent 22%),
        radial-gradient(circle at 78% 82%, rgba(120,72,220,0.14) 0%, transparent 24%),
        radial-gradient(circle at 20% 78%, rgba(255,255,255,0.06) 0%, transparent 22%);
      pointer-events: none; z-index: 0; opacity: 0.95;
    }
    body.theme-black-hole::after {
      background-image:
        radial-gradient(circle at 10% 15%, rgba(255,255,255,0.38) 0 1px, transparent 2px),
        radial-gradient(circle at 72% 12%, rgba(255,255,255,0.34) 0 1px, transparent 2px),
        radial-gradient(circle at 30% 36%, rgba(255,255,255,0.26) 0 1px, transparent 2px),
        radial-gradient(circle at 82% 28%, rgba(255,255,255,0.30) 0 1px, transparent 2px),
        radial-gradient(circle at 16% 70%, rgba(255,255,255,0.22) 0 1px, transparent 2px),
        radial-gradient(circle at 56% 80%, rgba(255,255,255,0.26) 0 1px, transparent 2px),
        radial-gradient(circle at 86% 82%, rgba(255,255,255,0.24) 0 1px, transparent 2px),
        radial-gradient(circle at 50% 50%, transparent 0 36%, rgba(120,65,230,0.18) 36.2% 36.8%, transparent 37% 44%, rgba(255,255,255,0.05) 44.2% 44.5%, transparent 45% 100%);
      background-size: auto;
      opacity: 0.9; mix-blend-mode: screen; filter: blur(0.2px);
    }

    .bg-orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0; animation: orbDrift linear infinite;
    }
    .bg-orb.o1 { width:320px; height:320px; background:var(--purple); opacity:0.18; top:-80px;  left:-60px;   animation-duration:20s; }
    .bg-orb.o2 { width:260px; height:260px; background:var(--pink);   opacity:0.15; top:58%;   right:-80px;  animation-duration:25s; animation-delay:-8s; }
    .bg-orb.o3 { width:210px; height:210px; background:var(--cyan);   opacity:0.13; bottom:4%; left:18%;     animation-duration:18s; animation-delay:-4s; }
    .bg-orb.o4 { width:190px; height:190px; background:var(--orange); opacity:0.12; top:32%;   left:-40px;   animation-duration:22s; animation-delay:-12s; }
    .bg-orb.o5 { width:160px; height:160px; background:var(--green);  opacity:0.09; top:20%;   right:8%;     animation-duration:28s; animation-delay:-6s; }
    @keyframes orbDrift {
      0%,100% { transform: translateY(0px)   scale(1); }
      33%      { transform: translateY(-28px) scale(1.07); }
      66%      { transform: translateY(18px)  scale(0.94); }
    }

    #homeText {
      position: fixed; top: 14px; left: 18px;
      font-family: 'Rubik', sans-serif; font-size: 1.7em; font-weight: 900;
      cursor: pointer; z-index: 100; transition: transform 0.2s;
      text-shadow: 0 0 20px rgba(157,78,221,0.6); letter-spacing: 0.5px;
    }
    #homeText:hover { transform: scale(1.15); }
    /* Cotton candy: dark pink so it doesn't blend into the background */
    body.theme-cotton-candy #homeText {
      color: #b5005e;
      text-shadow: 0 0 14px rgba(181,0,94,0.35), 0 1px 0 rgba(255,255,255,0.4);
    }

    #moneyBar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: center; align-items: center;
      padding: 14px; z-index: 99; pointer-events: none;
    }
    #money {
      font-family: 'Space Mono', monospace; font-size: 1.4em; font-weight: 700;
      color: var(--gold); background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,215,0,0.3); border-radius: 30px; padding: 8px 24px;
      text-shadow: 0 0 12px rgba(255,215,0,0.5); letter-spacing: 1px; pointer-events: auto;
      transition: color 0.4s, border-color 0.4s, text-shadow 0.4s, background 0.4s;
    }
    #money.negative { color: var(--red); border-color: rgba(255,58,58,0.4); text-shadow: 0 0 12px rgba(255,58,58,0.6); }
    body.theme-radioactive #money { color: #b8ff80; border-color: rgba(100,255,60,0.35); text-shadow: 0 0 12px rgba(100,255,60,0.55); background: rgba(0,18,0,0.72); }
    body.theme-snow #money { color: #d8f0ff; border-color: rgba(180,220,255,0.35); text-shadow: 0 0 12px rgba(180,220,255,0.6); background: rgba(0,16,28,0.72); }
    body.theme-cotton-candy #money { color: #ff4fa3; border-color: rgba(255,110,180,0.35); text-shadow: 0 0 12px rgba(255,110,180,0.5); background: rgba(80,0,40,0.14); }
    body.theme-saber #money { color: #a0d8ff; border-color: rgba(120,200,255,0.35); text-shadow: 0 0 12px rgba(80,180,255,0.55); background: rgba(0,10,26,0.72); }
    body.theme-black-hole #money { color: #f0ddff; border-color: rgba(200,155,255,0.28); text-shadow: 0 0 14px rgba(187,134,255,0.48); background: rgba(7,0,15,0.72); }

    #resetBtn {
      position: fixed; top: 14px; right: 18px; z-index: 100;
      background: transparent; border: 1.5px solid rgba(255,58,58,0.4);
      color: rgba(255,58,58,0.7); font-family: 'Rubik', sans-serif; font-size: 0.82em; font-weight: 700;
      padding: 7px 16px; border-radius: 20px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
    }
    #resetBtn:hover { background: rgba(255,58,58,0.15); border-color: var(--red); color: var(--red); box-shadow: 0 0 14px rgba(255,58,58,0.3); }

    #app {
      position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center;
      padding: 80px 20px 40px; min-height: 100vh;
    }

    h1 {
      font-family: 'Rubik', sans-serif; font-weight: 900;
      font-size: clamp(1.4em, 4vw, 2.6em); letter-spacing: 3px;
      margin-bottom: 30px; text-align: center;
      background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
      background-size: 200% 200%; -webkit-background-clip: text; color: transparent;
      animation: titleShimmer 4s ease infinite;
      filter: drop-shadow(0 0 20px rgba(157,78,221,0.5)); transition: filter 0.4s, background 0.4s;
    }
    body.theme-radioactive h1 { background: linear-gradient(135deg, #ccffcc, #44ff44, #00cc00, #aaff88); -webkit-background-clip: text; filter: drop-shadow(0 0 22px rgba(80,255,60,0.45)); }
    body.theme-snow h1 { background: linear-gradient(135deg, #ffffff, #c8e8ff, #90ccff, #e8f8ff); -webkit-background-clip: text; filter: drop-shadow(0 0 22px rgba(180,220,255,0.5)); }
    body.theme-cotton-candy h1 { background: linear-gradient(135deg, #ffffff, #ffd2eb, #ff88c7, #ff5aa8, #fff2fb); -webkit-background-clip: text; filter: drop-shadow(0 0 18px rgba(255,100,180,0.30)); }
    body.theme-saber h1 { background: linear-gradient(135deg, #f6fbff, #bfe7ff, #5fb8ff, #1e74ff, #dff6ff); -webkit-background-clip: text; filter: drop-shadow(0 0 12px rgba(70,170,255,0.55)) drop-shadow(0 0 30px rgba(0,120,255,0.24)); }
    body.theme-black-hole h1 { background: linear-gradient(135deg, #ffffff, #eadcff, #b67dff, #6d31e8, #ffffff); -webkit-background-clip: text; filter: drop-shadow(0 0 20px rgba(170,95,255,0.42)) drop-shadow(0 0 36px rgba(78,24,150,0.22)); }
    @keyframes titleShimmer { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

    #spinnerWrap { position: relative; width: min(380px, 92vw); margin-bottom: 24px; }
    #spinnerWrap::after {
      content: '▶'; position: absolute; left: -28px; top: 50%; transform: translateY(-50%);
      font-size: 1.6em; color: var(--cyan); text-shadow: 0 0 12px var(--cyan); z-index: 10;
      animation: pulsePt 1s ease infinite;
    }
    body.theme-radioactive #spinnerWrap::after { color: #88ff44; text-shadow: 0 0 14px rgba(100,255,60,0.92); }
    body.theme-snow #spinnerWrap::after { color: #cde8ff; text-shadow: 0 0 14px rgba(180,220,255,0.92); }
    body.theme-cotton-candy #spinnerWrap::after { color: #ff5ab6; text-shadow: 0 0 14px rgba(255,90,182,0.92); }
    body.theme-saber #spinnerWrap::after { color: #a0d8ff; text-shadow: 0 0 14px rgba(120,200,255,0.92); }
    body.theme-black-hole #spinnerWrap::after { color: #dcb8ff; text-shadow: 0 0 16px rgba(190,140,255,0.94), 0 0 26px rgba(255,255,255,0.18); }
    @keyframes pulsePt { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    #spinner {
      width: 100%; height: 320px; overflow: hidden; border-radius: 20px;
      border: 2px solid var(--purple);
      box-shadow: 0 0 40px rgba(157,78,221,0.4), inset 0 0 30px rgba(0,0,0,0.5);
      background: var(--surface); position: relative;
      transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
    }
    body.theme-radioactive #spinner { background: linear-gradient(180deg, #021400 0%, #083800 45%, #011000 100%); border-color: rgba(100,255,60,0.6); box-shadow: 0 0 40px rgba(80,255,60,0.25), inset 0 0 30px rgba(0,0,0,0.5); }
    body.theme-snow #spinner { background: linear-gradient(180deg, #07121f 0%, #10263c 100%); border-color: rgba(180,220,255,0.6); box-shadow: 0 0 40px rgba(180,220,255,0.25), inset 0 0 30px rgba(0,0,0,0.45); }
    body.theme-cotton-candy #spinner { background: linear-gradient(180deg, #fff0f8 0%, #ffd0e9 100%); border-color: rgba(255,110,180,0.6); box-shadow: 0 0 40px rgba(255,110,180,0.25), inset 0 0 30px rgba(255,200,220,0.15); }
    body.theme-saber #spinner { background: linear-gradient(180deg, #00000a 0%, #001428 45%, #020610 100%); border-color: rgba(120,200,255,0.6); box-shadow: 0 0 40px rgba(80,180,255,0.25), inset 0 0 30px rgba(0,0,0,0.5); }
    body.theme-black-hole #spinner { background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.98) 0 22%, rgba(13,6,24,1) 22.5% 29%, rgba(126,74,255,0.95) 29.4% 31%, rgba(0,0,0,0.98) 31.2% 44%, rgba(8,0,16,1) 44.5% 100%); border-color: rgba(188,132,255,0.52); box-shadow: 0 0 58px rgba(121,65,255,0.32), inset 0 0 34px rgba(0,0,0,0.88); }

    #spinner::before {
      content: ''; position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); height: 64px;
      border-top: 2px solid var(--cyan); border-bottom: 2px solid var(--cyan);
      background: rgba(0,245,255,0.05); z-index: 5; pointer-events: none;
    }
    body.theme-radioactive #spinner::before { border-top-color: #88ff44; border-bottom-color: #88ff44; background: rgba(100,255,60,0.06); }
    body.theme-snow #spinner::before { border-top-color: #cde8ff; border-bottom-color: #cde8ff; background: rgba(180,220,255,0.06); }
    body.theme-cotton-candy #spinner::before { border-top-color: rgba(255,100,170,0.7); border-bottom-color: rgba(255,100,170,0.7); background: rgba(255,100,170,0.07); }
    body.theme-saber #spinner::before { border-top-color: rgba(120,200,255,0.8); border-bottom-color: rgba(120,200,255,0.8); background: rgba(80,180,255,0.06); }
    body.theme-black-hole #spinner::before { border-top: 2px solid rgba(174,116,255,0.75); border-bottom: 2px solid rgba(174,116,255,0.75); background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(123,72,255,0.10) 55%, transparent 100%); }

    #spinner::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, var(--surface) 0%, transparent 30%, transparent 70%, var(--surface) 100%);
      z-index: 6; pointer-events: none;
    }
    body.theme-radioactive #spinner::after { background: linear-gradient(to bottom, rgba(2,20,0,1) 0%, transparent 30%, transparent 70%, rgba(2,20,0,1) 100%); }
    body.theme-snow #spinner::after { background: linear-gradient(to bottom, rgba(7,18,31,1) 0%, transparent 30%, transparent 70%, rgba(7,18,31,1) 100%); }
    body.theme-cotton-candy #spinner::after { background: linear-gradient(to bottom, rgba(255,240,248,1) 0%, transparent 30%, transparent 70%, rgba(255,240,248,1) 100%); }
    body.theme-saber #spinner::after { background: linear-gradient(to bottom, rgba(0,0,10,1) 0%, transparent 30%, transparent 70%, rgba(0,0,10,1) 100%); }
    body.theme-black-hole #spinner::after { background: radial-gradient(circle at 50% 50%, transparent 0 28%, rgba(255,255,255,0.05) 28.2% 28.8%, transparent 29% 100%), linear-gradient(to bottom, rgba(0,0,0,0.18) 0%, transparent 32%, transparent 68%, rgba(0,0,0,0.44) 100%); }

    #items { position: absolute; width: 100%; top: 0px; }
    .item {
      height: 64px; display: flex; align-items: center; justify-content: center;
      font-size: 1.3em; font-weight: 700; font-family: 'Space Mono', monospace;
      border-bottom: 1px solid var(--border);
    }
    .item.good    { color: var(--green); }
    .item.bad     { color: var(--red); }
    .item.special { color: var(--cyan); }
    .item.blackhole { color: #ffb55c; text-shadow: 0 0 10px rgba(255,181,92,0.35), 0 0 18px rgba(125,211,252,0.18); }
    .item.mult    { color: var(--gold); }
    .item.selected { background: rgba(157,78,221,0.25) !important; color: white !important; font-size: 1.4em; }
    /* Cotton candy items */
    body.theme-cotton-candy .item { color: #7a2050; border-bottom-color: rgba(255,140,190,0.15); }
    body.theme-cotton-candy .item.selected { background: rgba(255,100,170,0.20) !important; color: #cc1060 !important; }
    /* Saber items */
    body.theme-saber .item { color: #c0e8ff; text-shadow: 0 0 8px rgba(80,180,255,0.35); border-bottom-color: rgba(120,200,255,0.12); }
    body.theme-saber .item.selected { background: rgba(80,180,255,0.18) !important; color: white !important; }
    /* Black hole items */
    body.theme-black-hole .item { color: #f1e6ff; text-shadow: 0 0 10px rgba(180,130,255,0.42); border-bottom-color: rgba(255,255,255,0.08); }
    body.theme-black-hole .item.selected { background: rgba(181,133,255,0.30) !important; color: #ffffff !important; text-shadow: 0 0 10px rgba(255,255,255,0.35); box-shadow: inset 0 0 0 2px rgba(214,184,255,0.22); }

    #spinBtn {
      position: relative; padding: 16px 60px; font-size: 1.4em;
      font-family: 'Rubik', sans-serif; font-weight: 900; letter-spacing: 3px;

<body>

<script>
let money = parseInt(localStorage.getItem("wren_money")) || 0;
const moneyDisplay = document.getElementById("money");

const MONEY_UNLOCK_KEY        = "wren_theme_money_unlocked";
const SNOW_UNLOCK_KEY         = "wren_theme_snow_unlocked";
const COTTON_CANDY_UNLOCK_KEY = "wren_theme_cotton_candy_unlocked";
const SABER_UNLOCK_KEY        = "wren_theme_saber_unlocked";
const BLACKHOLE_UNLOCK_KEY    = "wren_theme_blackhole_unlocked";
const UNLOCK_NOTICE_QUEUE_KEY = "wren_pending_unlock_notices";
const THEME_KEY               = "wren_active_theme";
const MM_RADIOACTIVE_KEY      = "wren_theme_radioactive_unlocked";
const MM_SNOW_KEY             = SNOW_UNLOCK_KEY;

const THEME_DATA = {
  normal:       { label: "Normal",       desc: "The classic Wren look.",            note: "Unlocked by default.",                                                          className: "theme-normal" },
  radioactive:  { label: "Radioactive",  desc: "Green neon glow.",                  note: "How to get it: reach $1,000,000.",                                              className: "theme-radioactive",  unlockKey: MONEY_UNLOCK_KEY },
  snow:         { label: "Snow",         desc: "Icy blue winter glow.",             note: "How to get it: reach $1,000,000,000.",                                          className: "theme-snow",         unlockKey: SNOW_UNLOCK_KEY },
  cotton_candy: { label: "Cotton Candy", desc: "Sweet fluffy pink clouds.",         note: "How to get it: unlock Cotton Candy at $1,000,000,000,000.",                     className: "theme-cotton-candy", unlockKey: COTTON_CANDY_UNLOCK_KEY },
  saber:        { label: "Saber",        desc: "Blue lightsaber glow.",             note: "How to get it: unlock Saber at $1,000,000,000,000,000.",                        className: "theme-saber",        unlockKey: SABER_UNLOCK_KEY },
  black_hole:   { label: "Black Hole",   desc: "Dark cosmic void theme.",           note: "How to get it: spin the Wren Wheel of Doom and land on Black Hole.",            className: "theme-black-hole",   unlockKey: BLACKHOLE_UNLOCK_KEY }
};

function saveMoney() { localStorage.setItem("wren_money", money); }

function queueUnlockNotice(message) {
  try {
    const queue = JSON.parse(localStorage.getItem(UNLOCK_NOTICE_QUEUE_KEY) || "[]");
    queue.push(message);
    localStorage.setItem(UNLOCK_NOTICE_QUEUE_KEY, JSON.stringify(queue));
  } catch (e) { localStorage.setItem(UNLOCK_NOTICE_QUEUE_KEY, JSON.stringify([message])); }
}

function syncThemeUnlocks() {
  const f = Math.floor(money);
  if (f >= 1_000_000) {
    if (localStorage.getItem(MONEY_UNLOCK_KEY) !== "1") {
      localStorage.setItem(MONEY_UNLOCK_KEY, "1");
      localStorage.setItem(MM_RADIOACTIVE_KEY, "1");
      queueUnlockNotice("☢️ Radioactive & 💵 Money themes unlocked in main menu!");
    }
  }
  if (f >= 1_000_000_000) {
    if (localStorage.getItem(SNOW_UNLOCK_KEY) !== "1") {
      localStorage.setItem(SNOW_UNLOCK_KEY, "1");
      localStorage.setItem(MM_SNOW_KEY, "1");
      queueUnlockNotice("❄️ Snow theme unlocked in main menu too!");
    }
    localStorage.setItem(MONEY_UNLOCK_KEY, "1");
    localStorage.setItem(MM_RADIOACTIVE_KEY, "1");
  }
  if (f >= 1_000_000_000_000)     localStorage.setItem(COTTON_CANDY_UNLOCK_KEY, "1");
  if (f >= 1_000_000_000_000_000) localStorage.setItem(SABER_UNLOCK_KEY, "1");
}

function isThemeUnlocked(id) {
  if (id === "normal") return true;
  const d = THEME_DATA[id];
  return !!d && (!d.unlockKey || localStorage.getItem(d.unlockKey) === "1");
}

function getAvailableThemeId(id) {
  return (THEME_DATA[id] && isThemeUnlocked(id)) ? id : "normal";
}

function applyTheme(themeId, persist = true) {
  const chosen = getAvailableThemeId(themeId);
  if (persist) localStorage.setItem(THEME_KEY, chosen);
  document.body.classList.remove("theme-normal","theme-radioactive","theme-snow","theme-cotton-candy","theme-saber","theme-black-hole");
  document.body.classList.add(THEME_DATA[chosen].className);
  stopSnowParticles(); stopCandyParticles();
  if (chosen === "snow")         startSnowParticles();

function updateTheme() {
  const saved = localStorage.getItem(THEME_KEY) || "normal";

  applyTheme(chosen, false);

function updateMoney() {
  const f = Math.floor(money);
  moneyDisplay.textContent = "💰 $" + f.toLocaleString();
  moneyDisplay.classList.toggle("negative", f < 0);
  syncThemeUnlocks(); updateTheme();
}

function animateMoney(amount) {
  const target = money + amount, steps = 30, diff = (target - money) / steps;
  let step = 0;
  const iv = setInterval(() => {
    money += diff; step++;
    if (step >= steps) { money = target; clearInterval(iv); saveMoney(); syncThemeUnlocks(); updateTheme(); }
    updateMoney();
  }, 16);
  showResult(amount);
}

function applyMultiplier(mult, label) {
  const target = money < 0 ? (mult > 1 ? money / mult : money * (2 - mult)) : money * mult;
  const gain = target - money, steps = 30, diff = (target - money) / steps;
  let step = 0;
  const iv = setInterval(() => {
    money += diff; step++;
    if (step >= steps) { money = target; clearInterval(iv); saveMoney(); syncThemeUnlocks(); updateTheme(); }
    updateMoney();
  }, 16);
  showResult(gain, label);
}

function buildStrip(length) {
  const specials = getSpecialItems();
  const goodPool = [...goodItems, ...goodItems, ...specials];
  const badPool  = [...badItems, ...badItems];
  const pool = [];
  for (let i = 0; i < length; i++) {
    if (!isBlackHoleUnlocked() && Math.random() < 0.01) { pool.push(blackHoleItem); continue; }
    const src = Math.random() < 0.65 ? goodPool : badPool;
    pool.push(src[Math.floor(Math.random() * src.length)]);
  }
  return pool;
}

function spin(e) {

    r.style.left = (e.clientX - btn.getBoundingClientRect().left - d/2) + "px";
    r.style.top  = (e.clientY - btn.getBoundingClientRect().top  - d/2) + "px";
    btn.appendChild(r); setTimeout(() => r.remove(), 700);
  }

  const ITEM_H = 64, VISIBLE_H = 320, centerOffset = Math.floor(VISIBLE_H/2) - Math.floor(ITEM_H/2);

  container.style.transition = "top 3.2s cubic-bezier(0.12, 0.9, 0.15, 1)";

let speedActive = false, speedIsGreen = false, speedGreenTime = 0, speedRevealTimer = null, speedFailTimer = null, speedUsed = false;

function clearSpeedTimers() {
  clearTimeout(speedRevealTimer);
  clearTimeout(speedFailTimer);
  speedRevealTimer = null;
  speedFailTimer = null;
}

function startSpeedTest() {
  speedActive = false;
  speedIsGreen = false;
  speedUsed = false;
  speedGreenTime = 0;
  clearSpeedTimers();

  const overlay = document.getElementById("speedOverlay");
  const circle  = document.getElementById("speedCircle");
  const msg     = document.getElementById("speedMsg");
  const sub     = document.getElementById("speedSubMsg");

  circle.className = "";

  speedActive = true;

  const revealDelay = 650 + Math.random() * 1850; // 0.65s - 2.5s
  speedRevealTimer = setTimeout(() => {
    if (!speedActive) return;

    speedIsGreen = true;
    speedGreenTime = performance.now();

    circle.classList.add("go");
    circle.textContent = "CLICK!";
    msg.textContent = "NOW! CLICK AS FAST AS YOU CAN!";
    sub.textContent = "";

    speedFailTimer = setTimeout(() => {
      if (!speedActive || !speedIsGreen) return;
      speedActive = false;
      speedUsed = true;
      overlay.classList.remove("active");
      overlay.onclick = null;
      showResult(0, "TOO SLOW! Nothing 😔");

  }, revealDelay);

  overlay.onclick = handleSpeedClick;

function handleSpeedClick() {
  if (!speedActive || speedUsed) return;
  speedUsed = true;

  const overlay = document.getElementById("speedOverlay");

  if (!speedIsGreen) {
    speedActive = false;
    clearSpeedTimers();
    overlay.classList.remove("active");
    overlay.onclick = null;
    applyMultiplier(0.8, money < 0 ? "+20% debt 💀" : "-20% TOO EARLY! 💀");
    return;
  }

  speedActive = false;
  clearSpeedTimers();
  overlay.classList.remove("active");
  overlay.onclick = null;

  const elapsed = (performance.now() - speedGreenTime) / 1000;

  if (elapsed < 0.1) {
    applyMultiplier(3, money < 0 ? "÷3 debt ⚡" : "×3!! ⚡ INSANE!");
  } else if (elapsed < 0.2) {
    applyMultiplier(2, money < 0 ? "÷2 debt ⚡" : "×2!! ⚡ FAST!");
  } else if (elapsed < 0.4) {
    applyMultiplier(1.5, money < 0 ? "÷1.5 debt" : "×1.5! 🔥 Quick!");
  } else if (elapsed < 1.0) {
    applyMultiplier(1.1, money < 0 ? "÷1.1 debt" : "×1.1 Not bad");
  } else {
    showResult(0, "TOO SLOW! Nothing 😔");
  }
}

    const potentialGain = Math.floor(money * runningMult * 2) - Math.floor(money);
    area.innerHTML = `<div class="game-card"><div class="game-title" style="color:var(--gold)">🎲 DOUBLE OR NOTHING</div><p style="color:rgba(255,255,255,0.6); font-size:0.9em; margin-bottom:8px;">Round ${round} — current multiplier: <span style="color:var(--gold)">×${runningMult.toFixed(2)}</span></p><p style="color:var(--green); font-size:1em; margin-bottom:4px;">✅ Double: ×${(runningMult*2).toFixed(2)} (potential +$${potentialGain.toLocaleString()})</p><p style="color:var(--red); font-size:0.85em; margin-bottom:18px;">⚠️ 15% chance of losing 60% instead of doubling</p><div><button class="game-btn btn-gold" id="donDouble">🎲 DOUBLE IT</button><button class="game-btn btn-green" id="donCash">✅ CASH OUT ×${runningMult.toFixed(2)}</button></div><p style="color:rgba(255,255,255,0.3); font-size:0.75em; margin-top:14px;">Cash out now for ×${runningMult.toFixed(2)} your ${money < 0 ? "debt" : "balance"}, or gamble for ×${(runningMult*2).toFixed(2)}!</p></div>`;
    document.getElementById("donDouble").onclick = () => {
      if (Math.random() < 0.15) { applyMultiplier(0.4, money < 0 ? "+60% debt 💀" : "-60%!! 💀 Bad luck!"); area.innerHTML = ""; }
      else renderDON(round + 1, runningMult * 2);
    };
    document.getElementById("donCash").onclick = () => {
      if (runningMult === 1) { showResult(0, "Nothing gained!"); area.innerHTML = ""; }
      else { applyMultiplier(runningMult, money < 0 ? `×${runningMult.toFixed(1)} debt 💀` : `×${runningMult.toFixed(1)}!! 🔥`); area.innerHTML = ""; }
    };
  }
  renderDON(1, 1);
}

// ── RESET ──
function askReset() {
  showModal("Reset Balance?", "This will wipe all your WrenDollars. Are you sure?", "Yes, reset", () => {
    showModal("Are you VERY VERY sure?", "You will lose every single dollar. This cannot be undone. Really?", "YES, I'm sure", () => {
      money = 0; saveMoney(); updateMoney(); closeModal();
    });
  });
}
function showModal(title, body, confirmText, onConfirm) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").textContent = body;
  document.getElementById("modalConfirm").textContent = confirmText;
  document.getElementById("modalConfirm").onclick = onConfirm;
  document.getElementById("modalOverlay").style.display = "flex";
}
function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }

// ── MUSIC ──
const music = document.getElementById("bgMusic"), musicBtn = document.getElementById("musicBtn"), fullscreenBtn = document.getElementById("fullscreenBtn");
music.volume = 0.5;
function tryPlay() { music.play().catch(() => {}); }
tryPlay();
["click","keydown","touchstart","mousemove"].forEach(ev => document.addEventListener(ev, tryPlay, { once: true }));
function toggleMusic() { music.muted = !music.muted; musicBtn.textContent = music.muted ? "🔇 Muted" : "🔊 Music"; }

function updateFullscreenButton() {
  if (!fullscreenBtn) return;
  fullscreenBtn.textContent = document.fullscreenElement ? "🗗" : "⛶";
}

function toggleFullscreen() {
  const docEl = document.documentElement;
  if (!document.fullscreenElement) {
    const req = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.msRequestFullscreen;
    if (req) req.call(docEl);
  } else {
    const exit = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
    if (exit) exit.call(document);
  }
}

document.addEventListener("fullscreenchange", updateFullscreenButton);
document.addEventListener("webkitfullscreenchange", updateFullscreenButton);
document.addEventListener("msfullscreenchange", updateFullscreenButton);
updateFullscreenButton();

window.addEventListener("load", () => { updateMoney(); updateTheme(); syncThemeUnlocks(); renderThemesModal(); updateFullscreenButton(); });
</script>
