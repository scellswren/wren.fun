<!DOCTYPE html>
<html>
<head>
  <title>The Wren Wheel of Doom</title>
  <link rel="icon" type="image/png" href="../Favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #FFD700;
      --purple: #9D4EDD;
      --pink: #FF006E;
      --cyan: #00F5FF;
      --green: #06FFA5;
      --red: #FF3A3A;
      --orange: #FF7700;
      --bg: #0a0a0f;
      --surface: #13131f;
      --surface2: #1c1c2e;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: white;
      font-family: 'Rubik', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.45s ease, color 0.45s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 38% at 12% 18%, rgba(157,78,221,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 45% 32% at 88% 8%,  rgba(255,0,110,0.16) 0%, transparent 55%),
        radial-gradient(ellipse 50% 38% at 82% 82%, rgba(0,245,255,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 42% 32% at 8%  88%, rgba(255,119,0,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 38% 28% at 50% 50%, rgba(6,255,165,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(157,78,221,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(157,78,221,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── RADIOACTIVE THEME — clean green glow like snow but green ── */
    body.theme-radioactive {
      background: radial-gradient(circle at 20% 20%, rgba(100,255,60,0.42) 0%, transparent 34%),
        radial-gradient(circle at 80% 68%, rgba(50,200,0,0.48) 0%, transparent 38%),
        radial-gradient(circle at 55% 15%, rgba(180,255,80,0.26) 0%, transparent 32%),
        linear-gradient(180deg, #001a00 0%, #042600 45%, #000d00 100%);
      color: #ccffcc;
    }
    body.theme-radioactive::before {
      background:
        radial-gradient(ellipse 55% 38% at 12% 18%, rgba(80,255,60,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 45% 32% at 88% 8%,  rgba(120,255,70,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 50% 38% at 82% 82%, rgba(50,220,40,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 42% 32% at 8%  88%, rgba(100,255,80,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 38% 28% at 50% 50%, rgba(6,255,100,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    body.theme-radioactive::after {
      background-image:
        linear-gradient(rgba(80,255,60,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80,255,60,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── SNOW THEME ── */
    body.theme-snow {
      background: radial-gradient(circle at 20% 20%, rgba(200,230,255,0.55) 0%, transparent 34%),
        radial-gradient(circle at 80% 70%, rgba(160,200,240,0.45) 0%, transparent 40%),
        radial-gradient(circle at 55% 15%, rgba(240,248,255,0.40) 0%, transparent 32%),
        linear-gradient(180deg, #0d1b2a 0%, #1a2f45 45%, #060e16 100%);
      color: #e8f4ff;
    }
    body.theme-snow::before {
      background:
        radial-gradient(ellipse 55% 38% at 12% 18%, rgba(200,235,255,0.24) 0%, transparent 60%),
        radial-gradient(ellipse 45% 32% at 88% 8%,  rgba(160,210,255,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 50% 38% at 82% 82%, rgba(255,255,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 42% 32% at 8%  88%, rgba(120,190,255,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 38% 28% at 50% 50%, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    body.theme-snow::after {
      background-image:
        linear-gradient(rgba(200,235,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,235,255,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── COTTON CANDY THEME — light pink bg, fluffy cloud overlay ── */
    body.theme-cotton-candy {
      background: linear-gradient(180deg, #fff0f8 0%, #ffdaee 45%, #ffcae5 100%);
      color: #5a1035;
    }
    body.theme-cotton-candy::before {
      background:
        radial-gradient(ellipse 70% 40% at 15% 20%, rgba(255,255,255,0.85) 0%, transparent 55%),
        radial-gradient(ellipse 55% 35% at 80% 10%, rgba(255,200,230,0.75) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 50% 60%, rgba(255,255,255,0.65) 0%, transparent 55%),
        radial-gradient(ellipse 50% 35% at 20% 75%, rgba(255,180,220,0.55) 0%, transparent 50%),
        radial-gradient(ellipse 65% 40% at 85% 80%, rgba(255,255,255,0.70) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }
    body.theme-cotton-candy::after {
      background-image:
        linear-gradient(rgba(255,140,198,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,140,198,0.06) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── SABER THEME — blue lightsaber style matching main menu ── */
    body.theme-saber {
      background: radial-gradient(circle at 18% 20%, rgba(90,180,255,0.24) 0%, transparent 26%),
        radial-gradient(circle at 82% 24%, rgba(20,110,255,0.18) 0%, transparent 30%),
        radial-gradient(circle at 50% 92%, rgba(0,0,0,0.72) 0%, transparent 34%),
        linear-gradient(180deg, #00000a 0%, #00183d 44%, #040816 100%);
      color: #edf8ff;
    }
    body.theme-saber::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 28%, rgba(100,190,255,0.14) 0%, transparent 22%),
        radial-gradient(circle at 72% 60%, rgba(0,130,255,0.12) 0%, transparent 28%),
        radial-gradient(circle at 50% 14%, rgba(170,220,255,0.08) 0%, transparent 18%);
      pointer-events: none;
      z-index: 0;
    }
    body.theme-saber::after {
      background-image:
        linear-gradient(rgba(90,180,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(90,180,255,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: orbDrift linear infinite;
    }
    .bg-orb.o1 { width:320px; height:320px; background:var(--purple); opacity:0.18; top:-80px;  left:-60px;   animation-duration:20s; }
    .bg-orb.o2 { width:260px; height:260px; background:var(--pink);   opacity:0.15; top:58%;   right:-80px;  animation-duration:25s; animation-delay:-8s; }
    .bg-orb.o3 { width:210px; height:210px; background:var(--cyan);   opacity:0.13; bottom:4%; left:18%;     animation-duration:18s; animation-delay:-4s; }
    .bg-orb.o4 { width:190px; height:190px; background:var(--orange); opacity:0.12; top:32%;   left:-40px;   animation-duration:22s; animation-delay:-12s; }
    .bg-orb.o5 { width:160px; height:160px; background:var(--green);  opacity:0.09; top:20%;   right:8%;     animation-duration:28s; animation-delay:-6s; }

    @keyframes orbDrift {
      0%,100% { transform: translateY(0px)   scale(1); }
      33%      { transform: translateY(-28px) scale(1.07); }
      66%      { transform: translateY(18px)  scale(0.94); }
    }

    #homeText {
      position: fixed;
      top: 14px; left: 18px;
      font-family: 'Rubik', sans-serif;
      font-size: 1.7em; font-weight: 900;
      cursor: pointer; z-index: 100;
      transition: transform 0.2s;
      text-shadow: 0 0 20px rgba(157,78,221,0.6);
      letter-spacing: 0.5px;
    }
    #homeText:hover { transform: scale(1.15); }

    #moneyBar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: center; align-items: center;
      padding: 14px; z-index: 99; pointer-events: none;
    }

    #money {
      font-family: 'Space Mono', monospace;
      font-size: 1.4em; font-weight: 700;
      color: var(--gold);
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 30px; padding: 8px 24px;
      text-shadow: 0 0 12px rgba(255,215,0,0.5);
      letter-spacing: 1px; pointer-events: auto;
      transition: color 0.4s, border-color 0.4s, text-shadow 0.4s, background 0.4s;
    }
    #money.negative {
      color: var(--red);
      border-color: rgba(255,58,58,0.4);
      text-shadow: 0 0 12px rgba(255,58,58,0.6);
    }

    body.theme-radioactive #money {
      color: #b8ff80; border-color: rgba(100,255,60,0.35);
      text-shadow: 0 0 12px rgba(100,255,60,0.55);
      background: rgba(0,18,0,0.72);
    }
    body.theme-snow #money {
      color: #d8f0ff; border-color: rgba(180,220,255,0.35);
      text-shadow: 0 0 12px rgba(180,220,255,0.6);
      background: rgba(0,16,28,0.72);
    }
    body.theme-cotton-candy #money {
      color: #ff4fa3; border-color: rgba(255,110,180,0.35);
      text-shadow: 0 0 12px rgba(255,110,180,0.5);
      background: rgba(80,0,40,0.14);
    }
    body.theme-saber #money {
      color: #a0d8ff; border-color: rgba(120,200,255,0.35);
      text-shadow: 0 0 12px rgba(80,180,255,0.55);
      background: rgba(0,10,26,0.72);
    }

    #resetBtn {
      position: fixed; top: 14px; right: 18px; z-index: 100;
      background: transparent; border: 1.5px solid rgba(255,58,58,0.4);
      color: rgba(255,58,58,0.7);
      font-family: 'Rubik', sans-serif; font-size: 0.82em; font-weight: 700;
      padding: 7px 16px; border-radius: 20px; cursor: pointer;
      letter-spacing: 1px; transition: all 0.2s;
    }
    #resetBtn:hover {
      background: rgba(255,58,58,0.15); border-color: var(--red);
      color: var(--red); box-shadow: 0 0 14px rgba(255,58,58,0.3);
    }

    #app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 80px 20px 40px; min-height: 100vh;
    }

    h1 {
      font-family: 'Rubik', sans-serif; font-weight: 900;
      font-size: clamp(1.4em, 4vw, 2.6em); letter-spacing: 3px;
      margin-bottom: 30px; text-align: center;
      background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
      background-size: 200% 200%;
      -webkit-background-clip: text; color: transparent;
      animation: titleShimmer 4s ease infinite;
      filter: drop-shadow(0 0 20px rgba(157,78,221,0.5));
      transition: filter 0.4s, background 0.4s;
    }

    body.theme-radioactive h1 {
      background: linear-gradient(135deg, #ccffcc, #44ff44, #00cc00, #aaff88);
      -webkit-background-clip: text;
      filter: drop-shadow(0 0 22px rgba(80,255,60,0.45));
    }
    body.theme-snow h1 {
      background: linear-gradient(135deg, #ffffff, #c8e8ff, #90ccff, #e8f8ff);
      -webkit-background-clip: text;
      filter: drop-shadow(0 0 22px rgba(180,220,255,0.5));
    }
    body.theme-cotton-candy h1 {
      background: linear-gradient(135deg, #ffffff, #ffd2eb, #ff88c7, #ff5aa8, #fff2fb);
      -webkit-background-clip: text;
      filter: drop-shadow(0 0 18px rgba(255,100,180,0.30));
    }
    body.theme-saber h1 {
      background: linear-gradient(135deg, #f6fbff, #bfe7ff, #5fb8ff, #1e74ff, #dff6ff);
      -webkit-background-clip: text;
      filter: drop-shadow(0 0 12px rgba(70,170,255,0.55)) drop-shadow(0 0 30px rgba(0,120,255,0.24));
    }

    @keyframes titleShimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    #spinnerWrap {
      position: relative; width: min(380px, 92vw); margin-bottom: 24px;
    }

    #spinnerWrap::after {
      content: '▶';
      position: absolute; left: -28px; top: 50%;
      transform: translateY(-50%);
      font-size: 1.6em; color: var(--cyan);
      text-shadow: 0 0 12px var(--cyan); z-index: 10;
      animation: pulsePt 1s ease infinite;
    }
    body.theme-radioactive #spinnerWrap::after {
      color: #88ff44; text-shadow: 0 0 14px rgba(100,255,60,0.92);
    }
    body.theme-snow #spinnerWrap::after {
      color: #cde8ff; text-shadow: 0 0 14px rgba(180,220,255,0.92);
    }
    body.theme-cotton-candy #spinnerWrap::after {
      color: #ff5ab6; text-shadow: 0 0 14px rgba(255,90,182,0.92);
    }
    body.theme-saber #spinnerWrap::after {
      color: #a0d8ff; text-shadow: 0 0 14px rgba(120,200,255,0.92);
    }

    @keyframes pulsePt {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    #spinner {
      width: 100%; height: 320px; overflow: hidden;
      border-radius: 20px; border: 2px solid var(--purple);
      box-shadow: 0 0 40px rgba(157,78,221,0.4), inset 0 0 30px rgba(0,0,0,0.5);
      background: var(--surface); position: relative;
      transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
    }

    /* Radioactive spinner — clean like snow but green */
    body.theme-radioactive #spinner {
      background: linear-gradient(180deg, #021400 0%, #083800 45%, #011000 100%);
      border-color: rgba(100,255,60,0.6);
      box-shadow: 0 0 40px rgba(80,255,60,0.25), inset 0 0 30px rgba(0,0,0,0.5);
    }
    body.theme-snow #spinner {
      background: linear-gradient(180deg, #07121f 0%, #10263c 100%);
      border-color: rgba(180,220,255,0.6);
      box-shadow: 0 0 40px rgba(180,220,255,0.25), inset 0 0 30px rgba(0,0,0,0.45);
    }
    /* Cotton candy spinner — normal style but pink */
    body.theme-cotton-candy #spinner {
      background: linear-gradient(180deg, #fff0f8 0%, #ffd0e9 100%);
      border-color: rgba(255,110,180,0.6);
      box-shadow: 0 0 40px rgba(255,110,180,0.25), inset 0 0 30px rgba(255,200,220,0.15);
    }
    /* Saber spinner — blue matching main menu saber style */
    body.theme-saber #spinner {
      background: linear-gradient(180deg, #00000a 0%, #001428 45%, #020610 100%);
      border-color: rgba(120,200,255,0.6);
      box-shadow: 0 0 40px rgba(80,180,255,0.25), inset 0 0 30px rgba(0,0,0,0.5);
    }

    #spinner::before {
      content: ''; position: absolute; left: 0; right: 0;
      top: 50%; transform: translateY(-50%); height: 64px;
      border-top: 2px solid var(--cyan); border-bottom: 2px solid var(--cyan);
      background: rgba(0,245,255,0.05); z-index: 5; pointer-events: none;
    }
    body.theme-radioactive #spinner::before {
      border-top-color: #88ff44; border-bottom-color: #88ff44;
      background: rgba(100,255,60,0.06);
    }
    body.theme-snow #spinner::before {
      border-top-color: #cde8ff; border-bottom-color: #cde8ff;
      background: rgba(180,220,255,0.06);
    }
    body.theme-cotton-candy #spinner::before {
      border-top-color: rgba(255,100,170,0.7); border-bottom-color: rgba(255,100,170,0.7);
      background: rgba(255,100,170,0.07);
    }
    body.theme-saber #spinner::before {
      border-top-color: rgba(120,200,255,0.8); border-bottom-color: rgba(120,200,255,0.8);
      background: rgba(80,180,255,0.06);
    }

    #spinner::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, var(--surface) 0%, transparent 30%, transparent 70%, var(--surface) 100%);
      z-index: 6; pointer-events: none;
    }
    body.theme-radioactive #spinner::after {
      background: linear-gradient(to bottom, rgba(2,20,0,1) 0%, transparent 30%, transparent 70%, rgba(2,20,0,1) 100%);
    }
    body.theme-snow #spinner::after {
      background: linear-gradient(to bottom, rgba(7,18,31,1) 0%, transparent 30%, transparent 70%, rgba(7,18,31,1) 100%);
    }
    body.theme-cotton-candy #spinner::after {
      background: linear-gradient(to bottom, rgba(255,240,248,1) 0%, transparent 30%, transparent 70%, rgba(255,240,248,1) 100%);
    }
    body.theme-saber #spinner::after {
      background: linear-gradient(to bottom, rgba(0,0,10,1) 0%, transparent 30%, transparent 70%, rgba(0,0,10,1) 100%);
    }

    #items { position: absolute; width: 100%; top: 0px; }

    .item {
      height: 64px; display: flex; align-items: center; justify-content: center;
      font-size: 1.3em; font-weight: 700;
      font-family: 'Space Mono', monospace;
      border-bottom: 1px solid var(--border);
    }
    .item.good    { color: var(--green); }
    .item.bad     { color: var(--red); }
    .item.special { color: var(--cyan); }
    .item.blackhole { color: #ffb55c; text-shadow: 0 0 10px rgba(255,181,92,0.35), 0 0 18px rgba(125,211,252,0.18); }
    .item.mult    { color: var(--gold); }
    .item.selected {
      background: rgba(157,78,221,0.25) !important;
      color: white !important; font-size: 1.4em;
    }

    /* Cotton candy item colours */
    body.theme-cotton-candy .item { color: #7a2050; border-bottom-color: rgba(255,140,190,0.15); }
    body.theme-cotton-candy .item.selected {
      background: rgba(255,100,170,0.20) !important;
      color: #cc1060 !important;
    }
    /* Saber item colours */
    body.theme-saber .item { color: #c0e8ff; text-shadow: 0 0 8px rgba(80,180,255,0.35); border-bottom-color: rgba(120,200,255,0.12); }
    body.theme-saber .item.selected {
      background: rgba(80,180,255,0.18) !important;
      color: white !important;
    }

    #spinBtn {
      position: relative; padding: 16px 60px;
      font-size: 1.4em; font-family: 'Rubik', sans-serif; font-weight: 900;
      letter-spacing: 3px; border-radius: 50px; border: none; cursor: pointer;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: white; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s, background 0.4s, color 0.4s;
      box-shadow: 0 4px 30px rgba(157,78,221,0.5); margin-bottom: 28px;
    }
    #spinBtn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    }
    #spinBtn:hover:not(:disabled) { transform: translateY(-2px) scale(1.04); box-shadow: 0 8px 40px rgba(157,78,221,0.7); }
    #spinBtn:active:not(:disabled) { transform: scale(0.96); }
    #spinBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    body.theme-radioactive #spinBtn {
      background: linear-gradient(135deg, #88ff44, #228800);
      color: #001400; box-shadow: 0 4px 30px rgba(100,255,60,0.35);
    }
    body.theme-radioactive #spinBtn:hover:not(:disabled) { box-shadow: 0 8px 40px rgba(100,255,60,0.55); }
    body.theme-snow #spinBtn {
      background: linear-gradient(135deg, #e0f4ff, #6abaff);
      color: #001a2e; box-shadow: 0 4px 30px rgba(180,220,255,0.35);
    }
    body.theme-snow #spinBtn:hover:not(:disabled) { box-shadow: 0 8px 40px rgba(180,220,255,0.55); }
    body.theme-cotton-candy #spinBtn {
      background: linear-gradient(135deg, #fff6fb 0%, #ff8acc 44%, #ff3e9f 100%);
      color: #4d0b2e; box-shadow: 0 4px 30px rgba(255,120,189,0.36);
    }
    body.theme-cotton-candy #spinBtn:hover:not(:disabled) { box-shadow: 0 8px 40px rgba(255,120,189,0.55); }
    body.theme-saber #spinBtn {
      background: linear-gradient(145deg, #00306d, #00132d 58%, #02040c);
      color: #f4fbff;
      box-shadow: 0 0 0 1px rgba(120,200,255,0.25), 0 4px 30px rgba(30,120,255,0.35),
        inset 0 0 18px rgba(20,150,255,0.10);
      border: 1px solid rgba(120,190,255,0.22);
      position: relative; overflow: hidden;
    }
    body.theme-saber #spinBtn::before {
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.05) 42%,
        rgba(120,210,255,0.72) 50%, rgba(255,255,255,0.05) 58%, transparent 100%);
      transform: translateX(-130%);
      animation: saberSweep 2.1s linear infinite;
    }
    body.theme-saber #spinBtn:hover:not(:disabled) {
      box-shadow: 0 0 0 1px rgba(140,210,255,0.35), 0 8px 40px rgba(60,150,255,0.50),
        inset 0 0 22px rgba(20,170,255,0.16);
    }
    @keyframes saberSweep {
      0%   { transform: translateX(-130%); }
      100% { transform: translateX(130%); }
    }

    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.35); transform: scale(0);
      animation: rippleOut 0.6s linear; pointer-events: none;
    }
    @keyframes rippleOut { to { transform: scale(4); opacity: 0; } }

    #gameArea { width: min(480px, 94vw); margin-top: 6px; }

    .game-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 28px 24px; text-align: center;
      animation: slideUp 0.4s cubic-bezier(0.34,1.4,0.64,1) both;
      transition: background 0.4s, border-color 0.4s;
    }
    body.theme-radioactive .game-card { background: rgba(0,16,0,0.85); border-color: rgba(100,255,60,0.18); }

    @keyframes slideUp {

      width: min(620px, 94vw);

<body>

<script>
// ─────────────────────────────────────────
// MONEY  (also syncs to main menu keys)
// ─────────────────────────────────────────
let money = parseInt(localStorage.getItem("wren_money")) || 0;
const moneyDisplay = document.getElementById("money");

const MONEY_UNLOCK_KEY        = "wren_theme_money_unlocked";
const SNOW_UNLOCK_KEY         = "wren_theme_snow_unlocked";
const COTTON_CANDY_UNLOCK_KEY = "wren_theme_cotton_candy_unlocked";
const SABER_UNLOCK_KEY        = "wren_theme_saber_unlocked";
const BLACKHOLE_UNLOCK_KEY    = "wren_theme_blackhole_unlocked";
const UNLOCK_NOTICE_QUEUE_KEY = "wren_pending_unlock_notices";
const THEME_KEY               = "wren_active_theme";

// Main-menu unlock keys so wheel progress counts there too
const MM_RADIOACTIVE_KEY = "wren_theme_radioactive_unlocked";
const MM_SNOW_KEY        = SNOW_UNLOCK_KEY;

const THEME_DATA = {
  normal: {
    label: "Normal",
    desc: "The classic Wren look.",
    note: "Unlocked by default.",
    className: "theme-normal"
  },
  radioactive: {
    label: "Radioactive",
    desc: "Green neon glow.",
    note: "How to get it: reach $1,000,000.",
    className: "theme-radioactive",
    unlockKey: MONEY_UNLOCK_KEY
  },
  snow: {
    label: "Snow",
    desc: "Icy blue winter glow.",
    note: "How to get it: reach $1,000,000,000.",
    className: "theme-snow",
    unlockKey: SNOW_UNLOCK_KEY
  },
  cotton_candy: {
    label: "Cotton Candy",
    desc: "Sweet fluffy pink clouds.",
    note: "How to get it: unlock Cotton Candy at $1,000,000,000,000.",
    className: "theme-cotton-candy",
    unlockKey: COTTON_CANDY_UNLOCK_KEY
  },
  saber: {
    label: "Saber",
    desc: "Blue lightsaber glow.",
    note: "How to get it: unlock Saber at $1,000,000,000,000,000.",
    className: "theme-saber",
    unlockKey: SABER_UNLOCK_KEY
  },
  black_hole: {
    label: "Black Hole",
    desc: "Dark cosmic void theme.",
    note: "How to get it: spin the Wren Wheel of Doom and land on Black Hole.",
    className: "theme-black-hole",
    unlockKey: BLACKHOLE_UNLOCK_KEY
  }
};

function saveMoney() { localStorage.setItem("wren_money", money); }

function queueUnlockNotice(message) {
  try {
    const queue = JSON.parse(localStorage.getItem(UNLOCK_NOTICE_QUEUE_KEY) || "[]");
    queue.push(message);
    localStorage.setItem(UNLOCK_NOTICE_QUEUE_KEY, JSON.stringify(queue));
  } catch (e) {
    localStorage.setItem(UNLOCK_NOTICE_QUEUE_KEY, JSON.stringify([message]));
  }
}

function syncThemeUnlocks() {
  const floored = Math.floor(money);

  // Money theme (main menu) — $1,000,000
  if (floored >= 1_000_000) {
    if (localStorage.getItem(MONEY_UNLOCK_KEY) !== "1") {
      localStorage.setItem(MONEY_UNLOCK_KEY, "1");
      // also mark for main menu radioactive
      localStorage.setItem(MM_RADIOACTIVE_KEY, "1");
      queueUnlockNotice("☢️ Radioactive & 💵 Money themes unlocked in main menu!");
    }
  }

  // Snow / radioactive (wheel + main menu) — $1,000,000,000
  if (floored >= 1_000_000_000) {
    if (localStorage.getItem(SNOW_UNLOCK_KEY) !== "1") {
      localStorage.setItem(SNOW_UNLOCK_KEY, "1");
      localStorage.setItem(MM_SNOW_KEY, "1");
      queueUnlockNotice("❄️ Snow theme unlocked in main menu too!");
    }
    // keep radioactive in sync
    localStorage.setItem(MONEY_UNLOCK_KEY, "1");
    localStorage.setItem(MM_RADIOACTIVE_KEY, "1");
  }

  // Cotton Candy — $1,000,000,000,000
  if (floored >= 1_000_000_000_000) {
    localStorage.setItem(COTTON_CANDY_UNLOCK_KEY, "1");
  }

  // Saber — $1,000,000,000,000,000
  if (floored >= 1_000_000_000_000_000) {
    localStorage.setItem(SABER_UNLOCK_KEY, "1");
  }
}

function isThemeUnlocked(themeId) {
  if (themeId === "normal") return true;
  const data = THEME_DATA[themeId];
  return !!data && (!data.unlockKey || localStorage.getItem(data.unlockKey) === "1");
}

function getAvailableThemeId(themeId) {
  if (THEME_DATA[themeId] && isThemeUnlocked(themeId)) return themeId;
  return "normal";
}

function applyTheme(themeId, persist = true) {
  const chosen = getAvailableThemeId(themeId);
  if (persist) localStorage.setItem(THEME_KEY, chosen);

  document.body.classList.remove(
    "theme-normal",
    "theme-radioactive",
    "theme-snow",
    "theme-cotton-candy",
    "theme-saber",
    "theme-black-hole"
  );
  document.body.classList.add(THEME_DATA[chosen].className);

  // Start / stop particle effects
  stopSnowParticles();
  stopCandyParticles();
  if (chosen === "snow")         startSnowParticles();
  if (chosen === "cotton_candy") startCandyParticles();

  const btn = document.getElementById("themesBtn");
  if (btn) {
    btn.textContent = "🎨 THEMES";
    btn.title = "Current theme: " + THEME_DATA[chosen].label;
  }

  const overlay = document.getElementById("themesOverlay");
  if (overlay && overlay.classList.contains("active")) renderThemesModal();
}

function updateTheme() {
  const saved = localStorage.getItem(THEME_KEY) || "normal";
  const chosen = getAvailableThemeId(saved);
  if (chosen !== saved) localStorage.setItem(THEME_KEY, chosen);
  applyTheme(chosen, false);
}

function updateMoney() {
  const floored = Math.floor(money);
  moneyDisplay.textContent = "💰 $" + floored.toLocaleString();
  moneyDisplay.classList.toggle("negative", floored < 0);
  syncThemeUnlocks();
  updateTheme();
}
updateMoney();

function animateMoney(amount) {
  const target = money + amount;
  const steps  = 30;
  const diff   = (target - money) / steps;
  let step = 0;
  const iv = setInterval(() => {
    money += diff;
    step++;
    if (step >= steps) {
      money = target;
      clearInterval(iv);
      saveMoney();
      syncThemeUnlocks();
      updateTheme();
    }
    updateMoney();
  }, 16);
  showResult(amount);
}

function applyMultiplier(mult, label) {
  let target;
  if (money < 0) {
    target = (mult > 1) ? money / mult : money * (2 - mult);
  } else {
    target = money * mult;
  }
  const gain  = target - money;
  const steps = 30;
  const diff  = (target - money) / steps;
  let step = 0;
  const iv = setInterval(() => {
    money += diff;
    step++;
    if (step >= steps) {
      money = target;
      clearInterval(iv);
      saveMoney();
      syncThemeUnlocks();
      updateTheme();
    }
    updateMoney();
  }, 16);
  showResult(gain, label);
}

function buildStrip(length) {
  const goodPool = [...goodItems, ...goodItems, ...specialItems];
  const badPool  = [...badItems, ...badItems];
  const pool = [];
  for (let i = 0; i < length; i++) {
    if (Math.random() < 0.01) { pool.push(blackHoleItem); continue; }
    const src = Math.random() < 0.65 ? goodPool : badPool;
    const item = src[Math.floor(Math.random() * src.length)];
    pool.push(item);
  }
  return pool;
}

function spin(e) {
  if (spinning) return;
  spinning = true;

  document.getElementById("spinBtn").disabled = true;
  document.getElementById("gameArea").innerHTML = "";
  document.querySelectorAll(".item").forEach(i => i.classList.remove("selected"));

  if (e) {
    const btn = document.getElementById("spinBtn");
    const r   = document.createElement("span");
    r.className = "ripple";
    const d = Math.max(btn.clientWidth, btn.clientHeight);
    r.style.width = r.style.height = d + "px";
    r.style.left  = (e.clientX - btn.getBoundingClientRect().left - d/2) + "px";
    r.style.top   = (e.clientY - btn.getBoundingClientRect().top  - d/2) + "px";
    btn.appendChild(r);
    setTimeout(() => r.remove(), 700);
  }

  const ITEM_H     = 64;
  const VISIBLE_H  = 320;
  const centerOffset = Math.floor(VISIBLE_H / 2) - Math.floor(ITEM_H / 2);

  const index      = 20 + Math.floor(Math.random() * 70);
  const winningItem = strip[index];
  const targetTop  = -(index * ITEM_H) + centerOffset;

  container.style.transition = "none";
  void container.offsetHeight;
  container.style.transition = "top 3.2s cubic-bezier(0.12, 0.9, 0.15, 1)";
  container.style.top = targetTop + "px";

  setTimeout(() => {
    spinning = false;
    if (container.children[index]) container.children[index].classList.add("selected");
    winningItem.action();

    setTimeout(() => {
      strip = buildStrip(120);
      renderStrip();
      container.style.transition = "none";
      container.style.top = "0px";
      setTimeout(() => { document.getElementById("spinBtn").disabled = false; }, 1500);
    }, 700);
  }, 3300);
}

function beginClickRush() {
  const area = document.getElementById("gameArea");

  clickRushActive = true;

    if (timerEl) {
      timerEl.textContent = timeLeft;
      if (timeLeft <= 3) timerEl.style.color = "var(--red)";

function endClickRushForAutoclick() {
  if (!clickRushActive) return;
  clickRushActive = false;
  clearInterval(clickRushTimer);
  clearInterval(clickRushPrepTimer);
  const target = document.getElementById("clickTarget");
  if (target) target.removeEventListener("click", onClickRush);
  document.getElementById("gameArea").innerHTML = "";
  applyMultiplier(0.8, money < 0 ? "+20% debt 💀" : "-20% AUTOCLICK!");
}

function onClickRush(e) {
  if (!clickRushActive) return;

  const now = Date.now();
  clickRushClickTimes = clickRushClickTimes.filter(t => now - t < 1000);
  clickRushClickTimes.push(now);

  if (clickRushClickTimes.length >= 30) {
    endClickRushForAutoclick();
    return;
  }

  clickRushCount++;

  const target = document.getElementById("clickTarget");
  target.classList.remove("pulse");
  void target.offsetWidth;
  target.classList.add("pulse");

  const el = document.createElement("div");
  el.className   = "click-float";
  el.textContent = "+$" + clickRushClickValue.toLocaleString();
  el.style.left  = (e.clientX - 20) + "px";
  el.style.top   = (e.clientY - 20) + "px";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);

  const countEl = document.getElementById("clickCount");
  if (countEl)
    countEl.textContent = `Clicks: ${clickRushCount} — Earnings: +$${(clickRushClickValue * clickRushCount).toLocaleString()}`;
}

// SPEED TEST
// ─────────────────────────────────────────
let speedActive    = false;
let speedIsGreen   = false;
let speedGreenTime = 0;
let speedRevealTimer = null;
let speedFailTimer   = null;
let speedUsed      = false;

function startSpeedTest() {
  speedActive  = false;
  speedIsGreen = false;
  speedUsed    = false;
  clearTimeout(speedRevealTimer);
  clearTimeout(speedFailTimer);

  const overlay = document.getElementById("speedOverlay");
  const circle  = document.getElementById("speedCircle");
  const msg     = document.getElementById("speedMsg");
  const sub     = document.getElementById("speedSubMsg");

  circle.className   = "";
  circle.textContent = "WAIT";
  msg.textContent    = "Wait for GREEN, then click as fast as you can!";
  sub.textContent    = "Click TOO EARLY = -20% 💀";

  overlay.classList.add("active");
  speedActive = true;

  const poll = setInterval(() => {
    if (!speedActive) { clearInterval(poll); return; }
    if (Math.random() < 0.025) {
      clearInterval(poll);
      speedIsGreen   = true;
      speedGreenTime = Date.now();
      circle.classList.add("go");
      circle.textContent = "CLICK!";
      msg.textContent    = "NOW! CLICK AS FAST AS YOU CAN!";
      sub.textContent    = "";

      speedFailTimer = setTimeout(() => {
        if (!speedActive) return;
        speedActive = false;
        overlay.classList.remove("active");
        overlay.onclick = null;
        showResult(0, "TOO SLOW! Nothing 😔");
      }, 2000);
    }
  }, 500);

  overlay.onclick = handleSpeedClick;
}

function handleSpeedClick() {
  if (!speedActive || speedUsed) return;
  speedUsed = true;

  const overlay = document.getElementById("speedOverlay");

  if (!speedIsGreen) {
    speedActive = false;
    clearTimeout(speedRevealTimer);
    clearTimeout(speedFailTimer);
    overlay.classList.remove("active");
    overlay.onclick = null;
    applyMultiplier(0.8, money < 0 ? "+20% debt 💀" : "-20% TOO EARLY! 💀");
    return;
  }

  speedActive = false;
  clearTimeout(speedFailTimer);
  overlay.classList.remove("active");
  overlay.onclick = null;

  const elapsed = (Date.now() - speedGreenTime) / 1000;

  if (elapsed < 0.1) {
    applyMultiplier(3, money < 0 ? "÷3 debt ⚡" : "×3!! ⚡ INSANE!");
  } else if (elapsed < 0.2) {
    applyMultiplier(2, money < 0 ? "÷2 debt ⚡" : "×2!! ⚡ FAST!");
  } else if (elapsed < 0.4) {
    applyMultiplier(1.5, money < 0 ? "÷1.5 debt" : "×1.5! 🔥 Quick!");
  } else if (elapsed < 1.0) {
    applyMultiplier(1.1, money < 0 ? "÷1.1 debt" : "×1.1 Not bad");
  } else {
    showResult(0, "TOO SLOW! Nothing 😔");
  }
}

        </p>
        <p style="color:var(--green); font-size:1em; margin-bottom:4px;">
          ✅ Double: ×${(runningMult * 2).toFixed(2)} (potential +$${potentialGain.toLocaleString()})
        </p>
        <p style="color:var(--red); font-size:0.85em; margin-bottom:18px;">
          ⚠️ 15% chance of losing 60% instead of doubling
        </p>
        <div>
          <button class="game-btn btn-gold"  id="donDouble">🎲 DOUBLE IT</button>
          <button class="game-btn btn-green" id="donCash">✅ CASH OUT ×${runningMult.toFixed(2)}</button>
        </div>
        <p style="color:rgba(255,255,255,0.3); font-size:0.75em; margin-top:14px;">
          Cash out now for ×${runningMult.toFixed(2)} your ${money < 0 ? "debt" : "balance"}, or gamble for ×${(runningMult * 2).toFixed(2)}!
        </p>
      </div>`;

    document.getElementById("donDouble").onclick = () => {
      const lose = Math.random() < 0.15;
      if (lose) {
        applyMultiplier(0.4, money < 0 ? "+60% debt 💀" : "-60%!! 💀 Bad luck!");
        area.innerHTML = "";
      } else {
        renderDON(round + 1, runningMult * 2);
      }
    };

    document.getElementById("donCash").onclick = () => {
      if (runningMult === 1) {
        showResult(0, "Nothing gained!");
        area.innerHTML = "";
      } else {
        applyMultiplier(runningMult, money < 0 ? `×${runningMult.toFixed(1)} debt 💀` : `×${runningMult.toFixed(1)}!! 🔥`);
        area.innerHTML = "";
      }
    };
  }

  renderDON(1, 1);
}

// ─────────────────────────────────────────
// RESET
// ─────────────────────────────────────────
function askReset() {
  showModal("Reset Balance?", "This will wipe all your WrenDollars. Are you sure?", "Yes, reset", () => {
    showModal("Are you VERY VERY sure?", "You will lose every single dollar. This cannot be undone. Really?", "YES, I'm sure", () => {
      money = 0;
      saveMoney();
      updateMoney();
      closeModal();
    });
  });
}

function showModal(title, body, confirmText, onConfirm) {
  document.getElementById("modalTitle").textContent   = title;
  document.getElementById("modalBody").textContent    = body;
  document.getElementById("modalConfirm").textContent = confirmText;
  document.getElementById("modalConfirm").onclick     = onConfirm;
  document.getElementById("modalOverlay").style.display = "flex";
}

function closeModal() {
  document.getElementById("modalOverlay").style.display = "none";
}

// ─────────────────────────────────────────
// MUSIC
// ─────────────────────────────────────────
const music    = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");
music.volume   = 0.5;

function tryPlay() { music.play().catch(() => {}); }
tryPlay();
["click","keydown","touchstart","mousemove"].forEach(ev =>
  document.addEventListener(ev, tryPlay, { once: true })
);

function toggleMusic() {
  music.muted    = !music.muted;
  musicBtn.textContent = music.muted ? "🔇 Muted" : "🔊 Music";
}

// ─────────────────────────────────────────
// LOAD
// ─────────────────────────────────────────
window.addEventListener("load", () => {
  updateMoney();
  updateTheme();
  syncThemeUnlocks();
  renderThemesModal();
});
</script>
</body>
</html>
