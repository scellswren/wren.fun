<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wren Wheel of Doom</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../Favicon.png">
<style>
  body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg, #f6d365, #fda085);
    overflow: hidden;
  }

  /* Top bar */
  #topBar {
    position: fixed; top:0; left:0; right:0;
    display:flex; justify-content: space-between; align-items:center;
    padding:10px 20px;
    background: rgba(255,255,255,0.85);
    z-index:1000;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
  }
  #wrenTitle {
    font-family: 'Rubik', sans-serif;
    font-size: 2em; font-weight:700; cursor:pointer;
  }
  #wrenDollars {
    font-size:1.5em; font-weight:bold; color:purple;
  }

  /* Wheel container */
  #wheelContainer {
    position: relative; 
    height: 400px; width: 300px; 
    margin: 80px auto;
    overflow:hidden; border-radius:20px; 
    border:4px solid purple; background:linear-gradient(to bottom, #f093fb, #f5576c);
    box-shadow:0 0 20px rgba(0,0,0,0.3);
  }
  #wheel {
    display:flex; flex-direction: column;
  }
  .wheelItem {
    height:100px; display:flex; align-items:center; justify-content:center;
    font-size:1.5em; font-weight:bold; color:white;
    text-shadow:0 0 5px black;
    border-bottom:1px solid rgba(255,255,255,0.3);
    transition: all 0.3s;
    background: linear-gradient(45deg, #f093fb, #f5576c);
  }
  .active {
    transform: scale(1.1);
    box-shadow:0 0 20px purple;
  }

  /* Spin button */
  #spinBtn {
    display:block; margin:30px auto; padding:20px 40px;
    font-size:1.8em; font-family: 'Rubik', sans-serif;
    border:none; border-radius:15px; background-color:purple;
    color:white; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,0.3);
    transition: all 0.2s;
  }
  #spinBtn:active{ transform: scale(0.95); }

  /* Challenge container */
  #challengeContainer {
    display:none; margin:20px auto; width:90%; max-width:500px;
    text-align:center;
  }
  #challengeText {
    font-size:1.5em; margin-bottom:20px; color:white; text-shadow:0 0 5px black;
  }
  #challengeInput, #challengeButton {
    padding:10px 20px; font-size:1.2em; margin:5px;
    border-radius:10px; border:none;
  }
  #challengeButton {
    background-color: purple; color:white; cursor:pointer;
  }
</style>
</head>
<body>

<div id="topBar">
  <div id="wrenTitle">Wren.fun</div>
  <div id="wrenDollars">WrenDollars: $0</div>
</div>

<div id="wheelContainer">
  <div id="wheel"></div>
</div>

<button id="spinBtn">Spin</button>

<div id="challengeContainer">
  <div id="challengeText"></div>
  <input type="text" id="challengeInput" class="hidden">
  <button id="challengeButton" class="hidden"></button>
</div>

<script>
const baseItems = [
  {name:'+10', type:'money', value:10},
  {name:'+20', type:'money', value:20},
  {name:'+50', type:'money', value:50},
  {name:'+100', type:'money', value:100},
  {name:'+500', type:'money', value:500},
  {name:'+1000', type:'money', value:1000},
  {name:'+5000', type:'money', value:5000},
  {name:'-10', type:'money', value:-10},
  {name:'-20', type:'money', value:-20},
  {name:'-50', type:'money', value:-50},
  {name:'-100', type:'money', value:-100},
  {name:'-500', type:'money', value:-500},
  {name:'-1000', type:'money', value:-1000},
  {name:'-5000', type:'money', value:-5000},
  {name:'Click Frenzy', type:'clickGame'},
  {name:'Red Light Green Light', type:'clickGreen'}
];

// Make a bigger wheel array with more + than - and multiple items
const wheelItems = [];
for(let i=0;i<3;i++) baseItems.forEach(it=>{
  if(it.name.startsWith('+') || it.type!='money') wheelItems.push(it);
});
for(let i=0;i<2;i++) baseItems.forEach(it=>{
  if(it.name.startsWith('-')) wheelItems.push(it);
});

// Shuffle function
function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
}

shuffle(wheelItems);

const wheelContainer = document.getElementById('wheel');
wheelItems.forEach(item=>{
  const div = document.createElement('div');
  div.classList.add('wheelItem');
  div.textContent=item.name;
  wheelContainer.appendChild(div);
});

// Duplicate for smooth wrap
wheelItems.forEach(item=>{
  const div = document.createElement('div');
  div.classList.add('wheelItem');
  div.textContent=item.name;
  wheelContainer.appendChild(div);
});

let wrenDollars = parseInt(localStorage.getItem('wrenDollars')||0);
const wrenDisplay = document.getElementById('wrenDollars');
wrenDisplay.textContent=`WrenDollars: $${wrenDollars}`;

const spinBtn = document.getElementById('spinBtn');
const challengeContainer = document.getElementById('challengeContainer');
const challengeText = document.getElementById('challengeText');
const challengeInput = document.getElementById('challengeInput');
const challengeButton = document.getElementById('challengeButton');

let spinning=false;
let currentIndex=0;

function updateWrenDollars(amount){
  wrenDollars+=amount;
  wrenDisplay.textContent=`WrenDollars: $${wrenDollars}`;
  localStorage.setItem('wrenDollars',wrenDollars);
}

function startChallenge(challenge){
  spinBtn.style.display='none';
  challengeContainer.style.display='block';
  challengeText.textContent=challenge.name;
  challengeInput.classList.add('hidden');
  challengeButton.classList.add('hidden');

  if(challenge.type==='money'){
    updateWrenDollars(challenge.value);
    setTimeout(endChallenge,3000);
  } else if(challenge.type==='clickGame'){
    challengeButton.textContent='Click as fast as possible in 10s (+5 per click)';
    challengeButton.classList.remove('hidden');
    let clicks=0;
    let timeUp=false;
    challengeButton.onclick=()=>{ if(!timeUp) clicks++; }
    setTimeout(()=>{
      timeUp=true;
      updateWrenDollars(clicks*5);
      endChallenge();
    },10000);
  } else if(challenge.type==='clickGreen'){
    challengeButton.textContent='Red Light Green Light (click when green)';
    challengeButton.classList.remove('hidden');
    let total=0;
    let active=false;
    const interval=setInterval(()=>{
      active=!active;
      challengeButton.style.backgroundColor=active?'green':'red';
    },800);
    challengeButton.onclick=()=>{
      total = active ? total+1 : -Math.abs(total);
    }
    setTimeout(()=>{
      clearInterval(interval);
      updateWrenDollars(total);
      endChallenge();
    },10000);
  }
}

function endChallenge(){
  challengeContainer.style.display='none';
  spinBtn.style.display='block';
}

spinBtn.addEventListener('click',()=>{
  if(spinning) return;
  spinning=true;

  const totalItems = wheelItems.length/2; // half because duplicated
  const spinCount = Math.floor(Math.random()*30)+40;
  let steps=0;

  const interval = setInterval(()=>{
    const items=document.querySelectorAll('.wheelItem');
    items.forEach(i=>i.classList.remove('active'));
    const displayIndex = (currentIndex+steps)%totalItems;
    items[displayIndex].classList.add('active');
    wheelContainer.style.transform=`translateY(-${displayIndex*100}px)`;
    steps++;
    if(steps>=spinCount){
      clearInterval(interval);
      spinning=false;
      currentIndex=(currentIndex+spinCount)%totalItems;
      startChallenge(wheelItems[currentIndex]);
    }
  },50);
});

document.getElementById('wrenTitle').addEventListener('click',()=>{ window.location.href='../'; });
</script>

</body>
</html>
