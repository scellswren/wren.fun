<!DOCTYPE html>
<html>
<head>
  <title>Wren Wheel of Doom</title>
  <link rel="icon" type="image/png" href="../Favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #111, #000);
      color: white;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
    }

    #homeText {
      position: fixed;
      top: 0;
      left: 0;
      padding: 10px 15px;
      font-family: 'Rubik', sans-serif;
      font-size: 2em;
      cursor: pointer;
    }

    #money {
      position: fixed;
      top: 10px;
      right: 20px;
      font-size: 1.5em;
      color: gold;
      font-family: 'Rubik', sans-serif;
    }

    #musicBtn {
      position: fixed;
      bottom: 15px;
      left: 15px;
      background: #222;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 15px;
      cursor: pointer;
    }

    h1 {
      font-family: 'Rubik', sans-serif;
      margin-top: 50px;
    }

    #spinner {
      margin: 40px auto;
      width: 320px;
      height: 300px;
      overflow: hidden;
      border: 4px solid purple;
      border-radius: 20px;
      box-shadow: 0 0 25px purple;
      position: relative;
      background: black;
    }

    #items {
      position: absolute;
      width: 100%;
      transition: top 3s cubic-bezier(0.2,0.8,0.2,1);
    }

    .item {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4em;
      border-bottom: 1px solid #222;
    }

    .selected {
      background: purple;
      box-shadow: 0 0 25px purple;
      font-weight: bold;
    }

    #spinBtn {
      padding: 15px 40px;
      font-size: 1.5em;
      border-radius: 20px;
      border: none;
      background: purple;
      color: white;
      cursor: pointer;
    }

    #gameArea {
      margin-top: 20px;
    }

    button {
      padding: 15px 25px;
      font-size: 1.2em;
      border-radius: 15px;
      border: none;
      cursor: pointer;
    }

    #resultOverlay {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      display:none;
      align-items:center;
      justify-content:center;
      font-size:4em;
      font-family:'Rubik', sans-serif;
      z-index:9999;
    }

    .win {
      background: rgba(0,255,0,0.2);
      color: lime;
    }

    .lose {
      background: rgba(255,0,0,0.2);
      color: red;
    }

    #light {
      font-size: 3em;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div id="homeText" onclick="goHome()">Wren.fun</div>
<div id="money">WrenDollars: $0</div>

<h1>Wren Wheel of Doom</h1>

<div id="spinner">
  <div id="items"></div>
</div>

<button id="spinBtn" onclick="spin()">SPIN</button>

<div id="gameArea"></div>

<div id="resultOverlay"></div>

<button id="musicBtn" onclick="toggleMusic()">🔊 Music</button>

<audio id="bgMusic" loop>
  <source src="CoolBoySong.mp3" type="audio/mpeg">
</audio>

<script>
let money = parseInt(localStorage.getItem("money")) || 0;
const moneyDisplay = document.getElementById("money");

function updateMoney(){
  moneyDisplay.innerText = "WrenDollars: $" + money;
}
updateMoney();

function showBig(amount){
  const overlay = document.getElementById("resultOverlay");
  overlay.style.display = "flex";

  if(amount >= 0){
    overlay.className = "win";
    overlay.innerText = "+$" + amount;
  } else {
    overlay.className = "lose";
    overlay.innerText = "-$" + Math.abs(amount);
  }

  setTimeout(()=> overlay.style.display="none",2000);
}

function changeMoney(amount){
  let target = money + amount;
  let step = Math.max(1, Math.abs(amount)/20) * Math.sign(amount);

  let interval = setInterval(()=>{
    money += step;

    if((step > 0 && money >= target) || (step < 0 && money <= target)){
      money = target;
      clearInterval(interval);
      localStorage.setItem("money", money);
    }

    updateMoney();
  },15);

  showBig(amount);
}

function goHome(){
  window.location.href = "https://scellswren.github.io/wren.fun/";
}

const base = [
  "+10","+20","+50","+100","+500","+1000","+5000",
  "-10","-20","-50","-100","-500","-1000","-5000",
  "Spam Click (+5)",
  "Red Light Green Light"
];

let items=[];
for(let i=0;i<80;i++){
  items.push(base[Math.floor(Math.random()*base.length)]);
}

const container = document.getElementById("items");

function render(){
  container.innerHTML="";
  items.forEach(t=>{
    let d=document.createElement("div");
    d.className="item";
    d.innerText=t;
    container.appendChild(d);
  });
}
render();

let spinning=false;

function spin(){
  if(spinning) return;
  spinning=true;

  document.getElementById("gameArea").innerHTML="";
  document.querySelectorAll(".item").forEach(i=>i.classList.remove("selected"));

  let index=Math.floor(Math.random()*items.length);
  container.style.top = -(index*60)+"px";

  setTimeout(()=>{
    spinning=false;
    container.children[index].classList.add("selected");
    resolve(items[index]);
  },3000);
}

function resolve(r){
  if(r.startsWith("+") || r.startsWith("-")){
    changeMoney(parseInt(r));
    return;
  }

  if(r.includes("Spam")) spam();
  if(r.includes("Red")) redLight();
}

function spam(){
  let area=document.getElementById("gameArea");
  let c=0,t=10;

  area.innerHTML=`<h2>CLICK FAST</h2><button id="b">CLICK</button><p>${t}</p>`;
  document.getElementById("b").onclick=()=>c++;

  let i=setInterval(()=>{
    t--;
    area.querySelector("p").innerText=t;
    if(t<=0){
      clearInterval(i);
      changeMoney(c*5);
      area.innerHTML="";
    }
  },1000);
}

function redLight(){
  let area=document.getElementById("gameArea");
  let earn=0,green=true;

  area.innerHTML=`<h2 id="light">GREEN</h2>
  <button id="c">CLICK</button>
  <button onclick="cash()">Cash Out</button>`;

  const txt=document.getElementById("light");

  let i=setInterval(()=>{
    green=!green;
    txt.innerText = green?"GREEN":"RED";
    txt.style.color = green?"lime":"red";
  },1000);

  document.getElementById("c").onclick=()=>{
    if(green){
      earn+=10;
    }else{
      clearInterval(i);
      changeMoney(-earn);
      area.innerHTML="";
    }
  }

  window.cash=()=>{
    clearInterval(i);
    changeMoney(earn);
    area.innerHTML="";
  }
}

/* ✅ FIXED MUSIC */
const music = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");

window.addEventListener("load", () => {
  music.volume = 0.5;

  const playPromise = music.play();

  if (playPromise !== undefined) {
    playPromise.catch(() => {
      document.addEventListener("click", startMusicOnce);
    });
  }
});

function startMusicOnce() {
  music.play();
  document.removeEventListener("click", startMusicOnce);
}

function toggleMusic(){
  music.muted = !music.muted;
  musicBtn.innerText = music.muted ? "🔇 Muted" : "🔊 Music";
}
</script>

</body>
</html>
