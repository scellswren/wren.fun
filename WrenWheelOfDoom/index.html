<!DOCTYPE html>
<html>
<head>
  <title>The Wren Wheel of Doom</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../Favicon.png">
  <style>
    body {
      font-family: 'Rubik', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff4f81, #00d2ff);
      color: #fff;
      text-align: center;
      overflow-x: hidden;
    }

    h1#wrenLogo {
      position: fixed;
      top: 5px;
      left: 5px;
      font-size: 2em;
      cursor: pointer;
      user-select: none;
      color: #fff;
      text-shadow: 2px 2px #000;
      z-index: 1000;
    }

    #wrenDollars {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 2em;
      font-weight: bold;
      text-shadow: 1px 1px #000;
      z-index: 1000;
    }

    #wheelContainer {
      margin: 100px auto 0 auto;
      width: 300px;
      height: 400px;
      border: 4px solid #fff;
      border-radius: 20px;
      overflow: hidden;
      background: #222;
      position: relative;
      box-shadow: 0 0 20px #fff;
    }

    #wheelItems {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
    }

    .wheelItem {
      height: 80px;
      line-height: 80px;
      border-bottom: 2px solid #fff;
      font-size: 1.3em;
      background: linear-gradient(90deg,#ff8c00,#ff0080);
      margin: 0;
      transition: all 0.2s;
    }

    .active {
      background: purple;
      color: #fff;
      font-weight: bold;
      box-shadow: 0 0 15px yellow, 0 0 30px purple;
    }

    #spinBtn {
      font-size: 1.5em;
      padding: 15px 30px;
      margin-top: 20px;
      border-radius: 15px;
      border: none;
      background: #00ffcc;
      color: #000;
      cursor: pointer;
      transition: transform 0.2s;
      z-index: 100;
    }

    #spinBtn:hover { transform: scale(1.05); }

    #challengeArea {
      margin-top: 40px;
      font-size: 1.2em;
    }

    input[type="text"] {
      padding: 10px;
      font-size: 1.2em;
      border-radius: 10px;
      border: 2px solid #fff;
      width: 200px;
      margin-right: 10px;
    }

    .challengeBtn {
      font-size: 1.2em;
      padding: 10px 20px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #ff00ff;
      color: #fff;
      cursor: pointer;
      margin: 5px;
      transition: transform 0.2s;
    }

    .challengeBtn:hover { transform: scale(1.05); }

    .winAnim { animation: winAnim 1s ease forwards; }
    .loseAnim { animation: loseAnim 1s ease forwards; }

    @keyframes winAnim { 0% { transform: scale(1); color: #fff; } 50% { transform: scale(1.5); color: lime; } 100% { transform: scale(1); color: #fff; } }
    @keyframes loseAnim { 0% { transform: scale(1); color: #fff; } 50% { transform: scale(1.5); color: red; } 100% { transform: scale(1); color: #fff; } }

    #countdown {
      font-size: 2em;
      margin-top: 20px;
      color: yellow;
    }

  </style>
</head>
<body>

<h1 id="wrenLogo">Wren.fun</h1>
<div id="wrenDollars">WrenDollars: $0</div>

<div id="wheelContainer">
  <div id="wheelItems"></div>
</div>

<button id="spinBtn">Spin the Wheel!</button>

<div id="countdown"></div>
<div id="challengeArea"></div>

<script>
let wrenDollars = parseInt(localStorage.getItem('WrenDollars')) || 0;
const wrenDisplay = document.getElementById('wrenDollars');
wrenDisplay.textContent = `WrenDollars: $${wrenDollars}`;

const wheelItemsDiv = document.getElementById('wheelItems');
const spinBtn = document.getElementById('spinBtn');
const challengeArea = document.getElementById('challengeArea');
const countdownDiv = document.getElementById('countdown');

// === CHALLENGES ===
const challenges = [
  {name:'Red Light Green Light', type:'rlgl'},
  {name:'Keep Mouse Still 20s', type:'still', value:200},
  {name:'Quick Click 10 times', type:'click', value:150},
  {name:'Math 12 x 12', type:'math', value:200},
  {name:'Type "javascript"', type:'input', value:100},
  {name:'Button Mash 5', type:'buttonClick', value:100},
  {name:'Mini Wheel', type:'miniWheel'},
  {name:'Jackpot', type:'free', value:5000},
  {name:'Reroll', type:'reroll'},
  {name:'Quick Spin', type:'click', value:150}
];

wheelItemsDiv.innerHTML = challenges.map(c => `<div class="wheelItem">${c.name}</div>`).join('');

// === WHEEL SETUP ===
let spinning = false;
let currentIndex = 0;
const itemHeight = 80;

function updateWrenDollars(amount, win=true){
  wrenDollars += win ? amount : -amount;
  if(wrenDollars<0) wrenDollars=0;
  localStorage.setItem('WrenDollars', wrenDollars);
  wrenDisplay.textContent = `WrenDollars: $${wrenDollars}`;
  wrenDisplay.className = win ? 'winAnim' : 'loseAnim';
  setTimeout(()=> wrenDisplay.className='', 1000);
}

// Smooth continuous spin
function spinWheel(){
  if(spinning) return;
  spinning = true;
  challengeArea.innerHTML='';
  countdownDiv.innerHTML='';
  spinBtn.style.display='none';
  const totalSteps = 30 + Math.floor(Math.random()*20);
  let step=0;
  const interval = setInterval(()=>{
    currentIndex = (currentIndex+1) % challenges.length;
    highlightItem(currentIndex);
    step++;
    if(step>totalSteps){
      clearInterval(interval);
      setTimeout(()=> { executeChallenge(currentIndex); }, 500);
    }
  },50); // fast continuous spin
}

function highlightItem(index){
  const items = document.querySelectorAll('.wheelItem');
  items.forEach(i => i.classList.remove('active'));
  items[index].classList.add('active');
  // Wrap effect
  const offset = -(index*itemHeight) % (itemHeight*challenges.length);
  wheelItemsDiv.style.top = `${offset + 160}px`;
}

// === EXECUTE CHALLENGE ===
function executeChallenge(index){
  const challenge = challenges[index];
  document.getElementById('wheelContainer').style.display='none';
  switch(challenge.type){
    case 'free': updateWrenDollars(challenge.value); challengeArea.innerHTML=`You got $${challenge.value}!`; break;
    case 'lose': updateWrenDollars(challenge.value,false); challengeArea.innerHTML=`You lost $${challenge.value}!`; break;
    case 'reroll': challengeArea.innerHTML='Rerolling...'; setTimeout(spinWheel,1000); return;
    case 'click': startClickChallenge(challenge); break;
    case 'math': startMathChallenge(challenge); break;
    case 'input': startInputChallenge(challenge); break;
    case 'buttonClick': startButtonClickChallenge(challenge); break;
    case 'miniWheel': startMiniWheel(); break;
    case 'still': startStillChallenge(challenge); break;
    case 'rlgl': startRLGLChallenge(); break;
  }
}

// === HELPER COUNTDOWN ===
function countdown(seconds, callback){
  countdownDiv.textContent = seconds;
  let interval = setInterval(()=>{
    seconds--;
    if(seconds>0) countdownDiv.textContent = seconds;
    else {
      clearInterval(interval);
      countdownDiv.textContent='Go!';
      callback();
      setTimeout(()=> countdownDiv.textContent='',500);
    }
  },1000);
}

// === CHALLENGE FUNCTIONS ===
function startClickChallenge(challenge){
  countdown(3, ()=>{
    let count=0;
    challengeArea.innerHTML=`<button class="challengeBtn" id="clickBtn">Click me 0</button>`;
    const btn = document.getElementById('clickBtn');
    const timer = setTimeout(()=>{
      if(count>=10) updateWrenDollars(challenge.value);
      else updateWrenDollars(challenge.value,false);
      finishChallenge();
    },10000);
    btn.addEventListener('click',()=>{
      count++;
      btn.textContent=`Click me ${count}`;
    });
  });
}

function startMathChallenge(challenge){
  countdown(3, ()=>{
    challengeArea.innerHTML=`<p>What is 12 x 12?</p><input type="text" id="mathInput"><button class="challengeBtn" id="submitMath">Submit</button>`;
    document.getElementById('submitMath').addEventListener('click',()=>{
      if(parseInt(document.getElementById('mathInput').value)===144) updateWrenDollars(challenge.value);
      else updateWrenDollars(challenge.value,false);
      finishChallenge();
    });
  });
}

function startInputChallenge(challenge){
  countdown(3, ()=>{
    challengeArea.innerHTML=`<p>Type "javascript"</p><input type="text" id="inputAnswer"><button class="challengeBtn" id="submitInput">Submit</button>`;
    document.getElementById('submitInput').addEventListener('click',()=>{
      if(document.getElementById('inputAnswer').value.toLowerCase()==='javascript') updateWrenDollars(challenge.value);
      else updateWrenDollars(challenge.value,false);
      finishChallenge();
    });
  });
}

function startButtonClickChallenge(challenge){
  countdown(3, ()=>{
    let clicks=0;
    challengeArea.innerHTML=`<p>Click the button 5 times!</p><button class="challengeBtn" id="btnClick">0</button>`;
    const btn = document.getElementById('btnClick');
    btn.addEventListener('click', ()=>{
      clicks++;
      btn.textContent=clicks;
      if(clicks===5){ updateWrenDollars(challenge.value); finishChallenge(); }
    });
    setTimeout(()=>{ if(clicks<5){ updateWrenDollars(challenge.value,false); finishChallenge(); } },10000);
  });
}

function startMiniWheel(){
  countdown(3, ()=>{
    const miniItems=['Win $50','Win $100','Win $250','Win $500','Win $2000','Lose $50','Lose $100','Lose $250','Lose $500','Lose $2000'];
    challengeArea.innerHTML='<p>Mini Wheel!</p>';
    setTimeout(()=>{
      const result = miniItems[Math.floor(Math.random()*miniItems.length)];
      challengeArea.innerHTML=`<p>${result}</p>`;
      if(result.includes('Win')) updateWrenDollars(parseInt(result.replace(/\D/g,'')));
      else updateWrenDollars(parseInt(result.replace(/\D/g,'')),false);
      finishChallenge();
    },2000);
  });
}

function startStillChallenge(challenge){
  countdown(3, ()=>{
    challengeArea.innerHTML=`<p>Keep mouse still for 20s!</p>`;
    let moved=false;
    function mm(){ moved=true; }
    document.addEventListener('mousemove',mm);
    setTimeout(()=>{
      document.removeEventListener('mousemove',mm);
      if(!moved) updateWrenDollars(challenge.value);
      else updateWrenDollars(challenge.value,false);
      finishChallenge();
    },20000);
  });
}

function startRLGLChallenge(){
  countdown(3, ()=>{
    let score=0;
    challengeArea.innerHTML=`<p>Red Light Green Light!</p><button class="challengeBtn" id="rlBtn">Click Me!</button><button class="challengeBtn" id="leaveBtn">Leave</button>`;
    const btn = document.getElementById('rlBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    let green=true;
    const interval = setInterval(()=>{ green=!green; btn.style.background = green ? 'green' : 'red'; },1000);
    btn.addEventListener('click',()=>{
      if(!green){ clearInterval(interval); updateWrenDollars(score,false); finishChallenge(); }
      else score++;
    });
    leaveBtn.addEventListener('click',()=>{
      clearInterval(interval); updateWrenDollars(score); finishChallenge();
    });
  });
}

function finishChallenge(){
  challengeArea.innerHTML='';
  document.getElementById('wheelContainer').style.display='block';
  spinBtn.style.display='inline-block';
}

// === EVENTS ===
spinBtn.addEventListener('click', spinWheel);
document.getElementById('wrenLogo').addEventListener('click',()=>{ window.location.href='../'; });

</script>
</body>
</html>
