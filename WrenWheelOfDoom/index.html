<!DOCTYPE html>
<html>
<head>
  <title>The Wren Wheel of Doom</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../Favicon.png">
  <style>
    body {
      font-family: 'Rubik', sans-serif;
      margin: 0;
      padding: 0;
      background: #111;
      color: #fff;
      text-align: center;
      overflow-x: hidden;
    }

    h1 { margin-top: 20px; font-size: 2.8em; }
    #wrenDollars { position: fixed; top: 20px; right: 20px; font-size: 2em; }

    #wheelContainer {
      margin: 50px auto;
      width: 320px;
      height: 400px;
      border: 4px solid #fff;
      border-radius: 20px;
      overflow: hidden;
      background: #222;
      position: relative;
    }

    #wheelItems {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      transition: top 3s cubic-bezier(0.25,1,0.5,1);
    }

    .wheelItem {
      height: 80px;
      line-height: 80px;
      border-bottom: 1px solid #fff;
      font-size: 1.2em;
      background: #222;
      transition: all 0.3s;
    }

    .active {
      background: #4b0082;
      color: #fff;
      font-weight: bold;
      box-shadow: 0 0 20px purple;
    }

    #spinBtn {
      font-size: 1.5em;
      padding: 15px 30px;
      margin-top: 20px;
      border-radius: 15px;
      border: none;
      background: #f0f0f0;
      color: black;
      cursor: pointer;
      transition: transform 0.2s;
    }

    #spinBtn:hover { transform: scale(1.05); }

    #challengeArea {
      margin-top: 40px;
      font-size: 1.2em;
    }

    input[type="text"] {
      padding: 10px;
      font-size: 1.2em;
      border-radius: 10px;
      border: 2px solid #fff;
      width: 200px;
      margin-right: 10px;
    }

    .challengeBtn {
      font-size: 1.2em;
      padding: 10px 20px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #00bfff;
      color: #fff;
      cursor: pointer;
      margin: 5px;
    }

    .winAnim { animation: winAnim 1s ease forwards; }
    .loseAnim { animation: loseAnim 1s ease forwards; }

    @keyframes winAnim { 0% { transform: scale(1); color: #fff; } 50% { transform: scale(1.5); color: lime; } 100% { transform: scale(1); color: #fff; } }
    @keyframes loseAnim { 0% { transform: scale(1); color: #fff; } 50% { transform: scale(1.5); color: red; } 100% { transform: scale(1); color: #fff; } }

    #countdown {
      font-size: 2em;
      margin-top: 20px;
      color: yellow;
    }
  </style>
</head>
<body>

<h1>The Wren Wheel of Doom</h1>
<div id="wrenDollars">Wren $: 1000</div>

<div id="wheelContainer">
  <div id="wheelItems"></div>
</div>

<button id="spinBtn">Spin the Wheel!</button>

<div id="countdown"></div>
<div id="challengeArea"></div>

<script>
let wrenDollars = 1000;
const wrenDisplay = document.getElementById('wrenDollars');
const wheelItemsDiv = document.getElementById('wheelItems');
const spinBtn = document.getElementById('spinBtn');
const challengeArea = document.getElementById('challengeArea');
const countdownDiv = document.getElementById('countdown');

const challenges = [
  {name: 'Click 20 times in 10 sec', value: 200, type: 'click'},
  {name: 'Free $100', value: 100, type: 'free'},
  {name: 'Roll Again', type: 'reroll'},
  {name: '10 x 13', value: 300, type: 'math'},
  {name: 'Click 5 buttons', value: 300, type: 'buttonClick'},
  {name: 'Lose $500', value: 500, type: 'lose'},
  {name: 'Capital of France', value: 100, type: 'input'},
  {name: 'Keep egg on spoon 10s', value: 750, type: 'egg'},
  {name: 'Mini wheel', type: 'miniWheel'},
  {name: 'Keep still 20 sec', value: 100, type: 'still'},
  {name: 'Red Light Green Light', type: 'rlgl'},
  {name: 'Jackpot $5000', value: 5000, type: 'free'},
  {name: 'Trivia $200', value: 200, type: 'input'},
  {name: 'Quick Click $150', value: 150, type: 'click'},
  {name: 'Lose $250', value: 250, type: 'lose'},
  {name: 'Spin Again', type: 'reroll'},
  {name: 'Math $400', value: 400, type: 'math'},
  {name: 'Button Challenge $300', value: 300, type: 'buttonClick'},
  {name: 'Mini Wheel $500', type: 'miniWheel'},
  {name: 'Trivia $100', value: 100, type: 'input'}
];

wheelItemsDiv.innerHTML = challenges.map(c => `<div class="wheelItem">${c.name}</div>`).join('');

let spinning = false;
let currentIndex = 0;
const itemHeight = 80;

function updateWrenDollars(amount, win=true){
  wrenDollars += win ? amount : -amount;
  wrenDisplay.textContent = `Wren $: ${wrenDollars}`;
  wrenDisplay.className = win ? 'winAnim' : 'loseAnim';
  setTimeout(()=>{ wrenDisplay.className=''; },1000);
}

function spinWheel(){
  if(spinning) return;
  spinning = true;
  challengeArea.innerHTML = '';
  countdownDiv.innerHTML = '';
  const spins = 10 + Math.floor(Math.random() * 10); // random spins
  let step = 0;
  const spinInterval = setInterval(()=>{
    highlightItem(step % challenges.length);
    step++;
    if(step>spins){
      clearInterval(spinInterval);
      setTimeout(()=>{ executeChallenge(currentIndex); spinning=false; },500);
    }
  },150);
}

function highlightItem(index){
  const items = document.querySelectorAll('.wheelItem');
  items.forEach(i => i.classList.remove('active'));
  items[index].classList.add('active');
  currentIndex = index;
  wheelItemsDiv.style.top = `${-index*itemHeight + 160}px`;
}

function executeChallenge(index){
  const challenge = challenges[index];
  switch(challenge.type){
    case 'free': updateWrenDollars(challenge.value); challengeArea.innerHTML=`You got $${challenge.value}!`; break;
    case 'lose': updateWrenDollars(challenge.value,false); challengeArea.innerHTML=`You lost $${challenge.value}!`; break;
    case 'reroll': challengeArea.innerHTML=`Rerolling...`; setTimeout(spinWheel,1000); break;
    case 'click': startClickChallenge(challenge); break;
    case 'math': startMathChallenge(challenge); break;
    case 'input': startInputChallenge(challenge); break;
    case 'buttonClick': startButtonClickChallenge(challenge); break;
    case 'egg': startEggChallenge(challenge); break;
    case 'miniWheel': startMiniWheel(); break;
    case 'still': startStillChallenge(challenge); break;
    case 'rlgl': startRLGLChallenge(); break;
  }
}

// ===== INTERACTIVE CHALLENGES =====

function countdown(seconds, callback){
  countdownDiv.innerHTML = seconds;
  let interval = setInterval(()=>{
    seconds--;
    if(seconds>0) countdownDiv.innerHTML=seconds;
    else { clearInterval(interval); countdownDiv.innerHTML='Go!'; callback(); setTimeout(()=>countdownDiv.innerHTML='',500); }
  },1000);
}

function startClickChallenge(challenge){
  countdown(3, ()=>{
    let count=0;
    challengeArea.innerHTML=`<button class="challengeBtn" id="clickBtn">Click me 0</button>`;
    const btn = document.getElementById('clickBtn');
    const timer = setTimeout(()=>{
      if(count>=20){ updateWrenDollars(challenge.value); challengeArea.innerHTML='You did it!'; }
      else { updateWrenDollars(challenge.value,false); challengeArea.innerHTML='Failed!'; }
    },10000);
    btn.addEventListener('click',()=>{
      count++;
      btn.textContent=`Click me ${count}`;
    });
  });
}

function startMathChallenge(challenge){
  countdown(3, ()=>{
    challengeArea.innerHTML=`<p>What is 10 x 13?</p><input type="text" id="mathInput"><button class="challengeBtn" id="submitMath">Submit</button>`;
    document.getElementById('submitMath').addEventListener('click',()=>{
      if(parseInt(document.getElementById('mathInput').value)===130) updateWrenDollars(challenge.value);
      else updateWrenDollars(challenge.value,false);
      challengeArea.innerHTML='';
    });
  });
}

function startInputChallenge(challenge){
  countdown(3, ()=>{
    challengeArea.innerHTML=`<p>${challenge.name}</p><input type="text" id="inputAnswer"><button class="challengeBtn" id="submitInput">Submit</button>`;
    document.getElementById('submitInput').addEventListener('click',()=>{
      let val = document.getElementById('inputAnswer').value.toLowerCase();
      if(val==='paris') updateWrenDollars(challenge.value);
      else updateWrenDollars(challenge.value,false);
      challengeArea.innerHTML='';
    });
  });
}

function startButtonClickChallenge(challenge){
  countdown(3, ()=>{
    let clicks=0;
    challengeArea.innerHTML=`<p>Click the button 5 times!</p><button class="challengeBtn" id="btnClick">0</button>`;
    const btn = document.getElementById('btnClick');
    btn.addEventListener('click', ()=>{
      clicks++;
      btn.textContent=clicks;
      if(clicks===5){ updateWrenDollars(challenge.value); challengeArea.innerHTML='Success!'; }
    });
    setTimeout(()=>{ if(clicks<5){ updateWrenDollars(challenge.value,false); challengeArea.innerHTML='Failed!'; } },10000);
  });
}

function startEggChallenge(challenge){
  countdown(3, ()=>{
    challengeArea.innerHTML=`<p>Keep mouse over button for 10s!</p><button class="challengeBtn" id="eggBtn">Egg</button>`;
    const btn = document.getElementById('eggBtn');
    let success=true;
    btn.addEventListener('mouseleave',()=>{ success=false; });
    setTimeout(()=>{ if(success) updateWrenDollars(challenge.value); else updateWrenDollars(challenge.value,false); challengeArea.innerHTML=''; },10000);
  });
}

function startMiniWheel(){
  countdown(3, ()=>{
    const miniItems=['Win $50','Win $100','Win $250','Win $500','Win $2000','Lose $50','Lose $100','Lose $250','Lose $500','Lose $2000'];
    challengeArea.innerHTML='<p>Mini Wheel!</p><div id="miniWheel"></div>';
    const mw = document.getElementById('miniWheel');
    miniItems.forEach(it=> mw.innerHTML+=`<div class="wheelItem">${it}</div>`);
    setTimeout(()=>{
      const result = miniItems[Math.floor(Math.random()*miniItems.length)];
      challengeArea.innerHTML=`<p>${result}</p>`;
      if(result.includes('Win')) updateWrenDollars(parseInt(result.replace(/\D/g,'')));
      else updateWrenDollars(parseInt(result.replace(/\D/g,'')),false);
    },2000);
  });
}

function startStillChallenge(challenge){
  countdown(3, ()=>{
    challengeArea.innerHTML=`<p>Keep mouse still for 20s!</p>`;
    let moved=false;
    function mm(){ moved=true; }
    document.addEventListener('mousemove',mm);
    setTimeout(()=>{
      document.removeEventListener('mousemove',mm);
      if(!moved) updateWrenDollars(challenge.value);
      else updateWrenDollars(challenge.value,false);
      challengeArea.innerHTML='';
    },20000);
  });
}

function startRLGLChallenge(){
  countdown(3, ()=>{
    let score=0;
    challengeArea.innerHTML=`<p>Red Light Green Light!</p><button class="challengeBtn" id="rlBtn">Click Me!</button><button class="challengeBtn" id="leaveBtn">Leave</button>`;
    const btn = document.getElementById('rlBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    let green=true;
    const interval = setInterval(()=>{ green=!green; btn.style.background = green ? 'green' : 'red'; },1000);
    btn.addEventListener('click',()=>{
      if(!green){ clearInterval(interval); updateWrenDollars(score,false); challengeArea.innerHTML='Failed!'; }
      else score++;
    });
    leaveBtn.addEventListener('click',()=>{
      clearInterval(interval); updateWrenDollars(score); challengeArea.innerHTML='Success!'; 
    });
  });
}

spinBtn.addEventListener('click', spinWheel);
</script>

</body>
</html>
