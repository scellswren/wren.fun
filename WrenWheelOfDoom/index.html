<!DOCTYPE html>
<html>
<head>
  <title>Wren Wheel of Doom</title>
  <link rel="icon" type="image/png" href="../Favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      color: white;
      font-family: Arial;
      text-align: center;
      overflow-x: hidden;
    }

    /* HOME */
    #homeText {
      position: absolute;
      top: 0;
      left: 0;
      padding: 10px 15px;
      font-family: 'Rubik', sans-serif;
      font-size: 2em;
      cursor: pointer;
    }

    /* MONEY */
    #money {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 1.5em;
      color: gold;
      font-family: 'Rubik', sans-serif;
    }

    /* MUSIC BUTTON */
    #musicBtn {
      position: fixed;
      bottom: 15px;
      left: 15px;
      background: #222;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 15px;
      cursor: pointer;
    }

    h1 {
      font-family: 'Rubik', sans-serif;
      margin-top: 40px;
    }

    /* SPINNER */
    #spinner {
      margin: 50px auto;
      width: 300px;
      height: 300px;
      overflow: hidden;
      border: 5px solid purple;
      border-radius: 20px;
      box-shadow: 0 0 20px purple;
      position: relative;
    }

    #items {
      position: absolute;
      width: 100%;
      transition: top 3s cubic-bezier(0.2,0.8,0.2,1);
    }

    .item {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5em;
    }

    .highlight {
      color: purple;
      font-weight: bold;
    }

    #spinBtn {
      padding: 15px 40px;
      font-size: 1.5em;
      border-radius: 20px;
      border: none;
      background: purple;
      color: white;
      cursor: pointer;
    }

    #gameArea {
      margin-top: 30px;
    }

    button {
      padding: 15px 30px;
      font-size: 1.2em;
      margin: 10px;
      border-radius: 15px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="homeText" onclick="goHome()">Wren.fun</div>
<div id="money">WrenDollars: $0</div>

<h1>Wren Wheel of Doom</h1>

<div id="spinner">
  <div id="items"></div>
</div>

<button id="spinBtn" onclick="spin()">SPIN</button>

<div id="gameArea"></div>

<button id="musicBtn" onclick="toggleMusic()">🔊 Music</button>

<audio id="bgMusic" loop>
  <source src="CoolBoySong.mp3" type="audio/mpeg">
</audio>

<script>
let money = parseInt(localStorage.getItem("money")) || 0;
const moneyDisplay = document.getElementById("money");

function updateMoneyDisplay(){
  moneyDisplay.innerText = "WrenDollars: $" + money;
}
updateMoneyDisplay();

/* FAST COUNT UP */
function changeMoney(amount){
  let target = money + amount;
  let step = amount / 20; // faster
  let interval = setInterval(()=>{
    money += step;
    if((step > 0 && money >= target) || (step < 0 && money <= target)){
      money = target;
      clearInterval(interval);
      localStorage.setItem("money", money);
    }
    updateMoneyDisplay();
  },20);
}

/* HOME */
function goHome(){
  window.location.href = "https://scellswren.github.io/wren.fun/";
}

/* SPINNER ITEMS */
const baseItems = [
  "+10","+20","+50","+100","+500","+1000","+5000",
  "-10","-20","-50","-100","-500","-1000","-5000",
  "Spam Click (+5 each)",
  "Red Light Green Light"
];

/* RANDOMIZE + MORE POSITIVES */
let items = [];
for(let i=0;i<50;i++){
  let rand = baseItems[Math.floor(Math.random()*baseItems.length)];
  items.push(rand);
}

const container = document.getElementById("items");

function renderItems(){
  container.innerHTML="";
  items.forEach(text=>{
    let div=document.createElement("div");
    div.className="item";
    div.innerText=text;
    container.appendChild(div);
  });
}
renderItems();

let spinning=false;

function spin(){
  if(spinning) return;
  spinning=true;

  document.getElementById("gameArea").innerHTML="";
  
  let index = Math.floor(Math.random()*items.length);
  let offset = index * 60;

  container.style.transition="top 3s cubic-bezier(0.2,0.8,0.2,1)";
  container.style.top = -offset + "px";

  setTimeout(()=>{
    spinning=false;
    resolve(items[index]);
  },3000);
}

/* CHALLENGES */
function resolve(result){

  if(result.startsWith("+")){
    changeMoney(parseInt(result));
    return;
  }

  if(result.startsWith("-")){
    changeMoney(parseInt(result));
    return;
  }

  if(result==="Spam Click (+5 each)"){
    spamClickGame();
  }

  if(result==="Red Light Green Light"){
    redLightGame();
  }
}

/* SPAM CLICK */
function spamClickGame(){
  let area=document.getElementById("gameArea");
  let count=0;
  let time=10;

  area.innerHTML=`<h2>CLICK FAST</h2><button id="clickBtn">CLICK</button><p id="timer">10</p>`;

  document.getElementById("clickBtn").onclick=()=>count++;

  let interval=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText=time;

    if(time<=0){
      clearInterval(interval);
      changeMoney(count*5);
      area.innerHTML="";
    }
  },1000);
}

/* RED LIGHT GREEN LIGHT */
function redLightGame(){
  let area=document.getElementById("gameArea");
  let moneyEarned=0;
  let green=true;

  area.innerHTML=`<h2 id="light">GREEN</h2><button id="clickBtn">CLICK</button><button onclick="endGame()">Cash Out</button>`;

  const lightText=document.getElementById("light");

  let interval=setInterval(()=>{
    green=!green;
    lightText.innerText = green ? "GREEN" : "RED";
    lightText.style.color = green ? "lime" : "red";
  },1000);

  document.getElementById("clickBtn").onclick=()=>{
    if(green){
      moneyEarned++;
    }else{
      clearInterval(interval);
      changeMoney(-moneyEarned);
      area.innerHTML="";
    }
  }

  window.endGame=()=>{
    clearInterval(interval);
    changeMoney(moneyEarned);
    area.innerHTML="";
  }
}

/* MUSIC */
const music = document.getElementById("bgMusic");
let playing=false;

function toggleMusic(){
  if(!playing){
    music.play();
    playing=true;
    document.getElementById("musicBtn").innerText="🔇 Mute";
  }else{
    music.pause();
    playing=false;
    document.getElementById("musicBtn").innerText="🔊 Music";
  }
}
</script>

</body>
</html>
