<!DOCTYPE html>
<html>
<head>
  <title>The Wren Wheel of Doom</title>
  <link rel="icon" type="image/png" href="../Favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #FFD700;
      --purple: #9D4EDD;
      --pink: #FF006E;
      --cyan: #00F5FF;
      --green: #06FFA5;
      --red: #FF3A3A;
      --orange: #FF7700;
      --bg: #0a0a0f;
      --surface: #13131f;
      --surface2: #1c1c2e;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: white;
      font-family: 'Rubik', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.45s ease, color 0.45s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 38% at 12% 18%, rgba(157,78,221,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 45% 32% at 88% 8%,  rgba(255,0,110,0.16) 0%, transparent 55%),
        radial-gradient(ellipse 50% 38% at 82% 82%, rgba(0,245,255,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 42% 32% at 8%  88%, rgba(255,119,0,0.12) 0%, transparent 55%),
        radial-gradient(ellipse 38% 28% at 50% 50%, rgba(6,255,165,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(157,78,221,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(157,78,221,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body.money-theme {
      background: linear-gradient(180deg, #05130a 0%, #0b2a13 45%, #020804 100%);
      color: #eaffef;
    }
    body.money-theme::before {
      background:
        radial-gradient(ellipse 55% 38% at 12% 18%, rgba(80,255,120,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 45% 32% at 88% 8%,  rgba(255,215,0,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 50% 38% at 82% 82%, rgba(50,220,90,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 42% 32% at 8%  88%, rgba(255,255,255,0.06) 0%, transparent 55%),
        radial-gradient(ellipse 38% 28% at 50% 50%, rgba(6,255,165,0.07) 0%, transparent 60%);
    }
    body.money-theme::after {
      background-image:
        linear-gradient(rgba(80,255,120,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(80,255,120,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    body.snow-theme {
      background: linear-gradient(180deg, #081322 0%, #1a3552 45%, #040a12 100%);
      color: #eef8ff;
    }
    body.snow-theme::before {
      background:
        radial-gradient(ellipse 55% 38% at 12% 18%, rgba(200,235,255,0.24) 0%, transparent 60%),
        radial-gradient(ellipse 45% 32% at 88% 8%,  rgba(160,210,255,0.18) 0%, transparent 55%),
        radial-gradient(ellipse 50% 38% at 82% 82%, rgba(255,255,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 42% 32% at 8%  88%, rgba(120,190,255,0.10) 0%, transparent 55%),
        radial-gradient(ellipse 38% 28% at 50% 50%, rgba(255,255,255,0.08) 0%, transparent 60%);
    }
    body.snow-theme::after {
      background-image:
        linear-gradient(rgba(200,235,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,235,255,0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: orbDrift linear infinite;
    }
    .bg-orb.o1 { width:320px; height:320px; background:var(--purple); opacity:0.18; top:-80px;  left:-60px;   animation-duration:20s; }
    .bg-orb.o2 { width:260px; height:260px; background:var(--pink);   opacity:0.15; top:58%;   right:-80px;  animation-duration:25s; animation-delay:-8s; }
    .bg-orb.o3 { width:210px; height:210px; background:var(--cyan);   opacity:0.13; bottom:4%; left:18%;     animation-duration:18s; animation-delay:-4s; }
    .bg-orb.o4 { width:190px; height:190px; background:var(--orange); opacity:0.12; top:32%;   left:-40px;   animation-duration:22s; animation-delay:-12s; }
    .bg-orb.o5 { width:160px; height:160px; background:var(--green);  opacity:0.09; top:20%;   right:8%;     animation-duration:28s; animation-delay:-6s; }

    @keyframes orbDrift {
      0%,100% { transform: translateY(0px)   scale(1); }
      33%      { transform: translateY(-28px) scale(1.07); }
      66%      { transform: translateY(18px)  scale(0.94); }
    }

    #homeText {
      position: fixed;
      top: 14px; left: 18px;
      font-family: 'Rubik', sans-serif;
      font-size: 1.7em; font-weight: 900;
      cursor: pointer; z-index: 100;
      transition: transform 0.2s;
      text-shadow: 0 0 20px rgba(157,78,221,0.6);
      letter-spacing: 0.5px;
    }
    #homeText:hover { transform: scale(1.15); }

    #moneyBar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: center; align-items: center;
      padding: 14px; z-index: 99; pointer-events: none;
    }

    #money {
      font-family: 'Space Mono', monospace;
      font-size: 1.4em; font-weight: 700;
      color: var(--gold);
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,215,0,0.3);
      border-radius: 30px; padding: 8px 24px;
      text-shadow: 0 0 12px rgba(255,215,0,0.5);
      letter-spacing: 1px; pointer-events: auto;
      transition: color 0.4s, border-color 0.4s, text-shadow 0.4s, background 0.4s;
    }
    #money.negative {
      color: var(--red);
      border-color: rgba(255,58,58,0.4);
      text-shadow: 0 0 12px rgba(255,58,58,0.6);
    }

    body.money-theme #money {
      color: #9dffb2; border-color: rgba(80,255,120,0.3);
      text-shadow: 0 0 12px rgba(80,255,120,0.55);
      background: rgba(0,18,6,0.72);
    }
    body.snow-theme #money {
      color: #d8f0ff; border-color: rgba(180,220,255,0.35);
      text-shadow: 0 0 12px rgba(180,220,255,0.6);
      background: rgba(0,16,28,0.72);
    }

    #resetBtn {
      position: fixed; top: 14px; right: 18px; z-index: 100;
      background: transparent; border: 1.5px solid rgba(255,58,58,0.4);
      color: rgba(255,58,58,0.7);
      font-family: 'Rubik', sans-serif; font-size: 0.82em; font-weight: 700;
      padding: 7px 16px; border-radius: 20px; cursor: pointer;
      letter-spacing: 1px; transition: all 0.2s;
    }
    #resetBtn:hover {
      background: rgba(255,58,58,0.15); border-color: var(--red);
      color: var(--red); box-shadow: 0 0 14px rgba(255,58,58,0.3);
    }

    #app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 80px 20px 40px; min-height: 100vh;
    }

    h1 {
      font-family: 'Rubik', sans-serif; font-weight: 900;
      font-size: clamp(1.4em, 4vw, 2.6em); letter-spacing: 3px;
      margin-bottom: 30px; text-align: center;
      background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
      background-size: 200% 200%;
      -webkit-background-clip: text; color: transparent;
      animation: titleShimmer 4s ease infinite;
      filter: drop-shadow(0 0 20px rgba(157,78,221,0.5));
      transition: filter 0.4s, background 0.4s;
    }

    body.money-theme h1 {
      background: linear-gradient(135deg, #e7ffd7, #6eff8d, #12d45c, #f4ffcc);
      -webkit-background-clip: text;
      filter: drop-shadow(0 0 22px rgba(80,255,120,0.45));
    }
    body.snow-theme h1 {
      background: linear-gradient(135deg, #ffffff, #c8e8ff, #89caff, #f8fcff);
      -webkit-background-clip: text;
      filter: drop-shadow(0 0 22px rgba(180,220,255,0.5));
    }

    @keyframes titleShimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    #spinnerWrap {
      position: relative; width: min(380px, 92vw); margin-bottom: 24px;
    }

    #spinnerWrap::after {
      content: '▶';
      position: absolute; left: -28px; top: 50%;
      transform: translateY(-50%);
      font-size: 1.6em; color: var(--cyan);
      text-shadow: 0 0 12px var(--cyan); z-index: 10;
      animation: pulsePt 1s ease infinite;
    }

    @keyframes pulsePt {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    #spinner {
      width: 100%; height: 320px; overflow: hidden;
      border-radius: 20px; border: 2px solid var(--purple);
      box-shadow: 0 0 40px rgba(157,78,221,0.4), inset 0 0 30px rgba(0,0,0,0.5);
      background: var(--surface); position: relative;
      transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
    }

    body.money-theme #spinner {
      background: linear-gradient(180deg, #081b0f 0%, #0d2414 100%);
      border-color: rgba(80,255,120,0.6);
      box-shadow: 0 0 40px rgba(80,255,120,0.25), inset 0 0 30px rgba(0,0,0,0.5);
    }
    body.snow-theme #spinner {
      background: linear-gradient(180deg, #07121f 0%, #10263c 100%);
      border-color: rgba(180,220,255,0.6);
      box-shadow: 0 0 40px rgba(180,220,255,0.25), inset 0 0 30px rgba(0,0,0,0.45);
    }

    #spinner::before {
      content: ''; position: absolute; left: 0; right: 0;
      top: 50%; transform: translateY(-50%); height: 64px;
      border-top: 2px solid var(--cyan); border-bottom: 2px solid var(--cyan);
      background: rgba(0,245,255,0.05); z-index: 5; pointer-events: none;
    }
    body.money-theme #spinner::before {
      border-top-color: var(--green); border-bottom-color: var(--green);
      background: rgba(80,255,120,0.06);
    }
    body.snow-theme #spinner::before {
      border-top-color: #cde8ff; border-bottom-color: #cde8ff;
      background: rgba(180,220,255,0.06);
    }

    #spinner::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, var(--surface) 0%, transparent 30%, transparent 70%, var(--surface) 100%);
      z-index: 6; pointer-events: none;
    }
    body.money-theme #spinner::after {
      background: linear-gradient(to bottom, rgba(8,27,15,1) 0%, transparent 30%, transparent 70%, rgba(8,27,15,1) 100%);
    }
    body.snow-theme #spinner::after {
      background: linear-gradient(to bottom, rgba(7,18,31,1) 0%, transparent 30%, transparent 70%, rgba(7,18,31,1) 100%);
    }

    #items { position: absolute; width: 100%; top: 0px; }

    .item {
      height: 64px; display: flex; align-items: center; justify-content: center;
      font-size: 1.3em; font-weight: 700;
      font-family: 'Space Mono', monospace;
      border-bottom: 1px solid var(--border);
    }
    .item.good    { color: var(--green); }
    .item.bad     { color: var(--red); }
    .item.special { color: var(--cyan); }
    .item.blackhole { color: #ffb55c; text-shadow: 0 0 10px rgba(255,181,92,0.35), 0 0 18px rgba(125,211,252,0.18); }
    .item.mult    { color: var(--gold); }
    .item.selected {
      background: rgba(157,78,221,0.25) !important;
      color: white !important; font-size: 1.4em;
    }

    #spinBtn {
      position: relative; padding: 16px 60px;
      font-size: 1.4em; font-family: 'Rubik', sans-serif; font-weight: 900;
      letter-spacing: 3px; border-radius: 50px; border: none; cursor: pointer;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: white; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s, background 0.4s, color 0.4s;
      box-shadow: 0 4px 30px rgba(157,78,221,0.5); margin-bottom: 28px;
    }
    #spinBtn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    }
    #spinBtn:hover:not(:disabled) { transform: translateY(-2px) scale(1.04); box-shadow: 0 8px 40px rgba(157,78,221,0.7); }
    #spinBtn:active:not(:disabled) { transform: scale(0.96); }
    #spinBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    body.money-theme #spinBtn {
      background: linear-gradient(135deg, #10e05f, #046b25);
      color: #001a08; box-shadow: 0 4px 30px rgba(80,255,120,0.35);
    }
    body.money-theme #spinBtn:hover:not(:disabled) { box-shadow: 0 8px 40px rgba(80,255,120,0.55); }
    body.snow-theme #spinBtn {
      background: linear-gradient(135deg, #e6f4ff, #74bfff);
      color: #001a2a; box-shadow: 0 4px 30px rgba(180,220,255,0.35);
    }
    body.snow-theme #spinBtn:hover:not(:disabled) { box-shadow: 0 8px 40px rgba(180,220,255,0.55); }

    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.35); transform: scale(0);
      animation: rippleOut 0.6s linear; pointer-events: none;
    }
    @keyframes rippleOut { to { transform: scale(4); opacity: 0; } }

    #gameArea { width: min(480px, 94vw); margin-top: 6px; }

    .game-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 28px 24px; text-align: center;
      animation: slideUp 0.4s cubic-bezier(0.34,1.4,0.64,1) both;
      transition: background 0.4s, border-color 0.4s;
    }
    body.money-theme .game-card { background: rgba(10,30,16,0.85); border-color: rgba(80,255,120,0.18); }
    body.snow-theme .game-card  { background: rgba(8,22,36,0.85);  border-color: rgba(180,220,255,0.18); }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .game-title { font-size: 1.5em; font-weight: 900; letter-spacing: 2px; margin-bottom: 18px; }

    #clickTarget {
      width: 120px; height: 120px; border-radius: 50%;
      margin: 0 auto 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 2em; font-weight: 900; font-family: 'Space Mono', monospace;
      background: radial-gradient(circle at 35% 35%, #7B2FBE, #4a0e8f);
      border: 3px solid var(--purple);
      box-shadow: 0 0 30px rgba(157,78,221,0.5);
      user-select: none; position: relative; overflow: hidden;
    }
    #clickTarget:active { transform: scale(0.91); box-shadow: 0 0 50px rgba(157,78,221,0.9); }
    #clickTarget.pulse  { animation: clickPulse 0.12s ease; }

    @keyframes clickPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.88); box-shadow: 0 0 60px rgba(157,78,221,1); }
      100% { transform: scale(1); }
    }

    .click-float {
      position: fixed;
      font-family: 'Space Mono', monospace; font-weight: 700; font-size: 1.1em;
      color: var(--green); text-shadow: 0 0 10px var(--green);
      pointer-events: none; z-index: 9999;
      animation: floatUp 0.9s ease forwards;
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
    }

    #clickTimer { font-family: 'Space Mono', monospace; font-size: 2.5em; color: var(--cyan); text-shadow: 0 0 12px var(--cyan); margin-bottom: 8px; }
    #clickCount { font-family: 'Space Mono', monospace; font-size: 1.1em; color: var(--gold); margin-bottom: 18px; }

    #rlglLight {
      width: 100px; height: 100px; border-radius: 50%;
      margin: 0 auto 16px;
      transition: background 0.15s, box-shadow 0.15s;
      border: 3px solid rgba(255,255,255,0.2);
    }
    #rlglLight.green { background: radial-gradient(circle at 35% 35%, #00ff88, #00aa55); box-shadow: 0 0 40px var(--green), 0 0 80px rgba(0,255,133,0.3); }
    #rlglLight.red   { background: radial-gradient(circle at 35% 35%, #ff5555, #cc0000); box-shadow: 0 0 40px var(--red),   0 0 80px rgba(255,58,58,0.3); }

    #rlglStatus { font-size: 1.8em; font-weight: 900; letter-spacing: 3px; margin-bottom: 14px; }
    #rlglEarn   { font-family: 'Space Mono', monospace; font-size: 1.1em; color: var(--gold); margin-bottom: 18px; }

    .game-btn {
      padding: 12px 28px; font-size: 1em;
      font-family: 'Rubik', sans-serif; font-weight: 700;
      border-radius: 14px; border: none; cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
      letter-spacing: 1px; margin: 5px;
    }
    .game-btn:active { transform: scale(0.93); }

    .btn-green  { background: linear-gradient(135deg, #00aa55, #00ff88); color: #001a0d; box-shadow: 0 4px 20px rgba(0,255,133,0.3); }
    .btn-green:hover  { box-shadow: 0 6px 28px rgba(0,255,133,0.5); transform: translateY(-1px); }
    .btn-red    { background: linear-gradient(135deg, #cc0000, #ff3a3a); color: white;   box-shadow: 0 4px 20px rgba(255,58,58,0.3); }
    .btn-red:hover    { box-shadow: 0 6px 28px rgba(255,58,58,0.5); transform: translateY(-1px); }
    .btn-gold   { background: linear-gradient(135deg, #cc8800, var(--gold)); color: #1a0e00; box-shadow: 0 4px 20px rgba(255,215,0,0.3); }
    .btn-gold:hover   { box-shadow: 0 6px 28px rgba(255,215,0,0.5); transform: translateY(-1px); }
    .btn-purple { background: linear-gradient(135deg, var(--purple), var(--pink)); color: white; box-shadow: 0 4px 20px rgba(157,78,221,0.3); }
    .btn-purple:hover { box-shadow: 0 6px 28px rgba(157,78,221,0.5); transform: translateY(-1px); }

    #mmCountdown { font-family: 'Space Mono', monospace; font-size: 4em; color: var(--cyan); text-shadow: 0 0 20px var(--cyan); margin: 10px 0; }
    #mmBar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin: 12px 0; }
    #mmBarFill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); border-radius: 4px; transition: width 0.5s linear; box-shadow: 0 0 10px var(--cyan); }
    #mmStatus { font-size: 1em; color: rgba(255,255,255,0.6); margin-bottom: 12px; }

    /* Speed Test overlay */
    #speedOverlay {
      position: fixed; inset: 0; background: black;
      display: none; z-index: 7000; cursor: pointer;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 24px;
    }
    #speedOverlay.active { display: flex; }
    #speedCircle {
      width: 200px; height: 200px; border-radius: 50%;
      background: #111; border: 4px solid #333;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4em; font-weight: 900; font-family: 'Space Mono', monospace;
      color: rgba(255,255,255,0.5); transition: background 0.08s, border-color 0.08s, box-shadow 0.08s;
      user-select: none;
    }
    #speedCircle.go {
      background: radial-gradient(circle at 35% 35%, #00ff88, #00aa55);
      border-color: #00ff88;
      box-shadow: 0 0 60px rgba(0,255,136,0.7), 0 0 120px rgba(0,255,136,0.3);
      color: #001a0d;
    }
    #speedMsg {
      font-family: 'Space Mono', monospace; font-size: 1.3em;
      color: rgba(255,255,255,0.6); text-align: center; padding: 0 20px;
    }
    #speedSubMsg {
      font-family: 'Rubik', sans-serif; font-size: 0.9em;
      color: rgba(255,255,255,0.35); text-align: center;
    }

    #resultOverlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 9000; pointer-events: none; }
    #resultBubble {
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: clamp(2.5em, 8vw, 5em);
      padding: 20px 50px; border-radius: 30px;
      animation: resultPop 0.5s cubic-bezier(0.34,1.4,0.64,1) both;
      letter-spacing: 2px;
    }
    @keyframes resultPop {
      from { opacity: 0; transform: scale(0.3) rotate(-8deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    .result-win  { background: rgba(6,255,165,0.12); border: 2px solid var(--green); color: var(--green); text-shadow: 0 0 20px var(--green); box-shadow: 0 0 60px rgba(6,255,165,0.3); }
    .result-lose { background: rgba(255,58,58,0.12); border: 2px solid var(--red);   color: var(--red);   text-shadow: 0 0 20px var(--red);   box-shadow: 0 0 60px rgba(255,58,58,0.3); }

    #modalOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 8000; }
    #modal { background: var(--surface2); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; overflow: hidden; min-width: 300px; max-width: 380px; width: 90vw; animation: modalIn 0.3s cubic-bezier(0.34,1.4,0.64,1) both; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.8) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .modal-hd { padding: 22px 24px 16px; border-bottom: 1px solid var(--border); }
    .modal-hd h3 { font-family: 'Rubik', sans-serif; font-size: 1.3em; letter-spacing: 1px; margin: 0; }
    .modal-body { padding: 16px 24px 20px; color: rgba(255,255,255,0.55); font-size: 0.92em; line-height: 1.5; }
    .modal-footer { display: flex; border-top: 1px solid var(--border); }
    .modal-footer button { flex: 1; padding: 15px; border: none; background: transparent; color: white; font-family: 'Rubik', sans-serif; font-size: 1em; font-weight: 700; cursor: pointer; transition: background 0.15s; letter-spacing: 0.5px; }
    .modal-footer button:not(:last-child) { border-right: 1px solid var(--border); }
    .modal-footer button.m-danger { color: var(--red); }
    .modal-footer button.m-danger:hover { background: rgba(255,58,58,0.15); }
    .modal-footer button.m-cancel:hover { background: rgba(255,255,255,0.06); }

    #musicBtn { position: fixed; bottom: 16px; left: 16px; background: var(--surface2); color: rgba(255,255,255,0.7); border: 1px solid var(--border); padding: 9px 16px; border-radius: 20px; cursor: pointer; font-family: 'Rubik', sans-serif; font-size: 0.85em; font-weight: 700; transition: background 0.2s, color 0.2s; z-index: 100; }
    #musicBtn:hover { background: var(--surface); color: white; }

    .countdown { font-family: 'Space Mono', monospace; font-size: 5em; color: var(--gold); text-shadow: 0 0 30px var(--gold); animation: cntPop 0.4s cubic-bezier(0.34,1.4,0.64,1) both; }
    @keyframes cntPop { from { opacity:0; transform: scale(0.5); } to { opacity:1; transform: scale(1); } }

    .snow-particle {
      position: fixed; top: -20px; border-radius: 50%;
      background: white; pointer-events: none; z-index: 0; opacity: 0;
      animation: snowFall linear infinite;
    }
    @keyframes snowFall {
      0%   { opacity: 0; transform: translateY(0) translateX(0) rotate(0deg); }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { opacity: 0; transform: translateY(110vh) translateX(var(--drift)) rotate(var(--spin)); }
    }
  </style>
</head>
<body>

<div class="bg-orb o1"></div>
<div class="bg-orb o2"></div>
<div class="bg-orb o3"></div>
<div class="bg-orb o4"></div>
<div class="bg-orb o5"></div>

<div id="homeText" onclick="goHome()">Wren.fun</div>

<div id="moneyBar">
  <div id="money">💰 $0</div>
</div>

<button id="resetBtn" onclick="askReset()">⟳ RESET</button>

<div id="app">
  <h1>THE WREN WHEEL OF DOOM</h1>

  <div id="spinnerWrap">
    <div id="spinner">
      <div id="items"></div>
    </div>
  </div>

  <button id="spinBtn" onclick="spin(event)">SPIN</button>

  <div id="gameArea"></div>
</div>

<!-- Speed Test full-screen overlay -->
<div id="speedOverlay">
  <div id="speedCircle">WAIT</div>
  <div id="speedMsg">Wait for GREEN, then click as fast as you can!</div>
  <div id="speedSubMsg">Click TOO EARLY = -20% 💀</div>
</div>

<div id="resultOverlay">
  <div id="resultBubble"></div>
</div>

<div id="modalOverlay">
  <div id="modal">
    <div class="modal-hd"><h3 id="modalTitle">Are you sure?</h3></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="m-danger" id="modalConfirm">Yes</button>
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<button id="musicBtn" onclick="toggleMusic()">🔊 Music</button>

<audio id="bgMusic" loop>
  <source src="CoolBoySong.mp3" type="audio/mpeg">
</audio>

<script>
// ─────────────────────────────────────────
// MONEY
// ─────────────────────────────────────────
let money = parseInt(localStorage.getItem("wren_money")) || 0;
const moneyDisplay = document.getElementById("money");

const MONEY_UNLOCK_KEY        = "wren_theme_money_unlocked";
const SNOW_UNLOCK_KEY         = "wren_theme_snow_unlocked";
const COTTON_CANDY_UNLOCK_KEY = "wren_theme_cotton_candy_unlocked";
const SABER_UNLOCK_KEY        = "wren_theme_saber_unlocked";
const BLACKHOLE_UNLOCK_KEY    = "wren_theme_blackhole_unlocked";
const UNLOCK_NOTICE_QUEUE_KEY = "wren_pending_unlock_notices";

function saveMoney() { localStorage.setItem("wren_money", money); }

function queueUnlockNotice(message) {
  try {
    const queue = JSON.parse(localStorage.getItem(UNLOCK_NOTICE_QUEUE_KEY) || "[]");
    queue.push(message);
    localStorage.setItem(UNLOCK_NOTICE_QUEUE_KEY, JSON.stringify(queue));
  } catch (e) {
    localStorage.setItem(UNLOCK_NOTICE_QUEUE_KEY, JSON.stringify([message]));
  }
}

function syncThemeUnlocks() {
  const floored = Math.floor(money);
  if (floored >= 1_000_000_000_000 && localStorage.getItem(COTTON_CANDY_UNLOCK_KEY) !== "1")
    localStorage.setItem(COTTON_CANDY_UNLOCK_KEY, "1");
  if (floored >= 1_000_000_000_000_000 && localStorage.getItem(SABER_UNLOCK_KEY) !== "1")
    localStorage.setItem(SABER_UNLOCK_KEY, "1");
  if (floored >= 1_000_000_000) {
    localStorage.setItem(MONEY_UNLOCK_KEY, "1");
    localStorage.setItem(SNOW_UNLOCK_KEY, "1");
  } else if (floored >= 1_000_000) {
    localStorage.setItem(MONEY_UNLOCK_KEY, "1");
  }
}

function updateTheme() {
  const floored = Math.floor(money);
  document.body.classList.remove("money-theme", "snow-theme");
  if (floored >= 1_000_000_000) {
    document.body.classList.add("snow-theme");
  } else if (floored >= 1_000_000) {
    document.body.classList.add("money-theme");
  }
}

function updateMoney() {
  const floored = Math.floor(money);
  moneyDisplay.textContent = "💰 $" + floored.toLocaleString();
  moneyDisplay.classList.toggle("negative", floored < 0);
  syncThemeUnlocks();
  updateTheme();
}
updateMoney();

function animateMoney(amount) {
  const target = money + amount;
  const steps  = 30;
  const diff   = (target - money) / steps;
  let step = 0;
  const iv = setInterval(() => {
    money += diff;
    step++;
    if (step >= steps) {
      money = target;
      clearInterval(iv);
      saveMoney();
      syncThemeUnlocks();
      updateTheme();
    }
    updateMoney();
  }, 16);
  showResult(amount);
}

function applyMultiplier(mult, label) {
  let target;
  if (money < 0) {
    target = (mult > 1) ? money / mult : money * (2 - mult);
  } else {
    target = money * mult;
  }
  const gain  = target - money;
  const steps = 30;
  const diff  = (target - money) / steps;
  let step = 0;
  const iv = setInterval(() => {
    money += diff;
    step++;
    if (step >= steps) {
      money = target;
      clearInterval(iv);
      saveMoney();
      syncThemeUnlocks();
      updateTheme();
    }
    updateMoney();
  }, 16);
  showResult(gain, label);
}

// ─────────────────────────────────────────
// RESULT OVERLAY
// ─────────────────────────────────────────
function showResult(amount, customLabel) {
  const overlay = document.getElementById("resultOverlay");
  const bubble  = document.getElementById("resultBubble");
  const label   = customLabel || ((amount >= 0 ? "+" : "") + "$" + Math.floor(Math.abs(amount)).toLocaleString());
  bubble.textContent = label;
  bubble.className   = amount >= 0 ? "result-win" : "result-lose";
  overlay.style.display = "flex";
  bubble.style.animation = "none";
  void bubble.offsetWidth;
  bubble.style.animation = "resultPop 0.5s cubic-bezier(0.34,1.4,0.64,1) both";
  setTimeout(() => overlay.style.display = "none", 2200);
}

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
function goHome() { window.location.href = "https://scellswren.github.io/wren.fun/"; }

function unlockBlackHoleTheme() {
  localStorage.setItem(BLACKHOLE_UNLOCK_KEY, "1");
  showResult(0, "🕳️ Black Hole theme unlocked!");
}

function isBlackHoleUnlocked() {
  return localStorage.getItem(BLACKHOLE_UNLOCK_KEY) === "1";
}

// ─────────────────────────────────────────
// SPINNER ITEMS
// ─────────────────────────────────────────
const goodItems = [
  { label: "+$10",   type: "good", action: () => animateMoney(10) },
  { label: "+$10",   type: "good", action: () => animateMoney(10) },
  { label: "+$50",   type: "good", action: () => animateMoney(50) },
  { label: "+$50",   type: "good", action: () => animateMoney(50) },
  { label: "+$100",  type: "good", action: () => animateMoney(100) },
  { label: "+$100",  type: "good", action: () => animateMoney(100) },
  { label: "+$1000", type: "good", action: () => animateMoney(1000) },
  { label: "+$3000", type: "good", action: () => animateMoney(3000) },
  { label: "+$5000", type: "good", action: () => animateMoney(5000) },
  { label: "×1.1",  type: "mult", action: () => applyMultiplier(1.1,  money < 0 ? "÷1.1 🧯"  : "×1.1!") },
  { label: "×1.25", type: "mult", action: () => applyMultiplier(1.25, money < 0 ? "÷1.25 🧯" : "×1.25!") },
  { label: "×1.5",  type: "mult", action: () => applyMultiplier(1.5,  money < 0 ? "÷1.5 🧯"  : "×1.5!") }
];

const badItems = [
  { label: "-$10",     type: "bad", action: () => animateMoney(-10) },
  { label: "-$50",     type: "bad", action: () => animateMoney(-50) },
  { label: "-$100",    type: "bad", action: () => animateMoney(-100) },
  { label: "-$1000",   type: "bad", action: () => animateMoney(-1000) },
  { label: "-$3000",   type: "bad", action: () => animateMoney(-3000) },
  { label: "-$5000",   type: "bad", action: () => animateMoney(-5000) },
  { label: "Lose 5%",  type: "bad", action: () => applyMultiplier(0.95, money < 0 ? "+5% debt 💀"  : "-5%") },
  { label: "Lose 10%", type: "bad", action: () => applyMultiplier(0.90, money < 0 ? "+10% debt 💀" : "-10%") },
  { label: "Lose 20%", type: "bad", action: () => applyMultiplier(0.80, money < 0 ? "+20% debt 💀" : "-20%") },
  { label: "Lose 30%", type: "bad", action: () => applyMultiplier(0.70, money < 0 ? "+30% debt 💀" : "-30%") },
];

const blackHoleItem = { label: "🕳️ Black Hole", type: "blackhole", action: () => unlockBlackHoleTheme() };

// Fallback item used when Black Hole is already unlocked
const bhFallback = { label: "+$2500", type: "good", action: () => animateMoney(2500) };

const specialItems = [
  { label: "🔴🟢 Red/Green",  type: "special", action: () => startRedLight() },
  { label: "🖱 Click Rush",    type: "special", action: () => startClickRush() },
  { label: "🖱 Don't Move",    type: "special", action: () => startDontMove() },
  { label: "⚡ Speed Test",    type: "special", action: () => startSpeedTest() },
  { label: "🎲 Double/Nothing",type: "special", action: () => startDoubleOrNothing() },
  blackHoleItem,
];

function buildStrip(length) {
  const bhUnlocked = isBlackHoleUnlocked();
  const goodPool   = [...goodItems, ...goodItems, ...specialItems];
  const badPool    = [...badItems, ...badItems];
  const pool = [];
  for (let i = 0; i < length; i++) {
    if (Math.random() < 0.01) {
      // 1% chance to pick Black Hole; replace with fallback if already unlocked
      pool.push(bhUnlocked ? bhFallback : blackHoleItem);
      continue;
    }
    const src = Math.random() < 0.65 ? goodPool : badPool;
    let item = src[Math.floor(Math.random() * src.length)];
    // If the randomly picked item is Black Hole and it's unlocked, use fallback
    if (item === blackHoleItem && bhUnlocked) item = bhFallback;
    pool.push(item);
  }
  return pool;
}

let strip   = buildStrip(120);
let spinning = false;

const container = document.getElementById("items");

function renderStrip() {
  container.innerHTML = "";
  strip.forEach(item => {
    const d = document.createElement("div");
    d.className = "item " + item.type;
    d.textContent = item.label;
    container.appendChild(d);
  });
}
renderStrip();

// ─────────────────────────────────────────
// SPIN
// ─────────────────────────────────────────
function spin(e) {
  if (spinning) return;
  spinning = true;

  document.getElementById("spinBtn").disabled = true;
  document.getElementById("gameArea").innerHTML = "";
  document.querySelectorAll(".item").forEach(i => i.classList.remove("selected"));

  if (e) {
    const btn = document.getElementById("spinBtn");
    const r   = document.createElement("span");
    r.className = "ripple";
    const d = Math.max(btn.clientWidth, btn.clientHeight);
    r.style.width = r.style.height = d + "px";
    r.style.left  = (e.clientX - btn.getBoundingClientRect().left - d/2) + "px";
    r.style.top   = (e.clientY - btn.getBoundingClientRect().top  - d/2) + "px";
    btn.appendChild(r);
    setTimeout(() => r.remove(), 700);
  }

  const ITEM_H     = 64;
  const VISIBLE_H  = 320;
  const centerOffset = Math.floor(VISIBLE_H / 2) - Math.floor(ITEM_H / 2);

  const index      = 20 + Math.floor(Math.random() * 70);
  const winningItem = strip[index];
  const targetTop  = -(index * ITEM_H) + centerOffset;

  container.style.transition = "none";
  void container.offsetHeight;
  container.style.transition = "top 3.2s cubic-bezier(0.12, 0.9, 0.15, 1)";
  container.style.top = targetTop + "px";

  setTimeout(() => {
    spinning = false;
    if (container.children[index]) container.children[index].classList.add("selected");
    winningItem.action();

    setTimeout(() => {
      strip = buildStrip(120);
      renderStrip();
      container.style.transition = "none";
      container.style.top = "0px";
      setTimeout(() => { document.getElementById("spinBtn").disabled = false; }, 1500);
    }, 700);
  }, 3300);
}

// ─────────────────────────────────────────
// CLICK RUSH
// ─────────────────────────────────────────
let clickRushActive    = false;
let clickRushCount     = 0;
let clickRushTimer     = null;
let clickRushPrepTimer = null;
let clickRushClickTimes  = [];
let clickRushClickValue  = 1;

function startClickRush() {
  const area = document.getElementById("gameArea");
  clickRushCount  = 0;
  clickRushActive = false;
  clickRushClickTimes = [];
  let timeLeft = 3;

  area.innerHTML = `
    <div class="game-card">
      <div class="game-title" style="color:var(--cyan)">🖱 CLICK RUSH</div>
      <div id="clickTimer" class="countdown">${timeLeft}</div>
      <div id="clickCount">Heads up... get ready!</div>
      <div id="clickTarget" style="opacity:0.45; pointer-events:none;">WAIT</div>
      <p style="color:rgba(255,255,255,0.4); font-size:0.8em; margin-top:14px;">Each click = +1% of your balance</p>
    </div>`;

  const timerEl = document.getElementById("clickTimer");

  clickRushPrepTimer = setInterval(() => {
    timeLeft--;
    if (timerEl) {
      timerEl.textContent = timeLeft;
      timerEl.style.animation = "none";
      void timerEl.offsetWidth;
      timerEl.style.animation = "cntPop 0.4s cubic-bezier(0.34,1.4,0.64,1) both";
    }
    if (timeLeft <= 0) { clearInterval(clickRushPrepTimer); beginClickRush(); }
  }, 1000);
}

function beginClickRush() {
  const area = document.getElementById("gameArea");
  clickRushCount  = 0;
  clickRushActive = true;
  clickRushClickTimes = [];
  clickRushClickValue = money > 0 ? Math.max(1, Math.floor(money * 0.01)) : 1;

  let timeLeft = 10;

  area.innerHTML = `
    <div class="game-card">
      <div class="game-title" style="color:var(--cyan)">🖱 CLICK RUSH</div>
      <div id="clickTimer">10</div>
      <div id="clickCount">Clicks: 0 — Earnings: +$0</div>
      <div id="clickTarget">CLICK</div>
      <p style="color:rgba(255,255,255,0.4); font-size:0.8em; margin-top:14px;">Each click = +1% of your balance</p>
    </div>`;

  const target = document.getElementById("clickTarget");
  target.addEventListener("click", onClickRush);

  clickRushTimer = setInterval(() => {
    timeLeft--;
    const timerEl = document.getElementById("clickTimer");
    if (timerEl) {
      timerEl.textContent = timeLeft;
      if (timeLeft <= 3) timerEl.style.color = "var(--red)";
    }
    if (timeLeft <= 0) {
      clearInterval(clickRushTimer);
      clickRushActive = false;
      target.removeEventListener("click", onClickRush);
      const earned = clickRushClickValue * clickRushCount;
      animateMoney(earned);
      area.innerHTML = "";
    }
  }, 1000);
}

function endClickRushForAutoclick() {
  if (!clickRushActive) return;
  clickRushActive = false;
  clearInterval(clickRushTimer);
  clearInterval(clickRushPrepTimer);
  const target = document.getElementById("clickTarget");
  if (target) target.removeEventListener("click", onClickRush);
  document.getElementById("gameArea").innerHTML = "";
  applyMultiplier(0.8, money < 0 ? "+20% debt 💀" : "-20% AUTOCLICK!");
}

function onClickRush(e) {
  if (!clickRushActive) return;

  const now = Date.now();
  // Keep only clicks within the last 1 second
  clickRushClickTimes = clickRushClickTimes.filter(t => now - t < 1000);
  clickRushClickTimes.push(now);

  // Autoclick detection threshold raised to 30 clicks/second
  if (clickRushClickTimes.length >= 30) {
    endClickRushForAutoclick();
    return;
  }

  clickRushCount++;

  const target = document.getElementById("clickTarget");
  target.classList.remove("pulse");
  void target.offsetWidth;
  target.classList.add("pulse");

  const el = document.createElement("div");
  el.className   = "click-float";
  el.textContent = "+$" + clickRushClickValue.toLocaleString();
  el.style.left  = (e.clientX - 20) + "px";
  el.style.top   = (e.clientY - 20) + "px";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);

  const countEl = document.getElementById("clickCount");
  if (countEl)
    countEl.textContent = `Clicks: ${clickRushCount} — Earnings: +$${(clickRushClickValue * clickRushCount).toLocaleString()}`;
}

// ─────────────────────────────────────────
// RED LIGHT GREEN LIGHT
// ─────────────────────────────────────────
let rlglTimeout = null;

function startRedLight() {
  const area = document.getElementById("gameArea");
  let earn    = 0;
  let isGreen = true;
  let failed  = false;

  function getDelay(g) {
    return g ? (600 + Math.random() * 1400) : (400 + Math.random() * 1100);
  }

  area.innerHTML = `
    <div class="game-card">
      <div class="game-title" style="color:var(--cyan)">🔴🟢 RED LIGHT GREEN LIGHT</div>
      <div id="rlglLight" class="green"></div>
      <div id="rlglStatus" style="color:var(--green)">GREEN LIGHT</div>
      <div id="rlglEarn">Earned: $0</div>
      <div>
        <button class="game-btn btn-purple" id="rlglClick">TAP!</button>
        <button class="game-btn btn-gold"   id="rlglCash">CASH OUT</button>
      </div>
      <p style="color:rgba(255,255,255,0.35); font-size:0.78em; margin-top:14px;">Tap on green → +1% of your balance · Tap on red → lose all earnings</p>
    </div>`;

  function setLight(g) {
    isGreen = g;
    const light  = document.getElementById("rlglLight");
    const status = document.getElementById("rlglStatus");
    if (!light) return;
    light.className    = g ? "green" : "red";
    status.textContent = g ? "GREEN LIGHT" : "RED LIGHT";
    status.style.color = g ? "var(--green)" : "var(--red)";
    rlglTimeout = setTimeout(() => setLight(!isGreen), getDelay(g));
  }

  setLight(true);

  document.getElementById("rlglClick").onclick = () => {
    if (failed) return;
    if (isGreen) {
      const gain = money > 0 ? Math.max(1, Math.floor(money * 0.01)) : 1;
      earn += gain;
      const el = document.getElementById("rlglEarn");
      if (el) el.textContent = "Earned: $" + earn.toLocaleString();
      const l = document.getElementById("rlglLight");
      if (l) { l.style.transform = "scale(1.15)"; setTimeout(() => l.style.transform = "", 120); }
    } else {
      failed = true;
      clearTimeout(rlglTimeout);
      showResult(-earn, earn > 0 ? `-$${earn.toLocaleString()} 💀` : "NOTHING LOST");
      setTimeout(() => { area.innerHTML = ""; }, 400);
    }
  };

  document.getElementById("rlglCash").onclick = () => {
    if (failed) return;
    clearTimeout(rlglTimeout);
    animateMoney(earn);
    area.innerHTML = "";
  };
}

// ─────────────────────────────────────────
// DON'T MOVE YOUR MOUSE
// ─────────────────────────────────────────
let mmActive   = false;
let mmInterval = null;

function startDontMove() {
  const area = document.getElementById("gameArea");
  let cntDown = 3;
  const rewardLabel = money < 0 ? "×2 your debt 💀" : "×2 your total 💰";

  area.innerHTML = `
    <div class="game-card">
      <div class="game-title" style="color:var(--cyan)">🖱 DON'T MOVE YOUR MOUSE</div>
      <div id="mmCountdown" class="countdown">${cntDown}</div>
      <p style="color:rgba(255,255,255,0.5); font-size:0.9em;">Get ready... don't move for 50 seconds!</p>
      <p style="color:var(--gold); font-size:0.85em; margin-top:6px;">Reward: ${rewardLabel}</p>
    </div>`;

  const cntInterval = setInterval(() => {
    cntDown--;
    const el = document.getElementById("mmCountdown");
    if (!el) { clearInterval(cntInterval); return; }
    if (cntDown > 0) {
      el.textContent = cntDown;
      el.style.animation = "none";
      void el.offsetWidth;
      el.style.animation = "cntPop 0.4s cubic-bezier(0.34,1.4,0.64,1) both";
    } else { clearInterval(cntInterval); beginDontMove(); }
  }, 1000);
}

function beginDontMove() {
  const area = document.getElementById("gameArea");
  const TOTAL  = 50;
  let timeLeft = TOTAL;
  mmActive = true;
  const rewardLabel = money < 0 ? "×2 your debt" : "×2 your total";

  area.innerHTML = `
    <div class="game-card">
      <div class="game-title" style="color:var(--cyan)">🖱 DON'T MOVE YOUR MOUSE</div>
      <div id="mmCountdown">${TOTAL}</div>
      <div id="mmBar"><div id="mmBarFill" style="width:100%"></div></div>
      <div id="mmStatus">Hold still... 🧊</div>
      <p style="color:var(--gold); font-size:0.85em; margin-top:8px;">Reward: ${rewardLabel}</p>
    </div>`;

  const onMove = () => {
    if (!mmActive) return;
    mmActive = false;
    clearInterval(mmInterval);
    document.removeEventListener("mousemove", onMove);
    const status = document.getElementById("mmStatus");
    if (status) { status.textContent = "YOU MOVED! 💀"; status.style.color = "var(--red)"; }
    applyMultiplier(0.5, money < 0 ? "+50% debt 💀" : "-50% 💸");
    setTimeout(() => { area.innerHTML = ""; }, 1800);
  };

  document.addEventListener("mousemove", onMove);

  mmInterval = setInterval(() => {
    if (!mmActive) { clearInterval(mmInterval); return; }
    timeLeft--;
    const cntEl  = document.getElementById("mmCountdown");
    const fillEl = document.getElementById("mmBarFill");
    if (cntEl)  cntEl.textContent = timeLeft;
    if (fillEl) fillEl.style.width = ((timeLeft / TOTAL) * 100) + "%";
    if (timeLeft <= 0) {
      mmActive = false;
      clearInterval(mmInterval);
      document.removeEventListener("mousemove", onMove);
      applyMultiplier(2, money < 0 ? "×2 debt 💀" : "×2!! 🔥");
      area.innerHTML = "";
    }
  }, 1000);
}

// ─────────────────────────────────────────
// SPEED TEST
// ─────────────────────────────────────────
let speedActive    = false;
let speedIsGreen   = false;
let speedGreenTime = 0;
let speedTick      = null;
let speedUsed      = false;   // prevents second click after result

function startSpeedTest() {
  speedActive  = false;
  speedIsGreen = false;
  speedUsed    = false;

  const overlay = document.getElementById("speedOverlay");
  const circle  = document.getElementById("speedCircle");
  const msg     = document.getElementById("speedMsg");
  const sub     = document.getElementById("speedSubMsg");

  circle.className   = "";
  circle.textContent = "WAIT";
  msg.textContent    = "Wait for GREEN, then click as fast as you can!";
  sub.textContent    = "Click TOO EARLY = -20% 💀";

  overlay.classList.add("active");
  speedActive = true;

  // Check every 500ms, 5% chance per second = ~2.5% per 500ms tick
  speedTick = setInterval(() => {
    if (!speedActive) return;
    if (Math.random() < 0.025) {
      // GO GREEN
      speedIsGreen   = true;
      speedGreenTime = Date.now();
      clearInterval(speedTick);
      circle.classList.add("go");
      circle.textContent = "CLICK!";
      msg.textContent    = "NOW! CLICK AS FAST AS YOU CAN!";
      sub.textContent    = "";

      // After 2 seconds with no click = missed = nothing
      speedTick = setTimeout(() => {
        if (!speedActive) return;
        speedActive = false;
        overlay.classList.remove("active");
        showResult(0, "TOO SLOW! Nothing 😔");
      }, 2000);
    }
  }, 500);

  overlay.onclick = handleSpeedClick;
}

function handleSpeedClick() {
  if (!speedActive || speedUsed) return;
  speedUsed = true;

  const overlay = document.getElementById("speedOverlay");

  if (!speedIsGreen) {
    // Clicked before green — early click penalty
    clearInterval(speedTick);
    clearTimeout(speedTick);
    speedActive = false;
    overlay.classList.remove("active");
    overlay.onclick = null;
    applyMultiplier(0.8, money < 0 ? "+20% debt 💀" : "-20% TOO EARLY! 💀");
    return;
  }

  // Clicked after green — measure reaction time
  clearTimeout(speedTick);
  speedActive = false;
  overlay.classList.remove("active");
  overlay.onclick = null;

  const elapsed = (Date.now() - speedGreenTime) / 1000;  // seconds

  if (elapsed < 0.1) {
    applyMultiplier(3, money < 0 ? "÷3 debt ⚡" : "×3!! ⚡ INSANE!");
  } else if (elapsed < 0.2) {
    applyMultiplier(2, money < 0 ? "÷2 debt ⚡" : "×2!! ⚡ FAST!");
  } else if (elapsed < 0.4) {
    applyMultiplier(1.5, money < 0 ? "÷1.5 debt" : "×1.5! 🔥 Quick!");
  } else if (elapsed < 1.0) {
    applyMultiplier(1.1, money < 0 ? "÷1.1 debt" : "×1.1 Not bad");
  } else {
    showResult(0, "TOO SLOW! Nothing 😔");
  }
}

// ─────────────────────────────────────────
// DOUBLE OR NOTHING
// ─────────────────────────────────────────
function startDoubleOrNothing() {
  const area = document.getElementById("gameArea");

  function renderDON(round, runningMult) {
    const potentialGain = Math.floor(money * runningMult * 2) - Math.floor(money);
    const potentialLoss = Math.floor(money * runningMult * 0.4);

    area.innerHTML = `
      <div class="game-card">
        <div class="game-title" style="color:var(--gold)">🎲 DOUBLE OR NOTHING</div>
        <p style="color:rgba(255,255,255,0.6); font-size:0.9em; margin-bottom:8px;">
          Round ${round} — current multiplier: <span style="color:var(--gold)">×${runningMult.toFixed(2)}</span>
        </p>
        <p style="color:var(--green); font-size:1em; margin-bottom:4px;">
          ✅ Double: ×${(runningMult * 2).toFixed(2)} (potential +$${potentialGain.toLocaleString()})
        </p>
        <p style="color:var(--red); font-size:0.85em; margin-bottom:18px;">
          ⚠️ 15% chance of losing 60% instead of doubling
        </p>
        <div>
          <button class="game-btn btn-gold"  id="donDouble">🎲 DOUBLE IT</button>
          <button class="game-btn btn-green" id="donCash">✅ CASH OUT ×${runningMult.toFixed(2)}</button>
        </div>
        <p style="color:rgba(255,255,255,0.3); font-size:0.75em; margin-top:14px;">
          Cash out now for ×${runningMult.toFixed(2)} your ${money < 0 ? "debt" : "balance"}, or gamble for ×${(runningMult * 2).toFixed(2)}!
        </p>
      </div>`;

    document.getElementById("donDouble").onclick = () => {
      const lose = Math.random() < 0.15;
      if (lose) {
        applyMultiplier(0.4, money < 0 ? "+60% debt 💀" : "-60%!! 💀 Bad luck!");
        area.innerHTML = "";
      } else {
        renderDON(round + 1, runningMult * 2);
      }
    };

    document.getElementById("donCash").onclick = () => {
      if (runningMult === 1) {
        showResult(0, "Nothing gained!");
        area.innerHTML = "";
      } else {
        applyMultiplier(runningMult, money < 0 ? `×${runningMult.toFixed(1)} debt 💀` : `×${runningMult.toFixed(1)}!! 🔥`);
        area.innerHTML = "";
      }
    };
  }

  renderDON(1, 1);
}

// ─────────────────────────────────────────
// RESET
// ─────────────────────────────────────────
function askReset() {
  showModal("Reset Balance?", "This will wipe all your WrenDollars. Are you sure?", "Yes, reset", () => {
    showModal("Are you VERY VERY sure?", "You will lose every single dollar. This cannot be undone. Really?", "YES, I'm sure", () => {
      money = 0;
      saveMoney();
      updateMoney();
      closeModal();
    });
  });
}

function showModal(title, body, confirmText, onConfirm) {
  document.getElementById("modalTitle").textContent   = title;
  document.getElementById("modalBody").textContent    = body;
  document.getElementById("modalConfirm").textContent = confirmText;
  document.getElementById("modalConfirm").onclick     = onConfirm;
  document.getElementById("modalOverlay").style.display = "flex";
}

function closeModal() {
  document.getElementById("modalOverlay").style.display = "none";
}

// ─────────────────────────────────────────
// MUSIC
// ─────────────────────────────────────────
const music    = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");
music.volume   = 0.5;

function tryPlay() { music.play().catch(() => {}); }
tryPlay();
["click","keydown","touchstart","mousemove"].forEach(ev =>
  document.addEventListener(ev, tryPlay, { once: true })
);

function toggleMusic() {
  music.muted    = !music.muted;
  musicBtn.textContent = music.muted ? "🔇 Muted" : "🔊 Music";
}
