<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Wren</title>
  <link rel="icon" type="image/png" href="../Favicon.png">
  <style>
    :root {
      --bg1:#0a3d1f;
      --bg2:#0e6b2f;
      --bg3:#f19a2a;
      --panel:rgba(8, 20, 14, 0.78);
      --panel2:rgba(255,255,255,0.08);
      --text:#f4fff1;
      --muted:#c8e8cf;
      --green:#31d26b;
      --orange:#ff9c2a;
      --pipe:#1d8f3a;
      --pipeDark:#12622a;
      --shadow:0 22px 60px rgba(0,0,0,.32);
      --radius:26px;
    }
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:
      radial-gradient(circle at 15% 15%, rgba(255,171,62,.2) 0 18%, transparent 19%),
      radial-gradient(circle at 78% 16%, rgba(50,210,107,.26) 0 18%, transparent 19%),
      linear-gradient(180deg, var(--bg1), var(--bg2) 62%, var(--bg3));color:var(--text)}
    body::before{content:"";position:fixed;inset:0;background:
      linear-gradient(120deg, transparent 20%, rgba(255,255,255,.06) 50%, transparent 80%),
      radial-gradient(circle at 20% 80%, rgba(255,255,255,.10) 0 4px, transparent 5px),
      radial-gradient(circle at 75% 25%, rgba(255,255,255,.08) 0 5px, transparent 6px),
      radial-gradient(circle at 50% 50%, rgba(255,255,255,.06) 0 2px, transparent 3px);
      pointer-events:none;opacity:.9}
    #app{position:relative;width:100%;height:100%}
    #gameWrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:clamp(10px,2vw,24px)}
    canvas{width:min(100vw,720px);height:min(100vh,960px);max-width:100%;max-height:100%;border-radius:30px;box-shadow:var(--shadow);background:linear-gradient(180deg,#88d8ff 0%,#c8f3ff 30%,#dfffe8 55%,#bdf0c5 100%);display:block}
    #hud{position:absolute;top:14px;left:160px;right:14px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:5;gap:12px}
    #homeText{position:fixed;top:10px;left:10px;font-family:'Fredoka One',Arial,sans-serif;font-size:1.6em;cursor:pointer;transition:transform 0.2s;z-index:1000;user-select:none;opacity:0.95;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.4);font-weight:900}
    #homeText:hover{transform:scale(1.12)}
    #fullscreenBtn{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.20);color:white;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:all 0.2s;z-index:999;user-select:none;-webkit-user-select:none}
    #fullscreenBtn:hover{background:rgba(255,255,255,.20);transform:scale(1.05)}
    #fullscreenBtn:active{transform:scale(0.95)}
    .pill{pointer-events:auto;background:rgba(9,22,14,.65);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:10px 14px;box-shadow:0 10px 30px rgba(0,0,0,.18);font-weight:700}
    .leftPills,.rightPills{display:flex;gap:10px;flex-wrap:wrap}
    .pill b{color:#fff}
    .btn{border:0;border-radius:16px;padding:12px 16px;font:700 15px/1.1 Arial,Helvetica,sans-serif;background:linear-gradient(145deg,#ffffff,#e8f5e9);color:#10331b;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.14);transition:.18s transform,.18s filter,.18s opacity}
    .btn:hover{transform:translateY(-1px);filter:brightness(1.03)}
    .btn:active{transform:translateY(1px) scale(.98)}
    .btn.primary{background:linear-gradient(145deg,#2fe06f,#16a34a);color:white}
    .btn.orange{background:linear-gradient(145deg,#ffb14d,#ff8a1f);color:#fff}
    .btn.dark{background:linear-gradient(145deg,#1c3325,#0c1a12);color:#fff;border:1px solid rgba(255,255,255,.08)}
    #menu{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:8;padding:20px}
    .menuCard{width:min(460px,96vw);border-radius:36px;background:linear-gradient(160deg,rgba(10,28,16,.97),rgba(6,18,10,.93));border:1px solid rgba(255,255,255,.13);box-shadow:0 0 0 1px rgba(46,204,113,.08) inset,0 32px 80px rgba(0,0,0,.65);padding:32px 28px;text-align:center;position:relative;overflow:hidden}
    .menuCard::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(46,204,113,.16),transparent 60%),radial-gradient(ellipse at 90% 100%,rgba(255,186,87,.10),transparent 55%);pointer-events:none}
    .menuCard::after{content:"";position:absolute;top:-1px;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,rgba(103,255,143,.55),transparent);border-radius:999px}
    @keyframes menuIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
    .titleWrap{margin-bottom:22px;position:relative;z-index:1}
    .menuStats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:22px 0;position:relative;z-index:1}
    .mStat{border-radius:18px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);padding:14px 8px;display:flex;flex-direction:column;gap:5px}
    .mStat .mlabel{font-size:.7rem;color:rgba(200,232,207,.7);text-transform:uppercase;letter-spacing:.1em}
    .mStat .mvalue{font-size:1.35rem;font-weight:900;color:#fff}
    .mStat .mvalue.gold{color:#ffd36d;text-shadow:0 0 14px rgba(255,211,109,.45)}
    .mStat .mvalue.green{color:#67ff8f;text-shadow:0 0 14px rgba(103,255,143,.45)}
    .menuBtns{display:flex;flex-direction:column;gap:10px;position:relative;z-index:1}
    .btn.playBig{padding:17px 24px;font-size:1.15rem;border-radius:20px;letter-spacing:.02em;box-shadow:0 0 0 1px rgba(103,255,143,.25) inset,0 12px 32px rgba(0,0,0,.3);background:linear-gradient(145deg,#3df07a,#17b84a)}
    .btn.playBig:hover{transform:translateY(-2px);box-shadow:0 0 0 1px rgba(103,255,143,.4) inset,0 16px 40px rgba(0,0,0,.4),0 0 28px rgba(46,204,113,.22)}
    .menuRow{display:flex;gap:10px}
    .menuRow .btn{flex:1}
    .settingRow{display:grid;gap:14px}
    .settingCard{border-radius:20px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);padding:16px}
    .settingCard h3{margin:0 0 8px;font-size:1rem}
    .settingCard p{margin:0 0 12px;color:#cfead5;font-size:.95rem}
    .rangeWrap{display:flex;align-items:center;gap:12px}
    .rangeWrap input[type="range"]{flex:1;accent-color:#31d26b}
    .rangeValue{min-width:56px;text-align:right;font-weight:900;color:#ffd36d}
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
    @keyframes titleFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-6px) rotate(1deg)}}
    @keyframes greenShimmer{0%,100%{color:#67ff8f;text-shadow:0 0 18px rgba(103,255,143,.7),0 12px 28px rgba(0,0,0,.28)}50%{color:#a0ffbe;text-shadow:0 0 32px rgba(103,255,143,1),0 12px 28px rgba(0,0,0,.28)}}
    @keyframes orangePulse{0%,100%{color:#ffba57;text-shadow:0 0 18px rgba(255,186,87,.7),0 12px 28px rgba(0,0,0,.28)}50%{color:#ffd98a;text-shadow:0 0 32px rgba(255,186,87,1),0 12px 28px rgba(0,0,0,.28)}}
    .title{margin:0;font-family:'Fredoka One',Arial,sans-serif;font-size:clamp(3rem,7vw,5.8rem);line-height:.9;letter-spacing:.01em;animation:titleFloat 3s ease-in-out infinite}
    .title .green{color:#67ff8f;animation:greenShimmer 2.2s ease-in-out infinite;display:inline-block}
    .title .orange{color:#ffba57;animation:orangePulse 2.2s ease-in-out infinite .4s;display:inline-block}
    .heroActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;position:relative;z-index:1}
    #overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:20;background:radial-gradient(circle at 50% 20%,rgba(103,255,143,.12),transparent 35%),rgba(0,0,0,.62);backdrop-filter:blur(10px)}
    #overlay.show{display:flex}
    .panel{width:min(980px,96vw);max-height:min(88vh,860px);overflow:auto;border-radius:34px;background:linear-gradient(180deg,rgba(10,26,17,.98),rgba(6,18,10,.95));border:1px solid rgba(255,255,255,.12);box-shadow:0 0 0 1px rgba(103,255,143,.12) inset,0 36px 90px rgba(0,0,0,.58);padding:22px}
    .panelHeader{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px}
    .panelHeader h2{margin:0;font-size:1.55rem}
    .panelHeader p{margin:4px 0 0;color:var(--muted)}
    .panelHero{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;padding:16px 18px;border-radius:24px;background:linear-gradient(135deg,rgba(103,255,143,.15),rgba(255,186,87,.12));border:1px solid rgba(255,255,255,.09)}
    .panelHeroStat{display:flex;gap:10px;flex-wrap:wrap}
    .panelHeroPill{padding:10px 14px;border-radius:999px;background:rgba(7,19,12,.58);border:1px solid rgba(255,255,255,.10);font-weight:900}
    .panelHeroPill strong{color:#ffd36d}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
    .card{position:relative;border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.11),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.10);padding:16px;display:flex;flex-direction:column;gap:12px;overflow:hidden;box-shadow:0 14px 34px rgba(0,0,0,.24);transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
    .card::before{content:"";position:absolute;inset:0;background:linear-gradient(145deg,rgba(255,255,255,.10),transparent 45%,rgba(255,186,87,.08));opacity:.9;pointer-events:none}
    .card:hover{transform:translateY(-3px);box-shadow:0 20px 44px rgba(0,0,0,.32);border-color:rgba(103,255,143,.22)}
    .skinPreview{height:156px;border-radius:22px;background:radial-gradient(circle at 25% 20%,rgba(255,255,255,.26),transparent 22%),linear-gradient(135deg, rgba(29,143,58,.95), rgba(255,156,42,.78));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .skinPreview::after{content:"";position:absolute;inset:auto -18% -40% auto;width:150px;height:150px;background:rgba(255,255,255,.12);filter:blur(10px);border-radius:50%}
    .skinPreview img{width:92px;height:92px;object-fit:cover;border-radius:18px;box-shadow:0 18px 30px rgba(0,0,0,.28);background:rgba(255,255,255,.10);border:2px solid rgba(255,255,255,.18);position:relative;z-index:1}
    .skinPreview .fallback{width:92px;height:92px;border-radius:18px;background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.62));color:#12361f;font-size:2.3rem;font-weight:900;display:none;align-items:center;justify-content:center;position:relative;z-index:1}
    .card h3{margin:0;font-size:1.15rem;position:relative;z-index:1}
    .card .meta{color:#cfead5;font-size:.93rem;line-height:1.45}
    .tagRow{display:flex;gap:8px;flex-wrap:wrap;position:relative;z-index:1}
    .tag{border-radius:999px;padding:8px 11px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);font-size:.84rem}
    .tag.price{background:rgba(255,211,109,.12);border-color:rgba(255,211,109,.22);color:#ffd36d}
    .tag.ok{background:rgba(103,255,143,.12);border-color:rgba(103,255,143,.22);color:#9bffb7}
    .tag.lock{background:rgba(255,255,255,.06);color:#d9e8dc}
    .skinGlow{position:absolute;right:12px;top:12px;padding:7px 10px;border-radius:999px;background:rgba(7,19,12,.65);border:1px solid rgba(255,255,255,.12);font-size:.75rem;font-weight:900;z-index:2}
    .skinNameRow{display:flex;justify-content:space-between;gap:10px;align-items:center;position:relative;z-index:1}
    .shopSub{color:#cfead5;font-size:.92rem;line-height:1.45;min-height:2.7em;position:relative;z-index:1}
    .card .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto}
    .card .actions .btn{flex:1}
    .card.locked{opacity:.92}
    .card.owned{outline:2px solid rgba(47,224,111,.22)}
    .card.equipped{outline:2px solid rgba(255,180,72,.44);box-shadow:0 0 0 1px rgba(255,180,72,.30) inset,0 22px 52px rgba(0,0,0,.32)}
    #shopList,#inventoryList{margin-top:14px}
    .sectionSwitch{display:flex;gap:10px;flex-wrap:wrap}
    .sectionSwitch .btn{min-width:120px}
    #message{position:absolute;left:50%;top:100px;transform:translateX(-50%);padding:10px 16px;border-radius:999px;background:rgba(8,20,14,.82);color:white;border:1px solid rgba(255,255,255,.10);box-shadow:0 10px 24px rgba(0,0,0,.2);z-index:10;opacity:0;pointer-events:none;transition:.25s;max-width:min(92vw,720px);text-align:center}
    #message.show{opacity:1}
    .hide{display:none !important}
    @media (max-width:780px){
      canvas{border-radius:22px}
      .menuCard,.panel{padding:20px;border-radius:28px}
      .menuStats{gap:8px}
    }
  </style>
  <style>
    @keyframes hsFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(.25) rotate(-10deg)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.34) rotate(5deg)}60%{transform:translate(-50%,-50%) scale(.92) rotate(-2deg)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.08) rotate(0deg)}}
    @keyframes hsRing{0%{opacity:.95;transform:translate(-50%,-50%) scale(.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.05)}}
    #hsAnim{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:9999;pointer-events:none;opacity:0;font-family:'Fredoka One',Arial,sans-serif;font-size:clamp(3.1rem,10vw,6.9rem);color:#ffd36d;text-shadow:0 0 46px rgba(255,211,109,.95),0 0 100px rgba(255,150,0,.7);white-space:nowrap;display:none;letter-spacing:.03em}
    #hsAnim::after{content:"";position:absolute;left:50%;top:50%;width:min(62vw,520px);height:min(62vw,520px);border-radius:50%;border:6px solid rgba(255,211,109,.7);transform:translate(-50%,-50%) scale(.3);opacity:0;pointer-events:none}
    #hsAnim.go{display:block;animation:hsFlash 2.15s cubic-bezier(.22,1,.36,1) forwards}
    #hsAnim.go::after{animation:hsRing 1.1s ease-out forwards}
    @keyframes coinFly{0%{opacity:0;transform:translate(0,0) scale(.55)}15%{opacity:1}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.24)}}
    .coinParticle{position:fixed;pointer-events:none;z-index:9998;font-size:1.55rem;font-family:'Fredoka One',Arial,sans-serif;color:#ffd36d;text-shadow:0 0 12px rgba(255,211,109,.95),0 0 24px rgba(255,154,46,.72);animation:coinFly 1.95s cubic-bezier(.22,1,.36,1) forwards}
  </style>
</head>
<body>
  <div id="app">
    <div id="gameWrap">
      <canvas id="game" width="720" height="960" aria-label="Flappy Wren game canvas"></canvas>
    </div>

    <div id="hud" class="hide">
      <button class="btn hide" id="menuBtn">Menu</button>
    </div>

    <div id="message"></div>
    <div id="hsAnim">🏆 NEW BEST!</div>

    <div id="menu">
      <div class="menuCard">
        <div class="titleWrap">
          <h1 class="title"><span class="green">Flappy</span> <span class="orange">Wren</span></h1>
        </div>
        <div class="menuStats">
          <div class="mStat">
            <div class="mlabel">Best</div>
            <div class="mvalue green" id="menuHighScore">0</div>
          </div>
          <div class="mStat">
            <div class="mlabel">Coins</div>
            <div class="mvalue gold" id="menuCoins">$0</div>
          </div>
          <div class="mStat">
            <div class="mlabel">Skins</div>
            <div class="mvalue" id="menuOwned">0</div>
          </div>
        </div>
        <div class="menuBtns">
          <button class="btn playBig primary" id="playBtn">▶ Play</button>
          <div class="menuRow">
            <button class="btn orange" id="openShopBtn">Shop</button>
            <button class="btn" id="openInventoryBtn">Inventory</button>
          </div>
          <div class="menuRow">
            <button class="btn dark" id="openSettingsBtn">Settings</button>
          </div>
        </div>
      </div>
    </div>

    <div id="overlay">
      <div class="panel" id="panel"></div>
    </div>

    <div id="homeText" onclick="window.location.href='../index.html'">Wren.fun</div>
    <button id="fullscreenBtn" onclick="toggleFullscreen()" aria-label="Toggle fullscreen">⛶</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const dpr = Math.max(1, window.devicePixelRatio || 1);

    // ── Sound Engine ──────────────────────────────────────────────
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playTone(type, freq, dur, vol=0.18, freqEnd=null, attack=0.005, decay=null) {
      try {
        const actualVol = getSfxVolume(vol);
        if (actualVol <= 0) return;
        const ac = getAudio();
        const o = ac.createOscillator();
        const g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
        if (freqEnd !== null) o.frequency.exponentialRampToValueAtTime(freqEnd, ac.currentTime + dur);
        g.gain.setValueAtTime(0, ac.currentTime);
        g.gain.linearRampToValueAtTime(actualVol, ac.currentTime + attack);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + (decay || dur));
        o.start(ac.currentTime); o.stop(ac.currentTime + dur + 0.05);
      } catch(e) {}
    }
    function playNoise(dur, vol=0.12) {
      try {
        const actualVol = getSfxVolume(vol);
        if (actualVol <= 0) return;
        const ac = getAudio();
        const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const src = ac.createBufferSource();
        src.buffer = buf;
        const g = ac.createGain();
        src.connect(g); g.connect(ac.destination);
        g.gain.setValueAtTime(actualVol, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
        src.start(); src.stop(ac.currentTime + dur + 0.02);
      } catch(e) {}
    }
    const SFX = {
      flap()    {
        playTone('sine', 390, 0.10, 0.11, 280, 0.004, 0.09);
        playTone('triangle', 620, 0.05, 0.06, 420, 0.003, 0.05);
      },
      score()   { playTone('triangle', 660, 0.08, 0.15, 880); playTone('sine', 880, 0.1, 0.08, 1100, 0.01); },
      highScore(){ [0,85,170,255].forEach((d,i)=>setTimeout(()=>{ playTone('square',860 + i*90,0.17,0.13,1720 + i*140,0.008,0.16); },d)); },
      death()   {
        playTone('sawtooth', 260, 0.48, 0.16, 64, 0.004, 0.45);
        playTone('triangle', 120, 0.36, 0.08, 58, 0.003, 0.33);
        playNoise(0.18, 0.045);
      },
      button()  { playTone('sine', 520, 0.06, 0.08, 610, 0.004, 0.06); },
      buy()     { [0,70,140,210].forEach((d,i)=>setTimeout(()=>playTone('triangle',[520,660,830,1040][i],0.13,0.10,[660,830,1040,1320][i],0.005,0.12),d)); },
      equip()   { playTone('sine', 760, 0.13, 0.1, 940, 0.005, 0.12); playTone('triangle', 980, 0.11, 0.07, 1180, 0.005, 0.10); },
    };

    // ── High Score Animation ──────────────────────────────────────
    function showHsAnim() {
      const el = document.getElementById('hsAnim');
      el.classList.remove('go');
      void el.offsetWidth;
      el.classList.add('go');
      el.addEventListener('animationend', () => { el.classList.remove('go'); el.style.display='none'; }, { once: true });
    }

    // ── Coin Fly Animation on Death ───────────────────────────────
    function fireCoinParticles(score) {
      if (score <= 0) return;
      const coinsEl = document.getElementById('menuCoins');
      const targetRect = coinsEl ? coinsEl.getBoundingClientRect() : null;
      const tx = targetRect ? targetRect.left + targetRect.width / 2 : window.innerWidth / 2;
      const ty = targetRect ? targetRect.top + targetRect.height / 2 : 80;
      const count = Math.min(Math.max(score * 2, 18), 56);
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'coinParticle';
          el.textContent = (i % 5 === 0) ? '$2' : '$1';
          const sx = window.innerWidth / 2 + (Math.random() - .5) * 260;
          const sy = window.innerHeight / 2 + (Math.random() - .5) * 210;
          el.style.left = sx + 'px';
          el.style.top = sy + 'px';
          el.style.setProperty('--tx', (tx - sx) + 'px');
          el.style.setProperty('--ty', (ty - sy) + 'px');
          el.style.animationDelay = (Math.random() * 0.35) + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 2350);
        }, i * 45);
      }
    }

    function fitCanvas() {
      const cssW = Math.min(window.innerWidth, 720);
      const cssH = Math.min(window.innerHeight, 960);
      canvas.style.width = cssW + 'px';
      canvas.style.height = cssH + 'px';
      canvas.width = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      state.w = cssW;
      state.h = cssH;
      state.ground = Math.round(cssH * 0.16);
    }

    const STORAGE = {
      coins: 'flappyWrenCoins',
      highScore: 'flappyWrenHighScore',
      selected: 'flappyWrenSelectedSkin',
      owned: 'flappyWrenOwnedSkins',
      sfxVolume: 'flappyWrenSfxVolume',
      sfxMuted: 'flappyWrenSfxMuted'
    };

    const skins = {
      wren: { id:'wren', name:'Wren', src:'WrenYay.jpg', price:0, free:true, accent:'#48de79' },
      orin: { id:'orin', name:'The Mind Of Orin', src:'TheMindOfOrin.jpg', price:50, accent:'#ff9d2a' },
      tiki: { id:'tiki', name:'TikiTheG', src:'TikiTheG.jpg', price:500, accent:'#7cf1b4' },
      cena: { id:'cena', name:'Bald Cena', src:'TheRealBaldCena72.jpg', price:3500, accent:'#ffd36d' }
    };

    const imageCache = {};
    Object.values(skins).forEach(skin => {
      const img = new Image();
      img.src = skin.src;
      img.alt = skin.name;
      imageCache[skin.id] = img;
    });

    const state = {
      w: 720,
      h: 960,
      ground: 150,
      running: false,
      gameOver: false,
      started: false,
      score: 0,
      coins: Number(localStorage.getItem(STORAGE.coins) || '0'),
      highScore: Number(localStorage.getItem(STORAGE.highScore) || '0'),
      selectedSkin: localStorage.getItem(STORAGE.selected) || 'wren',
      ownedSkins: JSON.parse(localStorage.getItem(STORAGE.owned) || 'null') || ['wren'],
      pipes: [],
      ticks: 0,
      spawnTimer: 0,
      bgX: 0,
      bird: { x: 0, y: 0, vy: 0, size: 46, rot: 0, bob: 0 },
      countdown: 0,
      countdownTimer: null,
      runBestBaseline: Number(localStorage.getItem(STORAGE.highScore) || '0'),
      surpassedHighThisRun: false,
      sfxVolume: Math.max(0, Math.min(1, Number(localStorage.getItem(STORAGE.sfxVolume) || '0.75'))),
      sfxMuted: localStorage.getItem(STORAGE.sfxMuted) === '1'
    };

    if (!state.ownedSkins.includes(state.selectedSkin)) state.selectedSkin = 'wren';
    if (!state.ownedSkins.includes('wren')) state.ownedSkins.unshift('wren');

    function saveState() {
      localStorage.setItem(STORAGE.coins, String(state.coins));
      localStorage.setItem(STORAGE.highScore, String(state.highScore));
      localStorage.setItem(STORAGE.selected, state.selectedSkin);
      localStorage.setItem(STORAGE.owned, JSON.stringify([...new Set(state.ownedSkins)]));
      localStorage.setItem(STORAGE.sfxVolume, String(state.sfxVolume));
      localStorage.setItem(STORAGE.sfxMuted, state.sfxMuted ? '1' : '0');
    }

    function getSfxVolume(mult = 1) {
      if (state.sfxMuted) return 0;
      return Math.max(0, Math.min(1, state.sfxVolume * mult));
    }

    function setMessage(text, ms = 1600) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(setMessage.timer);
      setMessage.timer = setTimeout(() => el.classList.remove('show'), ms);
    }

    function ownedCount() { return [...new Set(state.ownedSkins)].length; }

    function getSkin(id) { return skins[id] || skins.wren; }

    function equipSkin(id) {
      if (!state.ownedSkins.includes(id)) return false;
      state.selectedSkin = id;
      saveState();
      renderUI();
      setMessage(`${getSkin(id).name} equipped.`);
      SFX.equip();
      return true;
    }

    function buySkin(id) {
      const skin = getSkin(id);
      if (state.ownedSkins.includes(id)) return equipSkin(id);
      if (state.coins < skin.price) {
        setMessage(`Not enough coins for ${skin.name}.`);
        return false;
      }
      state.coins -= skin.price;
      state.ownedSkins.push(id);
      state.selectedSkin = id;
      saveState();
      renderUI();
      setMessage(`${skin.name} purchased and equipped!`);
      SFX.buy();
      return true;
    }

    function renderUI() {
      document.getElementById('menuHighScore').textContent = state.highScore;
      document.getElementById('menuCoins').textContent = '$' + state.coins;
      document.getElementById('menuOwned').textContent = ownedCount();
    }

    function settingsMarkup() {
      const percent = Math.round(state.sfxVolume * 100);
      return `
        <div class="panelHeader">
          <div>
            <h2>Settings</h2>
            <p>Adjust sound effects volume or mute them.</p>
          </div>
          <div class="sectionSwitch">
            <button class="btn" data-close>Close</button>
            <button class="btn orange" data-go="shop">Shop</button>
            <button class="btn primary" data-go="inventory">Inventory</button>
          </div>
        </div>
        <div class="settingRow">
          <div class="settingCard">
            <h3>Sound Effects</h3>
            <p>Change the volume for gameplay and UI sounds.</p>
            <div class="rangeWrap">
              <input id="sfxVolumeRange" type="range" min="0" max="100" value="${percent}" />
              <div class="rangeValue" id="sfxVolumeValue">${percent}%</div>
            </div>
          </div>
          <div class="settingCard">
            <h3>Mute</h3>
            <p>Turn all sound effects on or off instantly.</p>
            <button class="btn dark" id="toggleMuteBtn">${state.sfxMuted ? 'Unmute SFX' : 'Mute SFX'}</button>
          </div>
        </div>`;
    }

    function resetGame() {
      state.running = false;
      state.started = false;
      state.gameOver = false;
      state.score = 0;
      state.pipes = [];
      state.ticks = 0;
      state.spawnTimer = 0;
      state.bgX = 0;
      state.bird.x = state.w * 0.38;
      state.bird.y = state.h * 0.42;
      state.bird.vy = 0;
      state.bird.rot = 0;
      state.bird.bob = 0;
      state.countdown = 0;
      if (state.countdownTimer) { clearInterval(state.countdownTimer); state.countdownTimer = null; }
      state.runBestBaseline = state.highScore;
      state.surpassedHighThisRun = false;
      renderUI();
    }

    function startGame() {
      resetGame();
      document.getElementById('menu').style.display = 'none';
      document.getElementById('hud').classList.remove('hide');
      state.countdown = 3;
      state.countdownTimer = setInterval(() => {
        state.countdown--;
        if (state.countdown <= 0) {
          clearInterval(state.countdownTimer);
          state.countdownTimer = null;
          state.countdown = 0;
          state.running = true;
          state.started = true;
        }
      }, 1000);
    }

    function endGame() {
      if (state.gameOver) return;
      state.running = false;
      state.gameOver = true;
      const earned = state.score;
      const beatHighScore = state.score > state.runBestBaseline;
      state.highScore = Math.max(state.highScore, state.score);
      saveState();
      renderUI();
      SFX.death();
      setTimeout(() => {
        document.getElementById('menu').style.display = 'flex';
        const mc = document.querySelector('.menuCard');
        mc.style.animation = 'none'; void mc.offsetWidth; mc.style.animation = '';
        document.getElementById('hud').classList.add('hide');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            fireCoinParticles(earned);
            if (beatHighScore) {
              SFX.highScore();
              showHsAnim();
            }
          });
        });
      }, 400);
    }

    function flap() {
      if (state.countdown > 0) return;
      if (!state.running || state.gameOver) return;
      state.bird.vy = -6.2;
      state.bird.rot = -0.32;
      SFX.flap();
    }

    function spawnPipe() {
      const marginTop = 60;
      const marginBottom = state.ground + 90;
      const gap = Math.max(170, 220 - Math.min(80, state.score * 2));
      const adjustedGap = gap + 14;
      const minTop = 70;
      const maxTop = state.h - marginBottom - adjustedGap - minTop;
      const topH = minTop + Math.random() * Math.max(80, maxTop);
      state.pipes.push({ x: state.w + 60, topH, gap: adjustedGap, scored:false });
    }

    function drawRoundedRect(x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function drawBackground() {
      const w = state.w, h = state.h;
      const sky = ctx.createLinearGradient(0, 0, 0, h);
      sky.addColorStop(0, '#8edcff');
      sky.addColorStop(0.45, '#d7fbff');
      sky.addColorStop(0.74, '#dff6df');
      sky.addColorStop(1, '#9fe0a7');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      state.bgX = (state.bgX - 0.35) % w;
      for (let i = -1; i < 3; i++) {
        const x = i * w + state.bgX;
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        ctx.ellipse(x + 120, 110, 70, 28, 0.1, 0, Math.PI * 2);
        ctx.ellipse(x + 480, 90, 100, 36, -0.1, 0, Math.PI * 2);
        ctx.fill();
      }

      // distant hills
      ctx.fillStyle = 'rgba(18,122,54,0.25)';
      ctx.beginPath();
      ctx.moveTo(0, h * 0.68);
      ctx.quadraticCurveTo(w * 0.18, h * 0.56, w * 0.36, h * 0.68);
      ctx.quadraticCurveTo(w * 0.53, h * 0.80, w * 0.74, h * 0.66);
      ctx.quadraticCurveTo(w * 0.90, h * 0.58, w, h * 0.69);
      ctx.lineTo(w, h);
      ctx.lineTo(0, h);
      ctx.closePath();
      ctx.fill();

      // ground
      const gY = h - state.ground;
      const groundGrad = ctx.createLinearGradient(0, gY, 0, h);
      groundGrad.addColorStop(0, '#2fbf5e');
      groundGrad.addColorStop(1, '#176831');
      ctx.fillStyle = groundGrad;
      ctx.fillRect(0, gY, w, state.ground);

      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      for (let i = 0; i < w; i += 24) ctx.fillRect(i, gY + 8 + (i % 48 === 0 ? 0 : 8), 14, 4);

      // path line
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(0, gY, w, 8);
    }

    function drawPipe(pipe) {
      const pipeW = 82;
      const topY = 0;
      const bottomY = pipe.topH + pipe.gap;
      const h = state.h - state.ground;

      function pipePiece(x, y, w, hgt, isTop) {
        const grad = ctx.createLinearGradient(x, 0, x + w, 0);
        grad.addColorStop(0, '#0f6e2f');
        grad.addColorStop(0.18, '#38d164');
        grad.addColorStop(0.5, '#1d9a44');
        grad.addColorStop(0.82, '#18b14d');
        grad.addColorStop(1, '#0d5a25');
        ctx.fillStyle = grad;
        drawRoundedRect(x, y, w, hgt, 14);
        ctx.fill();

        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(x + 12, y + 8, 8, Math.max(0, hgt - 16));

        const lipH = 18;
        const lipY = isTop ? y + hgt - lipH : y;
        ctx.fillStyle = '#0a5624';
        drawRoundedRect(x - 6, lipY, w + 12, lipH, 10);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.10)';
        ctx.fillRect(x - 3, lipY + 4, w + 6, 4);
      }

      pipePiece(pipe.x, topY, pipeW, pipe.topH, true);
      pipePiece(pipe.x, bottomY, pipeW, h - bottomY, false);
    }

    function drawBird() {
      const skin = getSkin(state.selectedSkin);
      const img = imageCache[skin.id];
      const x = state.bird.x;
      const y = state.bird.y;
      const size = state.bird.size;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(state.bird.rot);
      ctx.shadowColor = 'rgba(0,0,0,0.22)';
      ctx.shadowBlur = 12;
      ctx.shadowOffsetY = 6;
      if (img && img.complete && img.naturalWidth > 0) {
        ctx.save();
        drawRoundedRect(-size / 2, -size / 2, size, size, size * 0.19);
        ctx.clip();
        // object-fit: cover — scale to fill square, centre crop
        const iw = img.naturalWidth, ih = img.naturalHeight;
        const scale = Math.max(size / iw, size / ih);
        const dw = iw * scale, dh = ih * scale;
        ctx.drawImage(img, -dw / 2, -dh / 2, dw, dh);
        ctx.restore();
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.22)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetY = 6;
        drawRoundedRect(-size / 2, -size / 2, size, size, size * 0.19);
        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      } else {
        const grad = ctx.createLinearGradient(-size/2, -size/2, size/2, size/2);
        grad.addColorStop(0, skin.accent);
        grad.addColorStop(1, '#ffffff');
        ctx.fillStyle = grad;
        drawRoundedRect(-size/2, -size/2, size, size, 9);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#14311b';
        ctx.font = '900 18px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(skin.name === 'Wren' ? 'W' : skin.name.replace(/[^A-Za-z]/g,'').slice(0,1).toUpperCase(), 0, 1);
      }
      ctx.restore();
    }

    function hitBoxCircleRect(cx, cy, r, rx, ry, rw, rh) {
      const nx = Math.max(rx, Math.min(cx, rx + rw));
      const ny = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - nx;
      const dy = cy - ny;
      return dx * dx + dy * dy < r * r;
    }

    function updateGame() {
      if (!state.running) return;
      state.ticks++;
      state.spawnTimer++;
      state.bgX = (state.bgX - 2.2) % state.w;

      const gravity = 0.26;
      state.bird.vy += gravity;
      state.bird.y += state.bird.vy;
      state.bird.rot += (state.bird.vy > 0 ? 0.04 : -0.02);
      state.bird.rot = Math.max(-0.5, Math.min(1.1, state.bird.rot));
      state.bird.bob = Math.sin(state.ticks / 12) * 1.2;

      if (state.spawnTimer > 92) {
        spawnPipe();
        state.spawnTimer = 0;
      }

      const speed = 1.9 + Math.min(1.2, state.score * 0.015);
      for (const pipe of state.pipes) {
        pipe.x -= speed;
        const pipeW = 82;
        const birdR = state.bird.size * 0.38;
        const birdX = state.bird.x;
        const birdY = state.bird.y;
        const topRect = { x: pipe.x, y:0, w:pipeW, h:pipe.topH };
        const botRect = { x: pipe.x, y:pipe.topH + pipe.gap, w:pipeW, h:state.h - state.ground - (pipe.topH + pipe.gap) };
        if (hitBoxCircleRect(birdX, birdY, birdR, topRect.x, topRect.y, topRect.w, topRect.h) || hitBoxCircleRect(birdX, birdY, birdR, botRect.x, botRect.y, botRect.w, botRect.h)) {
          endGame();
          return;
        }
        if (!pipe.scored && pipe.x + pipeW < state.bird.x - birdR) {
          pipe.scored = true;
          state.score += 1;
          state.coins += 1;
          const isNewHigh = state.score > state.highScore;
          if (state.score > state.runBestBaseline) state.surpassedHighThisRun = true;
          state.highScore = Math.max(state.highScore, state.score);
          saveState();
          renderUI();
          SFX.score(); // Keep point sound consistent for every point.
        }
      }
      state.pipes = state.pipes.filter(p => p.x > -120);

      const floorY = state.h - state.ground;
      if (state.bird.y + state.bird.size * 0.42 > floorY || state.bird.y - state.bird.size * 0.42 < 0) {
        endGame();
        return;
      }
    }

    function drawScoreOverlay() {
      if (state.countdown > 0) {
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.32)';
        ctx.fillRect(0, 0, state.w, state.h);
        ctx.fillStyle = '#fff';
        ctx.font = '900 140px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(46,224,111,0.7)';
        ctx.shadowBlur = 40;
        ctx.fillText(state.countdown, state.w / 2, state.h / 2);
        ctx.restore();
        return;
      }
      if (!state.started || state.gameOver) return;
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(0, 0, state.w, 66);
      ctx.fillStyle = '#fff';
      ctx.font = '900 32px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(state.score, state.w / 2, 42);
      if (state.surpassedHighThisRun) {
        ctx.font = '900 15px Arial';
        ctx.textAlign = 'left';
        ctx.fillStyle = '#ffd36d';
        ctx.shadowColor = 'rgba(255,211,109,0.85)';
        ctx.shadowBlur = 12;
        ctx.fillText('HIGH SCORE', state.w / 2 + 24, 40);
      }
      ctx.restore();
    }

    function render() {
      updateGame();
      ctx.clearRect(0, 0, state.w, state.h);
      drawBackground();
      for (const pipe of state.pipes) drawPipe(pipe);
      drawBird();
      drawScoreOverlay();
      requestAnimationFrame(render);
    }

    function openOverlay(kind) {
      const overlay = document.getElementById('overlay');
      const panel = document.getElementById('panel');
      panel.dataset.view = kind;
      overlay.classList.add('show');
      if (kind === 'shop') panel.innerHTML = shopMarkup();
      else if (kind === 'settings') panel.innerHTML = settingsMarkup();
      else panel.innerHTML = inventoryMarkup();
      bindPanelActions(kind);
    }

    function closeOverlay() {
      document.getElementById('overlay').classList.remove('show');
    }

    function shopMarkup() {
      const cards = Object.values(skins).map(skin => {
        const owned = state.ownedSkins.includes(skin.id);
        const affordable = state.coins >= skin.price;
        const disabled = !owned && !affordable && !skin.free;
        const status = owned ? 'Owned' : (skin.free ? 'Free' : '$' + skin.price);
        const badge = state.selectedSkin === skin.id ? 'Equipped' : (owned ? 'Owned' : (skin.free ? 'Starter' : 'Premium'));
        const desc = owned ? `${skin.name} is already in your collection and ready to use.` : (skin.free ? `${skin.name} is your default bird and is always available.` : `Unlock ${skin.name} for ${skin.price} coins and fly with a fresh look.`);
        return `
          <div class="card ${owned ? 'owned' : 'locked'} ${state.selectedSkin === skin.id ? 'equipped' : ''}">
            <div class="skinGlow">${badge}</div>
            <div class="skinPreview">
              <img src="${skin.src}" alt="${skin.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
              <div class="fallback">${skin.name.replace(/[^A-Za-z]/g,'').slice(0,1).toUpperCase()}</div>
            </div>
            <div class="skinNameRow">
              <h3>${skin.name}</h3>
            </div>
            <div class="shopSub">${desc}</div>
            <div class="tagRow">
              <span class="tag ${owned || skin.free ? 'ok' : 'price'}">${status}</span>
              <span class="tag ${owned ? 'ok' : 'lock'}">${owned ? 'In inventory' : (skin.free ? 'Available now' : 'Buy to unlock')}</span>
            </div>
            <div class="actions">
              ${owned || skin.free ? `<button class="btn primary equipBtn" data-equip="${skin.id}">Equip</button>` : `<button class="btn orange buyBtn" data-buy="${skin.id}" ${disabled ? 'disabled style="opacity:.55;cursor:not-allowed"' : ''}>Buy</button>`}
            </div>
          </div>`;
      }).join('');
      return `
        <div class="panelHeader">
          <div>
            <h2>Shop</h2>
            <p>Buy skins with your coins. Each point you earn adds $1.</p>
          </div>
          <div class="sectionSwitch">
            <button class="btn" data-close>Close</button>
            <button class="btn primary" data-go="inventory">Inventory</button>
          </div>
        </div>
        <div class="panelHero">
          <div>
            <h2 style="margin:0 0 4px">Skin Boutique</h2>
            <p style="margin:0;color:var(--muted)">Cleaner cards, clearer prices, better browsing.</p>
          </div>
          <div class="panelHeroStat">
            <div class="panelHeroPill">Coins: <strong>$${state.coins}</strong></div>
            <div class="panelHeroPill">Owned: <strong>${ownedCount()}</strong></div>
          </div>
        </div>
        <div class="grid" id="shopList">${cards}</div>`;
    }

    function inventoryMarkup() {
      const cards = Object.values(skins).map(skin => {
        const owned = state.ownedSkins.includes(skin.id);
        const badge = state.selectedSkin === skin.id ? 'Selected' : (owned ? 'Unlocked' : 'Locked');
        const desc = owned ? `You own ${skin.name}. ${state.selectedSkin === skin.id ? 'This one is active right now.' : 'Equip it whenever you want.'}` : `${skin.name} is still locked. Visit the shop to unlock it.`;
        return `
          <div class="card ${owned ? 'owned' : 'locked'} ${state.selectedSkin === skin.id ? 'equipped' : ''}">
            <div class="skinGlow">${badge}</div>
            <div class="skinPreview">
              <img src="${skin.src}" alt="${skin.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
              <div class="fallback">${skin.name.replace(/[^A-Za-z]/g,'').slice(0,1).toUpperCase()}</div>
            </div>
            <div class="skinNameRow">
              <h3>${skin.name}</h3>
            </div>
            <div class="shopSub">${desc}</div>
            <div class="tagRow">
              <span class="tag ${owned ? 'ok' : 'lock'}">${owned ? 'Unlocked' : 'Locked'}</span>
              <span class="tag ${state.selectedSkin === skin.id ? 'price' : 'lock'}">${state.selectedSkin === skin.id ? 'Selected' : 'Not selected'}</span>
            </div>
            <div class="actions">
              <button class="btn primary equipBtn" data-equip="${skin.id}" ${owned ? '' : 'disabled style="opacity:.55;cursor:not-allowed"'}>Equip</button>
            </div>
          </div>`;
      }).join('');
      return `
        <div class="panelHeader">
          <div>
            <h2>Inventory</h2>
            <p>Change between skins you already own.</p>
          </div>
          <div class="sectionSwitch">
            <button class="btn" data-close>Close</button>
            <button class="btn orange" data-go="shop">Shop</button>
          </div>
        </div>
        <div class="panelHero">
          <div>
            <h2 style="margin:0 0 4px">Your Collection</h2>
            <p style="margin:0;color:var(--muted)">See what you own and switch fast.</p>
          </div>
          <div class="panelHeroStat">
            <div class="panelHeroPill">Selected: <strong>${getSkin(state.selectedSkin).name}</strong></div>
            <div class="panelHeroPill">Owned: <strong>${ownedCount()}</strong></div>
          </div>
        </div>
        <div class="grid" id="inventoryList">${cards}</div>`;
    }

    function bindPanelActions(kind) {
      const overlay = document.getElementById('overlay');
      const panel = document.getElementById('panel');
      overlay.onclick = (e) => { if (e.target === overlay) closeOverlay(); };
      panel.querySelectorAll('[data-close]').forEach(btn => btn.onclick = closeOverlay);
      panel.querySelectorAll('[data-go]').forEach(btn => btn.onclick = () => openOverlay(btn.dataset.go));
      panel.querySelectorAll('[data-buy]').forEach(btn => btn.onclick = () => { if (buySkin(btn.dataset.buy)) openOverlay('shop'); });
      panel.querySelectorAll('[data-equip]').forEach(btn => btn.onclick = () => { if (equipSkin(btn.dataset.equip)) openOverlay(kind); });
      const volumeRange = panel.querySelector('#sfxVolumeRange');
      if (volumeRange) {
        volumeRange.oninput = () => {
          state.sfxVolume = Number(volumeRange.value) / 100;
          saveState();
          const valueEl = panel.querySelector('#sfxVolumeValue');
          if (valueEl) valueEl.textContent = Math.round(state.sfxVolume * 100) + '%';
        };
      }
      const muteBtn = panel.querySelector('#toggleMuteBtn');
      if (muteBtn) {
        muteBtn.onclick = () => {
          const wasMuted = state.sfxMuted;
          state.sfxMuted = !state.sfxMuted;
          saveState();
          muteBtn.textContent = state.sfxMuted ? 'Unmute SFX' : 'Mute SFX';
          if (wasMuted) SFX.button();
        };
      }
    }

    // Buttons
    document.getElementById('playBtn').onclick = () => startGame();
    document.getElementById('openShopBtn').onclick = () => openOverlay('shop');
    document.getElementById('openInventoryBtn').onclick = () => openOverlay('inventory');
    document.getElementById('openSettingsBtn').onclick = () => openOverlay('settings');
    document.getElementById('menuBtn').onclick = () => {
      if (state.countdownTimer) { clearInterval(state.countdownTimer); state.countdownTimer = null; }
      state.running = false;
      state.gameOver = false;
      state.countdown = 0;
      document.getElementById('menu').style.display = 'flex';
      document.getElementById('hud').classList.add('hide');
    };

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      if (btn.id === 'toggleMuteBtn') return;
      SFX.button();
    });

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }
    document.addEventListener('fullscreenchange', () => {
      document.getElementById('fullscreenBtn').textContent = document.fullscreenElement ? '⤢' : '⛶';
    });

    window.addEventListener('resize', () => { fitCanvas(); resetGame(); });
    window.addEventListener('pointerdown', (e) => { if (e.target.closest('button')) return; if (document.getElementById('overlay').classList.contains('show')) return; flap(); });
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
      if (e.key === 'Escape') closeOverlay();
    });

    // Start
    fitCanvas();
    resetGame();
    renderUI();
    render();
  </script>
</body>
</html>
