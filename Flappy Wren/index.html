<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Wren</title>
  <link rel="icon" type="image/png" href="../Favicon.png">
  <style>
    :root {
      --bg1:#071a0d;
      --bg2:#0b3d1c;
      --bg3:#e8900a;
      --panel:rgba(6,16,10,0.92);
      --panel2:rgba(255,255,255,0.07);
      --text:#edfff3;
      --muted:#9ecfad;
      --green:#2ee86b;
      --orange:#ff9c2a;
      --pipe:#1d8f3a;
      --pipeDark:#12622a;
      --shadow:0 30px 80px rgba(0,0,0,.55);
      --radius:28px;
      --accent-green:#3dff82;
      --accent-gold:#ffd36d;
    }
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:Arial,Helvetica,sans-serif;background:
      radial-gradient(circle at 15% 15%, rgba(255,171,62,.2) 0 18%, transparent 19%),
      radial-gradient(circle at 78% 16%, rgba(50,210,107,.26) 0 18%, transparent 19%),
      linear-gradient(180deg, var(--bg1), var(--bg2) 62%, var(--bg3));color:var(--text)}
    body::before{content:"";position:fixed;inset:0;background:
      linear-gradient(120deg, transparent 20%, rgba(255,255,255,.06) 50%, transparent 80%),
      radial-gradient(circle at 20% 80%, rgba(255,255,255,.10) 0 4px, transparent 5px),
      radial-gradient(circle at 75% 25%, rgba(255,255,255,.08) 0 5px, transparent 6px),
      radial-gradient(circle at 50% 50%, rgba(255,255,255,.06) 0 2px, transparent 3px);
      pointer-events:none;opacity:.9}
    #app{position:relative;width:100%;height:100%}
    #gameWrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:clamp(10px,2vw,24px)}
    canvas{width:min(100vw,720px);height:min(100vh,960px);max-width:100%;max-height:100%;border-radius:30px;box-shadow:var(--shadow);background:linear-gradient(180deg,#88d8ff 0%,#c8f3ff 30%,#dfffe8 55%,#bdf0c5 100%);display:block}
    #hud{position:absolute;top:14px;left:160px;right:14px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:5;gap:12px}
    #homeText{position:fixed;top:10px;left:10px;font-family:'Fredoka One',Arial,sans-serif;font-size:1.6em;cursor:pointer;transition:transform 0.2s;z-index:1000;user-select:none;opacity:0.95;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.4);font-weight:900}
    #homeText:hover{transform:scale(1.12)}
    #fullscreenBtn{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.20);color:white;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:all 0.2s;z-index:999;user-select:none;-webkit-user-select:none}
    #fullscreenBtn:hover{background:rgba(255,255,255,.20);transform:scale(1.05)}
    #fullscreenBtn:active{transform:scale(0.95)}
    .pill{pointer-events:auto;background:rgba(9,22,14,.65);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:10px 14px;box-shadow:0 10px 30px rgba(0,0,0,.18);font-weight:700}
    .leftPills,.rightPills{display:flex;gap:10px;flex-wrap:wrap}
    .pill b{color:#fff}
    .btn{border:0;border-radius:14px;padding:13px 18px;font:700 14px/1.1 'Fredoka One',Arial,sans-serif;letter-spacing:.02em;background:linear-gradient(160deg,rgba(255,255,255,.92),rgba(220,240,224,.88));color:#0d2e17;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.22),0 8px 24px rgba(0,0,0,.18);transition:.15s transform,.15s box-shadow,.15s filter;position:relative;overflow:hidden}
    .btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,rgba(255,255,255,0) 55%);pointer-events:none;border-radius:inherit}
    .btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 rgba(0,0,0,.22),0 12px 28px rgba(0,0,0,.22);filter:brightness(1.04)}
    .btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.22),0 4px 12px rgba(0,0,0,.18)}
    .btn.primary{background:linear-gradient(160deg,#3dff82,#18c952);color:#04200e;box-shadow:0 4px 0 #0e7a30,0 8px 28px rgba(30,200,80,.30)}
    .btn.primary:hover{box-shadow:0 6px 0 #0e7a30,0 12px 36px rgba(30,200,80,.40)}
    .btn.primary:active{box-shadow:0 1px 0 #0e7a30,0 4px 16px rgba(30,200,80,.20)}
    .btn.equippedBlue{background:linear-gradient(160deg,#70d4ff,#2872ff);color:#fff;box-shadow:0 4px 0 #1240b0,0 8px 28px rgba(40,114,255,.30)}
    .btn.equippedBlue:hover{box-shadow:0 6px 0 #1240b0,0 12px 36px rgba(40,114,255,.40)}
    .btn.orange{background:linear-gradient(160deg,#ffcc5c,#ff8a1f);color:#3a1500;box-shadow:0 4px 0 #a04800,0 8px 28px rgba(255,140,30,.28)}
    .btn.orange:hover{box-shadow:0 6px 0 #a04800,0 12px 36px rgba(255,140,30,.38)}
    .btn.dark{background:linear-gradient(160deg,#1e3d28,#0e2018);color:#b8e8c8;border:1px solid rgba(255,255,255,.10);box-shadow:0 4px 0 rgba(0,0,0,.35),0 8px 20px rgba(0,0,0,.25)}
    #menu{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:8;padding:20px}
    .menuCard{width:min(420px,96vw);border-radius:32px;background:linear-gradient(170deg,rgba(8,22,13,.98),rgba(4,12,8,.96));border:1px solid rgba(255,255,255,.10);box-shadow:0 0 0 1px rgba(61,255,130,.06) inset,0 40px 100px rgba(0,0,0,.80),0 0 60px rgba(0,0,0,.40);padding:30px 26px;text-align:center;position:relative;overflow:hidden}
    .menuCard::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% -10%,rgba(61,255,130,.14),transparent 55%),radial-gradient(ellipse at 85% 110%,rgba(255,186,87,.08),transparent 50%);pointer-events:none}
    .menuCard::after{content:"";position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(61,255,130,.60),transparent)}
    @keyframes menuIn{from{opacity:0;transform:translateY(24px) scale(.95)}to{opacity:1;transform:none}}
    .titleWrap{margin-bottom:20px;position:relative;z-index:1}
    .menuStats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:20px 0;position:relative;z-index:1}
    .mStat{border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);padding:14px 8px;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden}
    .mStat::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent)}
    .mStat .mlabel{font-size:.65rem;color:rgba(180,220,190,.60);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
    .mStat .mvalue{font-size:1.4rem;font-weight:900;color:#fff;font-family:'Fredoka One',Arial,sans-serif}
    .mStat .mvalue.gold{color:#ffd36d;text-shadow:0 0 20px rgba(255,211,109,.50)}
    .mStat .mvalue.green{color:#3dff82;text-shadow:0 0 20px rgba(61,255,130,.50)}
    .menuBtns{display:flex;flex-direction:column;gap:9px;position:relative;z-index:1}
    .btn.playBig{padding:18px 24px;font-size:1.1rem;border-radius:18px;letter-spacing:.03em;background:linear-gradient(160deg,#4dff90,#18d455);color:#03180a;box-shadow:0 5px 0 #0b8a30,0 10px 36px rgba(24,212,85,.35),0 0 0 1px rgba(100,255,160,.20) inset}
    .btn.playBig:hover{transform:translateY(-3px);box-shadow:0 8px 0 #0b8a30,0 16px 44px rgba(24,212,85,.45),0 0 0 1px rgba(100,255,160,.30) inset}
    .btn.playBig:active{transform:translateY(3px);box-shadow:0 2px 0 #0b8a30,0 6px 20px rgba(24,212,85,.25)}
    .menuRow{display:flex;gap:9px}
    .menuRow .btn{flex:1}
    .menuRow.codeRow .btn{flex:1;width:100%;justify-content:center}
    .codeBtn{background:linear-gradient(145deg,#6d28d9,#0f172a);color:#efe7ff;border:1px solid rgba(196,181,253,.28);box-shadow:0 4px 0 rgba(36,16,84,.75),0 10px 28px rgba(0,0,0,.22)}
    .codeBtn:hover{filter:brightness(1.06)}
    .codePanelHero{background:linear-gradient(135deg,rgba(109,40,217,.24),rgba(15,23,42,.92));border:1px solid rgba(196,181,253,.18)}
    .codeInputWrap{display:grid;gap:12px}
    .codeInput{width:100%;padding:16px 18px;border-radius:18px;border:1px solid rgba(196,181,253,.22);background:rgba(4,10,24,.72);color:#fff;font:700 1rem/1.2 Arial,Helvetica,sans-serif;outline:none;box-shadow:0 0 0 1px rgba(255,255,255,.03) inset}
    .codeInput::placeholder{color:rgba(237,231,255,.45)}
    .codeInput:focus{border-color:rgba(191,165,255,.55);box-shadow:0 0 0 3px rgba(109,40,217,.22)}
    .codeActionRow{display:flex;gap:10px;flex-wrap:wrap}
    .codeActionRow .btn{flex:1}
    .codeTip{margin:0;color:#c9c0e7;font-size:.92rem;line-height:1.45}
    .codePopupShell{display:flex;align-items:center;justify-content:center;min-height:220px;padding:6px}
    .codePopupCard{width:min(420px,92vw);border-radius:24px;padding:18px;background:linear-gradient(180deg,rgba(18,10,35,.96),rgba(8,8,16,.98));border:1px solid rgba(196,181,253,.18);box-shadow:0 20px 60px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.03) inset;display:grid;gap:14px}
    .codePopupCard::before{content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;background:radial-gradient(circle at 50% 0%,rgba(109,40,217,.22),transparent 45%)}
    .codePopupTitle{font-family:'Fredoka One',Arial,sans-serif;font-size:1.35rem;letter-spacing:.02em;color:#efe7ff;text-align:center}
    .codeCloseBtn{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:999px;border:1px solid rgba(255,120,120,.35);background:linear-gradient(145deg,#ff5b5b,#b80000);color:#fff;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 0 #7a0000,0 10px 24px rgba(0,0,0,.25);z-index:2}
    .codeCloseBtn:hover{filter:brightness(1.05)}
    .codeCloseBtn:active{transform:translateY(1px)}
    .settingRow{display:grid;gap:14px}
    .settingCard{border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:18px}
    .settingCard h3{margin:0 0 6px;font-size:1rem;font-family:'Fredoka One',Arial,sans-serif}
    .settingCard p{margin:0 0 14px;color:#8ec8a0;font-size:.9rem}
    .rangeWrap{display:flex;align-items:center;gap:12px}
    .rangeWrap input[type="range"]{flex:1;accent-color:#3dff82;height:6px}
    .rangeValue{min-width:52px;text-align:right;font-weight:900;color:#ffd36d;font-family:'Fredoka One',Arial,sans-serif}
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
    @keyframes titleFloat{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-6px) rotate(1deg)}}
    @keyframes greenShimmer{0%,100%{color:#67ff8f;text-shadow:0 0 18px rgba(103,255,143,.7),0 12px 28px rgba(0,0,0,.28)}50%{color:#a0ffbe;text-shadow:0 0 32px rgba(103,255,143,1),0 12px 28px rgba(0,0,0,.28)}}
    @keyframes orangePulse{0%,100%{color:#ffba57;text-shadow:0 0 18px rgba(255,186,87,.7),0 12px 28px rgba(0,0,0,.28)}50%{color:#ffd98a;text-shadow:0 0 32px rgba(255,186,87,1),0 12px 28px rgba(0,0,0,.28)}}
    .title{margin:0;font-family:'Fredoka One',Arial,sans-serif;font-size:clamp(3rem,7vw,5.8rem);line-height:.9;letter-spacing:.01em;animation:titleFloat 3s ease-in-out infinite}
    .title .green{color:#67ff8f;animation:greenShimmer 2.2s ease-in-out infinite;display:inline-block}
    .title .orange{color:#ffba57;animation:orangePulse 2.2s ease-in-out infinite .4s;display:inline-block}
    .heroActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;position:relative;z-index:1}
    #overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:20;background:radial-gradient(circle at 50% 15%,rgba(61,255,130,.06),transparent 40%),rgba(0,0,0,.78);backdrop-filter:blur(2px)}
    #overlay.show{display:flex}
    .panel{width:min(1000px,96vw);max-height:min(90vh,880px);overflow:auto;border-radius:28px;background:linear-gradient(180deg,rgba(7,18,11,.99),rgba(4,12,8,.98));border:1px solid rgba(255,255,255,.09);box-shadow:0 0 0 1px rgba(61,255,130,.05) inset,0 24px 60px rgba(0,0,0,.60);padding:24px;overscroll-behavior:contain;transform:translateZ(0);contain:layout paint style;position:relative}
    .panel::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(61,255,130,.40),transparent);pointer-events:none}
    .panel,.panel *{scrollbar-width:thin;scrollbar-color:rgba(61,255,130,.15) transparent}
    .panel::-webkit-scrollbar{width:6px}
    .panel::-webkit-scrollbar-track{background:transparent}
    .panel::-webkit-scrollbar-thumb{background:rgba(61,255,130,.20);border-radius:999px}
    .panelHeader{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.06)}
    .panelHeader h2{margin:0;font-size:1.5rem;font-family:'Fredoka One',Arial,sans-serif;color:#edfff3}
    .panelHeader p{margin:3px 0 0;color:var(--muted);font-size:.88rem}
    .panelHero{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}
    .panelHeroStat{display:flex;gap:8px;flex-wrap:wrap}
    .panelHeroPill{padding:8px 14px;border-radius:999px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);font-weight:700;font-size:.88rem;letter-spacing:.01em}
    .panelHeroPill strong{color:#ffd36d}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;align-items:start}
    .card{position:relative;border-radius:22px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:14px;display:flex;flex-direction:column;gap:10px;overflow:hidden;transition:.15s border-color,.15s background;contain:layout paint style;content-visibility:auto;contain-intrinsic-size:280px}
    .card::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent);pointer-events:none}
    .card:hover{border-color:rgba(61,255,130,.20);background:rgba(255,255,255,.055)}
    .skinPreview{height:140px;border-radius:16px;background:linear-gradient(145deg,rgba(20,60,32,.90),rgba(10,30,18,.95));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
    .skinPreview::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(61,255,130,.08),transparent 60%);pointer-events:none}
    .skinPreview img{width:88px;height:88px;object-fit:cover;border-radius:16px;border:2px solid rgba(255,255,255,.20);position:relative;z-index:1;box-shadow:0 8px 24px rgba(0,0,0,.50)}
    .skinPreview .fallback{width:88px;height:88px;border-radius:16px;background:linear-gradient(145deg,rgba(255,255,255,.90),rgba(200,240,210,.70));color:#0a2512;font-size:2.2rem;font-weight:900;display:none;align-items:center;justify-content:center;position:relative;z-index:1;box-shadow:0 8px 24px rgba(0,0,0,.40)}
    .card h3{margin:0;font-size:1rem;font-weight:800;position:relative;z-index:1;color:#edfff3;letter-spacing:.01em}
    .tagRow{display:flex;gap:6px;flex-wrap:wrap;position:relative;z-index:1}
    .tag{border-radius:999px;padding:5px 12px;font-size:.78rem;font-weight:700;letter-spacing:.04em;display:inline-flex;align-items:center}
    .tag.price{background:rgba(255,211,109,.10);border:1px solid rgba(255,211,109,.35);color:#ffd36d}
    .tag.ok{background:rgba(61,255,130,.10);border:1px solid rgba(61,255,130,.30);color:#3dff82}
    .tag.lock{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);color:#7a9e86}
    .skinGlow{position:absolute;right:10px;top:10px;padding:4px 11px;border-radius:999px;font-size:.68rem;font-weight:800;z-index:2;letter-spacing:.06em;text-transform:uppercase;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .skinGlow.badge-equipped{background:rgba(40,110,255,.25);border:1px solid rgba(93,180,255,.50);color:#8dd4ff;box-shadow:0 2px 10px rgba(40,110,255,.20)}
    .skinGlow.badge-owned{background:rgba(61,255,130,.12);border:1px solid rgba(61,255,130,.30);color:#3dff82}
    .skinGlow.badge-locked{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);color:#6a8870}
    .skinGlow.badge-starter{background:rgba(255,211,109,.12);border:1px solid rgba(255,211,109,.35);color:#ffd36d}
    .skinGlow.badge-premium{background:rgba(180,100,255,.12);border:1px solid rgba(180,100,255,.30);color:#cc88ff}
    .skinNameRow{display:flex;justify-content:space-between;gap:10px;align-items:center;position:relative;z-index:1}
    .shopSub{color:#7a9e86;font-size:.88rem;line-height:1.4;min-height:2.5em;position:relative;z-index:1}
    .card .actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:auto}
    .card .actions .btn{flex:1;padding:10px 12px;font-size:.85rem}
    .card.locked{opacity:.88}
    .card.owned{border-color:rgba(61,255,130,.14)}
    .card.equipped{border-color:rgba(70,180,255,.45);background:rgba(40,100,255,.06);box-shadow:0 0 0 1px rgba(70,180,255,.12) inset}
    #shopList,#inventoryList{margin-top:12px}
    .sectionSwitch{display:flex;gap:8px;flex-wrap:wrap}
    .sectionSwitch .btn{padding:9px 14px;font-size:.85rem}
    #message{position:absolute;left:50%;top:90px;transform:translateX(-50%);padding:9px 18px;border-radius:999px;background:rgba(4,14,8,.90);color:#edfff3;border:1px solid rgba(255,255,255,.12);box-shadow:0 8px 24px rgba(0,0,0,.30);z-index:10;opacity:0;pointer-events:none;transition:.22s;max-width:min(90vw,680px);text-align:center;font-size:.92rem;font-weight:700;backdrop-filter:blur(8px)}
    #message.show{opacity:1}
    .hide{display:none !important}
    @media (max-width:780px){
      canvas{border-radius:22px}
      .menuCard,.panel{padding:18px;border-radius:24px}
      .menuStats{gap:7px}
      .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
    }
  </style>
  <style>
    @keyframes hsFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(.25) rotate(-10deg)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.34) rotate(5deg)}60%{transform:translate(-50%,-50%) scale(.92) rotate(-2deg)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.08) rotate(0deg)}}
    @keyframes hsRing{0%{opacity:.95;transform:translate(-50%,-50%) scale(.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(2.05)}}
    #hsAnim{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:9999;pointer-events:none;opacity:0;font-family:'Fredoka One',Arial,sans-serif;font-size:clamp(3.1rem,10vw,6.9rem);color:#ffd36d;text-shadow:0 0 46px rgba(255,211,109,.95),0 0 100px rgba(255,150,0,.7);white-space:nowrap;display:none;letter-spacing:.03em}
    #hsAnim::after{content:"";position:absolute;left:50%;top:50%;width:min(62vw,520px);height:min(62vw,520px);border-radius:50%;border:6px solid rgba(255,211,109,.7);transform:translate(-50%,-50%) scale(.3);opacity:0;pointer-events:none}
    #hsAnim.go{display:block;animation:hsFlash 2.15s cubic-bezier(.22,1,.36,1) forwards}
    #hsAnim.go::after{animation:hsRing 1.1s ease-out forwards}
    @keyframes coinFly{0%{opacity:0;transform:translate(0,0) scale(.55)}15%{opacity:1}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.24)}}
    .coinParticle{position:fixed;pointer-events:none;z-index:9998;font-size:1.55rem;font-family:'Fredoka One',Arial,sans-serif;color:#ffd36d;text-shadow:0 0 12px rgba(255,211,109,.95),0 0 24px rgba(255,154,46,.72);animation:coinFly 1.95s cubic-bezier(.22,1,.36,1) forwards}
  </style>
</head>
<body>
  <div id="app">
    <div id="gameWrap">
      <canvas id="game" width="720" height="960" aria-label="Flappy Wren game canvas"></canvas>
    </div>

    <div id="hud" class="hide">
      <button class="btn hide" id="menuBtn">Menu</button>
    </div>

    <div id="message"></div>
    <div id="hsAnim">🏆 NEW BEST!</div>

    <div id="menu">
      <div class="menuCard">
        <div class="titleWrap">
          <h1 class="title"><span class="green">Flappy</span> <span class="orange">Wren</span></h1>
        </div>
        <div class="menuStats">
          <div class="mStat">
            <div class="mlabel">Best</div>
            <div class="mvalue green" id="menuHighScore">0</div>
          </div>
          <div class="mStat">
            <div class="mlabel">Coins</div>
            <div class="mvalue gold" id="menuCoins">$0</div>
          </div>
          <div class="mStat">

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const dpr = Math.max(1, window.devicePixelRatio || 1);

    // ── Sound Engine ──────────────────────────────────────────────
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playTone(type, freq, dur, vol=0.18, freqEnd=null, attack=0.005, decay=null) {
      try {
        const actualVol = getSfxVolume(vol);
        if (actualVol <= 0) return;
        const ac = getAudio();
        const o = ac.createOscillator();
        const g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
        if (freqEnd !== null) o.frequency.exponentialRampToValueAtTime(freqEnd, ac.currentTime + dur);
        g.gain.setValueAtTime(0, ac.currentTime);
        g.gain.linearRampToValueAtTime(actualVol, ac.currentTime + attack);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + (decay || dur));
        o.start(ac.currentTime); o.stop(ac.currentTime + dur + 0.05);
      } catch(e) {}
    }
    function playNoise(dur, vol=0.12) {
      try {
        const actualVol = getSfxVolume(vol);
        if (actualVol <= 0) return;
        const ac = getAudio();
        const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const src = ac.createBufferSource();
        src.buffer = buf;
        const g = ac.createGain();
        src.connect(g); g.connect(ac.destination);
        g.gain.setValueAtTime(actualVol, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
        src.start(); src.stop(ac.currentTime + dur + 0.02);
      } catch(e) {}
    }
    const SFX = {
      flap()    {
        playTone('sine', 390, 0.10, 0.11, 280, 0.004, 0.09);
        playTone('triangle', 620, 0.05, 0.06, 420, 0.003, 0.05);
      },
      score()   { playTone('triangle', 660, 0.08, 0.15, 880); playTone('sine', 880, 0.1, 0.08, 1100, 0.01); },
      highScore(){ [0,85,170,255].forEach((d,i)=>setTimeout(()=>{ playTone('square',860 + i*90,0.17,0.13,1720 + i*140,0.008,0.16); },d)); },
      death()   {
        playTone('sawtooth', 260, 0.48, 0.16, 64, 0.004, 0.45);
        playTone('triangle', 120, 0.36, 0.08, 58, 0.003, 0.33);
        playNoise(0.18, 0.045);
      },
      button()  { playTone('sine', 520, 0.06, 0.08, 610, 0.004, 0.06); },
      buy()     { [0,70,140,210].forEach((d,i)=>setTimeout(()=>playTone('triangle',[520,660,830,1040][i],0.13,0.10,[660,830,1040,1320][i],0.005,0.12),d)); },
      equip()   { playTone('sine', 760, 0.13, 0.1, 940, 0.005, 0.12); playTone('triangle', 980, 0.11, 0.07, 1180, 0.005, 0.10); },
    };

    // ── High Score Animation ──────────────────────────────────────
    function showHsAnim() {
      const el = document.getElementById('hsAnim');
      el.classList.remove('go');
      void el.offsetWidth;
      el.classList.add('go');
      el.addEventListener('animationend', () => { el.classList.remove('go'); el.style.display='none'; }, { once: true });
    }

    // ── Coin Fly Animation on Death ───────────────────────────────
    function fireCoinParticles(score) {
      if (score <= 0) return;
      const coinsEl = document.getElementById('menuCoins');
      const targetRect = coinsEl ? coinsEl.getBoundingClientRect() : null;
      const tx = targetRect ? targetRect.left + targetRect.width / 2 : window.innerWidth / 2;
      const ty = targetRect ? targetRect.top + targetRect.height / 2 : 80;
      const count = Math.min(Math.max(score * 2, 18), 56);
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'coinParticle';
          el.textContent = (i % 5 === 0) ? '$2' : '$1';
          const sx = window.innerWidth / 2 + (Math.random() - .5) * 260;
          const sy = window.innerHeight / 2 + (Math.random() - .5) * 210;
          el.style.left = sx + 'px';
          el.style.top = sy + 'px';
          el.style.setProperty('--tx', (tx - sx) + 'px');
          el.style.setProperty('--ty', (ty - sy) + 'px');
          el.style.animationDelay = (Math.random() * 0.35) + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 2350);
        }, i * 45);
      }
    }

    function fitCanvas() {
      const cssW = Math.min(window.innerWidth, 720);
      const cssH = Math.min(window.innerHeight, 960);
      canvas.style.width = cssW + 'px';
      canvas.style.height = cssH + 'px';
      canvas.width = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      state.w = cssW;
      state.h = cssH;
      state.ground = Math.round(cssH * 0.16);
    }

    const STORAGE = {
      coins: 'flappyWrenCoins',
      highScore: 'flappyWrenHighScore',
      selected: 'flappyWrenSelectedSkin',
      owned: 'flappyWrenOwnedSkins',
      sfxVolume: 'flappyWrenSfxVolume',
      sfxMuted: 'flappyWrenSfxMuted',
      pipeColor: 'flappyWrenPipeColor',

      redeemedCodes: 'flappyWrenRedeemedCodes'

      orin:    { id:'orin',    name:'The Mind Of Orin',    src:'TheMindOfOrin.jpg',       price:50,              accent:'#ff9d2a' },
      potato:  { id:'potato',  name:'Potato',              src:'Potato.jpg',              price:100,             accent:'#d4a84b' },
      tiredWren:{ id:'tiredWren',name:'Tired Wren',        src:'TiredWren.jpg',           price:200,             accent:'#8fb3c9' },
      cheese:  { id:'cheese',  name:'Block of Cheese',     src:'CheeseYay.jpg',           price:250,             accent:'#ffe066' },
      scratch: { id:'scratch', name:'Scratch',             src:'Scratch.jpg',             price:300,             accent:'#f0c34a' },
      lucky:   { id:'lucky',   name:'Lucky',               src:'Lucky.jpg',               price:300,             accent:'#ffd36d' },
      wreNold: { id:'wreNold', name:'WrenIsOld',           src:'WrenIsOld.jpg',           price:300,             accent:'#a78bfa' },
      tiki:    { id:'tiki',    name:'TikiTheG',            src:'TikiTheG.jpg',            price:400,             accent:'#7cf1b4' },
      usa:     { id:'usa',     name:'USA',                 src:'Usa.jpg',                 price:500,             accent:'#60a5fa' },
      france:  { id:'france',  name:'France',              src:'France.jpg',              price:500,             accent:'#4a90d9' },
      uk:      { id:'uk',      name:'UK',                  src:'UK.jpg',                  price:500,             accent:'#cf2b2b' },
      china:   { id:'china',   name:'China',               src:'China.jpg',               price:500,             accent:'#de2910' },
      ogWrenIsOld: { id:'ogWrenIsOld', name:'OG WrenIsOld', src:'OG WrenIsOld.jpg',        price:500,             accent:'#c7a6ff' },
      underTheMatLucky: { id:'underTheMatLucky', name:'Lucky Under A Mat', src:'UnderTheMatLucky.jpg', price:600, accent:'#d6c84f' },

    };

    const imageCache = {};
    Object.values(skins).forEach(skin => {
      const img = new Image();
      img.src = skin.src;
      img.alt = skin.name;
      imageCache[skin.id] = img;
    });

    const state = {
      w: 720,
      h: 960,
      ground: 150,
      running: false,
      gameOver: false,
      started: false,
      score: 0,
      coins: Number(localStorage.getItem(STORAGE.coins) || '0'),
      highScore: Number(localStorage.getItem(STORAGE.highScore) || '0'),
      selectedSkin: localStorage.getItem(STORAGE.selected) || 'wren',
      ownedSkins: JSON.parse(localStorage.getItem(STORAGE.owned) || 'null') || ['wren'],
      pipes: [],
      ticks: 0,
      spawnTimer: 0,
      bgX: 0,
      bird: { x: 0, y: 0, vy: 0, size: 46, rot: 0, bob: 0 },
      countdown: 0,
      countdownTimer: null,
      runBestBaseline: Number(localStorage.getItem(STORAGE.highScore) || '0'),
      surpassedHighThisRun: false,
      sfxVolume: Math.max(0, Math.min(1, Number(localStorage.getItem(STORAGE.sfxVolume) || '0.75'))),
      sfxMuted: localStorage.getItem(STORAGE.sfxMuted) === '1',
      pipeColor: localStorage.getItem(STORAGE.pipeColor) || 'green',
      ownedPipes: JSON.parse(localStorage.getItem(STORAGE.ownedPipes) || 'null') || ['green'],
      redeemedCodes: JSON.parse(localStorage.getItem(STORAGE.redeemedCodes) || 'null') || []
    };

    if (!state.ownedSkins.includes(state.selectedSkin)) state.selectedSkin = 'wren';
    if (!state.ownedSkins.includes('wren')) state.ownedSkins.unshift('wren');

    function saveState() {
      localStorage.setItem(STORAGE.coins, String(state.coins));
      localStorage.setItem(STORAGE.highScore, String(state.highScore));
      localStorage.setItem(STORAGE.selected, state.selectedSkin);
      localStorage.setItem(STORAGE.owned, JSON.stringify([...new Set(state.ownedSkins)]));
      localStorage.setItem(STORAGE.sfxVolume, String(state.sfxVolume));
      localStorage.setItem(STORAGE.sfxMuted, state.sfxMuted ? '1' : '0');
      localStorage.setItem(STORAGE.pipeColor, state.pipeColor);
      localStorage.setItem(STORAGE.ownedPipes, JSON.stringify([...new Set(state.ownedPipes)]));
      localStorage.setItem(STORAGE.redeemedCodes, JSON.stringify([...new Set(state.redeemedCodes)]));
    }

    function getSfxVolume(mult = 1) {
      if (state.sfxMuted) return 0;
      return Math.max(0, Math.min(1, state.sfxVolume * mult));
    }

    function setMessage(text, ms = 1600) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(setMessage.timer);
      setMessage.timer = setTimeout(() => el.classList.remove('show'), ms);
    }

    function ownedCount() { return [...new Set(state.ownedSkins)].length; }

    function getSkin(id) { return skins[id] || skins.wren; }

    function equipSkin(id) {
      if (!state.ownedSkins.includes(id)) return false;
      state.selectedSkin = id;
      saveState();
      renderUI();
      setMessage(`${getSkin(id).name} equipped.`);
      SFX.equip();
      return true;
    }

    function buySkin(id) {
      const skin = getSkin(id);
      if (state.ownedSkins.includes(id)) return equipSkin(id);
      if (state.coins < skin.price) {
        setMessage(`Not enough coins for ${skin.name}.`);
        return false;
      }
      state.coins -= skin.price;
      state.ownedSkins.push(id);
      state.selectedSkin = id;
      saveState();
      renderUI();
      setMessage(`${skin.name} purchased and equipped!`);
      SFX.buy();
      return true;
    }

    function renderUI() {
      document.getElementById('menuHighScore').textContent = state.highScore;
      document.getElementById('menuCoins').textContent = '$' + state.coins;
      document.getElementById('menuOwned').textContent = ownedCount();
    }

    function settingsMarkup() {
      const percent = Math.round(state.sfxVolume * 100);
      return `
        <div class="panelHeader">
          <div>
            <h2>Settings</h2>
            <p>Adjust sound effects volume or mute them.</p>
          </div>
          <div class="sectionSwitch">
            <button class="btn" data-close>Close</button>
            <button class="btn orange" data-go="shop">Shop</button>
            <button class="btn primary" data-go="inventory">Inventory</button>
          </div>
        </div>
        <div class="settingRow">
          <div class="settingCard">
            <h3>Sound Effects</h3>
            <p>Change the volume for gameplay and UI sounds.</p>
            <div class="rangeWrap">
              <input id="sfxVolumeRange" type="range" min="0" max="100" value="${percent}" />
              <div class="rangeValue" id="sfxVolumeValue">${percent}%</div>
            </div>
          </div>
          <div class="settingCard">
            <h3>Mute</h3>
            <p>Turn all sound effects on or off instantly.</p>
            <button class="btn dark" id="toggleMuteBtn">${state.sfxMuted ? 'Unmute SFX' : 'Mute SFX'}</button>
          </div>
        </div>`;
    }

    function resetGame() {
      state.running = false;
      state.started = false;
      state.gameOver = false;
      state.score = 0;
      state.pipes = [];
      state.ticks = 0;
      state.spawnTimer = 0;
      state.bgX = 0;
      state.bird.x = state.w * 0.38;
      state.bird.y = state.h * 0.42;
      state.bird.vy = 0;
      state.bird.rot = 0;
      state.bird.bob = 0;
      state.countdown = 0;
      if (state.countdownTimer) { clearInterval(state.countdownTimer); state.countdownTimer = null; }
      state.runBestBaseline = state.highScore;
      state.surpassedHighThisRun = false;
      renderUI();
    }

    function startGame() {
      resetGame();
      document.getElementById('menu').style.display = 'none';
      document.getElementById('hud').classList.remove('hide');
      state.countdown = 3;
      state.countdownTimer = setInterval(() => {
        state.countdown--;
        if (state.countdown <= 0) {
          clearInterval(state.countdownTimer);
          state.countdownTimer = null;
          state.countdown = 0;
          state.running = true;
          state.started = true;
        }
      }, 1000);
    }

    function endGame() {
      if (state.gameOver) return;
      state.running = false;
      state.gameOver = true;
      const earned = state.score;
      const beatHighScore = state.score > state.runBestBaseline;
      state.highScore = Math.max(state.highScore, state.score);
      saveState();
      renderUI();
      SFX.death();
      setTimeout(() => {
        document.getElementById('menu').style.display = 'flex';
        const mc = document.querySelector('.menuCard');
        mc.style.animation = 'none'; void mc.offsetWidth; mc.style.animation = '';
        document.getElementById('hud').classList.add('hide');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            fireCoinParticles(earned);
            if (beatHighScore) {
              SFX.highScore();
              showHsAnim();
            }
          });
        });
      }, 400);
    }

    function flap() {
      if (state.countdown > 0) return;
      if (!state.running || state.gameOver) return;
      state.bird.vy = -5.8;
      state.bird.rot = -0.48;
      state.bird.flapAnim = 1.0;
      SFX.flap();
    }

    function spawnPipe() {
      const marginTop = 60;
      const marginBottom = state.ground + 90;
      const gap = Math.max(170, 220 - Math.min(80, state.score * 2));
      const adjustedGap = gap + 14;
      const minTop = 70;
      const maxTop = state.h - marginBottom - adjustedGap - minTop;
      const topH = minTop + Math.random() * Math.max(80, maxTop);
      state.pipes.push({ x: state.w + 60, topH, gap: adjustedGap, scored:false });
    }

    function drawRoundedRect(x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function drawBackground() {
      const w = state.w, h = state.h;
      const sky = ctx.createLinearGradient(0, 0, 0, h);
      sky.addColorStop(0, '#8edcff');
      sky.addColorStop(0.45, '#d7fbff');
      sky.addColorStop(0.74, '#dff6df');
      sky.addColorStop(1, '#9fe0a7');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      state.bgX = (state.bgX - 0.35) % w;
      for (let i = -1; i < 3; i++) {
        const x = i * w + state.bgX;
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        ctx.ellipse(x + 120, 110, 70, 28, 0.1, 0, Math.PI * 2);
        ctx.ellipse(x + 480, 90, 100, 36, -0.1, 0, Math.PI * 2);
        ctx.fill();
      }

      // distant hills
      ctx.fillStyle = 'rgba(18,122,54,0.25)';
      ctx.beginPath();
      ctx.moveTo(0, h * 0.68);
      ctx.quadraticCurveTo(w * 0.18, h * 0.56, w * 0.36, h * 0.68);
      ctx.quadraticCurveTo(w * 0.53, h * 0.80, w * 0.74, h * 0.66);
      ctx.quadraticCurveTo(w * 0.90, h * 0.58, w, h * 0.69);
      ctx.lineTo(w, h);
      ctx.lineTo(0, h);
      ctx.closePath();
      ctx.fill();

      // ground
      const gY = h - state.ground;
      const groundGrad = ctx.createLinearGradient(0, gY, 0, h);
      groundGrad.addColorStop(0, '#2fbf5e');
      groundGrad.addColorStop(1, '#176831');
      ctx.fillStyle = groundGrad;
      ctx.fillRect(0, gY, w, state.ground);

      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      for (let i = 0; i < w; i += 24) ctx.fillRect(i, gY + 8 + (i % 48 === 0 ? 0 : 8), 14, 4);

      // path line
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(0, gY, w, 8);
    }

    function drawPipe(pipe) {
      const pipeW = 82;
      const capW = pipeW + 18;
      const capH = 28;
      const topY = 0;
      const bottomY = pipe.topH + pipe.gap;
      const h = state.h - state.ground;
      const pc = state.pipeColor || 'green';

      // Resolve pipe colours from the colour scheme

          turquoise:{ main:'#0d9488', light:'#5eead4', dark:'#0f766e', shadow:'#134e4a', cap:'#0f766e', capTop:'#2dd4bf' },
          amber:    { main:'#d97706', light:'#fcd34d', dark:'#92400e', shadow:'#78350f', cap:'#b45309', capTop:'#fbbf24' },
          cream:    { main:'#d4c5a0', light:'#f0e8d0', dark:'#a89060', shadow:'#7a6540', cap:'#c4b080', capTop:'#e8dfc0' },
          tan:      { main:'#c4a882', light:'#dfc9a4', dark:'#9a7850', shadow:'#6b5030', cap:'#b09060', capTop:'#d0b890' },
          slate:    { main:'#475569', light:'#94a3b8', dark:'#1e293b', shadow:'#0f172a', cap:'#334155', capTop:'#64748b' },
          white:    { main:'#e8e8e8', light:'#ffffff', dark:'#c0c0c0', shadow:'#909090', cap:'#d8d8d8', capTop:'#f5f5f5' },
          black:    { main:'#1a1a1a', light:'#404040', dark:'#0a0a0a', shadow:'#000000', cap:'#222222', capTop:'#333333' },
          ruby:     { main:'#c0002a', light:'#ff3366', dark:'#800018', shadow:'#50000e', cap:'#a00022', capTop:'#ff2255', metallic:true },
          gold:     { main:'#c8960c', light:'#ffe066', dark:'#8a6400', shadow:'#5a4000', cap:'#b08010', capTop:'#ffd700', metallic:true },
          silver:   { main:'#a0a8b8', light:'#d8e0f0', dark:'#606870', shadow:'#303840', cap:'#8890a0', capTop:'#c8d0e0', metallic:true },
          bronze:   { main:'#a06030', light:'#d4904c', dark:'#703818', shadow:'#402010', cap:'#885028', capTop:'#c07840', metallic:true },
          emerald:  { main:'#046c30', light:'#22d36a', dark:'#024820', shadow:'#012010', cap:'#056a28', capTop:'#10e050', metallic:true },
          diamond:  { main:'#9be7ff', light:'#f7feff', dark:'#4db6d9', shadow:'#2d7fa1', cap:'#7ed5f3', capTop:'#ffffff', metallic:true },
        };
        return presets[scheme] || presets.green;
      }

      const C = getPipeColors(pc);

      function pipePiece(x, y, w, hgt, isTop) {
        if (hgt <= 0) return;
        // Main body gradient (left to right with highlight stripe)
        const grad = ctx.createLinearGradient(x, 0, x + w, 0);
        if (C.metallic) {
          grad.addColorStop(0,    C.shadow);
          grad.addColorStop(0.12, C.dark);
          grad.addColorStop(0.30, C.light);
          grad.addColorStop(0.50, C.main);
          grad.addColorStop(0.70, C.light);
          grad.addColorStop(0.85, C.dark);
          grad.addColorStop(1,    C.shadow);
        } else {
          grad.addColorStop(0,    C.shadow);
          grad.addColorStop(0.15, C.dark);
          grad.addColorStop(0.35, C.light);
          grad.addColorStop(0.55, C.main);
          grad.addColorStop(0.80, C.dark);
          grad.addColorStop(1,    C.shadow);
        }
        ctx.fillStyle = grad;
        // Rounded top/bottom edge only on open ends
        const r = 4;
        ctx.beginPath();
        if (isTop) {
          // top pipe: flat top, rounded at bottom opening is handled by cap
          ctx.rect(x, y, w, hgt);
        } else {
          ctx.rect(x, y, w, hgt);
        }
        ctx.fill();

        // Inner highlight stripe
        ctx.fillStyle = 'rgba(255,255,255,0.13)';
        ctx.fillRect(x + 10, y + (isTop ? 10 : 4), 10, Math.max(0, hgt - 18));

        // Right shadow stripe
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(x + w - 12, y + 4, 8, Math.max(0, hgt - 10));

        // Cap (the wider lip)
        const capX = x - (capW - w) / 2;
        const lipY = isTop ? y + hgt - capH : y;
        const capGrad = ctx.createLinearGradient(capX, 0, capX + capW, 0);
        if (C.metallic) {
          capGrad.addColorStop(0,    C.shadow);
          capGrad.addColorStop(0.15, C.dark);
          capGrad.addColorStop(0.35, C.capTop);
          capGrad.addColorStop(0.55, C.cap);
          capGrad.addColorStop(0.80, C.dark);
          capGrad.addColorStop(1,    C.shadow);
        } else {
          capGrad.addColorStop(0,    C.shadow);
          capGrad.addColorStop(0.15, C.dark);
          capGrad.addColorStop(0.38, C.capTop);
          capGrad.addColorStop(0.60, C.cap);
          capGrad.addColorStop(0.85, C.dark);
          capGrad.addColorStop(1,    C.shadow);
        }
        ctx.fillStyle = capGrad;
        const capR = 7;
        ctx.beginPath();
        if (isTop) {
          // cap at bottom of top pipe — round bottom corners
          ctx.moveTo(capX + capR, lipY);
          ctx.lineTo(capX + capW - capR, lipY);
          ctx.arcTo(capX + capW, lipY, capX + capW, lipY + capH, capR);
          ctx.arcTo(capX + capW, lipY + capH, capX, lipY + capH, capR);
          ctx.arcTo(capX, lipY + capH, capX, lipY, capR);
          ctx.arcTo(capX, lipY, capX + capW, lipY, capR);
        } else {
          // cap at top of bottom pipe — round top corners
          ctx.moveTo(capX + capR, lipY);
          ctx.arcTo(capX + capW, lipY, capX + capW, lipY + capH, capR);
          ctx.arcTo(capX + capW, lipY + capH, capX, lipY + capH, capR);
          ctx.arcTo(capX, lipY + capH, capX, lipY, capR);
          ctx.arcTo(capX, lipY, capX + capW, lipY, capR);
        }
        ctx.closePath();
        ctx.fill();

        // Cap highlight
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(capX + 8, lipY + 5, capW - 20, 5);

        // Cap shadow line
        const shadowSide = isTop ? lipY + capH - 4 : lipY;
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(capX, shadowSide, capW, 4);

        // Metallic shimmer overlay
        if (C.metallic) {
          const shimmer = ctx.createLinearGradient(x, y, x + w, y + hgt);
          shimmer.addColorStop(0, 'rgba(255,255,255,0)');
          shimmer.addColorStop(0.35, 'rgba(255,255,255,0.18)');
          shimmer.addColorStop(0.65, 'rgba(255,255,255,0)');
          ctx.fillStyle = shimmer;
          ctx.fillRect(x, y, w, hgt);
        }
      }

      // Draw outline/shadow behind pipes
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(pipe.x - 3, topY, pipeW + 6, pipe.topH + 3);
      ctx.fillRect(pipe.x - 3, bottomY - 3, pipeW + 6, h - bottomY + 3);

      pipePiece(pipe.x, topY, pipeW, pipe.topH, true);
      pipePiece(pipe.x, bottomY, pipeW, h - bottomY, false);
    }

    function drawBird() {
      const skin = getSkin(state.selectedSkin);
      const img = imageCache[skin.id];
      const x = state.bird.x;
      const y = state.bird.y;
      const size = state.bird.size; // hitbox matches this exactly
      const r = size * 0.22;        // corner radius — consistent everywhere
      const fa = state.bird.flapAnim || 0;
      const fallStretch = Math.max(0, Math.min(1, state.bird.vy / 8));
      // Keep squish/stretch very subtle so the square stays clearly square
      const scaleX = 1 + fa * 0.10 - fallStretch * 0.04;
      const scaleY = 1 - fa * 0.08 + fallStretch * 0.06;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(state.bird.rot);
      ctx.scale(scaleX, scaleY);

      const hs = size / 2; // half-size shorthand

      // ── Drop shadow (drawn before clip) ──────────────────────────
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.45)';
      ctx.shadowBlur = 20;
      ctx.shadowOffsetY = 7;
      ctx.shadowOffsetX = 2;
      drawRoundedRect(-hs, -hs, size, size, r);
      ctx.fillStyle = 'rgba(0,0,0,0.01)'; // needs a fill to trigger shadow
      ctx.fill();
      ctx.restore();

      // ── Image fill (clipped to rounded square) ───────────────────
      ctx.save();
      drawRoundedRect(-hs, -hs, size, size, r);
      ctx.clip();
      if (img && img.complete && img.naturalWidth > 0) {
        const iw = img.naturalWidth, ih = img.naturalHeight;
        const scale = Math.max(size / iw, size / ih);
        const dw = iw * scale, dh = ih * scale;
        ctx.drawImage(img, -dw / 2, -dh / 2, dw, dh);
      } else {
        // Fallback gradient block
        const grad = ctx.createLinearGradient(-hs, -hs, hs, hs);
        grad.addColorStop(0, skin.accent);
        grad.addColorStop(1, '#ffffff');
        ctx.fillStyle = grad;
        ctx.fillRect(-hs, -hs, size, size);
        ctx.fillStyle = '#14311b';
        ctx.font = `900 ${Math.round(size * 0.42)}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(skin.name.replace(/[^A-Za-z]/g,'').slice(0,1).toUpperCase() || 'W', 0, 1);
      }
      ctx.restore();

      // ── Top-left gloss highlight ──────────────────────────────────
      ctx.save();
      drawRoundedRect(-hs, -hs, size, size, r);
      ctx.clip();
      const gloss = ctx.createRadialGradient(-hs * 0.55, -hs * 0.55, 0, -hs * 0.55, -hs * 0.55, size * 0.65);
      gloss.addColorStop(0,   'rgba(255,255,255,0.45)');
      gloss.addColorStop(0.3, 'rgba(255,255,255,0.12)');
      gloss.addColorStop(1,   'rgba(255,255,255,0)');
      ctx.fillStyle = gloss;
      ctx.fillRect(-hs, -hs, size, size);
      // Bottom-right warm ambient
      const glow2 = ctx.createRadialGradient(hs * 0.55, hs * 0.55, 0, hs * 0.55, hs * 0.55, size * 0.55);
      glow2.addColorStop(0, 'rgba(255,210,80,0.22)');
      glow2.addColorStop(1, 'rgba(255,210,80,0)');
      ctx.fillStyle = glow2;
      ctx.fillRect(-hs, -hs, size, size);
      ctx.restore();

      // ── Crisp border ─────────────────────────────────────────────
      ctx.save();
      drawRoundedRect(-hs, -hs, size, size, r);
      ctx.strokeStyle = 'rgba(255,255,255,0.30)';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Inner inset border (gives depth)
      drawRoundedRect(-hs + 2, -hs + 2, size - 4, size - 4, Math.max(0, r - 2));
      ctx.strokeStyle = 'rgba(255,255,255,0.10)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();

      ctx.restore();
    }

    function hitBoxCircleRect(cx, cy, r, rx, ry, rw, rh) {
      const nx = Math.max(rx, Math.min(cx, rx + rw));
      const ny = Math.max(ry, Math.min(cy, ry + rh));
      const dx = cx - nx;
      const dy = cy - ny;
      return dx * dx + dy * dy < r * r;
    }

    function updateGame() {
      if (!state.running) return;
      state.ticks++;
      state.spawnTimer++;
      state.bgX = (state.bgX - 2.2) % state.w;

      const gravity = 0.20;
      state.bird.vy += gravity;
      state.bird.y += state.bird.vy;
      // Smooth rotation: nose down on fall, tilt back on rise
      const targetRot = state.bird.vy > 0 ? Math.min(1.3, state.bird.vy * 0.10) : Math.max(-0.5, state.bird.vy * 0.07);
      state.bird.rot += (targetRot - state.bird.rot) * 0.18;
      state.bird.bob = Math.sin(state.ticks / 12) * 1.2;
      // Flap squish/stretch anim
      if (state.bird.flapAnim === undefined) state.bird.flapAnim = 0;
      state.bird.flapAnim *= 0.82;

      if (state.spawnTimer > 106) {
        spawnPipe();
        state.spawnTimer = 0;
      }

      const speed = 1.9 + Math.min(1.2, state.score * 0.015);
      for (const pipe of state.pipes) {
        pipe.x -= speed;
        const pipeW = 82;
        // Square hitbox — inset 18% each side from the visual square for forgiving fairness
        const pad = state.bird.size * 0.18;
        const bx = state.bird.x - state.bird.size / 2 + pad;
        const by = state.bird.y - state.bird.size / 2 + pad;
        const bw = state.bird.size - pad * 2;
        const bh = state.bird.size - pad * 2;
        const topRect  = { x: pipe.x, y: 0,                    w: pipeW, h: pipe.topH };
        const botRect  = { x: pipe.x, y: pipe.topH + pipe.gap, w: pipeW, h: state.h - state.ground - (pipe.topH + pipe.gap) };
        function rectsOverlap(ax,ay,aw,ah,bx2,by2,bw2,bh2){return ax<bx2+bw2&&ax+aw>bx2&&ay<by2+bh2&&ay+ah>by2;}
        if (rectsOverlap(bx,by,bw,bh,topRect.x,topRect.y,topRect.w,topRect.h) ||
            rectsOverlap(bx,by,bw,bh,botRect.x,botRect.y,botRect.w,botRect.h)) {
          endGame();
          return;
        }
        const birdR = state.bird.size * 0.38;
        if (!pipe.scored && pipe.x + pipeW < state.bird.x - birdR) {
          pipe.scored = true;
          state.score += 1;
          state.coins += 1;
          const isNewHigh = state.score > state.highScore;
          if (state.score > state.runBestBaseline) state.surpassedHighThisRun = true;
          state.highScore = Math.max(state.highScore, state.score);
          saveState();
          renderUI();
          SFX.score(); // Keep point sound consistent for every point.
        }
      }
      state.pipes = state.pipes.filter(p => p.x > -120);

      const floorY = state.h - state.ground;
      if (state.bird.y + state.bird.size * 0.5 > floorY || state.bird.y - state.bird.size * 0.5 < 0) {
        endGame();
        return;
      }
    }

    function drawScoreOverlay() {
      if (state.countdown > 0) {
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.32)';
        ctx.fillRect(0, 0, state.w, state.h);
        ctx.fillStyle = '#fff';
        ctx.font = '900 140px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(46,224,111,0.7)';
        ctx.shadowBlur = 40;
        ctx.fillText(state.countdown, state.w / 2, state.h / 2);
        ctx.restore();
        return;
      }
      if (!state.started || state.gameOver) return;
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(0, 0, state.w, 66);
      ctx.fillStyle = '#fff';
      ctx.font = '900 32px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(state.score, state.w / 2, 42);
      if (state.surpassedHighThisRun) {
        ctx.font = '900 15px Arial';
        ctx.textAlign = 'left';
        ctx.fillStyle = '#ffd36d';
        ctx.shadowColor = 'rgba(255,211,109,0.85)';
        ctx.shadowBlur = 12;
        ctx.fillText('HIGH SCORE', state.w / 2 + 24, 40);
      }
      ctx.restore();
    }

    function render() {
      updateGame();
      ctx.clearRect(0, 0, state.w, state.h);
      drawBackground();
      for (const pipe of state.pipes) drawPipe(pipe);
      drawBird();
      drawScoreOverlay();
      requestAnimationFrame(render);
    }

    function buyPipeColor(id) {
      const pc = pipeColors.find(p => p.id === id);
      if (!pc) return;
      if (state.ownedPipes.includes(id)) { equipPipeColor(id); return; }
      if (state.coins < pc.price) { setMessage(`Not enough coins for ${pc.name} pipes.`); return; }
      state.coins -= pc.price;
      state.ownedPipes.push(id);
      state.pipeColor = id;
      saveState();
      renderUI();
      setMessage(`${pc.name} pipes purchased and equipped!`);
      SFX.buy();
      openOverlay('pipeshop');

      if (!state.ownedPipes.includes(id)) return;
      state.pipeColor = id;
      saveState();
      renderUI();
      setMessage(`${pipeColors.find(p=>p.id===id)?.name || id} pipes equipped.`);

        const isEquipped = state.selectedSkin === skin.id;
        return `
          <div class="card ${owned ? 'owned' : 'locked'} ${isEquipped ? 'equipped' : ''}">
            ${isEquipped ? `<div class="skinGlow badge-equipped">Equipped</div>` : ''}
            <div class="skinPreview">
              <img src="${skin.src}" alt="${skin.name}" loading="lazy" decoding="async" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
              <div class="fallback">${skin.name.replace(/[^A-Za-z]/g,'').slice(0,1).toUpperCase()}</div>
            </div>
            <div class="skinNameRow">
              <h3>${skin.name}</h3>
            </div>
            <div class="tagRow">
              <span class="tag ${owned || skin.free ? 'ok' : 'price'}">${status}</span>
            </div>
            <div class="actions">
              ${owned || skin.free ? `<button class="btn ${isEquipped ? 'equippedBlue' : 'primary'} equipBtn" data-equip="${skin.id}">${isEquipped ? 'Equipped' : 'Equip'}</button>` : `<button class="btn orange buyBtn" data-buy="${skin.id}" ${disabled ? 'disabled style="opacity:.55;cursor:not-allowed"' : ''}>Buy</button>`}
            </div>
          </div>`;
      }).join('');
      return `
        <div class="panelHeader">
          <div>
            <h2>Shop</h2>
            <p>Buy skins with your coins. Each point earns $1.</p>
          </div>
          <div class="sectionSwitch">
            <button class="btn" data-close>Close</button>
            <button class="btn primary" data-go="inventory">Inventory</button>
            <button class="btn" data-go="pipeshop" style="background:linear-gradient(145deg,#1c3b52,#0f2030);color:#a0e8ff;border:1px solid rgba(100,200,255,.18)">🎨 Pipes</button>
          </div>
        </div>
        <div class="panelHeroStat" style="margin-bottom:16px;display:flex;gap:10px">
          <div class="panelHeroPill">Coins: <strong>$${state.coins}</strong></div>
          <div class="panelHeroPill">Owned: <strong>${ownedCount()}</strong></div>
        </div>
        <div class="grid" id="shopList">${cards}</div>`;
    }

    function inventoryMarkup() {
      const ownedSkinCards = Object.values(skins)
        .filter(skin => state.ownedSkins.includes(skin.id))
        .map(skin => {
          const isEquipped = state.selectedSkin === skin.id;
          return `
            <div class="card owned ${isEquipped ? 'equipped' : ''}">
              ${isEquipped ? `<div class="skinGlow badge-equipped">Equipped</div>` : ''}
              <div class="skinPreview">
                <img src="${skin.src}" alt="${skin.name}" loading="lazy" decoding="async" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                <div class="fallback">${skin.name.replace(/[^A-Za-z]/g,'').slice(0,1).toUpperCase()}</div>
              </div>
              <div class="skinNameRow"><h3>${skin.name}</h3></div>
              <div class="actions">
                <button class="btn ${isEquipped ? 'equippedBlue' : 'primary'} equipBtn" data-equip="${skin.id}">${isEquipped ? 'Equipped' : 'Equip'}</button>
              </div>
            </div>`;
        }).join('');

      const ownedPipeCards = pipeColors
        .filter(pc => state.ownedPipes.includes(pc.id) || pc.free)
        .map(pc => {
          const equipped = state.pipeColor === pc.id;
          const swatch = pipeSwatchColors[pc.id] || '#2ecc52';
          return `
            <div class="card owned ${equipped ? 'equipped' : ''}">
              ${equipped ? `<div class="skinGlow badge-equipped">Equipped</div>` : ''}
              <div style="height:90px;border-radius:16px;background:linear-gradient(180deg,#a8e4f7 0%,#d4f5d0 100%);display:flex;align-items:center;justify-content:center;gap:18px;overflow:hidden;position:relative">
                <div style="width:28px;height:75px;background:${swatch};border-radius:4px 4px 0 0;box-shadow:inset 3px 0 6px rgba(255,255,255,.22),inset -3px 0 5px rgba(0,0,0,.25);position:relative">
                  <div style="position:absolute;bottom:0;left:-5px;right:-5px;height:14px;background:${swatch};filter:brightness(0.85);border-radius:3px"></div>
                </div>
                <div style="width:28px;height:75px;background:${swatch};border-radius:0 0 4px 4px;box-shadow:inset 3px 0 6px rgba(255,255,255,.22),inset -3px 0 5px rgba(0,0,0,.25);position:relative">
                  <div style="position:absolute;top:0;left:-5px;right:-5px;height:14px;background:${swatch};filter:brightness(0.85);border-radius:3px"></div>
                </div>
              </div>
              <div class="skinNameRow"><h3>${pc.name}</h3></div>
              <div class="actions">
                <button class="btn ${equipped ? 'equippedBlue' : 'primary'}" data-equippipe="${pc.id}">${equipped ? 'Equipped' : 'Equip'}</button>
              </div>
            </div>`;
        }).join('');

      return `
        <div class="panelHeader">
          <div>
            <h2>Inventory</h2>
            <p>Your unlocked skins and pipes.</p>
          </div>
          <div class="sectionSwitch">
            <button class="btn" data-close>Close</button>
            <button class="btn orange" data-go="shop">Shop</button>
            <button class="btn" data-go="pipeshop" style="background:linear-gradient(145deg,#1c3b52,#0f2030);color:#a0e8ff;border:1px solid rgba(100,200,255,.18)">🎨 Pipes</button>
          </div>
        </div>
        <div class="panelHeroStat" style="margin-bottom:16px;display:flex;gap:10px">
          <div class="panelHeroPill">Selected: <strong>${getSkin(state.selectedSkin).name}</strong></div>
          <div class="panelHeroPill">Skins: <strong>${ownedCount()}</strong></div>
        </div>
        <div class="grid" id="inventoryList">${ownedSkinCards}</div>
        <h3 style="margin:22px 0 12px;font-size:1rem;color:#a0ffc0;text-transform:uppercase;letter-spacing:.08em">🎨 Pipes</h3>
        <div class="grid">${ownedPipeCards}</div>`;
    }

    function codeMarkup() {
      return `
        <div class="codePopupShell">
          <div class="codePopupCard">
            <button class="codeCloseBtn" data-close aria-label="Close code menu">✕</button>
            <div class="codePopupTitle">Enter code</div>
            <input id="codeInput" class="codeInput" type="text" maxlength="32" placeholder="Enter code" autocomplete="off" spellcheck="false" />
            <div class="codeActionRow">
              <button class="btn primary" id="redeemCodeBtn">Redeem</button>
              <button class="btn dark" id="clearCodeBtn">Clear</button>
            </div>
          </div>
        </div>`;
    }

    function bindPanelActions(kind) {
      const overlay = document.getElementById('overlay');
      const panel = document.getElementById('panel');
      overlay.onclick = (e) => { if (e.target === overlay) closeOverlay(); };
      panel.querySelectorAll('[data-close]').forEach(btn => btn.onclick = closeOverlay);
      panel.querySelectorAll('[data-go]').forEach(btn => btn.onclick = () => openOverlay(btn.dataset.go));
      panel.querySelectorAll('[data-buy]').forEach(btn => btn.onclick = () => { if (buySkin(btn.dataset.buy)) openOverlay('shop'); });
      panel.querySelectorAll('[data-equip]').forEach(btn => btn.onclick = () => { if (equipSkin(btn.dataset.equip)) openOverlay(kind); });
      panel.querySelectorAll('[data-buypipe]').forEach(btn => btn.onclick = () => buyPipeColor(btn.dataset.buypipe));
      panel.querySelectorAll('[data-equippipe]').forEach(btn => btn.onclick = () => equipPipeColor(btn.dataset.equippipe));
      const codeInput = panel.querySelector('#codeInput');
      const redeemCodeBtn = panel.querySelector('#redeemCodeBtn');
      const clearCodeBtn = panel.querySelector('#clearCodeBtn');
      const codeCloseBtn = panel.querySelector('.codeCloseBtn');
      const redeemCode = () => {
        const code = (codeInput?.value || '').trim();
        if (!code) { setMessage('Enter a code first.'); return; }
        if (state.redeemedCodes.includes(code)) { setMessage('That code has already been used.'); return; }
        if (code !== 'Blue9998Y') { setMessage('That code is not valid.'); return; }
        state.coins += 6000;
        state.redeemedCodes.push(code);
        saveState();
        renderUI();
        setMessage('Code redeemed! +$6,000');
        SFX.buy();
        openOverlay('code');
      };
      if (redeemCodeBtn) redeemCodeBtn.onclick = redeemCode;
      if (clearCodeBtn) clearCodeBtn.onclick = () => { if (codeInput) codeInput.value = ''; codeInput.focus(); };
      if (codeCloseBtn) codeCloseBtn.onclick = () => closeOverlay();
      if (codeInput) codeInput.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') redeemCode(); });
      const volumeRange = panel.querySelector('#sfxVolumeRange');
      if (volumeRange) {
        volumeRange.oninput = () => {
          state.sfxVolume = Number(volumeRange.value) / 100;
          saveState();
          const valueEl = panel.querySelector('#sfxVolumeValue');
          if (valueEl) valueEl.textContent = Math.round(state.sfxVolume * 100) + '%';
        };
      }
      const muteBtn = panel.querySelector('#toggleMuteBtn');
      if (muteBtn) {
        muteBtn.onclick = () => {
          const wasMuted = state.sfxMuted;
          state.sfxMuted = !state.sfxMuted;
          saveState();
          muteBtn.textContent = state.sfxMuted ? 'Unmute SFX' : 'Mute SFX';
          if (wasMuted) SFX.button();
        };
      }
    }

    // Buttons
    document.getElementById('playBtn').onclick = () => startGame();
    document.getElementById('openShopBtn').onclick = () => openOverlay('shop');
    document.getElementById('openInventoryBtn').onclick = () => openOverlay('inventory');
    document.getElementById('openPipeShopBtn').onclick = () => openOverlay('pipeshop');
    document.getElementById('openSettingsBtn').onclick = () => openOverlay('settings');
    document.getElementById('openCodeBtn').onclick = () => openOverlay('code');
    document.getElementById('menuBtn').onclick = () => {
      if (state.countdownTimer) { clearInterval(state.countdownTimer); state.countdownTimer = null; }
      state.running = false;
      state.gameOver = false;
      state.countdown = 0;
      document.getElementById('menu').style.display = 'flex';
      document.getElementById('hud').classList.add('hide');
    };

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      if (btn.id === 'toggleMuteBtn') return;
      SFX.button();
    });

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }
    document.addEventListener('fullscreenchange', () => {
      document.getElementById('fullscreenBtn').textContent = document.fullscreenElement ? '⤢' : '⛶';
      requestAnimationFrame(() => fitCanvas());
    });

    window.addEventListener('resize', () => { fitCanvas(); });
    window.addEventListener('pointerdown', (e) => { if (e.target.closest('button')) return; if (document.getElementById('overlay').classList.contains('show')) return; flap(); });
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
      if (e.key === 'Escape') closeOverlay();
    });

    // Start
    fitCanvas();
    resetGame();
    renderUI();
    render();
  </script>
</body>
</html>
