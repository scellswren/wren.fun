<!DOCTYPE html>
<html>
<head>
  <title>Lucky Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #d3d3d3;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 4em;
    }

    #cat-img {
      width: 400px;        /* smaller image */
      max-width: 90%;
      border-radius: 20px;
      margin-top: 30px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    button {
      padding: 20px 40px;
      font-size: 2em;
      margin-top: 20px;
      border-radius: 20px;
      border: none;
      background-color: #f0f0f0;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: 'Poppins', sans-serif;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<h1>Lucky Generator</h1>

<img id="cat-img" src="Cat1.jpg" alt="Lucky">

<br>

<button onclick="generateCat()">Show Lucky!</button>

<script>
  const images = ["Cat1.jpg", "Cat2.jpg", "Cat3.jpg", "Cat4.jpg"];

  function generateCat() {
    const random = Math.floor(Math.random() * images.length);
    document.getElementById("cat-img").src = images[random];
  }
</script>

</body>
</html>
