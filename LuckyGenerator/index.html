<!DOCTYPE html>
<html>
<head>
  <title>Lucky Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="Favicon.png">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff; /* same as main page */
      color: black;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 50px;
      font-size: 5em;
      font-family: 'Rubik', sans-serif;
    }

    p {
      font-size: 1.5em;
      margin-bottom: 50px;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-bottom: 50px;
      flex-wrap: wrap;
    }

    .btn {
      background-color: #f0f0f0;
      color: black;
      padding: 30px 60px;
      font-size: 2.5em;
      font-family: 'Rubik', sans-serif;
      text-decoration: none;
      border-radius: 25px;
      border: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    #cat-img {
      width: 400px;
      max-width: 90%;
      border-radius: 20px;
      margin-top: 30px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    button {
      background-color: #f0f0f0;
      color: black;
      padding: 30px 60px;
      font-size: 2.5em;
      font-family: 'Rubik', sans-serif;
      border-radius: 25px;
      border: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

  </style>
</head>
<body>

<h1>Lucky Generator</h1>
<p>Vewy Cool😎</p>

<img id="cat-img" src="Cat1.jpg" alt="Lucky Cat">

<br>
<button onclick="generateCat()">Show Lucky!</button>

<script>
  const images = ["Cat1.jpg", "Cat2.jpg", "Cat3.jpg", "Cat4.jpg"];

  function generateCat() {
    const random = Math.floor(Math.random() * images.length);
    document.getElementById("cat-img").src = images[random];
  }
</script>

</body>
</html>
