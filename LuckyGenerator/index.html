<!DOCTYPE html>
<html>
<head>
  <title>Lucky Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="Favicon.png">
  <style>
    body {
      font-family: 'Rubik', sans-serif;
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin-top: 50px;
      font-size: 5em;
      font-family: 'Rubik', sans-serif;
      color: #f8fafc;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }

    .btn {
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: white;
      padding: 25px 50px;
      font-size: 2.2em;
      font-family: 'Rubik', sans-serif;
      text-decoration: none;
      border-radius: 30px;
      border: none;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn:hover {
      transform: scale(1.05) translateY(-5px);
      box-shadow: 0 0 40px rgba(56, 189, 248, 0.6);
      filter: brightness(1.1);
    }

    .btn:active {
      transform: scale(0.98);
    }

    #cat-img {
      position: relative;
      z-index: 1;
      display: none;
      width: 450px;
      max-width: 90%;
      border-radius: 30px;
      margin: 40px auto 20px;
      box-shadow: 0 0 50px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.1);
      border: 4px solid rgba(255, 255, 255, 0.1);
      transition: all 0.5s ease;
      opacity: 0;
      transform: scale(0.9);
    }

    #cat-img.show {
      opacity: 1;
      transform: scale(1);
      box-shadow: 0 0 60px rgba(56, 189, 248, 0.3), 0 0 30px rgba(168, 85, 247, 0.3);
    }

    #statusWrap {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1001;
      width: 200px;
      padding: 15px;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
    }

    #statusWrap.hidden {
      opacity: 0;
      transform: translateX(50px);
      pointer-events: none;
    }

    #counter {
      font-family: 'Rubik', sans-serif;
      font-size: 0.9em;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 10px;
    }

    #progressWrap {
      width: 100%;
      height: 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
      margin-bottom: 10px;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
      transition: width 0.3s ease;
    }

    #message {
      font-size: 0.75em;
      color: #94a3b8;
      font-weight: 500;
    }

    .footer {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-family: 'Rubik', sans-serif;
      font-size: 1.1em;
      color: rgba(255, 255, 255, 0.3);
      z-index: 1;
      letter-spacing: 2px;
    }

    #homeText {
      position: fixed;
      top: 20px;
      left: 20px;
      font-family: 'Rubik', sans-serif;
      font-size: 1.8em;
      color: white;
      text-decoration: none;
      z-index: 1000;
      transition: all 0.3s ease;
      opacity: 0.7;
    }

    #homeText:hover {
      opacity: 1;
      transform: translateX(5px);
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>

<a id="homeText" href="../index.html">Wren.fun</a>

<div id="statusWrap">
  <div id="counter">Clicks: 0 / 50</div>
  <div id="progressWrap"><div id="progressFill"></div></div>
  <div id="message">Click Show Lucky 50 times to unlock Lucky in the main menu.</div>
</div>

<h1>Lucky Generator</h1>

<img id="cat-img" alt="Lucky cat">

<br>
<button class="btn" onclick="generateCat()">Show Lucky!</button>

<div class="footer">LUCKY IS MY CAT :)</div>

<script>
  const images = [
    "Cat1.jpg","Cat2.jpg","Cat3.jpg","Cat4.jpg","Cat5.jpg",
    "Cat6.jpg","Cat7.jpg","Cat8.jpg","Cat9.jpg","Cat10.jpg",
    "Cat11.jpg","Cat12.jpg","Cat13.jpg","Cat14.jpg","Cat15.jpg",
    "Cat16.jpg","Cat17.jpg","Cat18.jpg","Cat19.jpg","Cat20.jpg",
    "Cat21.jpg","Cat22.jpg","Cat23.jpg","Cat24.jpg","Cat25.jpg",
    "Cat26.jpg","Cat27.jpg","Cat28.jpg","Cat29.jpg","Cat30.jpg",
    "Cat31.jpg","Cat32.jpg","Cat33.jpg","Cat34.jpg","Cat35.jpg",
    "Cat36.jpg","Cat37.jpg","Cat38.jpg","Cat39.jpg","Cat40.jpg"
  ];

  const VISIT_LUCKY_KEY = 'wren_visited_lucky';
  const LUCKY_CLICK_COUNT_KEY = 'wren_lucky_click_count';
  const LUCKY_THEME_UNLOCK_KEY = 'wren_theme_lucky_unlocked';

  const preloaded = [];
  images.forEach(src => {
    const img = new Image();
    img.src = src;
    preloaded.push(img);
  });

  let lastCats = [];
  let clickCount = Number(localStorage.getItem(LUCKY_CLICK_COUNT_KEY) || '0');
  let luckyUnlocked = localStorage.getItem(LUCKY_THEME_UNLOCK_KEY) === '1';

  const statusWrap = document.getElementById('statusWrap');
  const counterEl = document.getElementById('counter');
  const progressFill = document.getElementById('progressFill');
  const messageEl = document.getElementById('message');

  function updateUI() {
    const shown = Math.min(clickCount, 50);
    counterEl.textContent = `Clicks: ${shown} / 50`;
    progressFill.style.width = `${Math.min((clickCount / 50) * 100, 100)}%`;

    if (clickCount >= 50) {
      if (!luckyUnlocked) {
        messageEl.textContent = 'Lucky theme unlocked!';
      } else {
        messageEl.textContent = 'Lucky is already unlocked.';
      }
      setTimeout(() => {
        statusWrap.classList.add('hidden');
      }, 300);
    } else {
      statusWrap.classList.remove('hidden');
      messageEl.textContent = 'Click Show Lucky 50 times to unlock Lucky in the main menu.';
    }
  }

  function unlockLuckyTheme() {
    if (!luckyUnlocked && clickCount >= 50) {
      luckyUnlocked = true;
      localStorage.setItem(LUCKY_THEME_UNLOCK_KEY, '1');
      messageEl.textContent = '🐈 Lucky theme unlocked! Go back to the main menu.';
      setTimeout(() => {
        statusWrap.classList.add('hidden');
      }, 300);
    }
  }

  function generateCat() {
    clickCount += 1;
    localStorage.setItem(LUCKY_CLICK_COUNT_KEY, String(clickCount));

    let availableCats = images.filter((img, idx) => !lastCats.includes(idx));
    if (availableCats.length === 0) availableCats = images;

    const randomIdx = Math.floor(Math.random() * availableCats.length);
    const selectedCat = availableCats[randomIdx];

    const catIndex = images.indexOf(selectedCat);
    lastCats.push(catIndex);
    if (lastCats.length > 5) lastCats.shift();

    const img = document.getElementById("cat-img");
    img.classList.remove('show');
    
    // Use the preloaded image directly to ensure instant appearance
    const preloadedImg = preloaded.find(i => i.src.endsWith(selectedCat));
    if (preloadedImg && preloadedImg.complete) {
      img.src = selectedCat;
      img.style.display = 'block';
      setTimeout(() => img.classList.add('show'), 50);
    } else {
      // Fallback if not preloaded for some reason
      img.src = selectedCat;
      img.onload = () => {
        img.style.display = 'block';
        setTimeout(() => img.classList.add('show'), 50);
      };
    }

    updateUI();
    unlockLuckyTheme();
  }

  window.addEventListener('load', () => {
    localStorage.setItem(VISIT_LUCKY_KEY, '1');
    updateUI();
    if (clickCount >= 50) {
      unlockLuckyTheme();
      statusWrap.classList.add('hidden');
    }
  });
</script>

</body>
</html>
