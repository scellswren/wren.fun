<!DOCTYPE html>
<html>
<head>
  <title>Lucky Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="Favicon.png">
  <style>
    body {
      font-family: 'Rubik', sans-serif;
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin-top: 50px;
      font-size: 5em;
      font-family: 'Rubik', sans-serif;
      color: #f8fafc;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }

    .btn {
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: white;
      padding: 25px 50px;
      font-size: 2.2em;
      font-family: 'Rubik', sans-serif;
      text-decoration: none;
      border-radius: 30px;
      border: none;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn:hover {
      transform: scale(1.05) translateY(-5px);
      box-shadow: 0 0 40px rgba(56, 189, 248, 0.6);
      filter: brightness(1.1);
    }

    .btn:active {
      transform: scale(0.98);
    }

    #cat-img {
      position: relative;
      z-index: 1;
      display: none;
      width: 450px;
      max-width: 90%;
      border-radius: 30px;
      margin: 40px auto 20px;
      box-shadow: 0 0 50px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,255,0.1);
      border: 4px solid rgba(255, 255, 255, 0.1);
      transition: all 0.5s ease;
      opacity: 0;
      transform: scale(0.9);
    }

    #cat-img.show {
      opacity: 1;
      transform: scale(1);
      box-shadow: 0 0 60px rgba(56, 189, 248, 0.3), 0 0 30px rgba(168, 85, 247, 0.3);
    }

    #cat-img.gold-border {
      border: 4px solid transparent;
      border-radius: 30px;
      background-clip: padding-box;
      box-shadow:
        0 0 0 4px transparent,
        0 0 60px rgba(255, 200, 50, 0.5),
        0 0 30px rgba(255, 170, 20, 0.4);
      outline: none;
      position: relative;
    }

    #cat-img.gold-border.show {
      box-shadow:
        0 0 0 4px rgba(255,215,0,0.8),
        0 0 30px rgba(255,200,50,0.6),
        0 0 60px rgba(255,170,20,0.4),
        inset 0 0 20px rgba(255,215,0,0.1);
      border-color: #ffd700;
      animation: liquidGoldBorder 3s linear infinite;
    }

    @keyframes liquidGoldBorder {
      0%   { border-color: #ffd700; box-shadow: 0 0 0 4px #ffd700, 0 0 30px rgba(255,200,50,0.6), 0 0 60px rgba(255,170,20,0.4); }
      25%  { border-color: #ffec6e; box-shadow: 0 0 0 4px #ffec6e, 0 0 40px rgba(255,230,80,0.7), 0 0 70px rgba(255,200,40,0.5); }
      50%  { border-color: #f59e0b; box-shadow: 0 0 0 4px #f59e0b, 0 0 35px rgba(245,158,11,0.65), 0 0 65px rgba(200,140,10,0.45); }
      75%  { border-color: #fbbf24; box-shadow: 0 0 0 4px #fbbf24, 0 0 42px rgba(251,191,36,0.72), 0 0 72px rgba(220,160,20,0.5); }
      100% { border-color: #ffd700; box-shadow: 0 0 0 4px #ffd700, 0 0 30px rgba(255,200,50,0.6), 0 0 60px rgba(255,170,20,0.4); }
    }

    /* Gold background for Lucky Generator */
    body.gold-bg {
      background: radial-gradient(circle at 20% 20%, rgba(255,215,0,0.35) 0%, transparent 40%),
                  radial-gradient(circle at 80% 80%, rgba(255,165,0,0.30) 0%, transparent 40%),
                  radial-gradient(circle at 50% 50%, rgba(255,200,50,0.15) 0%, transparent 60%),
                  linear-gradient(135deg, #1a1200 0%, #3d2b00 35%, #6b4a00 65%, #2a1e00 100%) !important;
    }

    body.gold-bg::before {
      background:
        radial-gradient(circle at 20% 20%, rgba(255,215,0,0.22) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255,165,0,0.18) 0%, transparent 40%) !important;
    }

    #goldToggleBtn {
      position: fixed;
      bottom: 64px;
      right: 16px;
      z-index: 1000;
      background: linear-gradient(135deg, #ffd700, #f59e0b);
      border: none;
      border-radius: 10px;
      width: 40px;
      height: 40px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 14px rgba(255, 215, 0, 0.5);
      color: #1a1200;
      user-select: none;
      -webkit-user-select: none;
    }

    #goldToggleBtn.visible {
      display: flex;
    }

    #goldToggleBtn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 22px rgba(255, 215, 0, 0.7);
    }

    #goldToggleBtn:active {
      transform: scale(0.95);
    }

    /* Rare Lucky overlay */
    #rareLuckyOverlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      pointer-events: none;
    }

    #rareLuckyOverlay.show {
      display: flex;
      animation: rareFadeOut 5s ease forwards;
    }

    @keyframes rareFadeOut {
      0%   { opacity: 0; }
      10%  { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }

    #rareLuckyText {
      font-family: 'Rubik', sans-serif;
      font-size: 3.5em;
      font-weight: 700;
      text-align: center;
      color: #ffd700;
      text-shadow:
        0 0 20px rgba(255, 215, 0, 0.9),
        0 0 40px rgba(255, 165, 0, 0.7),
        0 0 80px rgba(255, 200, 50, 0.5),
        2px 2px 0 rgba(0,0,0,0.5);
      animation: rareTextPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      padding: 30px 60px;
      border-radius: 30px;
      background: rgba(0,0,0,0.55);
      border: 3px solid rgba(255, 215, 0, 0.6);
      backdrop-filter: blur(12px);
      max-width: 80vw;
    }

    @keyframes rareTextPop {
      0%   { transform: scale(0.4) rotate(-4deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg);    opacity: 1; }
    }

    .gold-sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      font-size: 2em;
      animation: sparkleFly 2.5s ease forwards;
    }

    @keyframes sparkleFly {
      0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-120px) scale(0.3) rotate(var(--spin)); }
    }

    #statusWrap {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1001;
      width: 200px;
      padding: 15px;
      border-radius: 20px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
    }

    #statusWrap.hidden {
      opacity: 0;
      transform: translateX(50px);
      pointer-events: none;
    }

    #counter {
      font-family: 'Rubik', sans-serif;
      font-size: 0.9em;
      font-weight: 700;
      color: #e2e8f0;
      margin-bottom: 10px;
    }

    #progressWrap {
      width: 100%;
      height: 8px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden;
      margin-bottom: 10px;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
      transition: width 0.3s ease;
    }

    #message {
      font-size: 0.75em;
      color: #94a3b8;
      font-weight: 500;
    }

    .footer {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-family: 'Rubik', sans-serif;
      font-size: 1.1em;
      color: rgba(255, 255, 255, 0.3);
      z-index: 1;
      letter-spacing: 2px;
    }

    #fullscreenBtn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(10px);
      color: white;
      user-select: none;
      -webkit-user-select: none;
    }

    #fullscreenBtn:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: scale(1.05);
    }

    #fullscreenBtn:active {
      transform: scale(0.95);
    }

    #homeText {
      position: fixed;
      top: 20px;
      left: 20px;
      font-family: 'Rubik', sans-serif;
      font-size: 1.8em;
      color: white;
      text-decoration: none;
      z-index: 1000;
      transition: all 0.3s ease;
      opacity: 0.7;
    }

    #homeText:hover {
      opacity: 1;
      transform: translateX(5px);
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    /* Secret armed indicator — subtle golden shimmer on the button */
    .btn.secret-armed {
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.6), 0 0 60px rgba(255, 165, 0, 0.3) !important;
      border: 2px solid rgba(255, 215, 0, 0.5) !important;
    }

    #secretArmedHint {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Rubik', sans-serif;
      font-size: 0.85em;
      color: rgba(255, 215, 0, 0.85);
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 100;
    }

    #secretArmedHint.visible {
      opacity: 1;
    }
  </style>
</head>
<body>

<a id="homeText" href="../index.html">Wren.fun</a>

<div id="statusWrap">
  <div id="counter">Clicks: 0 / 50</div>
  <div id="progressWrap"><div id="progressFill"></div></div>
  <div id="message">Click Show Lucky 50 times to unlock Lucky in the main menu.</div>
</div>

<h1>Lucky Generator</h1>

<img id="cat-img" alt="Lucky cat">

<br>
<button class="btn" onclick="generateCat()">Show Lucky!</button>

<button id="fullscreenBtn" onclick="toggleFullscreen()" title="Toggle Fullscreen">⛶</button>
<button id="goldToggleBtn" onclick="toggleGoldBg()" title="Toggle Gold Background">✨</button>

<div id="rareLuckyOverlay">
  <div id="rareLuckyText">⭐ YOU GOT THE RARE LUCKY! ⭐<br><span style="font-size:0.55em;display:block;margin-top:12px;color:#ffec6e;">Cat50 — 1 in 100,000 chance!</span></div>
</div>

<div class="footer">LUCKY IS MY CAT :)</div>
<div id="secretArmedHint">✨ Next click guaranteed ✨</div>

<script>
  const images = [
    "Cat1.jpg","Cat2.jpg","Cat3.jpg","Cat4.jpg","Cat5.jpg",
    "Cat6.jpg","Cat7.jpg","Cat8.jpg","Cat9.jpg","Cat10.jpg",
    "Cat11.jpg","Cat12.jpg","Cat13.jpg","Cat14.jpg","Cat15.jpg",
    "Cat16.jpg","Cat17.jpg","Cat18.jpg","Cat19.jpg","Cat20.jpg",
    "Cat21.jpg","Cat22.jpg","Cat23.jpg","Cat24.jpg","Cat25.jpg",
    "Cat26.jpg","Cat27.jpg","Cat28.jpg","Cat29.jpg","Cat30.jpg",
    "Cat31.jpg","Cat32.jpg","Cat33.jpg","Cat34.jpg","Cat35.jpg",
    "Cat36.jpg","Cat37.jpg","Cat38.jpg","Cat39.jpg","Cat40.jpg",
    "Cat41.jpg","Cat42.jpg","Cat43.jpg","Cat44.jpg","Cat45.jpg",
    "Cat46.jpg","Cat47.jpg","Cat48.jpg","Cat49.jpg","Cat51.jpg",
    "Cat52.jpg","Cat53.jpg","Cat54.jpg","Cat55.jpg"
  ];

  const VISIT_LUCKY_KEY = 'wren_visited_lucky';
  const LUCKY_CLICK_COUNT_KEY = 'wren_lucky_click_count';
  const LUCKY_THEME_UNLOCK_KEY = 'wren_theme_lucky_unlocked';
  const GOLDFIZZY_THEME_UNLOCK_KEY = 'wren_theme_goldfizzy_unlocked';
  const GOLD_BG_KEY = 'wren_lucky_gold_bg';
  const CAT50_SEEN_KEY = 'wren_lucky_cat50_seen';

  const preloaded = [];
  images.forEach(src => {
    const img = new Image();
    img.src = src;
    preloaded.push(img);
  });

  let lastCats = [];
  let clickCount = Number(localStorage.getItem(LUCKY_CLICK_COUNT_KEY) || '0');
  let luckyUnlocked = localStorage.getItem(LUCKY_THEME_UNLOCK_KEY) === '1';
  let goldBgActive = localStorage.getItem(GOLD_BG_KEY) === '1';

  function applyGoldBg() {
    if (goldBgActive) {
      document.body.classList.add('gold-bg');
    } else {
      document.body.classList.remove('gold-bg');
    }
  }

  function toggleGoldBg() {
    goldBgActive = !goldBgActive;
    localStorage.setItem(GOLD_BG_KEY, goldBgActive ? '1' : '0');
    applyGoldBg();
  }

  function showGoldToggle() {
    document.getElementById('goldToggleBtn').classList.add('visible');
  }

  function triggerRareLuckyAnimation() {
    const overlay = document.getElementById('rareLuckyOverlay');
    overlay.classList.remove('show');
    void overlay.offsetWidth;
    overlay.classList.add('show');
    setTimeout(() => overlay.classList.remove('show'), 5200);

    // Spawn gold sparkles
    const emojis = ['✨','⭐','🌟','💛','🏆','👑'];
    for (let i = 0; i < 28; i++) {
      setTimeout(() => {
        const s = document.createElement('span');
        s.className = 'gold-sparkle';
        s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        s.style.left = (Math.random() * 95) + 'vw';
        s.style.top = (Math.random() * 80 + 10) + 'vh';
        s.style.setProperty('--spin', (Math.random() * 720 - 360) + 'deg');
        s.style.fontSize = (1.2 + Math.random() * 2) + 'em';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 2600);
      }, Math.random() * 1200);
    }

    // Unlock gold bg and goldfizzy theme
    goldBgActive = true;
    localStorage.setItem(GOLD_BG_KEY, '1');
    applyGoldBg();
    showGoldToggle();

    if (localStorage.getItem(GOLDFIZZY_THEME_UNLOCK_KEY) !== '1') {
      localStorage.setItem(GOLDFIZZY_THEME_UNLOCK_KEY, '1');
    }
  }

  // ── SECRET SEQUENCE ──
  // Highlight (text-select) each of these exactly in order, holding for 10s each:
  //   Step 1: the "L" at the start of "Lucky Generator"
  //   Step 2: the "r" at the end of "Generator"
  //   Step 3: the ":)" smiley in the footer
  // Then the next Show Lucky click guarantees Cat50.

  let secretStep = 0; // 0=need L, 1=need r, 2=need :), 3=armed
  let secretHoldTimer = null;
  let secretGuaranteed = false;

  const SECRET_TARGETS = ['L', 'r', ':)'];

  function resetSecretSequence() {
    secretStep = 0;
    secretGuaranteed = false;
    if (secretHoldTimer) { clearTimeout(secretHoldTimer); secretHoldTimer = null; }
    const hint = document.getElementById('secretArmedHint');
    if (hint) hint.classList.remove('visible');
    const btn = document.querySelector('.btn');
    if (btn) btn.classList.remove('secret-armed');
  }

  document.addEventListener('selectionchange', () => {
    if (secretStep >= 3) return; // already armed

    const sel = window.getSelection();
    const selected = sel ? sel.toString() : '';
    const target = SECRET_TARGETS[secretStep];

    if (selected === target) {
      // Correct text selected — start 10s hold timer if not already running
      if (!secretHoldTimer) {
        secretHoldTimer = setTimeout(() => {
          secretHoldTimer = null;
          secretStep++;
          if (secretStep === 3) {
            secretGuaranteed = true;
            window.getSelection()?.removeAllRanges();
            const hint = document.getElementById('secretArmedHint');
            if (hint) hint.classList.add('visible');
            const btn = document.querySelector('.btn');
            if (btn) btn.classList.add('secret-armed');
            // Auto-reset after 60s if player doesn't click
            setTimeout(() => { if (secretGuaranteed) resetSecretSequence(); }, 60000);
          }
        }, 10000);
      }
    } else {
      // Selection changed away from the target — cancel the timer (don't reset steps)
      if (secretHoldTimer) {
        clearTimeout(secretHoldTimer);
        secretHoldTimer = null;
      }
    }
  });
  const counterEl = document.getElementById('counter');
  const progressFill = document.getElementById('progressFill');
  const messageEl = document.getElementById('message');

  function updateUI() {
    const shown = Math.min(clickCount, 50);
    counterEl.textContent = `Clicks: ${shown} / 50`;
    progressFill.style.width = `${Math.min((clickCount / 50) * 100, 100)}%`;

    if (clickCount >= 50) {
      if (!luckyUnlocked) {
        messageEl.textContent = 'Lucky theme unlocked!';
      } else {
        messageEl.textContent = 'Lucky is already unlocked.';
      }
      setTimeout(() => {
        statusWrap.classList.add('hidden');
      }, 300);
    } else {
      statusWrap.classList.remove('hidden');
      messageEl.textContent = 'Click Show Lucky 50 times to unlock Lucky in the main menu.';
    }
  }

  function unlockLuckyTheme() {
    if (!luckyUnlocked && clickCount >= 50) {
      luckyUnlocked = true;
      localStorage.setItem(LUCKY_THEME_UNLOCK_KEY, '1');
      messageEl.textContent = '🐈 Lucky theme unlocked! Go back to the main menu.';
      setTimeout(() => {
        statusWrap.classList.add('hidden');
      }, 300);
    }
  }

  function generateCat() {
    if (images.length === 0) return;

    clickCount += 1;
    localStorage.setItem(LUCKY_CLICK_COUNT_KEY, String(clickCount));

    const img = document.getElementById("cat-img");
    
    // Start fade out
    img.classList.remove('show');
    
    setTimeout(() => {
      let selectedCat;
      let isRareCat50 = false;

      // 1 in 100,000 chance of Cat50, or guaranteed if secret sequence completed
      if (secretGuaranteed || Math.random() < 1 / 100000) {
        selectedCat = 'Cat50.jpg';
        isRareCat50 = true;
        if (secretGuaranteed) resetSecretSequence();
      } else {
        let availableIndices = images.map((_, idx) => idx).filter(idx => !lastCats.includes(idx));
        if (availableIndices.length === 0) {
          lastCats = [];
          availableIndices = images.map((_, idx) => idx);
        }
        const randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
        selectedCat = images[randomIndex];
        lastCats.push(randomIndex);
        if (lastCats.length > 5) lastCats.shift();
      }

      // Apply/remove gold border
      if (isRareCat50) {
        img.classList.add('gold-border');
      } else {
        img.classList.remove('gold-border');
      }

      const preloadedImg = isRareCat50 ? null : preloaded.find(i => i.src.endsWith(selectedCat));
      if (!isRareCat50 && preloadedImg && preloadedImg.complete) {
        img.src = selectedCat;
        img.style.display = 'block';
        requestAnimationFrame(() => { img.classList.add('show'); });
      } else {
        img.src = selectedCat;
        img.onload = () => {
          img.style.display = 'block';
          requestAnimationFrame(() => { img.classList.add('show'); });
        };
      }

      if (isRareCat50) {
        triggerRareLuckyAnimation();
      }
      
      updateUI();
      unlockLuckyTheme();
    }, 200);
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().then(() => {
        localStorage.setItem('fullscreen_preferred', 'true');
      }).catch(err => {
        console.error(`Error attempting to enable full-screen mode: ${err.message}`);
      });
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
        localStorage.setItem('fullscreen_preferred', 'false');
      }
    }
  }

  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
      localStorage.setItem('fullscreen_preferred', 'false');
    } else {
      localStorage.setItem('fullscreen_preferred', 'true');
    }
  });

  window.addEventListener('load', () => {
    localStorage.setItem(VISIT_LUCKY_KEY, '1');
    updateUI();
    if (clickCount >= 50) {
      unlockLuckyTheme();
      statusWrap.classList.add('hidden');
    }
    applyGoldBg();
    if (localStorage.getItem(GOLDFIZZY_THEME_UNLOCK_KEY) === '1') {
      showGoldToggle();
    }
  });
</script>

</body>
</html>
