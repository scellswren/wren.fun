<!DOCTYPE html>
<html>
<head>
  <title>Lucky Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="Favicon.png">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff;
      color: black;
      text-align: center;
      margin: 0;
      padding: 0;
      position: relative;
      height: 100vh;
    }

    /* HOME TEXT */
    #homeText {
      position: absolute;
      top: 15px;
      left: 20px;
      font-family: 'Rubik', sans-serif;
      font-size: 2em;
      cursor: pointer;
      transition: transform 0.2s;
    }
    #homeText:hover {
      transform: scale(1.2);
    }

    h1 {
      margin-top: 50px;
      font-size: 5em;
      font-family: 'Rubik', sans-serif;
    }

    .btn {
      background-color: #f0f0f0;
      color: black;
      padding: 30px 60px;
      font-size: 2.5em;
      font-family: 'Rubik', sans-serif;
      text-decoration: none;
      border-radius: 25px;
      border: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      margin-top: 20px;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    #cat-img {
      display: none;
      width: 400px;
      max-width: 90%;
      border-radius: 20px;
      margin: 30px auto 0;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    /* Footer text in bottom-right corner */
    .footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-family: 'Rubik', sans-serif;
      font-size: 1.2em;
      color: #555;
    }
  </style>
</head>
<body>

<div id="homeText" onclick="goHome()">Wren.fun</div>

<h1>Lucky Generator</h1>

<img id="cat-img" alt="">

<br>
<button class="btn" onclick="generateCat()">Show Lucky!</button>

<div class="footer">LUCKY IS MY CAT :)</div>

<script>
  const images = [
    "Cat1.jpg","Cat2.jpg","Cat3.jpg","Cat4.jpg","Cat5.jpg",
    "Cat6.jpg","Cat7.jpg","Cat8.jpg","Cat9.jpg","Cat10.jpg",
    "Cat11.jpg","Cat12.jpg","Cat13.jpg","Cat14.jpg","Cat15.jpg",
    "Cat16.jpg","Cat17.jpg","Cat18.jpg","Cat19.jpg","Cat20.jpg",
    "Cat21.jpg","Cat22.jpg","Cat23.jpg","Cat24.jpg","Cat25.jpg",
    "Cat26.jpg","Cat27.jpg","Cat28.jpg","Cat29.jpg","Cat30.jpg",
    "Cat31.jpg","Cat32.jpg","Cat33.jpg","Cat34.jpg","Cat35.jpg",
    "Cat36.jpg","Cat37.jpg","Cat38.jpg","Cat39.jpg","Cat40.jpg"
  ];

  // Preload all images
  const preloaded = [];
  images.forEach(src => {
    const img = new Image();
    img.src = src;
    preloaded.push(img);
  });

  // Track last 5 cats to prevent duplicates
  let recentCats = JSON.parse(localStorage.getItem("recentCats")) || [];

  function generateCat() {
    // Filter images that are not in recentCats
    const available = images.filter(i => !recentCats.includes(i));
    let chosen;

    if (available.length === 0) {
      // if all are in cooldown, reset cooldown
      recentCats = [];
      chosen = images[Math.floor(Math.random() * images.length)];
    } else {
      chosen = available[Math.floor(Math.random() * available.length)];
    }

    // Show image
    const img = document.getElementById("cat-img");
    img.src = chosen;
    img.style.display = 'block';

    // Add to recentCats, keep max 5
    recentCats.push(chosen);
    if (recentCats.length > 5) recentCats.shift();

    localStorage.setItem("recentCats", JSON.stringify(recentCats));
  }

  function goHome() {
    window.location.href = "https://scellswren.github.io/wren.fun/";
  }
</script>

</body>
</html>
