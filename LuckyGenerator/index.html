<!DOCTYPE html>
<html>
<head>
  <title>Lucky Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="Favicon.png">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff;
      color: black;
      text-align: center;
      margin: 0;
      padding: 0;
      position: relative; /* needed for footer positioning */
      height: 100vh;
    }

    h1 {
      margin-top: 50px;
      font-size: 5em;
      font-family: 'Rubik', sans-serif;
    }

    .btn {
      background-color: #f0f0f0;
      color: black;
      padding: 30px 60px;
      font-size: 2.5em;
      font-family: 'Rubik', sans-serif;
      text-decoration: none;
      border-radius: 25px;
      border: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      margin-top: 20px;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    #cat-img {
      display: none;           /* hidden until button clicked */
      width: 400px;
      max-width: 90%;
      border-radius: 20px;
      margin: 30px auto 0;     
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      display: block;          
    }

    /* Footer text in bottom left corner */
    .footer {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-family: 'Rubik', sans-serif;
      font-size: 1.2em;
      color: #555;
    }
  </style>
</head>
<body>

<h1>Lucky Generator</h1>

<!-- Image only appears after button click -->
<img id="cat-img" alt="">

<br>
<button class="btn" onclick="generateCat()">Show Lucky!</button>

<div class="footer">Lucky is my cat</div>

<script>
  const images = [
    "Cat1.jpg", "Cat2.jpg", "Cat3.jpg", "Cat4.jpg", "Cat5.jpg",
    "Cat6.jpg", "Cat7.jpg", "Cat8.jpg", "Cat9.jpg", "Cat10.jpg",
    "Cat11.jpg", "Cat12.jpg", "Cat13.jpg", "Cat14.jpg", "Cat15.jpg",
    "Cat16.jpg", "Cat17.jpg", "Cat18.jpg", "Cat19.jpg", "Cat20.jpg",
    "Cat21.jpg", "Cat22.jpg", "Cat23.jpg", "Cat24.jpg", "Cat25.jpg",
    "Cat26.jpg", "Cat27.jpg", "Cat28.jpg", "Cat29.jpg", "Cat30.jpg",
    "Cat31.jpg", "Cat32.jpg", "Cat33.jpg", "Cat34.jpg", "Cat35.jpg",
    "Cat36.jpg", "Cat37.jpg", "Cat38.jpg", "Cat39.jpg", "Cat40.jpg"
  ];

  // Preload images
  const preloaded = [];
  images.forEach(src => {
    const img = new Image();
    img.src = src;
    preloaded.push(img);
  });

  function generateCat() {
    const random = Math.floor(Math.random() * images.length);
    const img = document.getElementById("cat-img");
    img.src = images[random];
    img.style.display = 'block';
  }
</script>

</body>
</html>
