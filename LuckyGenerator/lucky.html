<!DOCTYPE html>
<html>
<head>
  <title>Lucky Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Rubik', sans-serif;
      background-color: #fff;
      color: black;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 4em;
      margin-bottom: 30px;
    }

    #cat-img {
      max-width: 80%;
      border-radius: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      margin-bottom: 30px;
    }

    button {
      padding: 30px 60px;
      font-size: 2.5em;
      border-radius: 25px;
      border: none;
      background-color: #f0f0f0;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<h1>Lucky Generator</h1>
<img id="cat-img" src="" alt="Your Cat" />
<br>
<button onclick="generateCat()">Show Lucky!</button>

<script>
  const catPics = [
    '../images/cat1.jpg',
    '../images/cat2.jpg',
    '../images/cat3.jpg',
    '../images/cat4.jpg'
  ];

  function generateCat() {
    const randomIndex = Math.floor(Math.random() * catPics.length);
    document.getElementById('cat-img').src = catPics[randomIndex];
  }
</script>

</body>
</html>
