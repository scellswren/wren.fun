<!DOCTYPE html>
<html>
<head>
  <title>Cheese's Art</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../Favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #140700;
      --bg-2: #1b0a00;
      --card: rgba(255, 255, 255, 0.04);
      --card-hover: rgba(255, 255, 255, 0.08);
      --text: #fff4ea;
      --muted: rgba(255, 244, 234, 0.72);
      --accent: #ff9a3d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      text-align: center;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(255, 132, 0, 0.14), transparent 34%),
        radial-gradient(circle at bottom right, rgba(255, 94, 0, 0.12), transparent 32%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
    }

    body.mode-light {
      background:
        radial-gradient(circle at top left, rgba(255, 132, 0, 0.12), transparent 34%),
        radial-gradient(circle at bottom right, rgba(255, 94, 0, 0.10), transparent 32%),
        linear-gradient(180deg, #2a1200 0%, #170700 100%);
      color: var(--text);
    }

    body.mode-dark {
      background:
        radial-gradient(circle at top left, rgba(255, 132, 0, 0.14), transparent 34%),
        radial-gradient(circle at bottom right, rgba(255, 94, 0, 0.12), transparent 32%),
        linear-gradient(180deg, #1a0900 0%, #0f0500 100%);
      color: var(--text);
    }

    body.mode-rainbow {
      animation: rainbowBG 10s linear infinite;
      color: #fff;
    }

    @keyframes rainbowBG {
      0%   { background-color: #2a1200; }
      16%  { background-color: #3a1700; }
      33%  { background-color: #4a1f00; }
      50%  { background-color: #2c1600; }
      66%  { background-color: #3b1100; }
      83%  { background-color: #241000; }
      100% { background-color: #2a1200; }
    }

    body.mode-glass {
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 170, 80, 0.20) 0%, transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(255, 110, 0, 0.14) 0%, transparent 36%),
        linear-gradient(180deg, #2d1500 0%, #140700 100%);
      color: var(--text);
    }

    body.mode-lava {
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 150, 0, 0.18) 0%, transparent 35%),
        radial-gradient(circle at 80% 70%, rgba(255, 60, 0, 0.18) 0%, transparent 36%),
        linear-gradient(180deg, #2a0f00 0%, #0f0400 100%);
      color: var(--text);
    }

    body.mode-rose {
      background:
        radial-gradient(circle at 20% 25%, rgba(255, 132, 196, 0.12) 0%, transparent 34%),
        radial-gradient(circle at 80% 68%, rgba(255, 64, 160, 0.10) 0%, transparent 38%),
        linear-gradient(180deg, #221000 0%, #120600 100%);
      color: var(--text);
    }

    #homeText {
      position: fixed;
      top: 10px;
      left: 10px;
      font-family: 'Rubik', sans-serif;
      font-size: 2em;
      cursor: pointer;
      transition: transform 0.2s;
      z-index: 1000;
      user-select: none;
      opacity: 0.95;
    }

    #homeText:hover {
      transform: scale(1.15);
    }

    #content {
      position: relative;
      z-index: 1;
      padding: 58px 18px 120px;
    }

    h1 {
      margin: 34px 0 0;
      font-size: clamp(2.5em, 8vw, 5em);
      font-weight: 900;
      font-family: 'Rubik', sans-serif;
      color: var(--text);
    }

    .subtext {
      font-size: 1.15em;
      opacity: 0.78;
      margin: 10px 0 28px;
      color: var(--muted);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
      width: min(1200px, calc(100% - 24px));
      margin: 0 auto;
      padding-bottom: 40px;
    }

    .art-card {
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      background: var(--card);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      cursor: pointer;
    }

    .art-card:hover {
      transform: scale(1.03);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.26);
      background: var(--card-hover);
    }

    .art {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center;
      background: transparent;
    }

    .fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      font-weight: 700;
      font-size: 0.95em;
      line-height: 1.4;
      color: var(--muted);
    }

    footer {
      position: fixed;
      left: 0;
      bottom: 10px;
      width: 100%;
      display: flex;
      justify-content: center;
      z-index: 1000;
      pointer-events: none;
    }

    .footer-link {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 10px 16px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 0.2s, background 0.2s, opacity 0.2s;
      opacity: 0.9;
    }

    .footer-link:hover {
      transform: scale(1.04);
      background: rgba(255, 255, 255, 0.11);
      opacity: 1;
    }

    .footer-link img {
      width: 22px;
      height: 22px;
      display: block;
    }

    /* Fullscreen preview */
    #previewOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 5000;
      padding: 18px;
    }

    #previewOverlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    #previewImage {
      max-width: 96vw;
      max-height: 96vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.5);
      background: rgba(255, 255, 255, 0.02);
    }

    @media (max-width: 520px) {
      #homeText {
        font-size: 1.7em;
      }

      .gallery {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 14px;
      }

      .art-card {
        border-radius: 16px;
        padding: 8px;
      }

      footer {
        bottom: 8px;
      }

      .footer-link {
        font-size: 0.95em;
        padding: 9px 14px;
      }
    }
  </style>
</head>
<body>

<div id="homeText" onclick="goHome()">Wren.fun</div>

<div id="content">
  <h1>Cheese's Art 🧀</h1>
  <div class="subtext">Scroll down to see all 36 pieces.</div>
  <div class="gallery" id="gallery"></div>
</div>

<footer>
  <a class="footer-link" href="https://www.youtube.com/@cyatr9" target="_blank" rel="noopener noreferrer">
    <img src="youtube.png" alt="YouTube">
    Cheese's Youtube
  </a>
</footer>

<div id="previewOverlay" onclick="closePreview()">
  <img id="previewImage" alt="Art Preview">
</div>

<script>
  const MODE_KEY = 'wrenMode';
  const savedMode = localStorage.getItem(MODE_KEY) || 'light';
  document.body.className = 'mode-' + savedMode;

  function goHome() {
    window.location.href = "../index.html";
  }

  const gallery = document.getElementById('gallery');
  const previewOverlay = document.getElementById('previewOverlay');
  const previewImage = document.getElementById('previewImage');

  function openPreview(src, alt) {
    previewImage.src = src;
    previewImage.alt = alt || 'Art Preview';
    previewOverlay.classList.add('show');
  }

  function closePreview() {
    previewOverlay.classList.remove('show');
    previewImage.src = '';
  }

  for (let i = 1; i <= 36; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'art-card';

    const img = document.createElement('img');
    img.className = 'art';
    img.loading = 'lazy';
    img.alt = `Cheese Art ${i}`;

    const pngSrc = `CheeseArt${i}.png`;
    const jpgSrc = `CheeseArt${i}.jpg`;

    img.src = pngSrc;
    img.onerror = () => {
      if (img.src.endsWith('.png')) {
        img.src = jpgSrc;
      } else {
        const missing = document.createElement('div');
        missing.className = 'fallback';
        missing.textContent = `Missing file: CheeseArt${i}.png / .jpg`;
        wrap.replaceWith(missing);
      }
    };

    wrap.addEventListener('click', () => {
      openPreview(img.currentSrc || img.src, img.alt);
    });

    wrap.appendChild(img);
    gallery.appendChild(wrap);
  }
</script>

</body>
</html>
