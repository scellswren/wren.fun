<!DOCTYPE html>
<html>
<head>
  <title>Tiki Clicker</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../Favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #0e0500;
      --bg2: #1a0800;
      --accent: #ff6a00;
      --card: rgba(255,100,0,0.10);
      --card-hover: rgba(255,100,0,0.18);
      --text: #fff5ee;
      --muted: rgba(255,245,238,0.68);
      --gold: #ffb347;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; }
    body {
      font-family: 'Rubik', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(255,100,0,0.22), transparent 38%),
        radial-gradient(circle at 85% 80%, rgba(255,50,0,0.18), transparent 36%),
        radial-gradient(circle at 50% 50%, rgba(30,5,0,0.7), transparent 70%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    /* ── HOME BUTTON ── */
    #homeText {
      position: fixed; top: 12px; left: 14px;
      font-family: 'Rubik', sans-serif; font-size: 1.6em; font-weight: 900;
      cursor: pointer; transition: transform 0.18s; z-index: 1000;
      user-select: none; color: var(--text); opacity: 0.92;
      text-shadow: 0 0 18px rgba(255,100,0,0.5);
    }
    #homeText:hover { transform: scale(1.13); }

    /* ── FULLSCREEN BUTTON ── */
    #fullscreenBtn {
      position: fixed; top: 12px; right: 14px;
      background: rgba(255,100,0,0.15); border: 1px solid rgba(255,100,0,0.28);
      color: var(--text); font-size: 1.4em; width: 42px; height: 42px;
      border-radius: 10px; cursor: pointer; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.18s, transform 0.18s; backdrop-filter: blur(8px);
    }
    #fullscreenBtn:hover { background: rgba(255,100,0,0.28); transform: scale(1.08); }

    /* ══════════════════════════════════════
       SLOT SELECT SCREEN
    ══════════════════════════════════════ */
    #slotScreen {
      position: fixed; inset: 0; z-index: 800;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background:
        radial-gradient(circle at 15% 10%, rgba(255,100,0,0.22), transparent 38%),
        radial-gradient(circle at 85% 80%, rgba(255,50,0,0.18), transparent 36%),
        linear-gradient(180deg, #1a0800 0%, #0e0500 100%);
      padding: 20px;
    }
    #slotScreen h2 {
      font-size: clamp(1.8em, 6vw, 3em); font-weight: 900;
      background: linear-gradient(135deg, #ffb347, #ff6a00, #ff3a00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 18px rgba(255,100,0,0.45));
      margin-bottom: 6px;
    }
    #slotScreen .slot-sub {
      font-size: 0.95em; color: var(--muted); margin-bottom: 32px; text-align: center;
    }
    .slot-cards {
      display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
      width: 100%; max-width: 820px;
    }
    .slot-card {
      background: rgba(255,100,0,0.08);
      border: 2px solid rgba(255,100,0,0.22);
      border-radius: 20px; padding: 22px 20px;
      width: 220px; cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
      text-align: center; position: relative;
    }
    .slot-card:hover { background: rgba(255,100,0,0.18); border-color: rgba(255,100,0,0.5); transform: translateY(-4px); }
    .slot-card .slot-num {
      font-size: 2.2em; font-weight: 900; color: var(--gold);
      filter: drop-shadow(0 0 8px rgba(255,179,71,0.5));
    }
    .slot-card .slot-name {
      font-size: 0.82em; color: var(--muted); margin: 4px 0 10px;
      font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }
    .slot-card .slot-info {
      font-size: 0.88em; color: var(--text); margin-bottom: 4px; font-weight: 700;
    }
    .slot-card .slot-detail {
      font-size: 0.76em; color: var(--muted); line-height: 1.5;
    }
    .slot-card .slot-badge {
      position: absolute; top: -10px; right: 12px;
      background: linear-gradient(135deg, #ff6a00, #cc3000);
      color: #fff; font-size: 0.7em; font-weight: 900;
      padding: 3px 10px; border-radius: 999px;
      letter-spacing: 1px;
    }
    .slot-card.empty-slot { border-style: dashed; opacity: 0.75; }
    .slot-card.empty-slot:hover { opacity: 1; }
    .slot-delete-btn {
      display: inline-block; margin-top: 12px;
      background: rgba(255,50,50,0.12);
      border: 1px solid rgba(255,50,50,0.28);
      color: rgba(255,180,180,0.75);
      font-family: 'Rubik', sans-serif; font-size: 0.74em;
      padding: 5px 14px; border-radius: 999px; cursor: pointer;
      transition: background 0.15s;
    }
    .slot-delete-btn:hover { background: rgba(255,50,50,0.25); color: #ffb0b0; }

    /* ══════════════════════════════════════
       GAME SCREEN
    ══════════════════════════════════════ */
    #app {
      display: none; flex-direction: column; align-items: center;
      padding: 70px 16px 40px; min-height: 100vh;
    }
    #app.visible { display: flex; }

    h1 {
      font-size: clamp(2em, 7vw, 4em); font-weight: 900;
      background: linear-gradient(135deg, #ffb347, #ff6a00, #ff3a00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 2px; filter: drop-shadow(0 0 18px rgba(255,100,0,0.45));
    }
    #slotLabel {
      font-size: 0.85em; color: rgba(255,179,71,0.65); margin-bottom: 10px;
      font-weight: 700; letter-spacing: 1px;
    }

    /* ── COUNTER ── */
    #counterWrap { text-align: center; margin-bottom: 12px; }
    #clickCount {
      font-size: clamp(2.2em, 6vw, 3.8em); font-weight: 900; color: var(--gold);
      display: block; filter: drop-shadow(0 0 12px rgba(255,179,71,0.5));
    }
    #cpsDisplay { font-size: 0.95em; color: var(--muted); margin-top: 2px; }

    /* ── MAIN AREA ── */
    #mainArea {
      display: flex; gap: 28px; align-items: flex-start;
      justify-content: center; width: 100%; max-width: 1000px;
    }

    /* ── TIKI CIRCLE ── */
    #tikiWrap { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
    #tikiCircle {
      width: min(260px, 44vw); height: min(260px, 44vw);
      border-radius: 50%; overflow: hidden; cursor: pointer; position: relative;
      box-shadow: 0 0 0 4px rgba(255,100,0,0.35), 0 0 40px rgba(255,80,0,0.35), 0 12px 40px rgba(0,0,0,0.5);
      animation: tikiBob 2.4s ease-in-out infinite;
      transition: box-shadow 0.08s; user-select: none; -webkit-user-select: none;
    }
    #tikiCircle:active {
      transform: scale(0.93) !important;
      box-shadow: 0 0 0 4px rgba(255,100,0,0.55), 0 0 60px rgba(255,80,0,0.55), 0 6px 20px rgba(0,0,0,0.5);
      animation: none !important;
    }
    @keyframes tikiBob {
      0%   { transform: translateY(0px) rotate(-0.5deg); }
      25%  { transform: translateY(-6px) rotate(0.5deg); }
      50%  { transform: translateY(-10px) rotate(-0.5deg); }
      75%  { transform: translateY(-6px) rotate(0.5deg); }
      100% { transform: translateY(0px) rotate(-0.5deg); }
    }
    #tikiImg { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; border-radius: 50%; }
    #tikiImgFallback {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-size: 5em; background: radial-gradient(circle, #3a1200, #1a0500); border-radius: 50%;
    }
    #clickHint { margin-top: 14px; font-size: 0.9em; color: var(--muted); text-align: center; }

    /* ── CLICK PARTICLES ── */
    .click-particle {
      position: fixed; font-size: 1.1em; font-weight: 900; color: var(--gold);
      pointer-events: none; z-index: 9999; animation: floatUp 0.85s ease-out forwards;
      text-shadow: 0 0 8px rgba(255,179,71,0.8);
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(0.7); }
    }

    /* ── SHOP ── */
    #shop { flex: 1; min-width: 0; max-width: 440px; }
    #shopTitle { font-size: 1.3em; font-weight: 900; color: var(--gold); margin-bottom: 12px; text-align: center; letter-spacing: 1px; }
    .shop-section-label {
      font-size: 0.78em; font-weight: 700; color: rgba(255,179,71,0.6);
      letter-spacing: 2px; text-transform: uppercase; margin: 12px 0 6px; padding-left: 4px;
    }
    .shop-item {
      background: var(--card); border: 1px solid rgba(255,100,0,0.18);
      border-radius: 14px; padding: 12px 16px; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; transition: background 0.18s, border-color 0.18s;
    }
    .shop-item.affordable { border-color: rgba(255,100,0,0.42); }
    .shop-item.affordable:hover { background: var(--card-hover); }
    .shop-item.maxed { border-color: rgba(255,179,71,0.35); background: rgba(255,179,71,0.06); }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 700; font-size: 0.95em; color: var(--text); }
    .item-desc { font-size: 0.78em; color: var(--muted); margin-top: 2px; }
    .item-owned { font-size: 0.74em; color: var(--gold); margin-top: 2px; }
    .buy-btn {
      background: linear-gradient(145deg, #ff6a00, #cc3000); color: #fff5ee;
      border: none; border-radius: 10px; padding: 8px 14px;
      font-family: 'Rubik', sans-serif; font-weight: 700; font-size: 0.82em;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: filter 0.15s, transform 0.12s;
      box-shadow: 0 4px 14px rgba(255,80,0,0.3);
    }
    .buy-btn:hover:not(:disabled) { filter: brightness(1.14); transform: scale(1.04); }
    .buy-btn:active:not(:disabled) { transform: scale(0.96); }
    .buy-btn:disabled { background: rgba(100,50,20,0.35); color: rgba(255,245,238,0.32); cursor: not-allowed; box-shadow: none; }
    .buy-btn.maxed-btn { background: linear-gradient(145deg, #ffd060, #e09000); color: #1a0800; cursor: default; }

    /* ── BOTTOM BUTTONS ── */
    .bottom-btns { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; justify-content: center; }
    .bottom-btn {
      background: rgba(255,100,0,0.10); border: 1px solid rgba(255,100,0,0.22);
      color: rgba(255,245,238,0.7); font-family: 'Rubik', sans-serif;
      font-size: 0.82em; padding: 8px 20px; border-radius: 999px;
      cursor: pointer; transition: background 0.18s, color 0.18s;
    }
    .bottom-btn:hover { background: rgba(255,100,0,0.22); color: var(--text); }
    .bottom-btn.danger { background: rgba(255,40,40,0.10); border-color: rgba(255,40,40,0.22); color: rgba(255,180,180,0.7); }
    .bottom-btn.danger:hover { background: rgba(255,40,40,0.22); color: #ffb0b0; }

    /* ── MODALS (reset confirm + slot select) ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 900;
      background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: linear-gradient(180deg, #2a0e00 0%, #160700 100%);
      border: 1px solid rgba(255,100,0,0.35);
      border-radius: 20px; padding: 30px 28px;
      max-width: 380px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,80,0,0.1);
      text-align: center;
    }
    .modal-box h3 { font-size: 1.4em; font-weight: 900; color: var(--gold); margin-bottom: 10px; }
    .modal-box p { font-size: 0.9em; color: var(--muted); line-height: 1.5; margin-bottom: 22px; }
    .modal-actions { display: flex; gap: 12px; justify-content: center; }
    .modal-btn {
      font-family: 'Rubik', sans-serif; font-weight: 700; font-size: 0.9em;
      padding: 10px 24px; border-radius: 12px; cursor: pointer; border: none;
      transition: filter 0.15s, transform 0.12s;
    }
    .modal-btn:hover { filter: brightness(1.12); transform: scale(1.04); }
    .modal-btn.confirm { background: linear-gradient(145deg, #ff4040, #aa1010); color: #fff; }
    .modal-btn.cancel { background: rgba(255,100,0,0.15); border: 1px solid rgba(255,100,0,0.3); color: var(--text); }

    /* ── PREVIEW OVERLAY ── */
    #previewOverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 5000;
    }
    #previewOverlay.show { opacity: 1; pointer-events: auto; }
    #previewImage { max-width: 96vw; max-height: 96vh; object-fit: contain; border-radius: 50%; box-shadow: 0 18px 60px rgba(0,0,0,0.6); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,10,0,0.95); border: 1px solid rgba(255,100,0,0.35);
      color: var(--gold); font-weight: 700; padding: 10px 22px;
      border-radius: 999px; font-size: 0.92em;
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      z-index: 9000; pointer-events: none; backdrop-filter: blur(8px);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      #mainArea { flex-direction: column; align-items: center; }
      #shop { max-width: 100%; width: 100%; }
      #tikiCircle { width: min(220px, 72vw); height: min(220px, 72vw); }
      .slot-cards { gap: 12px; }
      .slot-card { width: 100%; max-width: 320px; }
    }
  </style>
</head>
<body>

<div id="homeText" onclick="goHome()">Wren.fun</div>
<button id="fullscreenBtn" title="Toggle Fullscreen">⛶</button>

<!-- ══ SLOT SELECTION SCREEN ══ -->
<div id="slotScreen">
  <h2>🗿 Tiki Clicker</h2>
  <div class="slot-sub">Choose a save slot to play in</div>
  <div class="slot-cards" id="slotCards"></div>
</div>

<!-- ══ GAME SCREEN ══ -->
<div id="app">
  <h1>🗿 Tiki Clicker</h1>
  <div id="slotLabel">SLOT 1</div>

  <div id="counterWrap">
    <span id="clickCount">0</span>
    <div id="cpsDisplay">No auto-clicks yet</div>
  </div>

  <div id="mainArea">
    <div id="tikiWrap">
      <div id="tikiCircle" onclick="handleClick(event)">
        <img id="tikiImg" src="TikiTheG.jpg" alt="Tiki the Cat"
             onerror="this.style.display='none';document.getElementById('tikiImgFallback').style.display='flex';">
        <div id="tikiImgFallback" style="display:none;">🐱</div>
      </div>
      <div id="clickHint">Click Tiki the Cat!</div>
    </div>

    <div id="shop">
      <div id="shopTitle">🛒 Tiki Shop</div>
      <div class="shop-section-label">⚙️ Auto Click</div>
      <div id="autoClickShop"></div>
      <div class="shop-section-label">✖️ Click Multiplier</div>
      <div id="multiplierShop"></div>
    </div>
  </div>

  <div class="bottom-btns">
    <button class="bottom-btn" onclick="switchSlot()">🔀 Switch Slot</button>
    <button class="bottom-btn danger" onclick="openResetModal()">🔄 Reset Progress</button>
  </div>
</div>

<!-- Reset Confirm Modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal-box">
    <h3>⚠️ Reset Progress?</h3>
    <p>This will wipe all your Tiki Clicks, upgrades, and auto-clickers for this slot. This <strong>cannot be undone!</strong></p>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeResetModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="doReset()">Yes, Reset!</button>
    </div>
  </div>
</div>

<!-- Preview overlay -->
<div id="previewOverlay" onclick="closePreview()">
  <img id="previewImage" alt="Tiki the Cat">
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════
//  GAME DATA
// ══════════════════════════════════════════

// Auto-click intervals halved from original (4s→2s, 3s→1.5s, etc.)
const AUTO_LEVELS = [
  { level:1, label:'Auto Click Lv.1', interval:2000,  cost:100   },
  { level:2, label:'Auto Click Lv.2', interval:1500,  cost:200   },
  { level:3, label:'Auto Click Lv.3', interval:1000,  cost:300   },
  { level:4, label:'Auto Click Lv.4', interval:500,   cost:500   },
  { level:5, label:'Auto Click Lv.5', interval:250,   cost:750   },
  { level:6, label:'Auto Click Lv.6', interval:125,   cost:2000  },
  { level:7, label:'Auto Click Lv.7', interval:50,    cost:4000  },
  { level:8, label:'Auto Click Lv.8', interval:25,    cost:10000 },
];

// Multiplier prices doubled from original
const MULT_LEVELS = [
  { level:2,  label:'x2 Clicks',  cost:1000   },
  { level:3,  label:'x3 Clicks',  cost:2400   },
  { level:4,  label:'x4 Clicks',  cost:5000   },
  { level:5,  label:'x5 Clicks',  cost:10000  },
  { level:10, label:'x10 Clicks', cost:24000  },
  { level:20, label:'x20 Clicks', cost:60000  },
  { level:50, label:'x50 Clicks', cost:200000 },
];

const SLOT_NAMES = ['Slot 1', 'Slot 2', 'Slot 3'];
const SAVE_PREFIX = 'tikiClicker_slot_';

// ══════════════════════════════════════════
//  SAVE / LOAD
// ══════════════════════════════════════════

let currentSlot = null; // 0, 1, or 2

function slotKey(idx) { return SAVE_PREFIX + idx; }

function emptyState() {
  return { clicks: 0, autoLevel: 0, multLevel: 1, multPurchased: 0 };
}

function loadSlot(idx) {
  try {
    const raw = localStorage.getItem(slotKey(idx));
    if (raw) {
      const s = JSON.parse(raw);
      return {
        clicks:        Number(s.clicks)        || 0,
        autoLevel:     Number(s.autoLevel)     || 0,
        multLevel:     Number(s.multLevel)     || 1,
        multPurchased: Number(s.multPurchased) || 0,
      };
    }
  } catch(e) {}
  return null; // null = slot is empty
}

function saveCurrentSlot() {
  if (currentSlot === null) return;
  localStorage.setItem(slotKey(currentSlot), JSON.stringify(state));
}

function deleteSlot(idx) {
  localStorage.removeItem(slotKey(idx));
}

function slotSummary(idx) {
  const s = loadSlot(idx);
  if (!s) return null;
  return s;
}

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════

let state = emptyState();
let autoTimer = null;

// ══════════════════════════════════════════
//  SLOT SCREEN
// ══════════════════════════════════════════

function renderSlotScreen() {
  const container = document.getElementById('slotCards');
  container.innerHTML = '';

  SLOT_NAMES.forEach((name, idx) => {
    const saved = slotSummary(idx);
    const card = document.createElement('div');
    card.className = 'slot-card' + (saved ? '' : ' empty-slot');

    if (saved) {
      const cps = calcCPS(saved);
      card.innerHTML = `
        <div class="slot-num">🗿</div>
        <div class="slot-name">${name}</div>
        <div class="slot-info">${formatNum(saved.clicks)} Clicks</div>
        <div class="slot-detail">
          Auto Lv.${saved.autoLevel || 0} &nbsp;·&nbsp; x${saved.multLevel || 1} Multiplier<br>
          ${cps > 0 ? cps.toFixed(cps < 1 ? 2 : 1) + ' CPS' : 'No auto-clicks'}
        </div>
        <button class="slot-delete-btn" onclick="confirmDeleteSlot(event, ${idx})">🗑 Delete</button>`;
    } else {
      card.innerHTML = `
        <div class="slot-num">➕</div>
        <div class="slot-name">${name}</div>
        <div class="slot-detail">Empty — start a new game!</div>`;
    }

    card.addEventListener('click', e => {
      if (e.target.classList.contains('slot-delete-btn')) return;
      enterSlot(idx);
    });

    container.appendChild(card);
  });
}

function confirmDeleteSlot(e, idx) {
  e.stopPropagation();
  if (confirm(`Delete ${SLOT_NAMES[idx]}? All progress will be lost!`)) {
    deleteSlot(idx);
    renderSlotScreen();
    showToast('🗑 ' + SLOT_NAMES[idx] + ' deleted.');
  }
}

function enterSlot(idx) {
  const saved = loadSlot(idx);
  currentSlot = idx;
  state = saved ? saved : emptyState();
  // Update slot label
  document.getElementById('slotLabel').textContent = SLOT_NAMES[idx].toUpperCase();
  // Switch screens
  document.getElementById('slotScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  startAutoClick();
  updateDisplay();
}

function switchSlot() {
  saveCurrentSlot();
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  currentSlot = null;
  document.getElementById('slotScreen').style.display = '';
  document.getElementById('app').classList.remove('visible');
  renderSlotScreen();
}

// ══════════════════════════════════════════
//  AUTO-CLICK
// ══════════════════════════════════════════

function calcCPS(s) {
  if (!s.autoLevel || s.autoLevel === 0) return 0;
  const lvl = AUTO_LEVELS[s.autoLevel - 1];
  return (1 * (s.multLevel || 1)) / (lvl.interval / 1000);
}

function getAutoClicksPerSecond() { return calcCPS(state); }

function startAutoClick() {
  if (autoTimer) clearInterval(autoTimer);
  if (!state.autoLevel) return;
  const lvl = AUTO_LEVELS[state.autoLevel - 1];
  autoTimer = setInterval(() => {
    state.clicks += state.multLevel;
    saveCurrentSlot();
    updateDisplay();
  }, lvl.interval);
}

// ══════════════════════════════════════════
//  DISPLAY
// ══════════════════════════════════════════

function formatNum(n) {
  n = Math.floor(n);
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function fmtInterval(ms) {
  if (ms >= 1000) return (ms/1000) + 's';
  return ms + 'ms';
}

function updateDisplay() {
  document.getElementById('clickCount').textContent = formatNum(state.clicks);
  const cps = getAutoClicksPerSecond();
  document.getElementById('cpsDisplay').textContent =
    cps === 0 ? 'No auto-clicks yet' :
    (cps % 1 === 0 ? cps : cps.toFixed(2)) + ' clicks per second';
  renderShop();
}

// ══════════════════════════════════════════
//  CLICKING
// ══════════════════════════════════════════

function handleClick(e) {
  const gain = state.multLevel;
  state.clicks += gain;
  saveCurrentSlot();
  updateDisplay();
  spawnParticle(e, '+' + gain);
  // Bounce animation
  const circle = document.getElementById('tikiCircle');
  circle.style.animation = 'none';
  void circle.offsetWidth; // reflow
  setTimeout(() => { circle.style.animation = ''; }, 80);
}

function spawnParticle(e, text) {
  const p = document.createElement('div');
  p.className = 'click-particle';
  p.textContent = text;
  p.style.left = (e.clientX + (Math.random() - 0.5) * 30 - 10) + 'px';
  p.style.top  = (e.clientY - 10) + 'px';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 900);
}

// ══════════════════════════════════════════
//  SHOP RENDER
// ══════════════════════════════════════════

function renderShop() {
  renderAutoShop();
  renderMultShop();
}

function renderAutoShop() {
  const el = document.getElementById('autoClickShop');
  el.innerHTML = '';
  const nextLevel = state.autoLevel + 1;

  if (state.autoLevel > 0) {
    const owned = AUTO_LEVELS[state.autoLevel - 1];
    el.innerHTML += `<div class="shop-item maxed">
      <div class="item-info">
        <div class="item-name">⚙️ ${owned.label}</div>
        <div class="item-desc">Auto-clicks every ${fmtInterval(owned.interval)}</div>
        <div class="item-owned">✅ Owned</div>
      </div>
      <button class="buy-btn maxed-btn" disabled>Owned</button>
    </div>`;
  }

  if (nextLevel <= AUTO_LEVELS.length) {
    const next = AUTO_LEVELS[nextLevel - 1];
    const can = state.clicks >= next.cost;
    el.innerHTML += `<div class="shop-item${can ? ' affordable' : ''}">
      <div class="item-info">
        <div class="item-name">⚙️ ${next.label}</div>
        <div class="item-desc">Auto-clicks every ${fmtInterval(next.interval)}</div>
        <div class="item-desc">Cost: 🗿 ${next.cost.toLocaleString()} clicks</div>
      </div>
      <button class="buy-btn" ${can ? '' : 'disabled'} onclick="buyAuto()">Buy</button>
    </div>`;
  } else {
    el.innerHTML += `<div class="shop-item maxed">
      <div class="item-info">
        <div class="item-name">⚙️ Max Auto-Click!</div>
        <div class="item-desc">You've reached the maximum speed — every 25ms!</div>
      </div>
      <button class="buy-btn maxed-btn" disabled>MAX</button>
    </div>`;
  }
}

function renderMultShop() {
  const el = document.getElementById('multiplierShop');
  el.innerHTML = '';
  const nextIdx = state.multPurchased;

  if (state.multLevel > 1) {
    el.innerHTML += `<div class="shop-item maxed">
      <div class="item-info">
        <div class="item-name">✖️ x${state.multLevel} Multiplier</div>
        <div class="item-desc">Each click gives ${state.multLevel} Tiki Clicks</div>
        <div class="item-owned">✅ Active</div>
      </div>
      <button class="buy-btn maxed-btn" disabled>Active</button>
    </div>`;
  }

  if (nextIdx < MULT_LEVELS.length) {
    const next = MULT_LEVELS[nextIdx];
    const can = state.clicks >= next.cost;
    el.innerHTML += `<div class="shop-item${can ? ' affordable' : ''}">
      <div class="item-info">
        <div class="item-name">✖️ ${next.label}</div>
        <div class="item-desc">Each click gives ${next.level} Tiki Clicks</div>
        <div class="item-desc">Cost: 🗿 ${next.cost.toLocaleString()} clicks</div>
      </div>
      <button class="buy-btn" ${can ? '' : 'disabled'} onclick="buyMult()">Buy</button>
    </div>`;
  } else {
    el.innerHTML += `<div class="shop-item maxed">
      <div class="item-info">
        <div class="item-name">✖️ Max Multiplier!</div>
        <div class="item-desc">x50 — Maximum power achieved! 🐱</div>
      </div>
      <button class="buy-btn maxed-btn" disabled>MAX</button>
    </div>`;
  }
}

// ══════════════════════════════════════════
//  PURCHASES
// ══════════════════════════════════════════

function buyAuto() {
  const nextLevel = state.autoLevel + 1;
  if (nextLevel > AUTO_LEVELS.length) return;
  const cost = AUTO_LEVELS[nextLevel - 1].cost;
  if (state.clicks < cost) return;
  state.clicks -= cost;
  state.autoLevel = nextLevel;
  saveCurrentSlot();
  startAutoClick();
  updateDisplay();
  showToast('⚙️ Auto Click Lv.' + nextLevel + ' unlocked!');
}

function buyMult() {
  const nextIdx = state.multPurchased;
  if (nextIdx >= MULT_LEVELS.length) return;
  const next = MULT_LEVELS[nextIdx];
  if (state.clicks < next.cost) return;
  state.clicks -= next.cost;
  state.multLevel = next.level;
  state.multPurchased = nextIdx + 1;
  saveCurrentSlot();
  startAutoClick();
  updateDisplay();
  showToast('✖️ ' + next.label + ' activated!');
}

// ══════════════════════════════════════════
//  RESET MODAL
// ══════════════════════════════════════════

function openResetModal() {
  document.getElementById('resetModal').classList.add('open');
}
function closeResetModal() {
  document.getElementById('resetModal').classList.remove('open');
}
function doReset() {
  closeResetModal();
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  state = emptyState();
  saveCurrentSlot();
  updateDisplay();
  showToast('🔄 Progress reset!');
}

// Close modal on backdrop click
document.getElementById('resetModal').addEventListener('click', function(e) {
  if (e.target === this) closeResetModal();
});

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════
//  FULLSCREEN
// ══════════════════════════════════════════

const fullscreenBtn = document.getElementById('fullscreenBtn');
function isFullscreen() { return !!(document.fullscreenElement || document.webkitFullscreenElement); }
function updateFullscreenButton() { fullscreenBtn.title = isFullscreen() ? 'Exit Fullscreen' : 'Toggle Fullscreen'; }
function toggleFullscreen() {
  if (isFullscreen()) {
    (document.exitFullscreen || document.webkitExitFullscreen || (()=>{})).call(document);
  } else {
    const el = document.documentElement;
    (el.requestFullscreen || el.webkitRequestFullscreen || (()=>{})).call(el);
  }
}
fullscreenBtn.addEventListener('click', toggleFullscreen);
document.addEventListener('fullscreenchange', updateFullscreenButton);
document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
updateFullscreenButton();

// ══════════════════════════════════════════
//  PREVIEW (right-click / long-press Tiki)
// ══════════════════════════════════════════

const previewOverlay = document.getElementById('previewOverlay');
const previewImage   = document.getElementById('previewImage');
let longPressTimer   = null;

document.getElementById('tikiCircle').addEventListener('contextmenu', e => {
  e.preventDefault(); openPreview();
});
document.getElementById('tikiCircle').addEventListener('touchstart', () => {
  longPressTimer = setTimeout(openPreview, 600);
}, { passive: true });
document.getElementById('tikiCircle').addEventListener('touchend', () => {
  clearTimeout(longPressTimer);
});
function openPreview() {
  previewImage.src = 'TikiTheG.jpg';
  previewOverlay.classList.add('show');
}
function closePreview() {
  previewOverlay.classList.remove('show');
  previewImage.src = '';
}

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════

function goHome() { window.location.href = '../index.html'; }

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════

// Show slot screen on load
renderSlotScreen();

// Poll shop affordability every 500ms
setInterval(() => {
  if (currentSlot !== null) renderShop();
}, 500);
</script>
