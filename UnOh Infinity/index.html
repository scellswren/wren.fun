<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnOh Infinity</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --red: #FF3B3B;
  --blue: #2B7FFF;
  --yellow: #FFD600;
  --green: #22D46B;
  --purple: #A855F7;
  --wild: #1a1a2e;
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #252540;
  --text: #f0f0ff;
  --muted: rgba(240,240,255,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); }

/* BACKGROUND */
#bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* SCREENS */
.screen { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.screen.hidden { display: none; }

/* ===== MENU SCREEN ===== */
#menu-screen { background: transparent; gap: 20px; }
.menu-logo { font-family: 'Fredoka One', cursive; font-size: clamp(2.5em, 8vw, 5.5em); background: linear-gradient(135deg, #FF3B3B, #FFD600, #22D46B, #2B7FFF, #A855F7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 30px rgba(168,85,247,0.4)); text-align: center; animation: logoFloat 3s ease-in-out infinite; }
@keyframes logoFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.menu-sub { color: var(--muted); font-size: 1.1em; font-weight: 600; margin-top: -10px; margin-bottom: 10px; }
.wins-badge { background: linear-gradient(135deg, rgba(255,214,0,0.15), rgba(255,214,0,0.05)); border: 1px solid rgba(255,214,0,0.3); border-radius: 50px; padding: 8px 22px; font-size: 0.95em; font-weight: 800; color: #FFD600; display: flex; align-items: center; gap: 8px; }

.bot-select-label { font-weight: 800; font-size: 1.05em; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.bot-btns { display: flex; gap: 12px; }
.bot-btn { padding: 12px 28px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: var(--text); font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1em; cursor: pointer; transition: all 0.2s; }
.bot-btn:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
.bot-btn.selected { background: linear-gradient(135deg, #A855F7, #6366f1); border-color: #A855F7; box-shadow: 0 0 20px rgba(168,85,247,0.5); transform: translateY(-2px); }

.play-btn { padding: 18px 60px; border-radius: 60px; border: none; background: linear-gradient(135deg, #FF3B3B 0%, #A855F7 50%, #2B7FFF 100%); color: white; font-family: 'Fredoka One', cursive; font-size: 1.5em; cursor: pointer; box-shadow: 0 8px 40px rgba(168,85,247,0.5); transition: all 0.2s; letter-spacing: 1px; margin-top: 8px; }
.play-btn:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 12px 50px rgba(168,85,247,0.7); }
.play-btn:active { transform: scale(0.97); }

.back-link { position: fixed; top: 16px; left: 16px; z-index: 100; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 8px 16px; font-weight: 800; font-size: 0.9em; text-decoration: none; color: var(--text); cursor: pointer; transition: all 0.2s; backdrop-filter: blur(10px); }
.back-link:hover { background: rgba(255,255,255,0.15); transform: translateX(-2px); }

.fullscreen-btn { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 1.2em; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(10px); }
.fullscreen-btn:hover { background: rgba(255,255,255,0.15); }

/* ===== GAME SCREEN ===== */
#game-screen { background: transparent; padding: 0; justify-content: space-between; }

/* Opponent areas */
.opponents-area { width: 100%; display: flex; justify-content: center; gap: 20px; padding: 8px 12px 4px; z-index: 2; flex-wrap: wrap; }
.opponent-zone { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 120px; }
.opp-name { font-weight: 800; font-size: 0.85em; padding: 4px 12px; border-radius: 20px; background: rgba(255,255,255,0.08); }
.opp-cards { display: flex; gap: -6px; position: relative; height: 64px; min-width: 60px; justify-content: center; align-items: flex-end; }
.opp-card-mini { width: 40px; height: 58px; border-radius: 7px; background: linear-gradient(135deg, #1a1a2e, #252540); border: 2px solid rgba(255,255,255,0.2); margin-left: -12px; box-shadow: 2px 2px 8px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; font-size: 1.2em; }
.opp-card-mini:first-child { margin-left: 0; }
.opp-info { display: flex; align-items: center; gap: 8px; font-size: 0.8em; color: var(--muted); }
.turn-indicator { width: 10px; height: 10px; border-radius: 50%; background: #22D46B; box-shadow: 0 0 8px #22D46B; animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.7} }

/* Center area */
.center-area { flex: 1; display: flex; align-items: center; justify-content: center; gap: 30px; width: 100%; padding: 0 20px; position: relative; }

.deck-zone { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.deck-pile { width: 72px; height: 100px; border-radius: 12px; background: linear-gradient(135deg, #1a1a2e 0%, #2d2d5e 100%); border: 3px solid rgba(255,255,255,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2em; position: relative; transition: all 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.5); user-select: none; }
.deck-pile:hover { transform: translateY(-4px) scale(1.05); border-color: rgba(255,255,255,0.5); box-shadow: 0 8px 30px rgba(168,85,247,0.4); }
.deck-pile:hover::after { content: 'DRAW'; position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); font-size: 0.5em; font-weight: 800; color: var(--muted); white-space: nowrap; }
.deck-count { font-size: 0.8em; font-weight: 800; color: var(--muted); }

/* Discard pile */
.discard-zone { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.discard-pile { width: 80px; height: 112px; border-radius: 14px; display: flex; align-items: center; justify-content: center; position: relative; box-shadow: 0 8px 30px rgba(0,0,0,0.5); transition: all 0.3s; }
.discard-label { font-size: 0.75em; font-weight: 800; color: var(--muted); }

/* THE CARD */
.game-card { width: 80px; height: 112px; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Fredoka One', cursive; font-size: 1.6em; font-weight: 400; position: relative; border: 3px solid rgba(255,255,255,0.3); box-shadow: 0 4px 15px rgba(0,0,0,0.4); transition: all 0.15s; cursor: default; user-select: none; overflow: hidden; }
.game-card::before { content: ''; position: absolute; inset: 6px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.25); pointer-events: none; }
.game-card .card-tl { position: absolute; top: 6px; left: 8px; font-size: 0.5em; line-height: 1; text-align: center; }
.game-card .card-br { position: absolute; bottom: 6px; right: 8px; font-size: 0.5em; line-height: 1; transform: rotate(180deg); text-align: center; }
.game-card .card-center { font-size: 1em; z-index: 1; text-align: center; line-height: 1.1; }

/* Color classes */
.card-red { background: linear-gradient(145deg, #c82020, #FF3B3B); color: white; }
.card-blue { background: linear-gradient(145deg, #1450c8, #2B7FFF); color: white; }
.card-yellow { background: linear-gradient(145deg, #c8a000, #FFD600); color: #1a1200; }
.card-green { background: linear-gradient(145deg, #148040, #22D46B); color: white; }
.card-purple { background: linear-gradient(145deg, #6020a8, #A855F7); color: white; }
.card-wild { background: linear-gradient(145deg, #1a1a2e, #2d2d5e); color: white; border-color: rgba(255,255,255,0.4) !important; }
.card-wild::after { content: ''; position: absolute; inset: 0; background: conic-gradient(from 0deg, #FF3B3B 0deg 72deg, #FFD600 72deg 144deg, #22D46B 144deg 216deg, #2B7FFF 216deg 288deg, #A855F7 288deg 360deg); opacity: 0.3; border-radius: 11px; z-index: 0; }

/* Player hand */
.player-area { width: 100%; padding: 8px 12px 12px; position: relative; z-index: 2; }
.player-info { display: flex; align-items: center; justify-content: space-between; padding: 0 4px 6px; }
.player-name { font-weight: 800; font-size: 0.95em; display: flex; align-items: center; gap: 8px; }
.uno-btn { padding: 6px 18px; border-radius: 20px; background: linear-gradient(135deg, #FF3B3B, #ff6b35); border: none; color: white; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 0.85em; cursor: pointer; opacity: 0; transition: all 0.3s; transform: scale(0.8); }
.uno-btn.visible { opacity: 1; transform: scale(1); animation: unoPulse 0.5s ease-out; }
@keyframes unoPulse { 0%{transform:scale(1.5)} 100%{transform:scale(1)} }
.hand-container { display: flex; overflow-x: auto; gap: 0; padding: 8px 4px 4px; scrollbar-width: none; justify-content: center; flex-wrap: nowrap; }
.hand-container::-webkit-scrollbar { display: none; }
.hand-card { width: 72px; height: 100px; border-radius: 12px; margin-left: -18px; flex-shrink: 0; cursor: pointer; transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s; position: relative; z-index: 1; }
.hand-card:first-child { margin-left: 0; }
.hand-card:hover { z-index: 10 !important; }
.hand-card.playable { box-shadow: 0 0 0 3px white, 0 0 20px rgba(255,255,255,0.6); animation: glowPulse 1.5s ease-in-out infinite; }
@keyframes glowPulse { 0%,100%{box-shadow:0 0 0 3px white, 0 0 15px rgba(255,255,255,0.5)} 50%{box-shadow:0 0 0 3px white, 0 0 30px rgba(255,255,255,0.9)} }
.hand-card.playable:hover { transform: translateY(-22px) scale(1.08) !important; z-index: 20 !important; }
.hand-card:not(.playable):hover { transform: translateY(-12px); }
.hand-card.not-playable { opacity: 0.6; cursor: not-allowed; }
.hand-card.not-playable:hover { transform: translateY(-6px) !important; }

/* Status / message */
.status-bar { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 50; pointer-events: none; }
.status-msg { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 14px 28px; font-weight: 800; font-size: 1.1em; text-align: center; opacity: 0; transform: translateY(10px); transition: all 0.3s; max-width: 320px; }
.status-msg.show { opacity: 1; transform: translateY(0); }

/* Color picker modal */
#color-picker { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); }
#color-picker.hidden { display: none; }
.color-picker-box { background: var(--surface); border-radius: 24px; padding: 28px; border: 1px solid rgba(255,255,255,0.15); text-align: center; }
.color-picker-title { font-family: 'Fredoka One', cursive; font-size: 1.4em; margin-bottom: 20px; }
.color-options { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.color-opt { width: 60px; height: 60px; border-radius: 14px; border: 3px solid rgba(255,255,255,0.2); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-size: 1.4em; }
.color-opt:hover { transform: scale(1.15); border-color: white; box-shadow: 0 0 20px rgba(255,255,255,0.4); }

/* Win/Lose screen */
#end-screen { z-index: 200; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); gap: 20px; }
.end-icon { font-size: 5em; animation: endBounce 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes endBounce { 0%{transform:scale(0) rotate(-20deg)} 100%{transform:scale(1) rotate(0)} }
.end-title { font-family: 'Fredoka One', cursive; font-size: clamp(2.5em, 8vw, 4em); }
.end-sub { color: var(--muted); font-size: 1em; font-weight: 600; }
.end-btns { display: flex; gap: 14px; margin-top: 10px; }
.end-btn { padding: 14px 32px; border-radius: 50px; border: none; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1em; cursor: pointer; transition: all 0.2s; }
.end-btn.primary { background: linear-gradient(135deg, #A855F7, #2B7FFF); color: white; box-shadow: 0 4px 20px rgba(168,85,247,0.5); }
.end-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(168,85,247,0.7); }
.end-btn.secondary { background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid rgba(255,255,255,0.2); }
.end-btn.secondary:hover { background: rgba(255,255,255,0.18); }

/* Turn arrow */
.turn-arrow { position: fixed; top: 50%; right: 20px; transform: translateY(-50%); z-index: 30; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
.turn-arrow.show { opacity: 1; }
.arrow-label { writing-mode: vertical-rl; font-weight: 900; font-size: 0.8em; color: var(--muted); padding: 8px; }

/* Direction indicator */
.direction-badge { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; font-size: 2em; opacity: 0.15; z-index: 1; }

/* Card fly animation */
@keyframes cardFly {
  0% { transform: translate(0,0) rotate(0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(0.3); opacity: 0; }
}
@keyframes cardDeal {
  0% { transform: translateY(-60px) scale(0.7); opacity: 0; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}
.card-deal-anim { animation: cardDeal 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }

/* Discard glow */
.discard-glow { animation: discardGlow 0.4s ease-out; }
@keyframes discardGlow {
  0% { transform: scale(1.3); box-shadow: 0 0 40px rgba(255,255,255,0.8); }
  100% { transform: scale(1); box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
}

/* Draw cards animation */
@keyframes drawCard {
  0% { transform: translateX(-40px) scale(0.8); opacity: 0; }
  60% { transform: translateX(5px) scale(1.05); opacity: 1; }
  100% { transform: translateX(0) scale(1); opacity: 1; }
}
.draw-anim { animation: drawCard 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }

/* Current turn highlight */
.your-turn-glow { animation: yourTurnGlow 1s ease-out; }
@keyframes yourTurnGlow {
  0% { box-shadow: 0 0 0 0 rgba(168,85,247,0.8); }
  100% { box-shadow: 0 0 30px rgba(168,85,247,0); }
}

/* Floating damage numbers */
.float-msg { position: fixed; font-family: 'Fredoka One', cursive; font-size: 1.6em; font-weight: 400; pointer-events: none; z-index: 200; animation: floatUp 1.2s ease-out forwards; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(-60px) scale(0.7); opacity: 0; }
}

/* Responsive hand */
@media (max-width: 500px) {
  .hand-card { width: 58px; height: 82px; margin-left: -20px; }
  .game-card { font-size: 1.2em; }
}

/* UNO shout */
.uno-shout { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Fredoka One', cursive; font-size: clamp(3em, 15vw, 7em); color: #FF3B3B; text-shadow: 0 0 40px rgba(255,59,59,0.8), 0 0 80px rgba(255,59,59,0.4); z-index: 300; pointer-events: none; animation: unoShout 1.2s ease-out forwards; }
@keyframes unoShout { 0%{transform:translate(-50%,-50%) scale(0) rotate(-15deg); opacity:1} 60%{transform:translate(-50%,-50%) scale(1.1) rotate(3deg); opacity:1} 100%{transform:translate(-50%,-50%) scale(0.9) rotate(0deg); opacity:0} }

/* Stacked indicator */
.stack-badge { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); border: 2px solid #FF3B3B; border-radius: 12px; padding: 8px 16px; font-weight: 800; color: #FF3B3B; z-index: 50; pointer-events: none; font-size: 0.9em; display: none; }

/* Uno call button */
.uno-call-overlay { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%); z-index: 60; display: none; }
.uno-call-btn { padding: 14px 40px; background: linear-gradient(135deg, #FF3B3B, #ff6b35); border: none; border-radius: 50px; color: white; font-family: 'Fredoka One', cursive; font-size: 1.4em; cursor: pointer; box-shadow: 0 4px 20px rgba(255,59,59,0.6); animation: unoBtnPulse 0.8s ease-in-out infinite; }
@keyframes unoBtnPulse { 0%,100%{box-shadow:0 4px 20px rgba(255,59,59,0.6)} 50%{box-shadow:0 4px 40px rgba(255,59,59,1)} }

</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- BACK + FULLSCREEN -->
<a class="back-link" onclick="goBack()">← Wren.fun</a>
<button class="fullscreen-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">⛶</button>

<!-- ===== MENU SCREEN ===== -->
<div class="screen" id="menu-screen">
  <div class="menu-logo">UnOh Infinity</div>
  <div class="menu-sub">Uno, but wilder. Way wilder.</div>

  <div class="wins-badge">🏆 Total Wins: <span id="win-count">0</span></div>

  <div class="bot-select-label" style="margin-top:18px;">Opponents</div>
  <div class="bot-btns">
    <button class="bot-btn selected" onclick="selectBots(1)" data-bots="1">1 Bot</button>
    <button class="bot-btn" onclick="selectBots(2)" data-bots="2">2 Bots</button>
    <button class="bot-btn" onclick="selectBots(3)" data-bots="3">3 Bots</button>
  </div>

  <button class="play-btn" onclick="startGame()">▶ Play</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div class="screen hidden" id="game-screen">
  <!-- Opponents -->
  <div class="opponents-area" id="opponents-area"></div>

  <!-- Center: deck + discard -->
  <div class="center-area">
    <div class="deck-zone">
      <div class="deck-pile" id="deck-pile" onclick="drawFromDeck()">🂠</div>
      <div class="deck-count" id="deck-count">52 cards</div>
    </div>
    <div class="discard-zone">
      <div class="discard-pile" id="discard-pile"></div>
      <div class="discard-label">DISCARD</div>
    </div>
  </div>

  <!-- Player hand -->
  <div class="player-area">
    <div class="player-info">
      <div class="player-name" id="player-name-label">
        <span class="turn-indicator" id="player-turn-dot" style="display:none"></span>
        YOU
      </div>
      <button class="uno-btn" id="uno-btn" onclick="callUno()">UNO!</button>
    </div>
    <div class="hand-container" id="player-hand"></div>
  </div>
</div>

<!-- STATUS MSG -->
<div class="status-bar">
  <div class="status-msg" id="status-msg"></div>
</div>

<!-- STACK BADGE -->
<div class="stack-badge" id="stack-badge"></div>

<!-- UNO CALL OVERLAY -->
<div class="uno-call-overlay" id="uno-call-overlay">
  <button class="uno-call-btn" onclick="callUno()">UNO!</button>
</div>

<!-- COLOR PICKER -->
<div id="color-picker" class="hidden">
  <div class="color-picker-box">
    <div class="color-picker-title">Choose a Color</div>
    <div class="color-options">
      <div class="color-opt" style="background:#FF3B3B" onclick="pickColor('red')" title="Red">🔴</div>
      <div class="color-opt" style="background:#2B7FFF" onclick="pickColor('blue')" title="Blue">🔵</div>
      <div class="color-opt" style="background:#FFD600; color:#000" onclick="pickColor('yellow')" title="Yellow">🟡</div>
      <div class="color-opt" style="background:#22D46B" onclick="pickColor('green')" title="Green">🟢</div>
      <div class="color-opt" style="background:#A855F7" onclick="pickColor('purple')" title="Purple">🟣</div>
    </div>
  </div>
</div>

<!-- END SCREEN -->
<div class="screen hidden" id="end-screen">
  <div class="end-icon" id="end-icon">🎉</div>
  <div class="end-title" id="end-title">You Win!</div>
  <div class="end-sub" id="end-sub">Amazing game!</div>
  <div class="end-btns">
    <button class="end-btn primary" onclick="startGame()">Play Again</button>
    <button class="end-btn secondary" onclick="showMenu()">Menu</button>
  </div>
</div>

<script>
// ===================== BACKGROUND CANVAS =====================
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let bgParticles = [];

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

const BG_COLORS = ['#FF3B3B','#2B7FFF','#FFD600','#22D46B','#A855F7'];
for(let i=0;i<40;i++){
  bgParticles.push({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    r: 2+Math.random()*4,
    color: BG_COLORS[Math.floor(Math.random()*5)],
    vx: (Math.random()-0.5)*0.4,
    vy: (Math.random()-0.5)*0.4,
    alpha: 0.15+Math.random()*0.25
  });
}

function drawBg() {
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  // Gradient bg
  const grd = bgCtx.createRadialGradient(bgCanvas.width/2,bgCanvas.height/2,0,bgCanvas.width/2,bgCanvas.height/2,Math.max(bgCanvas.width,bgCanvas.height));
  grd.addColorStop(0,'#16162a');
  grd.addColorStop(1,'#0a0a15');
  bgCtx.fillStyle = grd;
  bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height);

  for(let p of bgParticles){
    p.x += p.vx; p.y += p.vy;
    if(p.x<0)p.x=bgCanvas.width; if(p.x>bgCanvas.width)p.x=0;
    if(p.y<0)p.y=bgCanvas.height; if(p.y>bgCanvas.height)p.y=0;
    bgCtx.beginPath();
    bgCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgCtx.fillStyle = p.color+Math.floor(p.alpha*255).toString(16).padStart(2,'0');
    bgCtx.fill();
  }
  requestAnimationFrame(drawBg);
}
drawBg();

// ===================== GAME STATE =====================
const COLORS = ['red','blue','yellow','green','purple'];
const COLOR_CSS = { red:'#FF3B3B', blue:'#2B7FFF', yellow:'#FFD600', green:'#22D46B', purple:'#A855F7', wild:'#2d2d5e' };

// Card definitions: { value, type, color, label, effect }
// Types: number, reverse, skip, plus, skipAll, doubleSkip, colorTransform, wild, wildReverse, wildSkip, wildPlus, wildSkipAll, pickUntil

function buildDeck() {
  const deck = [];
  // Rarity weights
  // 70% basics: numbers 1-12 per color
  // 10% action: reverse, skip, +1 to +5 per color
  // 5% power: skipAll, +6, doubleSkip per color
  // 4% special: colorTransform per color, +8, +10 per color
  // 15% wilds: Wild, Wild Reverse, Wild Skip, Wild+1-5
  // 5% mega-wilds: Wild+6, Wild+8, Wild+10, Wild Skip All
  // 2.5% ultra: Pick Until Color

  for(const color of COLORS){
    // Basic numbers (x2 each)
    for(let n=1;n<=12;n++){
      for(let i=0;i<2;i++) deck.push({color,value:String(n),type:'number',label:n});
    }
    // Reverse x2
    for(let i=0;i<2;i++) deck.push({color,value:'reverse',type:'reverse',label:'↩'});
    // Skip x2
    for(let i=0;i<2;i++) deck.push({color,value:'skip',type:'skip',label:'⊘'});
    // +1 to +5 x2 each
    for(let p=1;p<=5;p++){
      for(let i=0;i<2;i++) deck.push({color,value:'+'+p,type:'plus',num:p,label:'+'+p});
    }
    // Skip All x1
    deck.push({color,value:'skipAll',type:'skipAll',label:'⊘⊘'});
    // +6 x1
    deck.push({color,value:'+6',type:'plus',num:6,label:'+6'});
    // Double Skip x1
    deck.push({color,value:'doubleSkip',type:'doubleSkip',label:'⊘²'});
    // Color Transform x1
    deck.push({color,value:'colorTransform',type:'colorTransform',label:'🔄'});
    // +8 x1
    deck.push({color,value:'+8',type:'plus',num:8,label:'+8'});
    // +10 x1
    deck.push({color,value:'+10',type:'plus',num:10,label:'+10'});
  }

  // Wilds
  for(let i=0;i<6;i++) deck.push({color:'wild',value:'wild',type:'wild',label:'🌈'});
  for(let i=0;i<3;i++) deck.push({color:'wild',value:'wildReverse',type:'wildReverse',label:'↩🌈'});
  for(let i=0;i<3;i++) deck.push({color:'wild',value:'wildSkip',type:'wildSkip',label:'⊘🌈'});
  for(let p=1;p<=5;p++){
    for(let i=0;i<2;i++) deck.push({color:'wild',value:'wild+'+p,type:'wildPlus',num:p,label:`+${p}🌈`});
  }
  // Mega wilds
  for(let v of ['+6','+8','+10']){
    deck.push({color:'wild',value:'wild'+v,type:'wildPlus',num:parseInt(v.slice(1)),label:`${v}🌈`});
  }
  deck.push({color:'wild',value:'wildSkipAll',type:'wildSkipAll',label:'⊘⊘🌈'});
  // Ultra
  for(let i=0;i<2;i++) deck.push({color:'wild',value:'pickUntil',type:'pickUntil',label:'🎲🌈'});

  return deck;
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

let state = {};
let selectedBots = 1;
let pendingWild = null; // card waiting for color pick
let pendingPickUntil = null; // target color
let gameRunning = false;
let stackCount = 0; // current stacked draw count
let unoCalled = false;
let unoCallTimer = null;

  document.querySelectorAll('.bot-btn').forEach(b=>b.classList.toggle('selected', parseInt(b.dataset.bots)===n));

function startGame(){
  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('end-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  gameRunning = true;
  stackCount = 0;
  unoCalled = false;

  const fullDeck = shuffle(buildDeck());
  const players = [{name:'You',isBot:false,cards:[]}];
  const botNames = ['🤖 Bot A','👾 Bot B','🎮 Bot C'];
  for(let i=0;i<selectedBots;i++){
    players.push({name:botNames[i],isBot:true,cards:[]});
  }

  // Deal 7 cards each
  for(let i=0;i<7;i++){
    for(let p of players) p.cards.push(fullDeck.pop());
  }

  // First discard: must be a basic number card
  let firstCard;
  let idx = fullDeck.findIndex(c=>c.type==='number');
  if(idx>=0){ firstCard=fullDeck.splice(idx,1)[0]; }
  else { firstCard=fullDeck.pop(); if(firstCard.color==='wild')firstCard.color='red'; }

  state = {
    players,
    deck: fullDeck,
    discard: [firstCard],
    currentPlayer: 0,
    direction: 1, // 1=clockwise, -1=counter
    currentColor: firstCard.color,
    gameOver: false,
    pendingDraw: 0, // stacked draw cards
    skipNext: 0, // players to skip
    unoFailed: {}
  };

  renderOpponents();
  renderDiscard();
  renderPlayerHand();
  updateDeckCount();
  scheduleBot();
}

function updateOpponentZone(idx){

  infoEl.textContent = `${p.cards.length} card${p.cards.length!==1?'s':''}`;

  const isTurn = idx === state.currentPlayer;

    nameEl.innerHTML = `<span class="turn-indicator"></span> ${p.name}`;

function cardColorClass(card){

function buildCardEl(card, size=80){

function renderDiscard(){
  const pile = document.getElementById('discard-pile');
  pile.innerHTML = '';
  const top = state.discard[state.discard.length-1];
  if(!top) return;

  // Show color indicator

function renderPlayerHand(){
  const hand = document.getElementById('player-hand');

function isPlayable(card){
  const top = state.discard[state.discard.length-1];
  const cc = state.currentColor;

  // Wild cards always playable (unless pending draw and no stacking ability)
  if(card.color==='wild') return true;

  // If there's a pending draw stack, only matching draw cards can be played
  if(state.pendingDraw > 0){
    // Can stack: same type of plus card, or a +4/+5 can go on any draw
    if(card.type==='plus' || card.type==='wildPlus'){
      return true; // stacking allowed
    }
    // Must draw otherwise
    return false;
  }

  // Color match
  if(card.color === cc) return true;
  // Value match
  if(card.value === top.value) return true;
  // Number match
  if(card.type==='number' && top.type==='number' && card.label===top.label) return true;
  // Same type for action cards
  if(card.type === top.type) return true;

  return false;
}

function playCard(idx){
  if(state.currentPlayer !== 0 || state.gameOver) return;
  const player = state.players[0];
  const card = player.cards[idx];
  if(!isPlayable(card)) return;

  // Multi-play: if we're placing same number as current discard top and it's our turn, allow chaining
  executePlayCard(0, idx);
}

function executePlayCard(playerIdx, cardIdx){
  const player = state.players[playerIdx];
  const card = player.cards.splice(cardIdx, 1)[0];
  state.discard.push(card);

  // Animate discard
  const pile = document.getElementById('discard-pile');
  pile.classList.remove('discard-glow');
  void pile.offsetWidth;
  pile.classList.add('discard-glow');

  // Floating label
  spawnFloatMsg(card.label, COLOR_CSS[card.color]||'#fff', playerIdx);

  // Handle wild color choice
  if(card.color==='wild'){
    if(playerIdx===0){
      // Player chooses
      pendingWild = {card, playerIdx};
      if(card.type==='pickUntil'){
        pendingPickUntil = true;
        showColorPicker('🎲 Pick Until: Choose a color to hunt for!');
      } else if(card.type==='colorTransform'){
        showColorPicker('🔄 Color Transform: Choose a new color for your hand!');
      } else {
        showColorPicker('Choose a Color');
      }
      return; // Wait for color pick
    } else {
      // Bot picks random color
      const botColor = COLORS[Math.floor(Math.random()*5)];
      state.currentColor = botColor;
      applyCardEffect(card, playerIdx, botColor);
    }
  } else {
    state.currentColor = card.color;
    applyCardEffect(card, playerIdx, card.color);
  }
}

function applyCardEffect(card, playerIdx, chosenColor){
  const numPlayers = state.players.length;

  // Check for multi-play opportunity (same number on top)
  // Only for the human player after they play
  let continuesTurn = false;

  switch(card.type){
    case 'number':
      // Allow same-number multi-play for player
      continuesTurn = playerIdx === 0 && canPlayMoreSameNumber(card);
      break;

    case 'reverse':
    case 'wildReverse':
      state.direction *= -1;
      if(numPlayers===2){
        // In 2-player, reverse acts as skip
        advanceTurn();
      }
      break;

    case 'skip':
    case 'wildSkip':
      advanceTurn(); // skip next
      break;

    case 'skipAll':
    case 'wildSkipAll':
      // Skip everyone, current player goes again
      continuesTurn = true;
      break;

    case 'doubleSkip':
      advanceTurn(); advanceTurn(); // skip two
      break;

    case 'plus':
    case 'wildPlus':
      state.pendingDraw += card.num;
      // Next player must draw or stack
      break;

    case 'colorTransform':
      // Transform all of player's cards to chosenColor
      if(playerIdx===0){
        state.players[0].cards = state.players[0].cards.map(c=>{
          if(c.color!=='wild') return {...c, color:chosenColor};
          return c;
        });
      }
      break;

    case 'pickUntil':
      // Next player draws until they get chosenColor card
      doPickUntil(nextPlayerIdx(), chosenColor);
      break;
  }

  if(!continuesTurn){
    advanceTurn();
    if(state.pendingDraw > 0 && !continuesTurn){
      // Check if next player has stackable cards
    }
  }

  finishTurn(playerIdx, continuesTurn);
}

function canPlayMoreSameNumber(justPlayed){
  const top = state.discard[state.discard.length-1];
  const player = state.players[0];
  return player.cards.some(c=>c.type==='number' && c.label===top.label);
}

function doPickUntil(targetIdx, targetColor){
  const target = state.players[targetIdx];
  let draws = 0;
  while(true){
    if(state.deck.length===0) reshuffleDeck();
    const drawn = state.deck.pop();
    target.cards.push(drawn);
    draws++;
    if(drawn.color===targetColor || draws>=20) break; // cap at 20
  }
  showStatus(`${target.name} drew ${draws} cards looking for ${targetColor}! 😬`);
  spawnFloatMsg(`+${draws}`, '#FF3B3B', targetIdx);
}

function advanceTurn(){
  const n = state.players.length;
  state.currentPlayer = (state.currentPlayer + state.direction + n) % n;
}

function nextPlayerIdx(){
  const n = state.players.length;
  return (state.currentPlayer + state.direction + n) % n;
}

function finishTurn(playerIdx, continuesTurn){
  const player = state.players[playerIdx];

  // Check win
  if(player.cards.length === 0){
    endGame(playerIdx);
    return;
  }

  // UNO check for bots
  if(player.isBot && player.cards.length === 1){
    // Small chance bot forgets to call UNO
    if(Math.random()>0.2){
      showUnoShout(player.name);
    }
  }

  renderDiscard();
  updateDeckCount();

  if(!continuesTurn){
    if(playerIdx===0){
      renderPlayerHand();
      renderOpponents();
      scheduleBot();
    } else {
      updateOpponentZone(playerIdx);
      renderPlayerHand();
      scheduleBot();
    }
  } else {
    // Player can continue
    renderPlayerHand();
    renderDiscard();
    showStatus(`You can play another card of the same number!`);
  }
}

function scheduleBot(){
  if(!gameRunning || state.gameOver) return;
  if(state.players[state.currentPlayer].isBot){
    const delay = 800 + Math.random()*600;
    setTimeout(()=>{
      if(!gameRunning || state.gameOver) return;
      botTurn(state.currentPlayer);
    }, delay);
  }
}

function botTurn(idx){
  if(!gameRunning || state.gameOver) return;
  if(state.currentPlayer !== idx) return;
  const bot = state.players[idx];

  // Handle pending draws - must draw unless can stack
  if(state.pendingDraw > 0){
    const stackable = bot.cards.filter(c=>c.type==='plus'||c.type==='wildPlus');
    if(stackable.length>0 && Math.random()>0.3){
      // Stack!
      const cardIdx = bot.cards.indexOf(stackable[0]);
      executePlayCard(idx, cardIdx);
      return;
    } else {
      // Must draw
      botDrawPenalty(idx);
      return;
    }
  }

  // Find playable cards
  const playable = bot.cards.map((c,i)=>({c,i})).filter(({c})=>isPlayableFor(c));

  if(playable.length===0){
    // Draw a card
    botDraw(idx);
    return;
  }

  // Bot strategy: prefer wilds last, prefer action cards, prefer matching color
  let chosen = null;
  // prefer cards matching current color
  const matching = playable.filter(({c})=>c.color===state.currentColor);
  const wilds = playable.filter(({c})=>c.color==='wild');
  const others = playable.filter(({c})=>c.color!=='wild');

  if(matching.length>0) chosen = matching[Math.floor(Math.random()*matching.length)];
  else if(others.length>0) chosen = others[Math.floor(Math.random()*others.length)];
  else if(wilds.length>0) chosen = wilds[0];

  if(chosen) executePlayCard(idx, chosen.i);
  else botDraw(idx);
}

function isPlayableFor(card){
  const top = state.discard[state.discard.length-1];
  const cc = state.currentColor;
  if(card.color==='wild') return true;
  if(state.pendingDraw>0) return card.type==='plus'||card.type==='wildPlus';
  if(card.color===cc) return true;
  if(card.value===top.value) return true;
  if(card.type==='number' && top.type==='number' && card.label===top.label) return true;
  if(card.type===top.type) return true;
  return false;
}

function botDraw(idx){
  if(!gameRunning) return;
  if(state.deck.length===0) reshuffleDeck();
  const drawn = state.deck.pop();
  state.players[idx].cards.push(drawn);
  spawnFloatMsg('+1','#888',idx);
  updateDeckCount();
  updateOpponentZone(idx);

  // Can the drawn card be played?
  if(isPlayableFor(drawn)){
    setTimeout(()=>{
      if(!gameRunning) return;
      const ci = state.players[idx].cards.indexOf(drawn);
      if(ci>=0) executePlayCard(idx, ci);
      else advanceTurnBot(idx);
    }, 400);
  } else {
    advanceTurnBot(idx);
  }
}

function botDrawPenalty(idx){
  if(!gameRunning) return;
  const n = state.pendingDraw;
  for(let i=0;i<n;i++){
    if(state.deck.length===0) reshuffleDeck();
    const drawn = state.deck.pop();
    state.players[idx].cards.push(drawn);
  }
  showStatus(`${state.players[idx].name} drew ${n} cards! 😬`, 1500);
  spawnFloatMsg(`+${n}`,'#FF3B3B',idx);
  state.pendingDraw = 0;
  updateDeckCount();
  updateOpponentZone(idx);
  advanceTurnBot(idx);
}

function advanceTurnBot(idx){
  advanceTurn();
  finishTurnBot(idx);
}

function finishTurnBot(idx){
  updateOpponentZone(idx);
  renderPlayerHand();
  renderDiscard();
  updateDeckCount();
  scheduleBot();
}

function drawFromDeck(){
  if(state.currentPlayer !== 0 || state.gameOver) return;

  // If pending draw, must draw penalty
  if(state.pendingDraw > 0){
    const n = state.pendingDraw;
    for(let i=0;i<n;i++){
      if(state.deck.length===0) reshuffleDeck();
      const drawn = state.deck.pop();
      state.players[0].cards.push(drawn);
    }
    showStatus(`You drew ${n} cards! 😬`, 1800);
    spawnFloatMsg(`+${n}`,'#FF3B3B',0);
    state.pendingDraw = 0;
    advanceTurn();
    renderPlayerHand();
    renderDiscard();
    updateDeckCount();
    scheduleBot();
    return;
  }

  if(state.deck.length===0) reshuffleDeck();
  const drawn = state.deck.pop();
  state.players[0].cards.push(drawn);

  // Animate the new card
  setTimeout(()=>{
    const hand = document.getElementById('player-hand');
    const last = hand.lastChild;
    if(last) last.classList.add('draw-anim');
  }, 50);

  showStatus(`Drew: ${drawn.label}`, 1200);
  spawnFloatMsg('+1','#aaa',0);
  updateDeckCount();

  // Check if drawable card is playable
  if(isPlayable(drawn)){
    renderPlayerHand();
    showStatus(`Drew ${drawn.label} — you can play it!`, 2000);
  } else {
    // Auto end turn after drawing
    advanceTurn();
    renderPlayerHand();
    scheduleBot();
  }
}

function reshuffleDeck(){
  if(state.discard.length<=1) return;
  const top = state.discard.pop();
  state.deck = shuffle([...state.discard]);
  state.discard = [top];
  showStatus('Deck reshuffled! ♻️', 1200);
}

function updateDeckCount(){
  document.getElementById('deck-count').textContent = state.deck.length+' cards';
}

// ===================== COLOR PICKER =====================
function showColorPicker(title){
  document.querySelector('.color-picker-title').textContent = title;
  document.getElementById('color-picker').classList.remove('hidden');
}

function pickColor(color){
  document.getElementById('color-picker').classList.add('hidden');
  state.currentColor = color;

  if(pendingWild){
    const {card, playerIdx} = pendingWild;
    pendingWild = null;

    if(card.type==='pickUntil'){
      // Draw until someone gets target color
      const next = nextPlayerIdx();
      doPickUntil(next, color);
      advanceTurn();
    } else if(card.type==='colorTransform'){
      // Transform player's cards
      state.players[0].cards = state.players[0].cards.map(c=>{
        if(c.color!=='wild') return {...c, color};
        return c;
      });
      showStatus(`All your cards transformed to ${color}! 🔄`, 2000);
    }

    applyCardEffect(card, playerIdx, color);
  }
}

// ===================== END GAME =====================
function endGame(winnerIdx){
  state.gameOver = true;
  gameRunning = false;

  const winner = state.players[winnerIdx];
  const endScreen = document.getElementById('end-screen');
  document.getElementById('game-screen').classList.add('hidden');
  endScreen.classList.remove('hidden');

  if(winnerIdx===0){
    document.getElementById('end-icon').textContent='🎉';
    document.getElementById('end-title').textContent='You Win!';
    document.getElementById('end-sub').textContent='Amazing! You crushed the bots.';
    document.getElementById('end-title').style.color='#FFD600';

    // Increment wins
    const wins = parseInt(localStorage.getItem('unoh_wins')||'0');
    localStorage.setItem('unoh_wins', wins+1);
  } else {
    document.getElementById('end-icon').textContent='😢';
    document.getElementById('end-title').textContent=winner.name+' Wins!';
    document.getElementById('end-sub').textContent='Better luck next time!';
    document.getElementById('end-title').style.color='#FF3B3B';
  }
}

// ===================== UI HELPERS =====================
let statusTimer = null;
function showStatus(msg, duration=2000){
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.classList.add('show');
  if(statusTimer) clearTimeout(statusTimer);
  statusTimer = setTimeout(()=>el.classList.remove('show'), duration);
}

function spawnFloatMsg(text, color, playerIdx){
  const el = document.createElement('div');
  el.className = 'float-msg';
  el.textContent = text;
  el.style.color = color;

  let x,y;
  if(playerIdx===0){
    x = window.innerWidth/2 + (Math.random()-0.5)*100;
    y = window.innerHeight-160;
  } else {
    const zone = document.getElementById(`opp-zone-${playerIdx}`);
    if(zone){
      const r = zone.getBoundingClientRect();
      x = r.left + r.width/2;
      y = r.bottom;
    } else {
      x = window.innerWidth/2;
      y = 100;
    }
  }

  el.style.left = x+'px';
  el.style.top = y+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1300);
}

function showUnoShout(name){
  const el = document.createElement('div');
  el.className = 'uno-shout';
  el.textContent = name==='You'?'UNO!' : name+': UNO!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1200);
}

function callUno(){
  if(state.players[0].cards.length===1 && state.currentPlayer===0){
    unoCalled = true;
    showUnoShout('UNO!');
    document.getElementById('uno-btn').classList.remove('visible');
    document.getElementById('uno-call-overlay').style.display='none';
  }
}

// ===================== NAV =====================
function goBack(){
  window.location.href='../index.html';
}

function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen && document.exitFullscreen();
  }
}

// Init
updateWinDisplay();

</script>
