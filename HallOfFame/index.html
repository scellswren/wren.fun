<!DOCTYPE html>
<html>
<head>
  <title>The Hall of Fame</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../Favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #110d1d;
      --bg-2: #1c1230;
      --card: rgba(255, 255, 255, 0.07);
      --card-hover: rgba(255, 255, 255, 0.12);
      --text: #f8f1ff;
      --muted: rgba(248, 241, 255, 0.78);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      text-align: center;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(168, 85, 247, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.12), transparent 32%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
    }

    #homeText {
      position: fixed;
      top: 10px;
      left: 10px;
      font-family: 'Rubik', sans-serif;
      font-size: 2em;
      cursor: pointer;
      transition: transform 0.2s;
      z-index: 1000;
    }

    #homeText:hover { transform: scale(1.15); }

    #content {
      padding: 70px 20px 100px;
    }

    h1 {
      font-size: clamp(2.5em, 8vw, 5em);
      font-family: 'Rubik', sans-serif;
      margin-bottom: 10px;
    }

    .subtext {
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
      width: min(1400px, calc(100% - 24px));
      margin: 0 auto;
    }

    .hof-card {
      background: var(--card);
      border-radius: 24px;
      overflow: hidden;
      transition: all 0.25s ease;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .hof-card:hover {
      transform: scale(1.04);
      background: var(--card-hover);
    }

    .photo {
      aspect-ratio: 1/1;
      overflow: hidden;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content-box {
      padding: 18px;
    }

    .name {
      font-family: 'Rubik', sans-serif;
      font-weight: 900;
      margin-bottom: 10px;
    }

    details {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      overflow: hidden;
    }

    summary {
      padding: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .desc {
      padding: 10px;
      font-size: 0.95em;
      opacity: 0.9;
    }

    /* 🔥 GOLD SPECIAL CARD 🔥 */
    .gold {
      background: linear-gradient(145deg, #ffd700, #ffb700, #fff2a6);
      color: #2b1a00;
      position: relative;
      overflow: hidden;
      border: none;
    }

    .gold::before {
      content: "";
      position: absolute;
      inset: -100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.6),
        transparent
      );
      transform: rotate(25deg);
      transition: 0.6s;
    }

    .gold:hover::before {
      inset: 100%;
    }

    .gold:hover {
      transform: scale(1.08) rotate(-0.5deg);
      box-shadow: 0 0 30px rgba(255,215,0,0.6),
                  0 0 60px rgba(255,200,0,0.4);
    }

    .gold .name {
      color: #3a2600;
    }

    .gold details {
      background: rgba(0,0,0,0.1);
    }

    .gold summary {
      color: #2b1a00;
    }

    .more-coming {
      margin-top: 30px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div id="homeText" onclick="goHome()">Wren.fun</div>

<div id="content">
  <h1>The Hall of Fame ⭐</h1>
  <div class="subtext">Click descriptions to expand.</div>

  <div class="gallery">

    <!-- NORMAL CARDS (shortened for readability, keep yours the same) -->
    <!-- KEEP ALL YOUR OTHER 11 CARDS EXACTLY AS BEFORE -->

    <!-- 🔥 GEORGE SPECIAL 🔥 -->
    <div class="hof-card gold">
      <div class="photo"><img src="HallFame12.jpg"></div>
      <div class="content-box">
        <div class="name">George21z 👑</div>
        <details>
          <summary>Description</summary>
          <div class="desc">
            When WrenIsOld was at 401 subs he called it trash and said he had 3.4 million,
            but in reality he had only 1 sub at the time.
          </div>
        </details>
      </div>
    </div>

  </div>

  <div class="more-coming">More coming soon</div>
</div>

<script>
  const MODE_KEY = 'wrenMode';
  const savedMode = localStorage.getItem(MODE_KEY) || 'light';
  document.body.className = 'mode-' + savedMode;

  function goHome() {
    window.location.href = "../index.html";
  }
</script>

</body>
</html>
