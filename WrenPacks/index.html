<!DOCTYPE html>
<html>
<head>
  <title>Wren Packs</title>

  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../Favicon.png">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    /* HOME TEXT */
    #homeText {
      position: absolute;
      top: 15px;
      left: 20px;
      font-family: 'Rubik', sans-serif;
      font-size: 2em;
      cursor: pointer;
      transition: transform 0.2s;
    }
    #homeText:hover { transform: scale(1.2); }

    h1 { margin-top: 20px; }

    /* BUTTONS */
    .tabs button {
      padding: 15px 35px;
      margin: 10px;
      font-size: 1.3em;
      cursor: pointer;
      border: none;
      border-radius: 30px;
      color: white;
      font-weight: bold;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .tabs button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px white;
    }

    .packBtn { background: purple; }
    .invBtn { background: green; }
    .indexBtn { background: dodgerblue; }

    /* NOTIF */
    .notif {
      position: absolute;
      top: -8px;
      right: -8px;
      background: red;
      border-radius: 50%;
      padding: 5px 10px;
      font-size: 0.8em;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .section { display: none; }
    .active { display: block; }

    /* PACK */
    .pack {
      width: 200px;
      height: 300px;
      margin: 100px auto;
      border: 3px solid purple;
      box-shadow: 0 0 30px purple;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2em;
    }

    /* CODE BUTTON */
    #codeBtn {
      position: fixed;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      padding: 15px 25px;
      font-size: 1.3em;
      background: gold;
      color: black;
      font-weight: bold;
      border-radius: 15px;
      cursor: pointer;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #codeBtn:hover {
      transform: translateY(-50%) scale(1.1);
      box-shadow: 0 0 15px gold;
    }

    /* CODE INPUT */
    #codeInputBox {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      padding: 30px;
      border-radius: 15px;
      display: none;
      z-index: 3000;
    }
    #codeInputBox input {
      padding: 10px;
      font-size: 1.2em;
      width: 250px;
    }
    #codeInputBox button {
      padding: 10px 20px;
      font-size: 1.2em;
      margin-left: 10px;
      cursor: pointer;
    }

    /* RESULT */
    #result {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
      z-index: 1000;
    }

    #result img {
      width: 200px;
      animation: spinIn 0.8s forwards;
    }

    @keyframes spinIn {
      0% { transform: scale(0) rotate(-720deg); opacity: 0; }
      50% { transform: scale(1.2) rotate(360deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* GRID */
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      width: 130px;
      transition: transform 0.5s ease, opacity 0.5s ease;
      position: relative;
    }

    .card img { width: 100%; }

    .explode {
      transform: scale(2) rotate(25deg);
      opacity: 0;
    }

    .deleteBtn {
      position: absolute;
      top: -5px;
      right: -5px;
      background: red;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      color: white;
      cursor: pointer;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1em;
    }

    /* RESET */
    #resetBtn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
    }

    /* CONFIRM */
    #confirmBox {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      padding: 30px;
      border-radius: 15px;
      display: none;
      z-index: 2000;
    }

    #darken {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      z-index: 1500;
    }

    /* RARITY */
    .Common { color: white; }
    .Uncommon { color: lime; }
    .Rare { color: dodgerblue; }
    .Epic { color: violet; }
    .Legendary { color: gold; }
    .Omega {
      background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
      -webkit-background-clip: text;
      color: transparent;
      animation: rainbow 3s linear infinite;
    }
    .Void {
      color: black;
      font-size: 2em;
      text-shadow: 0 0 10px black;
      animation: rainbow 3s linear infinite;
    }

    @keyframes rainbow {
      100% { filter: hue-rotate(360deg); }
    }

    /* OVERLAY */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.1);
      font-size: 5em;
      color: gold;
      z-index: 9999;
    }

    .fade {
      animation: fadeAnim 2s ease forwards;
    }

    @keyframes fadeAnim {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0; }
    }

    /* RATES */
    .rates {
      margin: 30px;
      font-size: 1.2em;
      line-height: 1.8em;
    }
  </style>
</head>

<body>

<div id="homeText" onclick="goHome()">Wren.fun</div>

<h1>Wren Packs</h1>

<div class="tabs">
  <button class="packBtn" onclick="showTab('pack')">Open Pack</button>
  <button class="invBtn" onclick="showTab('inventory')">
    Inventory
    <span id="notif" class="notif" style="display:none;">0</span>
  </button>
  <button class="indexBtn" onclick="showTab('index')">Index</button>
</div>

<div id="codeBtn" onclick="openCodeInput()">Code</div>

<div id="codeInputBox">
  <input id="codeInput" type="text" placeholder="Enter code">
  <button onclick="redeemCode()">Redeem</button>
</div>

<div id="overlay">✨ PACK OPENING ✨</div>

<div id="pack" class="section active">
  <div class="pack" onclick="openPack()">OPEN</div>
</div>

<div id="result"></div>

<div id="inventory" class="section">
  <button id="resetBtn" onclick="showConfirm()">Reset</button>
  <h2>Your Inventory</h2>
  <div id="inventory-list" class="grid"></div>
</div>

<div id="darken"></div>

<div id="confirmBox">
  <h2>Are you sure?</h2>
  <button onclick="resetInventory()">Yes</button>
  <button onclick="hideConfirm()">No</button>
</div>

<!-- INDEX -->
<div id="index" class="section">
  <h2>All Characters</h2>
  <div id="index-list" class="grid"></div>

  <div class="rates">
    <p class="Common">Common: 45%</p>
    <p class="Uncommon">Uncommon: 30%</p>
    <p class="Rare">Rare: 12%</p>
    <p class="Epic">Epic: 7%</p>
    <p class="Legendary">Legendary: 1%</p>
    <p class="Omega">Omega: 0.1%</p>
  </div>
</div>

<script>
let canOpen = true;
let newItems = 0;
let redeemedCodes = JSON.parse(localStorage.getItem("redeemedCodes")) || {};

// ORIGINAL ITEMS
const items = [
  {name:"WrenIsOld", display:"WrenIsOld", rarity:"Common"},
  {name:"TheMindOfOrin", display:"The Mind of Orin", rarity:"Common"},
  {name:"TheRealBaldCena72", display:"Bald Cena", rarity:"Common"},
  {name:"Edunzie", display:"Edunzie", rarity:"Common"},
  {name:"Wren.fun", display:"Wren.fun", rarity:"Common"},
  {name:"Juju2y", display:"Juju2y", rarity:"Uncommon"},
  {name:"Scratch", display:"Scratch", rarity:"Uncommon"},
  {name:"BlockOfCheese", display:"Block Of Cheese", rarity:"Uncommon"},
  {name:"Zxno", display:"Zxno", rarity:"Rare"},
  {name:"EthansHalfTable", display:"EthansHalfTable", rarity:"Rare"},
  {name:"TheTurtleKid2012", display:"Turtle Kid 2012", rarity:"Rare"},
  {name:"ThomasMini", display:"Thomas & Friends Minis", rarity:"Rare"},  
  {name:"TikiTheG", display:"Tikitheg", rarity:"Epic"},
  {name:"Nathan8028", display:"Nathan", rarity:"Epic"},
  {name:"Pigmaxv", display:"Pigmaxv", rarity:"Epic"},
  {name:"AustinsHalfTable", display:"AustinsHalfTable", rarity:"Epic"},  
  {name:"Wren", display:"Wren", rarity:"Legendary"},
  {name:"LuckyCat", display:"Lucky", rarity:"Legendary"},
  {name:"FatWren", display:"Fat Wren", rarity:"Omega"},
  {name:"KSIWithBigHead", display:"KSI Drawing", rarity:"Omega"},
  {name:"OrinFlower", display:"Orin Flower", rarity:"Void", hideInIndex:true}
];

const chances = {
  Common: 45,
  Uncommon: 30,
  Rare: 12,
  Epic: 7,
  Legendary: 1,
  Omega: 0.1
};

function goHome() {
  window.location.href = "https://scellswren.github.io/wren.fun/";
}

function rollRarity() {
  let r = Math.random() * 100;
  let sum = 0;
  for (let key in chances) {
    sum += chances[key];
    if (r <= sum) return key;
  }
  return "Common";
}

function updateNotif() {
  const n = document.getElementById("notif");
  n.style.display = "inline-block";
  n.innerText = newItems;
}

function openPack() {
  if (!canOpen) return;
  canOpen = false;

  const overlay = document.getElementById("overlay");
  overlay.style.display = "flex";
  overlay.classList.add("fade");

  setTimeout(() => {
    overlay.style.display = "none";
    overlay.classList.remove("fade");

    const rarity = rollRarity();
    const pool = items.filter(i => i.rarity === rarity);
    const item = pool[Math.floor(Math.random() * pool.length)];

    const result = document.getElementById("result");
    result.innerHTML = `<h2 class="${rarity}">${item.display} (${rarity})</h2><img src="${item.name}.jpg">`;
    result.style.display = "block";

    let inv = JSON.parse(localStorage.getItem("inventory")) || {};
    if (!inv[item.name]) {
      newItems++;
      updateNotif();
    }

    addToInventory(item.name);

    setTimeout(() => {
      canOpen = true;
      result.style.display = "none";
    }, 3000);

  }, 2000);
}

function addToInventory(name, quantity = 1) {
  let inv = JSON.parse(localStorage.getItem("inventory")) || {};
  inv[name] = (inv[name] || 0) + quantity;
  localStorage.setItem("inventory", JSON.stringify(inv));
}

function renderInventory() {
  let inv = JSON.parse(localStorage.getItem("inventory")) || {};
  const container = document.getElementById("inventory-list");
  container.innerHTML = "";

  // Sort by rarity: Common -> Uncommon -> ... -> Void
  const rarityOrder = ["Common","Uncommon","Rare","Epic","Legendary","Omega","Void"];
  let sortedItems = [];
  rarityOrder.forEach(r => {
    items.forEach(i => {
      if (inv[i.name]) sortedItems.push(i);
    });
  });

  sortedItems.forEach(i => {
    if (inv[i.name]) {
      container.innerHTML += `
        <div class="card">
          <div class="deleteBtn" onclick="deleteItemPrompt('${i.name}')">x</div>
          <img src="${i.name}.jpg">
          <p class="${i.rarity}">${i.display} x${inv[i.name]}</p>
        </div>
      `;
    }
  });
}

function deleteItemPrompt(name) {
  let inv = JSON.parse(localStorage.getItem("inventory")) || {};
  let max = inv[name];
  let qty = prompt(`Enter amount to delete (max ${max}):`);
  qty = parseInt(qty);
  if (isNaN(qty) || qty < 1) return;
  if (qty >= max) {
    delete inv[name];
  } else {
    inv[name] -= qty;
  }
  localStorage.setItem("inventory", JSON.stringify(inv));
  renderInventory();

  // Remove Orin Flower code redemption if deleted
  if(name === "OrinFlower") redeemedCodes["Subscribe"] = false;
  localStorage.setItem("redeemedCodes", JSON.stringify(redeemedCodes));
}

function showTab(tab) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  // Code button visibility
  document.getElementById("codeBtn").style.display = (tab === "pack") ? "flex" : "none";

  if (tab === "inventory") {
    newItems = 0;
    document.getElementById("notif").style.display = "none";
    renderInventory();
  }

  if (tab === "index") {
    renderIndex();
  }
}

function renderIndex() {
  const container = document.getElementById("index-list");
  container.innerHTML = "";

  items.forEach(i => {
    if(i.hideInIndex) return; // Void items hidden
    container.innerHTML += `
      <div class="card">
        <img src="${i.name}.jpg">
        <p class="${i.rarity}">${i.display}</p>
        <p class="${i.rarity}">${i.rarity}</p>
      </div>
    `;
  });
}

// CODE REDEMPTION
function openCodeInput() {
  document.getElementById("codeInputBox").style.display = "block";
}
function redeemCode() {
  const code = document.getElementById("codeInput").value;
  if(code === "Subscribe" && !redeemedCodes["Subscribe"]) {
    redeemedCodes["Subscribe"] = true;
    localStorage.setItem("redeemedCodes", JSON.stringify(redeemedCodes));
    document.getElementById("codeInputBox").style.display = "none";
    giveOrinFlower();
  } else {
    alert("Invalid or already redeemed code!");
  }
}

function giveOrinFlower() {
  addToInventory("OrinFlower");
  renderInventory();

  // HUGE animation & page shake
  const animDiv = document.createElement("div");
  animDiv.id = "overlay";
  animDiv.style.fontSize = "10em";
  animDiv.style.display = "flex";
  animDiv.innerHTML = `<img src="OrinFlower.jpg" style="width:500px"><p class="Void">Orin Flower</p>`;
  document.body.appendChild(animDiv);

  document.body.style.animation = "shake 0.1s infinite";
  setTimeout(() => {
    animDiv.remove();
    document.body.style.animation = "";
  }, 10000);
}

@keyframes shake {
  0% { transform: translate(1px, 1px); }
  25% { transform: translate(-1px, -2px); }
  50% { transform: translate(-3px, 0px); }
  75% { transform: translate(3px, 2px); }
  100% { transform: translate(0px, 0px); }
}

// RESET
function resetInventory() {
  const cards = document.querySelectorAll(".card");

  cards.forEach((card, i) => {
    setTimeout(() => {
      card.classList.add("explode");
    }, i * 100);
  });

  setTimeout(() => {
    localStorage.removeItem("inventory");
    hideConfirm();
    renderInventory();
    redeemedCodes["Subscribe"] = false;
    localStorage.setItem("redeemedCodes", JSON.stringify(redeemedCodes));
  }, 800);
}

function showConfirm() {
  document.getElementById("confirmBox").style.display = "block";
  document.getElementById("darken").style.display = "block";
}

function hideConfirm() {
  document.getElementById("confirmBox").style.display = "none";
  document.getElementById("darken").style.display = "none";
}

// INITIAL SETUP
showTab("pack");
</script>

</body>
</html>
