<!DOCTYPE html>
<html>
<head>
  <title>Wren Packs</title>
  <link rel="icon" type="image/png" href="../Favicon.png">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 { margin-top: 20px; }

    .tabs button {
      padding: 15px 30px;
      margin: 10px;
      font-size: 1.2em;
      cursor: pointer;
    }

    .section { display: none; }
    .active { display: block; }

    /* PACK */
    .pack {
      width: 200px;
      height: 300px;
      margin: 100px auto;
      border: 3px solid purple;
      box-shadow: 0 0 30px purple;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2em;
      transition: transform 0.2s;
    }

    .pack:active {
      transform: scale(0.95);
    }

    /* RESULT */
    #result {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      animation: pop 0.5s ease;
      display: none;
      z-index: 1000;
    }

    #result img {
      width: 200px;
      margin-top: 10px;
    }

    @keyframes pop {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    /* GRID */
    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card { 
      width: 130px;
      transition: transform 0.5s ease, opacity 0.5s ease; /* ✅ ADDED */
    }
    .card img { width: 100%; }

    /* 💥 EXPLOSION */
    .explode {
      transform: scale(2) rotate(25deg);
      opacity: 0;
    }

    /* RESET BUTTON */
    #resetBtn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      font-size: 1em;
      cursor: pointer;
    }

    /* POPUP */
    #confirmBox {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      padding: 30px;
      border-radius: 15px;
      display: none;
      z-index: 2000;
    }

    #confirmBox button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 1em;
      cursor: pointer;
    }

    /* OVERLAY */
    #darken {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      z-index: 1500;
    }

    /* RARITY COLORS */
    .Common { color: white; }
    .Uncommon { color: lime; }
    .Rare { color: dodgerblue; }
    .Epic { color: violet; }
    .Legendary { color: gold; }
    .Omega {
      background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
      -webkit-background-clip: text;
      color: transparent;
      animation: rainbow 3s linear infinite;
    }

    @keyframes rainbow {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    /* OVERLAY ANIMATION */
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5em;
      color: gold;
      z-index: 9999;
      display: none;
    }

    .fade {
      animation: fadeAnim 2s ease forwards;
    }

    @keyframes fadeAnim {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0; transform: scale(1); }
    }
  </style>
</head>
<body>

<h1>Wren Packs</h1>

<div class="tabs">
  <button onclick="showTab('pack')">Open Pack</button>
  <button onclick="showTab('inventory')">Inventory</button>
  <button onclick="showTab('index')">Index</button>
</div>

<div id="overlay">✨ PACK OPENING ✨</div>

<div id="pack" class="section active">
  <div class="pack" onclick="openPack()">OPEN</div>
</div>

<div id="result"></div>

<!-- INVENTORY -->
<div id="inventory" class="section">
  <button id="resetBtn" onclick="showConfirm()">Reset</button>
  <h2>Your Inventory</h2>
  <div id="inventory-list" class="grid"></div>
</div>

<!-- CONFIRM POPUP -->
<div id="darken"></div>

<div id="confirmBox">
  <h2>Are you sure?</h2>
  <button onclick="resetInventory()">Yes</button>
  <button onclick="hideConfirm()">No</button>
</div>

<!-- INDEX -->
<div id="index" class="section">
  <h2>All Characters</h2>
  <div id="index-list" class="grid"></div>
</div>

<script>
let canOpen = true;

const items = [
  {name:"WrenIsOld", display:"WrenIsOld", rarity:"Common"},
  {name:"TheMindOfOrin", display:"The Mind of Orin", rarity:"Common"},
  {name:"TheRealBaldCena72", display:"Bald Cena", rarity:"Common"},
  {name:"Edunzie", display:"Edunzie", rarity:"Common"},
  {name:"Juju2y", display:"Juju2y", rarity:"Uncommon"},
  {name:"Scratch", display:"Scratch", rarity:"Uncommon"},
  {name:"BlockOfCheese", display:"Block Of Cheese", rarity:"Uncommon"},
  {name:"Zxno", display:"Zxno", rarity:"Rare"},
  {name:"EthansHalfTable", display:"EthansHalfTable", rarity:"Rare"},
  {name:"TheTurtleKid2012", display:"Turtle Kid 2012", rarity:"Rare"},
  {name:"TikiTheG", display:"Tikitheg", rarity:"Epic"},
  {name:"Nathan8028", display:"Nathan", rarity:"Epic"},
  {name:"Pigmaxv", display:"Pigmaxv", rarity:"Epic"},
  {name:"Wren", display:"Wren", rarity:"Legendary"},
  {name:"LuckyCat", display:"Lucky", rarity:"Legendary"},
  {name:"FatWren", display:"Fat Wren", rarity:"Omega"},
  {name:"KSIWithBigHead", display:"KSI Drawing", rarity:"Omega"}
];

const chances = {
  Common: 45,
  Uncommon: 30,
  Rare: 12,
  Epic: 7,
  Legendary: 1,
  Omega: 0.1
};

function rollRarity() {
  let r = Math.random() * 100;
  let sum = 0;
  for (let key in chances) {
    sum += chances[key];
    if (r <= sum) return key;
  }
  return "Common";
}

function openPack() {
  if (!canOpen) return;
  canOpen = false;

  const overlay = document.getElementById("overlay");
  overlay.style.display = "flex";
  overlay.classList.add("fade");

  setTimeout(() => {
    overlay.style.display = "none";
    overlay.classList.remove("fade");

    const rarity = rollRarity();
    const pool = items.filter(i => i.rarity === rarity);
    const item = pool[Math.floor(Math.random() * pool.length)];

    const result = document.getElementById("result");
    result.innerHTML = `<h2 class="${rarity}">${item.display} (${rarity})</h2><img src="${item.name}.jpg">`;
    result.style.display = "block";

    addToInventory(item.name);

    setTimeout(() => {
      canOpen = true;
      result.style.display = "none";
    }, 3000);

  }, 2000);
}

function showTab(tab) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
  renderInventory();
}

function addToInventory(name) {
  let inv = JSON.parse(localStorage.getItem("inventory")) || {};
  inv[name] = (inv[name] || 0) + 1;
  localStorage.setItem("inventory", JSON.stringify(inv));
}

function renderInventory() {
  let inv = JSON.parse(localStorage.getItem("inventory")) || {};
  let container = document.getElementById("inventory-list");
  container.innerHTML = "";

  items.forEach(i => {
    if (inv[i.name]) {
      container.innerHTML += `
        <div class="card">
          <img src="${i.name}.jpg">
          <p class="${i.rarity}">${i.display} x${inv[i.name]}</p>
        </div>
      `;
    }
  });
}

/* RESET WITH EXPLOSION */
function resetInventory() {
  const cards = document.querySelectorAll(".card");

  cards.forEach((card, i) => {
    setTimeout(() => {
      card.classList.add("explode");
    }, i * 100);
  });

  setTimeout(() => {
    localStorage.removeItem("inventory");
    hideConfirm();
    renderInventory();
  }, 800);
}

function showConfirm() {
  document.getElementById("confirmBox").style.display = "block";
  document.getElementById("darken").style.display = "block";
}

function hideConfirm() {
  document.getElementById("confirmBox").style.display = "none";
  document.getElementById("darken").style.display = "none";
}
</script>

</body>
</html>
