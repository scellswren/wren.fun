<!DOCTYPE html>
<html>
<head>
  <title>Wren Packs</title>

  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../Favicon.png">

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    #homeText {
      position: absolute;
      top: 15px;
      left: 20px;
      font-family: 'Rubik', sans-serif;
      font-size: 2em;
      cursor: pointer;
      transition: transform 0.2s;
    }
    #homeText:hover { transform: scale(1.2); }

    h1 { margin-top: 20px; }

    .tabs button {
      padding: 15px 35px;
      margin: 10px;
      font-size: 1.3em;
      cursor: pointer;
      border: none;
      border-radius: 30px;
      color: white;
      font-weight: bold;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .tabs button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px white;
    }

    .packBtn { background: purple; }
    .invBtn { background: green; }
    .indexBtn { background: dodgerblue; }

    /* ✅ ADDED */
    .codeBtn { background: gold; color: black; }

    .notif {
      position: absolute;
      top: -8px;
      right: -8px;
      background: red;
      border-radius: 50%;
      padding: 5px 10px;
      font-size: 0.8em;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .section { display: none; }
    .active { display: block; }

    .pack {
      width: 200px;
      height: 300px;
      margin: 100px auto;
      border: 3px solid purple;
      box-shadow: 0 0 30px purple;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2em;
    }

    #result {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
      z-index: 1000;
    }

    #result img {
      width: 200px;
      animation: spinIn 0.8s forwards;
    }

    @keyframes spinIn {
      0% { transform: scale(0) rotate(-720deg); opacity: 0; }
      50% { transform: scale(1.2) rotate(360deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .explodeOut {
      animation: explodeOutAnim 0.6s forwards;
    }

    @keyframes explodeOutAnim {
      0% { transform: scale(1) rotate(0deg); opacity: 1; }
      50% { transform: scale(1.5) rotate(20deg); opacity: 1; }
      100% { transform: scale(2.5) rotate(40deg); opacity: 0; }
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .card {
      width: 130px;
      position: relative;
      transition: transform 0.5s ease, opacity 0.5s ease;
    }

    .card img { width: 100%; }

    .explode {
      transform: scale(2) rotate(25deg);
      opacity: 0;
    }

    .deleteBtn {
      position: absolute;
      top: -5px;
      right: -5px;
      background: red;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1em;
    }

    #resetBtn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
    }

    #confirmBox, #deletePrompt {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      padding: 30px;
      border-radius: 15px;
      display: none;
      z-index: 2000;
      text-align: center;
    }

    #darken {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      z-index: 1500;
    }

    .Common { color: white; }
    .Uncommon { color: lime; }
    .Rare { color: dodgerblue; }
    .Epic { color: violet; }
    .Legendary { color: gold; }
    .Omega {
      background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
      -webkit-background-clip: text;
      color: transparent;
      animation: rainbow 3s linear infinite;
    }
    .Void { color: cyan; font-weight: bold; }

    @keyframes rainbow {
      100% { filter: hue-rotate(360deg); }
    }

    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.1);
      font-size: 5em;
      color: gold;
      z-index: 9999;
    }

    .fade {
      animation: fadeAnim 2s ease forwards;
    }

    @keyframes fadeAnim {
      0% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0; }
    }

    .rates {
      margin: 30px;
      font-size: 1.2em;
      line-height: 1.8em;
    }

    #deletePrompt input {
      width: 80px;
      padding: 5px;
      font-size: 1em;
    }

    #deletePrompt button {
      margin-top: 10px;
      padding: 5px 10px;
      font-size: 1em;
      cursor: pointer;
    }

    /* ✅ ADDED */
    #codeBox {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      padding: 30px;
      border-radius: 15px;
      display: none;
      z-index: 3000;
      text-align: center;
    }

  </style>
</head>

<body>

<div id="homeText" onclick="goHome()">Wren.fun</div>

<h1>Wren Packs</h1>

<div class="tabs">
  <button class="packBtn" onclick="showTab('pack')">Open Pack</button>
  <button class="invBtn" onclick="showTab('inventory')">
    Inventory
    <span id="notif" class="notif" style="display:none;">0</span>
  </button>
  <button class="indexBtn" onclick="showTab('index')">Index</button>

  <!-- ✅ ADDED -->
  <button class="codeBtn" onclick="openCode()">Code</button>
</div>

<div id="overlay">✨ PACK OPENING ✨</div>

<div id="pack" class="section active">
  <div class="pack" onclick="openPack()">OPEN</div>
</div>

<div id="result"></div>

<div id="inventory" class="section">
  <button id="resetBtn" onclick="showConfirm()">Reset</button>
  <h2>Your Inventory</h2>
  <div id="inventory-list" class="grid"></div>
</div>

<div id="darken"></div>

<div id="confirmBox">
  <h2>Are you sure?</h2>
  <button onclick="resetInventory()">Yes</button>
  <button onclick="hideConfirm()">No</button>
</div>

<div id="deletePrompt">
  <h3>How many to delete?</h3>
  <input type="number" id="deleteQty" min="1">
  <br>
  <button onclick="confirmDelete()">Delete</button>
  <button onclick="cancelDelete()">Cancel</button>
</div>

<!-- ✅ ADDED -->
<div id="codeBox">
  <h3>Enter Code</h3>
  <input type="text" id="codeInput">
  <br><br>
  <button onclick="redeemCode()">Redeem</button>
  <button onclick="closeCode()">Close</button>
</div>

<div id="index" class="section">
  <h2>All Characters</h2>
  <div id="index-list" class="grid"></div>

  <div class="rates">
    <p class="Common">Common: 45%</p>
    <p class="Uncommon">Uncommon: 30%</p>
    <p class="Rare">Rare: 12%</p>
    <p class="Epic">Epic: 7%</p>
    <p class="Legendary">Legendary: 1%</p>
    <p class="Omega">Omega: 0.1%</p>
  </div>
</div>

<script>
let canOpen = true;
let newItems = 0;
let deleteItem = null;

const items = [
  {name:"WrenIsOld", display:"WrenIsOld", rarity:"Common"},
  {name:"TheMindOfOrin", display:"The Mind of Orin", rarity:"Common"},
  {name:"TheRealBaldCena72", display:"Bald Cena", rarity:"Common"},
  {name:"Edunzie", display:"Edunzie", rarity:"Common"},
  {name:"Wren.fun", display:"Wren.fun", rarity:"Common"},
  {name:"Juju2y", display:"Juju2y", rarity:"Uncommon"},
  {name:"Scratch", display:"Scratch", rarity:"Uncommon"},
  {name:"BlockOfCheese", display:"Block Of Cheese", rarity:"Uncommon"},
  {name:"Zxno", display:"Zxno", rarity:"Rare"},
  {name:"EthansHalfTable", display:"EthansHalfTable", rarity:"Rare"},
  {name:"TheTurtleKid2012", display:"Turtle Kid 2012", rarity:"Rare"},
  {name:"ThomasMini", display:"Thomas & Friends Minis", rarity:"Rare"},  
  {name:"TikiTheG", display:"Tikitheg", rarity:"Epic"},
  {name:"Nathan8028", display:"Nathan", rarity:"Epic"},
  {name:"Pigmaxv", display:"Pigmaxv", rarity:"Epic"},
  {name:"AustinsHalfTable", display:"AustinsHalfTable", rarity:"Epic"},  
  {name:"Wren", display:"Wren", rarity:"Legendary"},
  {name:"LuckyCat", display:"Lucky", rarity:"Legendary"},
  {name:"FatWren", display:"Fat Wren", rarity:"Omega"},
  {name:"KSIWithBigHead", display:"KSI Drawing", rarity:"Omega"},
  {name:"OrinFlower", display:"Orin Flower", rarity:"Void"}
];


const chances = {
  Common: 45,
  Uncommon: 30,
  Rare: 12,
  Epic: 7,
  Legendary: 1,
  Omega: 0.1,
  Void: 0
};

function goHome() { window.location.href = "https://scellswren.github.io/wren.fun/"; }

function rollRarity() {
  let r = Math.random() * 100;
  let sum = 0;
  for (let key in chances) { sum += chances[key]; if (r <= sum) return key; }
  return "Common";
}

function updateNotif() {
  const n = document.getElementById("notif");
  if (newItems > 0) { n.style.display = "inline-block"; n.innerText = newItems; } 
  else { n.style.display = "none"; }
}

function openPack() {
  if (!canOpen) return;
  canOpen = false;

  const overlay = document.getElementById("overlay");
  overlay.style.display = "flex";
  overlay.classList.add("fade");

  setTimeout(() => {
    overlay.style.display = "none";
    overlay.classList.remove("fade");

    const rarity = rollRarity();
    const pool = items.filter(i => i.rarity === rarity);
    const item = pool[Math.floor(Math.random() * pool.length)];

    const result = document.getElementById("result");
    result.innerHTML = `<div id="resultInner">
      <h2 class="${rarity}">${item.display} (${rarity})</h2>
      <img src="${item.name}.jpg">
    </div>`;
    result.style.display = "block";

    let inv = JSON.parse(localStorage.getItem("inventory")) || {};
    if (!inv[item.name]) { newItems++; updateNotif(); }

    addToInventory(item.name);

    setTimeout(() => {
      document.getElementById("resultInner").classList.add("explodeOut");
    }, 2000);

    setTimeout(() => { canOpen = true; result.style.display = "none"; }, 2600);

  }, 2000);
}

function showTab(tab) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  if (tab === "inventory") { newItems = 0; updateNotif(); renderInventory(); }
  if (tab === "index") { renderIndex(); }
}

// ✅ FIX 1: Filter out Void rarity items from the Index
function renderIndex() {
  const container = document.getElementById("index-list");
  container.innerHTML = "";
  items.filter(i => i.rarity !== "Void").forEach(i => {
    container.innerHTML += `<div class="card"><img src="${i.name}.jpg"><p class="${i.rarity}">${i.display}</p><p class="${i.rarity}">${i.rarity}</p></div>`;
  });
}

function addToInventory(name) {
  let inv = JSON.parse(localStorage.getItem("inventory")) || {};
  inv[name] = (inv[name] || 0) + 1;
  localStorage.setItem("inventory", JSON.stringify(inv));
}

function renderInventory() {
  let inv = JSON.parse(localStorage.getItem("inventory")) || {};
  let container = document.getElementById("inventory-list");
  container.innerHTML = "";

  items.forEach(i => {
    if (inv[i.name]) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<img src="${i.name}.jpg"><p class="${i.rarity}">${i.display} x${inv[i.name]}</p>`;

      const delBtn = document.createElement("div");
      delBtn.className = "deleteBtn";
      delBtn.innerText = "x";
      delBtn.onclick = (e) => {
        e.stopPropagation();
        deleteItem = i;
        openDeletePrompt(inv[i.name]);
      };
      card.appendChild(delBtn);

      container.appendChild(card);
    }
  });
}

function openDeletePrompt(maxQty) {
  const prompt = document.getElementById("deletePrompt");
  const qtyInput = document.getElementById("deleteQty");
  qtyInput.value = "";
  qtyInput.max = maxQty;
  prompt.style.display = "block";
  document.getElementById("darken").style.display = "block";
}

function confirmDelete() {
  const qty = parseInt(document.getElementById("deleteQty").value);
  if (!qty || qty < 1) return cancelDelete();

  let inv = JSON.parse(localStorage.getItem("inventory")) || {};
  if (!inv[deleteItem.name]) return cancelDelete();

  if (qty >= inv[deleteItem.name]) {
    delete inv[deleteItem.name];
    localStorage.setItem("inventory", JSON.stringify(inv));
    cancelDelete();
    showTab("pack");
  } else {
    inv[deleteItem.name] -= qty;
    localStorage.setItem("inventory", JSON.stringify(inv));
    cancelDelete();
    renderInventory();
  }
}

function cancelDelete() {
  document.getElementById("deletePrompt").style.display = "none";
  document.getElementById("darken").style.display = "none";
  deleteItem = null;
}

function resetInventory() {
  const cards = document.querySelectorAll(".card");
  cards.forEach((card, i) => setTimeout(()=>{ card.classList.add("explode"); }, i*100));
  setTimeout(()=>{ localStorage.removeItem("inventory"); hideConfirm(); renderInventory(); }, 800);
}

function showConfirm() { document.getElementById("confirmBox").style.display = "block"; document.getElementById("darken").style.display = "block"; }
function hideConfirm() { document.getElementById("confirmBox").style.display = "none"; document.getElementById("darken").style.display = "none"; }

/* ✅ ADDED */
function openCode() {
  document.getElementById("codeBox").style.display = "block";
  document.getElementById("darken").style.display = "block";
}

function closeCode() {
  document.getElementById("codeBox").style.display = "none";
  document.getElementById("darken").style.display = "none";
}

// ✅ FIX 2: One-time use for "Subscribe" code (stored in localStorage)
// ✅ FIX 3: Longer animation for Orin Flower (5s display before exploding, total 5.6s)
function redeemCode() {
  const code = document.getElementById("codeInput").value.trim();

  if (code === "Subscribe") {
    const usedCodes = JSON.parse(localStorage.getItem("usedCodes")) || {};

    if (usedCodes["Subscribe"]) {
      alert("This code has already been redeemed!");
      closeCode();
      return;
    }

    usedCodes["Subscribe"] = true;
    localStorage.setItem("usedCodes", JSON.stringify(usedCodes));

    addToInventory("OrinFlower");
    newItems++;
    updateNotif(); 

    const result = document.getElementById("result");
    result.innerHTML = `<div id="resultInner">
      <h2 class="Void">Orin Flower (Void)</h2>
      <img src="OrinFlower.jpg">
    </div>`;
    result.style.display = "block";

    setTimeout(() => {
      document.getElementById("resultInner").classList.add("explodeOut");
    }, 5000);

    setTimeout(() => { result.style.display = "none"; }, 5600);

    alert("Code redeemed! You received Orin Flower.");
  } else {
    alert("Invalid code");
  }

  closeCode();
}

</script>

</body>
</html>
